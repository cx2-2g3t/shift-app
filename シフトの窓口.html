<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>シフトの窓口</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome (アイコン) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    .animate-fade-in-down { animation: fadeInDown 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    
    ::-webkit-scrollbar { height: 8px; width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .bg-stripes-gray { background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(0,0,0,0.05) 5px, rgba(0,0,0,0.05) 10px); }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }

    .tooltip-container { position: relative; display: inline-flex; align-items: center; outline: none; }
    .tooltip-container:hover { z-index: 99999; }
    .tooltip-text { 
      visibility: hidden; 
      position: absolute; 
      bottom: 130%; 
      left: -10px;
      margin-bottom: 8px;
      background-color: #1e293b; 
      color: white; 
      text-align: left; 
      padding: 10px 14px; 
      border-radius: 8px; 
      white-space: normal; 
      min-width: max-content;
      max-width: 250px;
      font-size: 13px;
      font-weight: bold;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.2s, visibility 0.2s;
      pointer-events: none;
      z-index: 99999;
    }
    .tooltip-container:hover .tooltip-text,
    .tooltip-container:active .tooltip-text,
    .tooltip-container:focus-within .tooltip-text {
      visibility: visible;
      opacity: 1;
    }
    .tooltip-text::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 15px; 
      border-width: 6px;
      border-style: solid;
      border-color: #1e293b transparent transparent transparent;
    }
  </style>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const INITIAL_USERS = [
      { employeeId: '1001', id: 'u1', name: '佐藤 (オペレーター)', role: 'staff' },
      { employeeId: '1002', id: 'u2', name: '鈴木 (オペレーター)', role: 'staff' },
      { employeeId: '1003', id: 'u3', name: '高橋 (オペレーター)', role: 'staff' },
      { employeeId: '9999', id: 'admin', name: '管理者 (SV)', role: 'admin' },
    ];

    const DEFAULT_START_TIME = '9:00';
    const DEFAULT_END_TIME = '18:00';
    const START_HOUR = 7;
    const END_HOUR = 22;
    const TOTAL_HOURS = END_HOUR - START_HOUR;
    const timeAxis = Array.from({ length: TOTAL_HOURS }, (_, i) => i + START_HOUR);
    const HOUR_OPTIONS = Array.from({ length: TOTAL_HOURS + 1 }, (_, i) => `${i + START_HOUR}:00`);

    const Icon = ({ name, size = 16, className = "", title = "" }) => (
      <i className={`fas fa-${name} ${className}`} style={{ fontSize: size }} title={title}></i>
    );

    function App() {
      const [isLoading, setIsLoading] = useState(false);
      const [toast, setToast] = useState(null);
      
      const [view, setView] = useState('login'); 
      const [currentUser, setCurrentUser] = useState(null);
      const [employeeIdInput, setEmployeeIdInput] = useState('');
      const [loginError, setLoginError] = useState('');

      const [displayDate, setDisplayDate] = useState(new Date(2026, 3, 1)); 
      
      const [dbUsers, setDbUsers] = useState(INITIAL_USERS);
      const [activeTargetMonth, setActiveTargetMonth] = useState('2026-04');
      const [deadline, setDeadline] = useState('2026-04-15');
      const [isConfirmed, setIsConfirmed] = useState(true); 
      
      const [shifts, setShifts] = useState({
        u1: { 1: {status: '勤務', start: '9:00', end: '18:00', note: '病院のため早退。18時までなら入れます。'}, 2: {status: '勤務', start: '9:00', end: '15:00'}, 15: {status: '勤務', start: '8:00', end: '17:00'} },
        u2: { 1: {status: '勤務', start: '12:00', end: '21:00'}, 2: {status: '休', canWorkIfNeeded: false}, 15: {status: '休', start: '10:00', end: '16:00', canWorkIfNeeded: true} },
        u3: { 1: {status: '勤務', start: '9:00', end: '14:00'}, 2: {status: '勤務', start: '15:00', end: '21:00'}, 15: {status: '勤務', start: '12:00', end: '21:00'} },
      });
      // 💡 テスト用に一部スタッフを未提出や途中保存にしておきます
      const [submissionStatus, setSubmissionStatus] = useState({ u1: '提出済', u2: '未提出', u3: '途中保存' });
      const [dailyNotes, setDailyNotes] = useState({ 15: '新キャンペーン開始日', 25: '入電予測:高' });
      const [personalNotes, setPersonalNotes] = useState({ u1: '今月もSV補佐お願いします！' });
      const [adminNotifications, setAdminNotifications] = useState([]);

      const [modal, setModal] = useState({ isOpen: false, type: '', targetId: null, text: '' });
      const [adminTab, setAdminTab] = useState('shift');
      const [shiftViewMode, setShiftViewMode] = useState('day');
      const [selectedDay, setSelectedDay] = useState(1);
      
      const [newStaff, setNewStaff] = useState({ employeeId: '', name: '' });

      const [staffViewMode, setStaffViewMode] = useState('list'); 
      const [currentWeekIndex, setCurrentWeekIndex] = useState(0);

      const [confirmSubmitModal, setConfirmSubmitModal] = useState({ isOpen: false, isResubmit: false });

      const [changeForm, setChangeForm] = useState({
        isOpen: false,
        day: 1,
        status: '勤務',
        start: DEFAULT_START_TIME,
        end: DEFAULT_END_TIME,
        canWorkIfNeeded: false,
        note: '',
        reason: ''
      });
      
      const [changeRequests, setChangeRequests] = useState([]); 
      const [pendingChanges, setPendingChanges] = useState({}); 

      const currentYear = displayDate.getFullYear();
      const currentMonth = displayDate.getMonth() + 1;
      const currentMonthStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
      const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
      const daysArray = Array.from({ length: daysInMonth }, (_, i) => i + 1);

      const startDayOfWeek = new Date(currentYear, currentMonth - 1, 1).getDay();
      const emptyCells = Array.from({ length: startDayOfWeek }, () => null);
      const calendarCells = [...emptyCells, ...daysArray];
      const totalCells = Math.ceil(calendarCells.length / 7) * 7;
      const trailingEmptyCells = Array.from({ length: totalCells - calendarCells.length }, () => null);
      const fullCalendarCells = [...calendarCells, ...trailingEmptyCells];

      const weeks = [];
      for (let i = 0; i < fullCalendarCells.length; i += 7) {
        weeks.push(fullCalendarCells.slice(i, i + 7));
      }

      const getDayOfWeek = (day) => ['日', '月', '火', '水', '木', '金', '土'][new Date(currentYear, currentMonth - 1, day).getDay()];
      const getDayColor = (day) => {
        const dow = getDayOfWeek(day);
        if (dow === '日') return 'text-red-500 font-bold';
        if (dow === '土') return 'text-blue-500 font-bold';
        return 'text-gray-700 font-bold';
      };

      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const formatShiftStr = (shiftObj) => {
        if (!shiftObj || shiftObj.status === '未') return '未入力';
        if (shiftObj.status === '勤務') return `勤務 (${shiftObj.start}-${shiftObj.end})`;
        if (shiftObj.status === '休' && shiftObj.canWorkIfNeeded) return `休 (${shiftObj.start}-${shiftObj.end} 調整可)`;
        return shiftObj.status;
      };

      const calculateShiftDetails = (startStr, endStr) => {
        if (!startStr || !endStr) return { hours: 0, hasBreak: false, startVal: 0, endVal: 0 };
        const [h1, m1] = startStr.split(':').map(Number);
        const [h2, m2] = endStr.split(':').map(Number);
        const startVal = h1 + m1 / 60;
        const endVal = h2 + m2 / 60;
        const diff = endVal - startVal;
        
        if (diff >= 6) {
          const midVal = startVal + (diff / 2);
          let breakStartVal = Math.round((midVal - 0.5) * 2) / 2;
          const breakEndVal = breakStartVal + 1;
          return { 
            hours: diff - 1, hasBreak: true, startVal, endVal, breakStartVal, breakEndVal,
            breakStartStr: `${Math.floor(breakStartVal)}:${(breakStartVal % 1) * 60 === 0 ? '00' : '30'}`,
            breakEndStr: `${Math.floor(breakEndVal)}:${(breakEndVal % 1) * 60 === 0 ? '00' : '30'}`
          };
        }
        return { hours: diff, hasBreak: false, startVal, endVal };
      };

      const getStaffUsers = () => dbUsers.filter(u => u.role === 'staff');
      
      const getHourlyCount = (day, hour) => {
        let confirmed = 0, possible = 0;
        getStaffUsers().forEach(u => {
          const s = shifts[u.id]?.[day];
          if (!s) return;
          if (s.status === '勤務' || (s.status === '休' && s.canWorkIfNeeded)) {
            const details = calculateShiftDetails(s.start, s.end);
            if (details.hours === 0) return;
            let isWorkingThisHour = (details.startVal <= hour && details.endVal > hour);
            if (isWorkingThisHour && details.hasBreak && details.breakStartVal <= hour && details.breakEndVal > hour) {
              isWorkingThisHour = false;
            }
            if (isWorkingThisHour) {
              if (s.status === '勤務') confirmed++;
              else possible++;
            }
          }
        });
        return { confirmed, possible };
      };

      const simulateLoading = (callback) => {
        setIsLoading(true);
        setTimeout(() => {
          callback();
          setIsLoading(false);
        }, 400);
      };

      const handleLoginSubmit = (e) => {
        e.preventDefault();
        setLoginError('');
        simulateLoading(() => {
          const user = dbUsers.find(u => u.employeeId === employeeIdInput);
          if (user) {
            setCurrentUser(user);
            setView(user.role);
            showToast(`${user.name.split(' ')[0]}としてログインしました`);
            setEmployeeIdInput('');
            if (user.role === 'staff') {
              const [y, m] = activeTargetMonth.split('-');
              setDisplayDate(new Date(parseInt(y), parseInt(m) - 1, 1));
            }
          } else {
            setLoginError('該当する社員番号が見つかりません。');
          }
        });
      };

      const handleLogout = () => { 
        setCurrentUser(null); setView('login'); setAdminTab('shift'); 
      };

      const changeMonth = (offset) => {
        const newDate = new Date(displayDate);
        newDate.setMonth(displayDate.getMonth() + offset);
        setDisplayDate(newDate);
        setSelectedDay(1);
        setCurrentWeekIndex(0); 
      };

      const updateLocalShift = (day, field, value) => {
        setShifts(prev => {
          const uShifts = prev[currentUser.id] || {};
          const cShift = uShifts[day] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
          return { ...prev, [currentUser.id]: { ...uShifts, [day]: { ...cShift, [field]: value } } };
        });
      };

      const handleSubmitShift = (isSubmit = false) => {
        if (isSubmit) {
          const currentShifts = shifts[currentUser.id] || {};
          const hasUnentered = daysArray.some(day => !currentShifts[day] || currentShifts[day].status === '未');
          
          if (hasUnentered) {
            setConfirmSubmitModal({ isOpen: true, isResubmit: submissionStatus[currentUser.id] === '提出済' });
            return;
          }
        }
        executeSubmit(isSubmit);
      };

      const executeSubmit = (isSubmit) => {
        simulateLoading(() => {
          setSubmissionStatus(prev => ({ ...prev, [currentUser.id]: isSubmit ? '提出済' : '途中保存' }));
          showToast(isSubmit ? '提出しました' : '途中保存しました');
          setConfirmSubmitModal({ isOpen: false, isResubmit: false });
        });
      };

      const openChangeForm = () => {
        setChangeForm({
          isOpen: true,
          day: 1,
          status: '勤務',
          start: DEFAULT_START_TIME,
          end: DEFAULT_END_TIME,
          canWorkIfNeeded: false,
          note: '',
          reason: ''
        });
      };

      const submitChangeRequest = () => {
        if (!changeForm.reason.trim()) {
          showToast('変更の理由を入力してください', 'error');
          return;
        }
        const original = (shifts[currentUser.id] || {})[changeForm.day] || { status: '未' };
        const newVal = { status: changeForm.status, start: changeForm.start, end: changeForm.end, canWorkIfNeeded: changeForm.canWorkIfNeeded, note: changeForm.note };

        if (JSON.stringify(original) === JSON.stringify(newVal)) {
          showToast('シフト内容が元の状態から変更されていません', 'error');
          return;
        }
        
        simulateLoading(() => {
          const newReq = {
            id: Date.now(),
            userId: currentUser.id,
            userName: currentUser.name.split(' ')[0],
            changes: [{ day: changeForm.day, oldVal: original, newVal }],
            reason: changeForm.reason,
            status: 'pending',
            createdAt: new Date().toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute:'2-digit' })
          };

          setChangeRequests(prev => [newReq, ...prev]);
          setPendingChanges(prev => {
            const uPending = prev[currentUser.id] || {};
            uPending[changeForm.day] = true;
            return { ...prev, [currentUser.id]: uPending };
          });

          setChangeForm(prev => ({ ...prev, isOpen: false }));
          showToast('管理者に変更申請を送信しました');
        });
      };

      const handleApprove = (reqId) => {
        simulateLoading(() => {
          const req = changeRequests.find(r => r.id === reqId);
          if (!req) return;
          
          setShifts(prev => {
            const uShifts = { ...(prev[req.userId] || {}) };
            req.changes.forEach(c => { uShifts[c.day] = c.newVal; });
            return { ...prev, [req.userId]: uShifts };
          });

          setPendingChanges(prev => {
            const uPending = { ...(prev[req.userId] || {}) };
            req.changes.forEach(c => delete uPending[c.day]);
            return { ...prev, [req.userId]: uPending };
          });

          setChangeRequests(prev => prev.map(r => r.id === reqId ? { ...r, status: 'approved' } : r));
          showToast(`${req.userName} さんの変更を承認しました`);
        });
      };

      const handleReject = (reqId) => {
        simulateLoading(() => {
          const req = changeRequests.find(r => r.id === reqId);
          if (!req) return;

          setPendingChanges(prev => {
            const uPending = { ...(prev[req.userId] || {}) };
            req.changes.forEach(c => delete uPending[c.day]);
            return { ...prev, [req.userId]: uPending };
          });

          setChangeRequests(prev => prev.map(r => r.id === reqId ? { ...r, status: 'rejected' } : r));
          showToast('申請を却下しました');
        });
      };

      const setAsActiveMonth = () => {
        simulateLoading(() => {
          setActiveTargetMonth(currentMonthStr);
          setIsConfirmed(false);
          showToast(`${currentMonthStr} を募集対象月に設定しました`);
        });
      };

      const toggleConfirmAll = () => {
        simulateLoading(() => {
          const newState = !isConfirmed;
          setIsConfirmed(newState);
          showToast(newState ? 'シフトを確定しました' : 'シフトの確定を解除しました');
        });
      };

      const handleSaveModal = () => {
        simulateLoading(() => {
          if (modal.type === 'daily') {
            setDailyNotes(prev => ({ ...prev, [modal.targetId]: modal.text }));
          } else {
            setPersonalNotes(prev => ({ ...prev, [modal.targetId]: modal.text }));
          }
          showToast('メモを保存しました');
          setModal({ isOpen: false, type: '', targetId: null, text: '' });
        });
      };

      const markNotificationAsRead = (id) => {
        setAdminNotifications(prev => prev.map(n => n.id === id ? { ...n, read: true } : n));
      };

      const handleAddStaff = (e) => {
        e.preventDefault();
        simulateLoading(() => {
          const usersList = Array.isArray(dbUsers) ? dbUsers : [];
          if (usersList.some(u => u.employeeId === newStaff.employeeId)) {
            showToast('その社員番号は既に使用されています', 'error');
            return;
          }
          const newId = `u${Date.now()}`;
          const safeName = newStaff.name || '名称未設定';
          const newUser = { employeeId: newStaff.employeeId, id: newId, name: `${safeName} (オペレーター)`, role: 'staff' };
          
          setDbUsers([...usersList, newUser]);
          setSubmissionStatus(prev => ({ ...prev, [newId]: '未提出' }));
          showToast(`${safeName} さんを追加しました`);
          setNewStaff({ employeeId: '', name: '' });
        });
      };

      const handleDeleteStaff = (userId, name) => {
        const safeName = name || 'このスタッフ';
        if (!window.confirm(`${safeName} を削除してよろしいですか？`)) return;
        
        simulateLoading(() => {
          const usersList = Array.isArray(dbUsers) ? dbUsers : [];
          setDbUsers(usersList.filter(u => u.id !== userId));
          showToast(`${safeName} を削除しました`);
        });
      };

      // 💡 未提出者にリマインドメールを送信する機能
      const handleSendRemind = () => {
        simulateLoading(() => {
          const unsubmittedUsers = getStaffUsers().filter(u => {
            const status = submissionStatus[u.id] || '未提出';
            return status === '未提出' || status === '途中保存';
          });
          
          if (unsubmittedUsers.length === 0) {
            showToast('未提出のスタッフはいません');
            return;
          }
          
          showToast(`未提出のスタッフ ${unsubmittedUsers.length} 名にリマインドメールを送信しました`);
        });
      };

      const renderHeader = () => (
        <header className={`${view === 'admin' ? 'bg-indigo-800' : 'bg-blue-600'} text-white px-4 py-3 sm:px-6 sm:py-4 shadow-md sticky top-0 z-30 flex justify-between items-center`}>
          <div className="flex items-center gap-3">
            {view === 'admin' && <Icon name="user-tie" size={24} className="hidden sm:block" />}
            {view === 'staff' && <Icon name="calendar-alt" size={24} className="hidden sm:block" />}
            
            <div className="flex flex-col">
              {view === 'admin' && adminTab === 'staff' ? (
                <h1 className="text-lg sm:text-xl font-bold flex items-center gap-2">スタッフ管理</h1>
              ) : (
                <>
                  <h1 className="text-lg sm:text-xl font-bold flex items-center gap-1 sm:gap-2">
                    シフトの窓口
                  </h1>
                  {view === 'admin' && <span className="text-[10px] sm:text-xs opacity-90 font-medium leading-none mt-0.5">管理者ダッシュボード</span>}
                </>
              )}
              
              {!(view === 'admin' && adminTab === 'staff') && (
                <div className="flex items-center gap-2 mt-0.5 text-sm opacity-90">
                  <button onClick={() => changeMonth(-1)} className="p-1 hover:bg-white/20 rounded transition-colors"><Icon name="chevron-left" size={12}/></button>
                  <span className="min-w-[5rem] text-center font-medium">{currentYear}年 {currentMonth}月</span>
                  <button onClick={() => changeMonth(1)} className="p-1 hover:bg-white/20 rounded transition-colors"><Icon name="chevron-right" size={12}/></button>
                  {view === 'staff' && <span className="ml-2 border-l border-white/40 pl-3 truncate max-w-[150px] font-bold">{currentUser?.name?.replace(' (オペレーター)', '')}</span>}
                </div>
              )}
            </div>
          </div>
          <button onClick={handleLogout} className={`p-2 rounded-full flex items-center gap-2 text-sm font-bold ${view === 'admin' ? 'bg-indigo-700 hover:bg-indigo-600' : 'bg-blue-500 hover:bg-blue-400'}`}>
            <Icon name="sign-out-alt" size={16}/> <span className="hidden sm:inline">ログアウト</span>
          </button>
        </header>
      );

      const renderLoadingOverlay = () => {
        if (!isLoading) return null;
        return (
          <div className="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50">
            <div className="bg-white p-4 rounded-xl shadow-xl flex items-center gap-3">
              <Icon name="spinner" className="fa-spin text-blue-600" size={28} />
              <span className="font-bold text-gray-700 text-lg">処理中...</span>
            </div>
          </div>
        );
      };

      const renderToastAlert = () => {
        if (!toast) return null;
        return (
          <div className="fixed top-4 right-4 z-50 animate-fade-in-down pointer-events-none">
            <div className={`flex items-center gap-2 px-6 py-4 rounded-lg shadow-lg text-white font-bold text-base ${toast.type === 'success' ? 'bg-gray-800' : 'bg-red-600'}`}>
              <Icon name={toast.type === 'success' ? 'check-circle' : 'exclamation-circle'} size={20} />{toast.message}
            </div>
          </div>
        );
      };

      // 💡 ログイン画面
      if (view === 'login') {
        return (
          <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4 relative">
            {renderLoadingOverlay()}
            <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-xl w-full max-w-md border-t-4 border-blue-600">
              <div className="text-center mb-6 sm:mb-8 text-blue-600">
                <Icon name="calendar-alt" size={56} className="mb-4 text-blue-600" />
                <h1 className="text-2xl sm:text-3xl font-black text-gray-800 mt-2 tracking-tight">シフトの窓口</h1>
              </div>
              <form onSubmit={handleLoginSubmit} className="space-y-5 sm:space-y-6">
                {loginError && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-base flex items-center gap-2 font-bold"><Icon name="exclamation-triangle" />{loginError}</div>}
                <div>
                  <label className="block text-sm sm:text-base font-bold text-gray-700 mb-2 text-center">社員番号を入力してください</label>
                  <div className="relative">
                    <input type="text" inputMode="numeric" pattern="[0-9]*" value={employeeIdInput} onChange={(e) => setEmployeeIdInput(e.target.value)} className="w-full bg-gray-50 border-2 border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3 sm:p-4 text-xl sm:text-2xl tracking-widest font-bold text-center" placeholder="例: 1234567" required />
                  </div>
                </div>
                <button type="submit" className="w-full text-white bg-blue-600 hover:bg-blue-700 font-bold rounded-xl px-5 py-3 sm:py-4 shadow-md text-lg sm:text-xl">ログイン</button>

          </div>

      // 💡 スタッフ画面
      if (view === 'staff') {
        const myShifts = shifts[currentUser.id] || {};
        const isOverdue = new Date() > new Date(deadline);
        const isActive = currentMonthStr === activeTargetMonth;
        const myPendingDays = pendingChanges[currentUser.id] || {};
        const hasPending = Object.keys(myPendingDays).length > 0;
        
        let myStatus = submissionStatus[currentUser.id] || '未提出';
        if (isConfirmed && hasPending) myStatus = '申請結果待ち';
        const isDisabled = isConfirmed || currentMonthStr !== activeTargetMonth;

        return (
          <div className="min-h-screen bg-gray-50 pb-28 relative">
            {renderLoadingOverlay()}
            {renderHeader()}
            
            <div className="max-w-4xl mx-auto p-3 sm:p-4 space-y-3 sm:space-y-4 animate-fade-in">
              
              {!isActive && (
                <div className="bg-yellow-50 text-yellow-800 border border-yellow-200 p-4 rounded-xl flex items-start gap-3 shadow-sm text-base">
                  <Icon name="shield-alt" size={24} className="shrink-0 mt-0.5" />
                  <div><p className="font-bold">{currentMonth}月は現在提出期間ではありません。</p><p className="text-sm mt-1">過去のシフトの確認、または次回の募集開始をお待ち下さい。</p></div>
                </div>
              )}

              {isActive && (
                <div className={`rounded-xl p-4 flex items-center justify-between border shadow-sm ${isOverdue ? 'bg-red-50 border-red-200' : 'bg-white border-gray-200'}`}>

                    <Icon name="calendar-alt" size={24} className={isOverdue ? "text-red-500" : "text-gray-500"} />

                  </div>
                  <span className={`text-lg sm:text-xl font-black flex items-center ${isOverdue ? "text-red-600" : "text-gray-800"}`}>

                    {isOverdue && <span className="text-sm ml-3 bg-red-500 text-white px-2.5 py-0.5 rounded-full">期限切れ</span>}
                  </span>
                </div>

                <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-4 shadow-sm relative overflow-hidden">

                    <Icon name="comment-alt" size={24} className="text-indigo-500 shrink-0 mt-0.5" />

                      <p className="text-sm font-bold text-indigo-800 mb-1">管理者からのメッセージ</p>

                    </div>
                  </div>
                </div>

              {isActive && (
                <div className={`bg-white rounded-xl shadow-sm p-4 flex items-center justify-between border-l-4 ${hasPending ? 'border-orange-500' : 'border-blue-500'}`}>

                    <Icon name="info-circle" size={20} className={hasPending ? "text-orange-500" : "text-blue-500"}/> 現在の状況:
                  </span>
                  <span className={`px-3 py-1 rounded-full text-sm sm:text-base font-bold ${myStatus === '提出済' ? 'bg-green-100 text-green-700' : myStatus === '申請結果待ち' ? 'bg-orange-100 text-orange-700 border border-orange-200' : myStatus === '途中保存' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-200 text-gray-700'}`}>{myStatus}</span>

                <button onClick={() => setStaffViewMode('week')} className={`flex-1 flex justify-center items-center gap-2 px-3 py-2.5 text-sm sm:text-base font-bold rounded-lg transition-colors ${staffViewMode === 'week' ? 'bg-blue-50 text-blue-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><Icon name="calendar-week" /> 週間</button>
                <button onClick={() => setStaffViewMode('month')} className={`flex-1 flex justify-center items-center gap-2 px-3 py-2.5 text-sm sm:text-base font-bold rounded-lg transition-colors ${staffViewMode === 'month' ? 'bg-blue-50 text-blue-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><Icon name="calendar-alt" /> 月間</button>

              {isConfirmed && (
                <div className="bg-blue-50 text-blue-700 text-sm font-bold p-3 rounded-xl text-center border border-blue-200">

                      const shiftData = myShifts[day] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };

                      const isRest = shiftData.status === '休';

                          {isPendingDay && (
                            <div className="absolute top-2 right-2 bg-orange-500 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-sm z-10 flex items-center gap-1">

                              <button onClick={() => updateLocalShift(day, 'status', '休')} disabled={isDisabled} className={`flex-[1.5] sm:flex-1 sm:max-w-[3.5rem] px-1 py-2 sm:py-2.5 rounded-lg text-sm font-bold transition-all ${shiftData.status === '休' ? 'bg-red-500 text-white shadow-md' : 'bg-white border border-gray-300 text-gray-700'} disabled:opacity-40`}>休</button>

                          </div>

                                <select value={shiftData.start} onChange={(e) => updateLocalShift(day, 'start', e.target.value)} disabled={isDisabled} className={`bg-white border text-sm sm:text-base rounded-lg block px-2 py-2 w-[5.5rem] sm:w-[6.5rem] text-center appearance-none disabled:bg-gray-100 ${isRest ? 'border-orange-300 text-orange-800' : 'border-blue-200 text-blue-900'}`} style={{ textAlignLast: 'center' }}>
                                  {HOUR_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}

                                <span className="text-gray-400 font-bold">~</span>
                                <select value={shiftData.end} onChange={(e) => updateLocalShift(day, 'end', e.target.value)} disabled={isDisabled} className={`bg-white border text-sm sm:text-base rounded-lg block px-2 py-2 w-[5.5rem] sm:w-[6.5rem] text-center appearance-none disabled:bg-gray-100 ${isRest ? 'border-orange-300 text-orange-800' : 'border-blue-200 text-blue-900'}`} style={{ textAlignLast: 'center' }}>
                                  {HOUR_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
                                </select>
                              </div>
                            </div>

                          {shiftData.status !== '未' && (
                            <div className="flex justify-end sm:pl-16 animate-fade-in-down mt-1">
                              <div className="relative w-full sm:w-auto">
                                <Icon name="comment-dots" className="absolute left-3 top-[10px] text-gray-400 text-xs" />
                                <input type="text" value={shiftData.note || ''} onChange={(e) => updateLocalShift(day, 'note', e.target.value)} disabled={isDisabled} placeholder="備考 (任意)" className="w-full sm:w-72 bg-white border border-gray-300 text-sm rounded-lg pl-8 pr-3 py-2 focus:ring-2 focus:ring-blue-300 outline-none disabled:bg-gray-100" />
                              </div>
                            </div>
                          )}

                          {isRest && !isDisabled && (
                            <div className="flex justify-end sm:pl-16 animate-fade-in-down mt-1">

                                <input type="checkbox" className="sr-only peer" checked={shiftData.canWorkIfNeeded} onChange={() => updateLocalShift(day, 'canWorkIfNeeded', !shiftData.canWorkIfNeeded)} />

                                <span className="text-xs sm:text-sm font-bold text-gray-600">出勤調整可能</span>
                              </label>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {staffViewMode === 'week' && (
                <div className="mb-6 animate-fade-in overflow-x-auto no-scrollbar pt-4 pb-16">

                    <button onClick={() => setCurrentWeekIndex(Math.max(0, currentWeekIndex - 1))} disabled={currentWeekIndex === 0} className="p-2 sm:p-3 rounded hover:bg-gray-100 disabled:opacity-50"><Icon name="chevron-left" size={18}/></button>

                    <button onClick={() => setCurrentWeekIndex(Math.min(weeks.length - 1, currentWeekIndex + 1))} disabled={currentWeekIndex === weeks.length - 1} className="p-2 sm:p-3 rounded hover:bg-gray-100 disabled:opacity-50"><Icon name="chevron-right" size={18}/></button>
                  </div>

                  <div className="grid grid-cols-2 sm:grid-cols-7 gap-3 sm:gap-4 min-w-[350px] sm:min-w-[800px]">
                    {weeks[currentWeekIndex].map((day, idx) => {
                      if (!day) return <div key={`empty-${idx}`} className="hidden sm:block opacity-50 bg-gray-100 rounded-xl border border-gray-200 min-h-[180px]"></div>;
                      
                      const shiftData = myShifts[day] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
                      const isWorking = shiftData.status === '勤務';
                      const isRest = shiftData.status === '休';
                      const isPendingDay = myPendingDays[day]; 
                      const rowDisabled = isDisabled || isPendingDay;

                      return (
                        <div key={day} className={`bg-white border rounded-xl p-3 flex flex-col gap-2 shadow-sm relative ${isPendingDay ? 'bg-orange-50 border-orange-200' : 'border-gray-200'} hover:z-50`}>

                          <div className="text-center border-b border-gray-100 pb-2">
                            <div className={`text-2xl font-black leading-tight ${getDayColor(day)}`}>{day}</div>
                            <div className={`text-sm font-bold ${getDayColor(day)}`}>{getDayOfWeek(day)}</div>
                            {dailyNotes[day] && <div className="text-xs bg-red-100 text-red-700 font-bold px-1.5 py-0.5 rounded mt-1.5 truncate" title={dailyNotes[day]}>{dailyNotes[day]}</div>}
                          </div>

                          <div className="grid grid-cols-2 gap-1.5 mt-1">
                            <button onClick={() => updateLocalShift(day, 'status', '未')} disabled={rowDisabled} className={`py-2 rounded-lg text-sm font-bold transition-colors ${shiftData.status === '未' ? 'bg-gray-600 text-white' : 'bg-gray-100 text-gray-500'} disabled:opacity-40`}>未</button>
                            <button onClick={() => updateLocalShift(day, 'status', '休')} disabled={rowDisabled} className={`py-2 rounded-lg text-sm font-bold transition-colors ${shiftData.status === '休' ? 'bg-red-500 text-white' : 'bg-white border border-gray-300 text-gray-700'} disabled:opacity-40`}>休</button>
                            <button onClick={() => updateLocalShift(day, 'status', '有休')} disabled={rowDisabled} className={`py-2 rounded-lg text-sm font-bold transition-colors ${shiftData.status === '有休' ? 'bg-teal-500 text-white' : 'bg-white border border-gray-300 text-gray-700'} disabled:opacity-40`}>有</button>
                            <button onClick={() => updateLocalShift(day, 'status', '勤務')} disabled={rowDisabled} className={`py-2 rounded-lg text-sm font-bold transition-colors ${isWorking ? 'bg-blue-600 text-white' : 'bg-white border border-gray-300 text-blue-700'} disabled:opacity-40`}>勤</button>

                          {(isWorking || (isRest && shiftData.canWorkIfNeeded)) && (
                            <div className="flex flex-col gap-1.5 mt-auto pt-2">

                                {HOUR_OPTIONS.map(t=><option key={t} value={t}>{t}</option>)}
                              </select>
                              <div className="text-center text-gray-300 text-xs leading-none">▼</div>
                              <select value={shiftData.end} onChange={(e) => updateLocalShift(day, 'end', e.target.value)} disabled={rowDisabled} className="bg-gray-50 border border-gray-300 text-sm sm:text-base rounded-lg block px-2 py-1.5 w-full text-center font-bold appearance-none" style={{ textAlignLast: 'center' }}>
                                {HOUR_OPTIONS.map(t=><option key={t} value={t}>{t}</option>)}
                              </select>
                            </div>
                          )}
                          
                          {shiftData.status !== '未' && (
                            <input type="text" value={shiftData.note || ''} onChange={(e) => updateLocalShift(day, 'note', e.target.value)} disabled={rowDisabled} placeholder="備考" className="mt-2 bg-white border border-gray-300 text-xs sm:text-sm rounded-lg block px-2 py-1.5 w-full text-center focus:ring-1 focus:ring-blue-300 outline-none disabled:bg-gray-50 shadow-inner" />
                          )}

                          {isRest && !rowDisabled && (
                            <label className="flex items-center cursor-pointer gap-1.5 justify-center mt-2 bg-gray-50 p-1.5 rounded-lg border border-gray-200">
                              <input type="checkbox" className="sr-only peer" checked={shiftData.canWorkIfNeeded} onChange={() => updateLocalShift(day, 'canWorkIfNeeded', !shiftData.canWorkIfNeeded)} />
                              <div className="relative w-7 h-4 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[1px] after:start-[1px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-orange-500"></div>
                              <span className="text-xs font-bold text-gray-600">調整可</span>
                            </label>

                        </div>

              {staffViewMode === 'month' && (
                <div className="bg-white rounded-xl shadow-sm mb-6 border border-gray-200 overflow-x-auto animate-fade-in no-scrollbar pt-16 pb-20">
                  <div className="min-w-[700px]">
                    <div className="grid grid-cols-7 bg-gray-100 border-b border-gray-200">
                      {['日', '月', '火', '水', '木', '金', '土'].map((dow, i) => (

                            const shiftData = myShifts[day] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
                            const isWorking = shiftData.status === '勤務';
                            const isRest = shiftData.status === '休';
                            const isPendingDay = myPendingDays[day]; 
                            const rowDisabled = isDisabled || isPendingDay;

                            if (shiftData.status === '勤務') statusColorClass = 'bg-blue-100 text-blue-800 border-blue-300 font-bold';
                            if (shiftData.status === '休') statusColorClass = 'bg-red-50 text-red-700 border-red-200 font-bold';

                            return (
                              <div key={day} className={`p-2 sm:p-3 border-r last:border-r-0 border-gray-200 min-h-[140px] flex flex-col relative transition-colors ${isPendingDay ? 'bg-orange-50' : 'hover:bg-blue-50/10'} hover:z-[100]`}>
                                {isPendingDay && <div className="absolute top-1 right-1 bg-orange-500 text-white text-xs font-bold px-1.5 py-0.5 rounded shadow-sm z-10">申請中</div>}
                                
                                <div className="flex justify-between items-start mb-2">
                                  <span className={`text-base font-black ${getDayColor(day)}`}>{day}</span>

                                </div>

                                <div className="mt-auto flex flex-col gap-1.5">
                                  <select 
                                    value={shiftData.status} 
                                    onChange={(e) => updateLocalShift(day, 'status', e.target.value)}

                                    <option value="未" className="text-gray-600 bg-white">未入力</option>
                                    <option value="休" className="text-red-600 bg-white">休 み</option>
                                    <option value="有休" className="text-teal-600 bg-white">有 休</option>
                                    <option value="勤務" className="text-blue-600 bg-white">勤 務</option>
                                  </select>
