<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>シフトの窓口</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    .animate-fade-in-down { animation: fadeInDown 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { height: 8px; width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .bg-stripes-gray { background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(0,0,0,0.05) 5px, rgba(0,0,0,0.05) 10px); }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }

    .tooltip-container { position: relative; display: inline-flex; align-items: center; outline: none; }
    .tooltip-container:hover { z-index: 99999; }
    .tooltip-text { 
      visibility: hidden; 
      position: absolute; 
      bottom: 130%; 
      left: -10px;
      margin-bottom: 8px;
      background-color: #1e293b; 
      color: white; 
      text-align: left; 
      padding: 10px 14px; 
      border-radius: 8px; 
      white-space: normal; 
      min-width: max-content;
      max-width: 250px;
      font-size: 13px;
      font-weight: bold;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.2s, visibility 0.2s;
      pointer-events: none;
      z-index: 99999;
    }
    .tooltip-container:hover .tooltip-text,
    .tooltip-container:active .tooltip-text,
    .tooltip-container:focus-within .tooltip-text {
      visibility: visible;
      opacity: 1;
    }
    .tooltip-text::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 15px; 
      border-width: 6px;
      border-style: solid;
      border-color: #1e293b transparent transparent transparent;
    }
  </style>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const INITIAL_USERS = [
      { employeeId: '1001', id: 'u1', name: '佐藤 (オペレーター)', email: 'sato@example.com', role: 'staff', status: 'active', password: '1001' },
      { employeeId: '1002', id: 'u2', name: '鈴木 (オペレーター)', email: 'suzuki@example.com', role: 'staff', status: 'active', password: '1002' },
      { employeeId: '1003', id: 'u3', name: '高橋 (オペレーター)', email: 'takahashi@example.com', role: 'staff', status: 'active', password: '1003' },
      { employeeId: '9999', id: 'admin', name: '管理者 (SV)', email: 'admin@example.com', role: 'admin', status: 'active', password: '9999' },
    ];

    const DEFAULT_START_TIME = '9:00';
    const DEFAULT_END_TIME = '18:00';
    const START_HOUR = 7;
    const END_HOUR = 22;
    const TOTAL_HOURS = END_HOUR - START_HOUR;
    const timeAxis = Array.from({ length: TOTAL_HOURS }, (_, i) => i + START_HOUR);
    const HOUR_OPTIONS = Array.from({ length: TOTAL_HOURS + 1 }, (_, i) => `${i + START_HOUR}:00`);

    const Icon = ({ name, size = 16, className = "", title = "" }) => (
      <i className={`fas fa-${name} ${className}`} style={{ fontSize: size }} title={title}></i>
    );

    function App() {
      const [isLoading, setIsLoading] = useState(false);
      const [toast, setToast] = useState(null);
      const [view, setView] = useState('login'); 
      const [currentUser, setCurrentUser] = useState(null);
      
      const [loginStep, setLoginStep] = useState('login'); 
      const [tempUser, setTempUser] = useState(null);
      const [isResetMode, setIsResetMode] = useState(false); 

      const [employeeIdInput, setEmployeeIdInput] = useState('');
      const [passwordInput, setPasswordInput] = useState('');
      const [passwordConfirm, setPasswordConfirm] = useState('');
      const [resetIdInput, setResetIdInput] = useState('');
      const [resetEmailInput, setResetEmailInput] = useState('');
      const [loginError, setLoginError] = useState('');

      const [displayDate, setDisplayDate] = useState(new Date(2026, 3, 1)); 
      const [dbUsers, setDbUsers] = useState(INITIAL_USERS);
      const [activeTargetMonth, setActiveTargetMonth] = useState('2026-04');
      const [deadline, setDeadline] = useState('2026-03-15');
      const [isConfirmed, setIsConfirmed] = useState(true); 
      
      const [shifts, setShifts] = useState({
        u1: { 1: {status: '勤務', start: '9:00', end: '18:00', note: '病院のため早退。18時までなら入れます。'}, 2: {status: '勤務', start: '9:00', end: '14:00'}, 15: {status: '勤務', start: '8:00', end: '17:00'} },
        u2: { 1: {status: '勤務', start: '12:00', end: '21:00'}, 2: {status: '休', canWorkIfNeeded: false}, 15: {status: '休', start: '10:00', end: '15:00', canWorkIfNeeded: true} },
        u3: { 1: {status: '勤務', start: '9:00', end: '14:00'}, 2: {status: '勤務', start: '15:00', end: '20:00'}, 15: {status: '勤務', start: '12:00', end: '21:00'} },
      });
      const [submissionStatus, setSubmissionStatus] = useState({ u1: '提出済', u2: '未提出', u3: '途中保存' });
      const [dailyNotes, setDailyNotes] = useState({ 15: '新キャンペーン開始日のため全員出勤推奨', 25: '入電予測:高' });
      const [personalNotes, setPersonalNotes] = useState({ u1: '今月もSV補佐お願いします！' });
      const [adminNotifications, setAdminNotifications] = useState([]);

      const [modal, setModal] = useState({ isOpen: false, type: '', targetId: null, text: '' });
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null, isAlert: false });

      const [adminTab, setAdminTab] = useState('shift');
      const [shiftViewMode, setShiftViewMode] = useState('month');
      const [selectedDay, setSelectedDay] = useState(1);
      const [newStaff, setNewStaff] = useState({ employeeId: '', name: '', email: '' });
      const [showRetired, setShowRetired] = useState(false);
      const [staffViewMode, setStaffViewMode] = useState('list'); 
      const [currentWeekIndex, setCurrentWeekIndex] = useState(0);
      const [changeForm, setChangeForm] = useState({ isOpen: false, day: 1, status: '勤務', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '', reason: '', changeType: '' });
      const [changeRequests, setChangeRequests] = useState([]); 
      const [pendingChanges, setPendingChanges] = useState({}); 
      const [approvalChecks, setApprovalChecks] = useState({}); 
      const [adminChangeTypes, setAdminChangeTypes] = useState({}); 

      const currentYear = displayDate.getFullYear();
      const currentMonth = displayDate.getMonth() + 1;
      const currentMonthStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
      const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
      const daysArray = Array.from({ length: daysInMonth }, (_, i) => i + 1);

      const weeks = useMemo(() => {
        const startDayOfWeek = new Date(currentYear, currentMonth - 1, 1).getDay();
        const emptyCells = Array.from({ length: startDayOfWeek }, () => null);
        const calendarCells = [...emptyCells, ...daysArray];
        const totalCells = Math.ceil(calendarCells.length / 7) * 7;
        const trailingEmptyCells = Array.from({ length: totalCells - calendarCells.length }, () => null);
        const fullCells = [...calendarCells, ...trailingEmptyCells];
        const rows = [];
        for (let i = 0; i < fullCells.length; i += 7) rows.push(fullCells.slice(i, i + 7));
        return rows;
      }, [currentYear, currentMonth, daysArray]);

      const getDayOfWeek = (day) => ['日', '月', '火', '水', '木', '金', '土'][new Date(currentYear, currentMonth - 1, day).getDay()];
      const getDayColor = (day) => {
        const dow = getDayOfWeek(day);
        if (dow === '日') return 'text-red-500 font-bold';
        if (dow === '土') return 'text-blue-500 font-bold';
        return 'text-gray-700 font-bold';
      };
      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };
      const formatShiftStr = (shiftObj) => {
        if (!shiftObj || shiftObj.status === '未') return '未入力';
        if (shiftObj.status === '休' && !shiftObj.canWorkIfNeeded) return '休';
        if (shiftObj.status === '有休') return '有休';
        if (shiftObj.status === '勤務') return `勤務 (${shiftObj.start}-${shiftObj.end})`;
        if (shiftObj.status === '休' && shiftObj.canWorkIfNeeded) return `休 (${shiftObj.start}-${shiftObj.end}可)`;
        return shiftObj.status;
      };
      const calculateShiftDetails = (startStr, endStr) => {
        if (!startStr || !endStr) return { hours: 0, hasBreak: false, startVal: 0, endVal: 0 };
        const [h1, m1] = startStr.split(':').map(Number);
        const [h2, m2] = endStr.split(':').map(Number);
        const startVal = h1 + m1 / 60;
        const endVal = h2 + m2 / 60;
        const diff = endVal - startVal;
        
        // 💡 6時間を超える場合に1時間休憩を引く (6時間ちょうどは引かない)
        if (diff > 6) {
          const midVal = startVal + (diff / 2);
          let breakStartVal = Math.round((midVal - 0.5) * 2) / 2;
          const breakEndVal = breakStartVal + 1;
          return { hours: diff - 1, hasBreak: true, startVal, endVal, breakStartVal, breakEndVal, breakStartStr: `${Math.floor(breakStartVal)}:${(breakStartVal % 1) * 60 === 0 ? '00' : '30'}`, breakEndStr: `${Math.floor(breakEndVal)}:${(breakEndVal % 1) * 60 === 0 ? '00' : '30'}` };
        }
        return { hours: diff, hasBreak: false, startVal, endVal };
      };
      const getStaffUsers = () => dbUsers.filter(u => u.role === 'staff');
      
      const getHourlyCount = (day, hour) => {
        let confirmed = 0, possible = 0;
        getStaffUsers().forEach(u => {
          if (u.status === 'retired') return; 
          const s = shifts[u.id]?.[day];
          if (!s) return;
          if (s.status === '勤務' || (s.status === '休' && s.canWorkIfNeeded)) {
            const details = calculateShiftDetails(s.start, s.end);
            if (details.hours === 0) return;
            let isWorkingThisHour = (details.startVal <= hour && details.endVal > hour);
            if (isWorkingThisHour && details.hasBreak && details.breakStartVal <= hour && details.breakEndVal > hour) isWorkingThisHour = false;
            if (isWorkingThisHour) { if (s.status === '勤務') confirmed++; else possible++; }
          }
        });
        return { confirmed, possible };
      };

      // 💡 日別の出勤人数・稼働時間を計算する関数
      const getDailySummary = (day) => {
        let confirmed = 0;
        let possible = 0;
        let totalHours = 0;
        getStaffUsers().filter(u => u.status === 'active').forEach(u => {
          const s = shifts[u.id]?.[day];
          if (s) {
            if (s.status === '勤務') {
              confirmed++;
              const details = calculateShiftDetails(s.start, s.end);
              totalHours += details.hours;
            } else if (s.status === '休' && s.canWorkIfNeeded) {
              possible++;
            }
          }
        });
        return { confirmed, possible, totalHours };
      };

      const simulateLoading = (callback) => {
        setIsLoading(true);
        setTimeout(() => { callback(); setIsLoading(false); }, 400);
      };

      const handleDemoLogin = (empId) => {
        setLoginError('');
        simulateLoading(() => {
          const user = dbUsers.find(u => u.employeeId === empId);
          if (user) {
            loginSuccess(user);
          }
        });
      };

      const handleLoginSubmit = (e) => {
        e.preventDefault();
        setLoginError('');
        simulateLoading(() => {
          const user = dbUsers.find(u => u.employeeId === employeeIdInput);
          if (!user) {
            setLoginError('該当する社員番号が見つかりません。');
            return;
          }
          if (user.status === 'retired') {
            setLoginError('このアカウントは現在利用できません。管理者に確認してください。');
            return;
          }
          
          if (user.password === passwordInput) {
            if (passwordInput === user.employeeId) {
              setTempUser(user);
              setIsResetMode(false);
              setLoginStep('change_password');
            } else {
              loginSuccess(user);
            }
          } else {
            setLoginError('パスワードが間違っています。');
          }
        });
      };

      const validatePassword = (pw) => {
        if (pw.length < 8) return { valid: false, msg: 'パスワードは8文字以上で設定してください。' };
        
        let matchCount = 0;
        if (/[A-Z]/.test(pw)) matchCount++; 
        if (/[a-z]/.test(pw)) matchCount++; 
        if (/[0-9]/.test(pw)) matchCount++; 
        if (/[^A-Za-z0-9]/.test(pw)) matchCount++; 
        
        if (matchCount < 3) {
          return { valid: false, msg: '英大文字、英小文字、数字、記号のうち3種類以上を組み合わせてください。' };
        }
        
        return { valid: true };
      };

      const handleChangePasswordSubmit = (e) => {
        e.preventDefault();
        setLoginError('');
        
        if (!tempUser) {
          setLoginError('ユーザー情報が失われました。最初からやり直してください。');
          setLoginStep('login');
          return;
        }
        
        if (passwordInput !== passwordConfirm) {
          setLoginError('パスワードが一致しません。');
          return;
        }

        if (passwordInput === tempUser.employeeId) {
          setLoginError('初期パスワード(社員番号)と同じパスワードは設定できません。');
          return;
        }

        const validation = validatePassword(passwordInput);
        if (!validation.valid) {
          setLoginError(validation.msg);
          return;
        }
        
        simulateLoading(() => {
          setDbUsers(prev => prev.map(u => u.id === tempUser.id ? { ...u, password: passwordInput } : u));
          const updatedUser = { ...tempUser, password: passwordInput };
          showToast(isResetMode ? 'パスワードを再設定しました' : 'パスワードを変更しました');
          loginSuccess(updatedUser);
        });
      };

      const handleResetRequestSubmit = (e) => {
        e.preventDefault();
        setLoginError('');
        simulateLoading(() => {
          const user = dbUsers.find(u => u.employeeId === resetIdInput);
          
          if (user && user.email === resetEmailInput) {
            setDbUsers(prev => prev.map(u => u.id === user.id ? { ...u, password: null } : u));
            setTempUser({...user, password: null});
            setIsResetMode(true);
            setLoginStep('change_password');
            setPasswordInput('');
            setPasswordConfirm('');
            setResetIdInput('');
            setResetEmailInput('');
            showToast('本人確認が完了しました。新しいパスワードを設定してください。');
          } else {
            setLoginError('入力された社員番号またはメールアドレスが登録情報と一致しません。');
          }
        });
      };

      const loginSuccess = (user) => {
        setCurrentUser(user);
        setView(user.role);
        setEmployeeIdInput('');
        setPasswordInput('');
        setPasswordConfirm('');
        setLoginStep('login');
        setTempUser(null);
        setIsResetMode(false);
        if (user.role === 'staff') {
          const [y, m] = activeTargetMonth.split('-');
          setDisplayDate(new Date(parseInt(y), parseInt(m) - 1, 1));
        }
      };

      const goBackToLogin = () => {
        setLoginStep('login');
        setPasswordInput('');
        setPasswordConfirm('');
        setResetIdInput('');
        setResetEmailInput('');
        setTempUser(null);
        setIsResetMode(false);
        setLoginError('');
      };

      const handleLogout = () => { 
        setCurrentUser(null); setView('login'); setAdminTab('shift'); setLoginStep('login');
      };

      const changeMonth = (offset) => {
        const newDate = new Date(displayDate);
        newDate.setMonth(displayDate.getMonth() + offset);
        setDisplayDate(newDate);
        setSelectedDay(1);
        setCurrentWeekIndex(0); 
      };

      const updateLocalShift = (day, field, value) => {
        if (!currentUser) return;
        setShifts(prev => {
          const uShifts = prev[currentUser.id] || {};
          const cShift = uShifts[day] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
          return { ...prev, [currentUser.id]: { ...uShifts, [day]: { ...cShift, [field]: value } } };
        });
      };

      const handleSubmitShift = (isSubmit = false) => {
        if (isSubmit && currentUser) {
          const currentShifts = shifts[currentUser.id] || {};
          const hasUnentered = daysArray.some(day => !currentShifts[day] || currentShifts[day].status === '未');
          if (hasUnentered) {
            setConfirmModal({
              isOpen: true,
              title: '未入力エラー',
              message: '未入力のシフトがあります。\nカレンダーのすべての日付に「休」「有休」「勤務」のいずれかを選択してから提出してください。',
              isAlert: true,
              onConfirm: null
            });
            return;
          }
        }
        executeSubmit(isSubmit);
      };

      const executeSubmit = (isSubmit) => {
        simulateLoading(() => {
          if (!currentUser) return;
          setSubmissionStatus(prev => ({ ...prev, [currentUser.id]: isSubmit ? '提出済' : '途中保存' }));
          showToast(isSubmit ? 'シフトを提出しました' : '一時保存しました');
        });
      };

      // --- 変更申請フォーム関連 ---
      const handleChangeFormDay = (dayStr) => {
        const day = parseInt(dayStr);
        if (!currentUser) return;
        const currentShift = (shifts[currentUser.id] || {})[day] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
        
        let newStart = currentShift.start || DEFAULT_START_TIME;
        let newEnd = currentShift.end || DEFAULT_END_TIME;
        
        setChangeForm(prev => ({ 
          ...prev, 
          day, 
          status: currentShift.status === '未' ? '勤務' : currentShift.status, 
          start: newStart, 
          end: newEnd, 
          canWorkIfNeeded: currentShift.canWorkIfNeeded || false, 
          note: currentShift.note || '' 
        }));
      };

      const openChangeForm = () => {
        const initialDay = 1;
        const currentShift = (shifts[safeUserId] || {})[initialDay] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
        setChangeForm({ 
          isOpen: true, 
          day: initialDay, 
          status: currentShift.status === '未' ? '勤務' : currentShift.status, 
          start: currentShift.start || DEFAULT_START_TIME, 
          end: currentShift.end || DEFAULT_END_TIME, 
          canWorkIfNeeded: currentShift.canWorkIfNeeded || false, 
          note: currentShift.note || '', 
          reason: '',
          changeType: ''
        });
      };

      const submitChangeRequest = () => {
        if (!currentUser) return;
        if (!changeForm.changeType) { showToast('変更の種別を選択してください', 'error'); return; }
        if (!changeForm.reason.trim()) { showToast('変更理由を入力してください', 'error'); return; }

        const original = (shifts[currentUser.id] || {})[changeForm.day] || { status: '未' };
        const newVal = { 
          status: changeForm.status, 
          start: changeForm.start, 
          end: changeForm.end, 
          canWorkIfNeeded: changeForm.canWorkIfNeeded, 
          note: changeForm.note,
          changeType: changeForm.changeType
        };

        if (JSON.stringify(original) === JSON.stringify({ ...newVal, changeType: undefined })) { 
          showToast('シフト内容が変更されていません', 'error'); 
          return; 
        }
        
        simulateLoading(() => {
          const newReq = {
            id: Date.now(), userId: currentUser.id, userName: currentUser.name.split(' ')[0],
            changes: [{ day: changeForm.day, oldVal: original, newVal }],
            day: changeForm.day, oldVal: original, newVal: newVal, reason: changeForm.reason, status: 'pending',
            createdAt: new Date().toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute:'2-digit' })
          };
          setChangeRequests(prev => [newReq, ...prev]);
          setPendingChanges(prev => { const uPending = prev[currentUser.id] || {}; uPending[changeForm.day] = true; return { ...prev, [currentUser.id]: uPending }; });
          setChangeForm(prev => ({ ...prev, isOpen: false }));
          showToast('管理者に変更申請を送信しました');
        });
      };

      const handleApprove = (reqId) => {
        simulateLoading(() => {
          const req = changeRequests.find(r => r.id === reqId);
          if (!req) return;

          const type = adminChangeTypes[reqId] || req.newVal.changeType || '自己変更';

          const updatedReq = {
            ...req,
            status: 'approved',
            newVal: { ...req.newVal, changeType: type },
            changes: req.changes.map(c => ({
              ...c,
              newVal: { ...c.newVal, changeType: type }
            }))
          };

          setShifts(prev => { 
            const uShifts = { ...(prev[req.userId] || {}) }; 
            updatedReq.changes.forEach(c => { uShifts[c.day] = c.newVal; }); 
            return { ...prev, [req.userId]: uShifts }; 
          });
          
          setPendingChanges(prev => { 
            const uPending = { ...(prev[req.userId] || {}) }; 
            updatedReq.changes.forEach(c => delete uPending[c.day]); 
            return { ...prev, [req.userId]: uPending }; 
          });
          
          setChangeRequests(prev => prev.map(r => r.id === reqId ? updatedReq : r));
          
          // 承認チェック・変更種別状態をクリア
          setApprovalChecks(prev => { const newChecks = { ...prev }; delete newChecks[reqId]; return newChecks; });
          setAdminChangeTypes(prev => { const newTypes = { ...prev }; delete newTypes[reqId]; return newTypes; });

          showToast(`${req.userName} さんの変更を承認しました`);
        });
      };

      const handleReject = (reqId) => {
        simulateLoading(() => {
          const req = changeRequests.find(r => r.id === reqId);
          if (!req) return;
          setPendingChanges(prev => { const uPending = { ...(prev[req.userId] || {}) }; req.changes.forEach(c => delete uPending[c.day]); return { ...prev, [req.userId]: uPending }; });
          setChangeRequests(prev => prev.map(r => r.id === reqId ? { ...r, status: 'rejected' } : r));
          
          setApprovalChecks(prev => { const newChecks = { ...prev }; delete newChecks[reqId]; return newChecks; });
          setAdminChangeTypes(prev => { const newTypes = { ...prev }; delete newTypes[reqId]; return newTypes; });

          showToast('申請を却下しました');
        });
      };

      const toggleApprovalCheck = (reqId, type) => {
        setApprovalChecks(prev => {
          const current = prev[reqId] || { shift: false, kot: false };
          return { ...prev, [reqId]: { ...current, [type]: !current[type] } };
        });
      };

      const setAsActiveMonth = () => {
        simulateLoading(() => { 
          setActiveTargetMonth(currentMonthStr); 
          setIsConfirmed(false); 

          // 対象月の前月の15日を締切日として自動設定
          let dYear = currentYear;
          let dMonth = currentMonth - 1;
          if (dMonth === 0) {
            dMonth = 12;
            dYear -= 1;
          }
          const newDeadline = `${dYear}-${String(dMonth).padStart(2, '0')}-15`;
          setDeadline(newDeadline);

          showToast(`${currentYear}年${currentMonth}月 を募集対象月に設定しました`); 
        });
      };

      const toggleConfirmAll = () => {
        simulateLoading(() => { const newState = !isConfirmed; setIsConfirmed(newState); showToast(newState ? 'シフトを確定しました' : '確定を解除しました'); });
      };

      const handleSaveModal = () => {
        simulateLoading(() => {
          if (modal.type === 'daily') setDailyNotes(prev => ({ ...prev, [modal.targetId]: modal.text }));
          else setPersonalNotes(prev => ({ ...prev, [modal.targetId]: modal.text }));
          showToast('保存しました');
          setModal({ isOpen: false, type: '', targetId: null, text: '' });
        });
      };

      const markNotificationAsRead = (id) => {
        setAdminNotifications(prev => prev.map(n => n.id === id ? { ...n, read: true } : n));
      };

      const handleAddStaff = (e) => {
        e.preventDefault();
        simulateLoading(() => {
          const usersList = Array.isArray(dbUsers) ? dbUsers : [];
          if (usersList.some(u => u.employeeId === newStaff.employeeId)) { showToast('その社員番号は既に使用されています', 'error'); return; }
          const newId = `u${Date.now()}`;
          const safeName = newStaff.name || '名称未設定';
          const newUser = { employeeId: newStaff.employeeId, id: newId, name: safeName, email: newStaff.email, role: 'staff', status: 'active', password: newStaff.employeeId };
          setDbUsers([...usersList, newUser]);
          setSubmissionStatus(prev => ({ ...prev, [newId]: '未提出' }));
          showToast(`${safeName} さんを追加しました`);
          setNewStaff({ employeeId: '', name: '', email: '' });
        });
      };

      const toggleStaffStatus = (userId, name, currentStatus) => {
        const isRetiring = currentStatus === 'active';
        const actionText = isRetiring ? '退職扱い' : '復職';
        
        setConfirmModal({
          isOpen: true,
          title: '確認',
          message: `${name || 'このスタッフ'} を${actionText}にしてもよろしいですか？\n※退職扱いにすると本人はログインできなくなり、シフト表からも非表示になります。`,
          isAlert: false,
          onConfirm: () => {
            simulateLoading(() => {
              setDbUsers(prev => prev.map(u => u.id === userId ? { ...u, status: isRetiring ? 'retired' : 'active' } : u));
              showToast(`${name} を${actionText}にしました`);
            });
          }
        });
      };

      const handleDeleteStaff = (userId, name) => {
        const safeName = name || 'このスタッフ';
        setConfirmModal({
          isOpen: true,
          title: '警告',
          message: `${safeName} を完全に削除してよろしいですか？\n※過去のシフト履歴からも名前が消えてしまいます。\n通常は「退職扱い」にすることを強く推奨します。`,
          isAlert: false,
          onConfirm: () => {
            simulateLoading(() => {
              const usersList = Array.isArray(dbUsers) ? dbUsers : [];
              setDbUsers(usersList.filter(u => u.id !== userId));
              showToast(`${safeName} を削除しました`);
            });
          }
        });
      };

      const handleSendRemind = () => {
        simulateLoading(() => {
          const unsubmittedUsers = getStaffUsers().filter(u => {
            if (u.status === 'retired') return false; 
            const status = submissionStatus[u.id] || '未提出';
            return status === '未提出' || status === '途中保存';
          });
          if (unsubmittedUsers.length === 0) { showToast('未提出のスタッフはいません'); return; }
          showToast(`未提出のスタッフ ${unsubmittedUsers.length} 名にリマインドメールを送信しました`);
        });
      };

      const handleExportCSV = () => {
        simulateLoading(() => {
          let csvContent = "社員番号,名前,日付,ステータス,出勤時間,退勤時間,備考\n";
          const mStr = String(currentMonth);
          const escapeCsv = (str) => `"${String(str).replace(/"/g, '""')}"`;
          
          const staffUsers = getStaffUsers();
          staffUsers.forEach(user => {
            if (user.status === 'retired') return;
            const name = user.name.replace(' (オペレーター)', '');
            const empId = user.employeeId;

            daysArray.forEach(day => {
              const s = shifts[user.id]?.[day] || { status: '未' };
              const dateStr = `${mStr}/${day}`; 
              let status = s.status;
              if (s.status === '休' && s.canWorkIfNeeded) {
                status = '休(調整可)';
              }
              const start = (s.status === '勤務' || (s.status === '休' && s.canWorkIfNeeded)) ? s.start : '';
              const end = (s.status === '勤務' || (s.status === '休' && s.canWorkIfNeeded)) ? s.end : '';
              const note = s.note || '';
              
              csvContent += `${escapeCsv(empId)},${escapeCsv(name)},${escapeCsv(dateStr)},${escapeCsv(status)},${escapeCsv(start)},${escapeCsv(end)},${escapeCsv(note)}\n`;
            });
          });

          const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.setAttribute("href", url);
          link.setAttribute("download", `月間シフトリスト_${currentYear}年${currentMonth}月.csv`);
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          showToast('シフトデータをダウンロードしました');
        });
      };

      const renderHeaderAndTabs = () => (
        <div className="sticky top-0 z-[80] w-full shadow-md">
          <header className={`${view === 'admin' ? 'bg-indigo-800' : 'bg-blue-600'} text-white px-4 py-3 sm:px-6 sm:py-4 flex justify-between items-center`}>
            <div className="flex items-center gap-3">
              {view === 'admin' && <Icon name="user-tie" size={24} className="hidden sm:block" />}
              {view === 'staff' && <Icon name="calendar-alt" size={24} className="hidden sm:block" />}
              <div className="flex flex-col">
                {view === 'admin' ? (
                  <>
                    <h1 className="text-lg sm:text-xl font-bold flex items-center gap-1 sm:gap-2">シフトの窓口（管理画面）</h1>
                    <div className="flex items-center gap-2 mt-0.5 text-sm opacity-90">
                      <button onClick={() => changeMonth(-1)} className="p-1 hover:bg-white/20 rounded transition-colors"><Icon name="chevron-left" size={12}/></button>
                      <span className="min-w-[5rem] text-center font-medium">{currentYear}年 {currentMonth}月</span>
                      <button onClick={() => changeMonth(1)} className="p-1 hover:bg-white/20 rounded transition-colors"><Icon name="chevron-right" size={12}/></button>
                      <span className="ml-2 border-l border-white/40 pl-3 font-bold">{currentUser?.name?.replace(' (SV)', '')}</span>
                    </div>
                  </>
                ) : (
                  <>
                    <h1 className="text-lg sm:text-xl font-bold flex items-center gap-1 sm:gap-2">シフトの窓口</h1>
                    <div className="flex items-center gap-2 mt-0.5 text-sm opacity-90">
                      <button onClick={() => changeMonth(-1)} className="p-1 hover:bg-white/20 rounded transition-colors"><Icon name="chevron-left" size={12}/></button>
                      <span className="min-w-[5rem] text-center font-medium">{currentYear}年 {currentMonth}月</span>
                      <button onClick={() => changeMonth(1)} className="p-1 hover:bg-white/20 rounded transition-colors"><Icon name="chevron-right" size={12}/></button>
                      <span className="ml-2 border-l border-white/40 pl-3 truncate max-w-[150px] font-bold">{currentUser?.name?.replace(' (オペレーター)', '')}</span>
                    </div>
                  </>
                )}
              </div>
            </div>
            <button onClick={handleLogout} className={`p-2 rounded-full flex items-center gap-2 text-sm font-bold ${view === 'admin' ? 'bg-indigo-700 hover:bg-indigo-600' : 'bg-blue-500 hover:bg-blue-400'}`}>
              <Icon name="sign-out-alt" size={16}/> <span className="hidden sm:inline">ログアウト</span>
            </button>
          </header>

          {view === 'admin' && (
            <div className="bg-indigo-900 border-b border-indigo-700 overflow-x-auto no-scrollbar">
              <div className="max-w-[1400px] mx-auto px-4 flex gap-4 min-w-[300px]">
                <button onClick={() => setAdminTab('shift')} className={`py-3 px-2 text-sm sm:text-base font-bold border-b-4 whitespace-nowrap transition-colors ${adminTab === 'shift' ? 'border-white text-white' : 'border-transparent text-indigo-300 hover:text-white'}`}><Icon name="calendar-alt" className="mr-1.5" />シフト集計・管理</button>
                <button onClick={() => setAdminTab('history')} className={`py-3 px-2 text-sm sm:text-base font-bold border-b-4 whitespace-nowrap transition-colors ${adminTab === 'history' ? 'border-white text-white' : 'border-transparent text-indigo-300 hover:text-white'}`}><Icon name="history" className="mr-1.5" />変更履歴 <span className="bg-white/20 px-1.5 py-0.5 rounded ml-1 text-xs">{changeRequests.length}</span></button>
                <button onClick={() => setAdminTab('staff')} className={`py-3 px-2 text-sm sm:text-base font-bold border-b-4 whitespace-nowrap transition-colors ${adminTab === 'staff' ? 'border-white text-white' : 'border-transparent text-indigo-300 hover:text-white'}`}><Icon name="user-cog" className="mr-1.5" />スタッフ管理</button>
              </div>
            </div>
          )}
        </div>
      );

      const renderLoadingOverlay = () => {
        if (!isLoading) return null;
        return (
          <div className="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-[120]">
            <div className="bg-white p-5 rounded-2xl shadow-xl flex flex-col items-center gap-4">
              <Icon name="spinner" className="fa-spin text-blue-600" size={36} />
              <span className="font-bold text-gray-700 text-lg">処理中...</span>
            </div>
          </div>
        );
      };

      const renderToastAlert = () => {
        if (!toast) return null;
        return (
          <div className="fixed top-4 right-4 z-[130] animate-fade-in-down pointer-events-none">
            <div className={`flex items-center gap-3 px-6 py-4 rounded-xl shadow-lg text-white font-bold text-base ${toast.type === 'success' ? 'bg-gray-800' : 'bg-red-600'}`}>
              <Icon name={toast.type === 'success' ? 'check-circle' : 'exclamation-circle'} size={24} />{toast.message}
            </div>
          </div>
        );
      };

      if (view === 'login') {
        return (
          <div className="min-h-screen bg-gray-100 flex items-center justify-center p-4 relative">
            {renderLoadingOverlay()}
            <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-xl w-full max-w-md border-t-4 border-blue-600 animate-fade-in">
              <div className="text-center mb-6 sm:mb-8 text-blue-600">
                <Icon name="calendar-alt" size={56} className="mb-4 text-blue-600" />
                <h1 className="text-2xl sm:text-3xl font-black text-gray-800 mt-2 tracking-tight">シフトの窓口</h1>
              </div>

              {loginError && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm sm:text-base flex items-start gap-2 font-bold mb-5"><Icon name="exclamation-triangle" className="mt-0.5 shrink-0" />{loginError}</div>}

              {loginStep === 'login' && (
                <form onSubmit={handleLoginSubmit} className="space-y-5 animate-fade-in">
                  <div>
                    <label className="block text-sm sm:text-base font-bold text-gray-700 mb-1.5 pl-1">社員番号</label>
                    <input type="text" inputMode="numeric" pattern="[0-9]*" value={employeeIdInput} onChange={(e) => setEmployeeIdInput(e.target.value)} className="w-full bg-gray-50 border-2 border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3.5 text-xl tracking-widest font-bold text-center" placeholder="例: 1001" required />
                  </div>
                  <div>
                    <label className="block text-sm sm:text-base font-bold text-gray-700 mb-1.5 pl-1">パスワード</label>
                    <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full bg-gray-50 border-2 border-gray-300 rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3.5 text-xl tracking-widest font-bold text-center" placeholder="••••••••" required />
                  </div>
                  <div className="flex flex-col gap-4 pt-3">
                    <button type="submit" className="w-full text-white bg-blue-600 hover:bg-blue-700 font-bold rounded-xl px-5 py-4 shadow-md text-lg transition-colors">ログイン</button>
                    <div className="text-center">
                      <button type="button" onClick={() => {
                        setLoginStep('reset_request');
                        setLoginError('');
                        setResetIdInput('');
                        setResetEmailInput('');
                      }} className="text-blue-500 hover:text-blue-700 text-sm font-bold underline underline-offset-2">パスワードを忘れた場合</button>
                    </div>
                  </div>
                  
                  {/* 💡 デモ用のワンクリックログインボタンエリアを追加 */}
                  <div className="mt-8 p-4 bg-blue-50 rounded-xl border border-blue-100 text-sm text-center">
                    <p className="font-bold mb-3 text-blue-800"><Icon name="rocket" className="mr-1"/> デモ用 ワンクリックログイン</p>
                    <div className="flex flex-col gap-2">
                      <button type="button" onClick={() => handleDemoLogin('1001')} className="w-full bg-white border border-blue-200 hover:bg-blue-100 text-blue-700 font-bold py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2 shadow-sm"><Icon name="user"/> スタッフ (1001) でログイン</button>
                      <button type="button" onClick={() => handleDemoLogin('9999')} className="w-full bg-white border border-blue-200 hover:bg-blue-100 text-blue-700 font-bold py-2.5 rounded-lg transition-colors flex items-center justify-center gap-2 shadow-sm"><Icon name="user-tie"/> 管理者 (9999) でログイン</button>
                    </div>
                    <p className="text-[10px] mt-3 text-gray-500">※通常ログイン時は初期PW(社員番号)でパスワード設定画面に進みます。</p>
                  </div>
                </form>
              )}

              {loginStep === 'change_password' && (
                <form onSubmit={handleChangePasswordSubmit} className="space-y-4 animate-fade-in">
                  <div className="text-center mb-2">
                    <p className="font-bold text-gray-800 text-xl">{tempUser?.name?.split(' ')[0]} さん</p>
                    <p className="text-sm font-bold text-orange-600 bg-orange-50 p-2.5 rounded-lg mt-2 border border-orange-200">
                      {isResetMode ? '新しいパスワードを設定してください' : '初期パスワードから変更してください'}
                    </p>
                  </div>
                  <div>
                    <label className="block text-[11px] sm:text-xs font-bold text-gray-700 mb-1">新しいパスワード (8文字以上。英大文字/英小文字/数字/記号から3種類以上の文字種を組み合わせて設定)</label>
                    <input type="password" value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full bg-gray-50 border-2 border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3 text-lg font-bold text-center" placeholder="••••••••" required minLength={8}/>
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-1">パスワード (確認用)</label>
                    <input type="password" value={passwordConfirm} onChange={(e) => setPasswordConfirm(e.target.value)} className="w-full bg-gray-50 border-2 border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3 text-lg font-bold text-center" placeholder="もう一度入力してください" required minLength={8}/>
                  </div>
                  <div className="pt-2 flex flex-col gap-3">
                    <button type="submit" className="w-full text-white bg-green-600 hover:bg-green-700 font-bold rounded-xl px-5 py-3 sm:py-4 shadow-md text-base sm:text-lg transition-colors">設定してログイン</button>
                    {/* 💡 デモ用のスキップボタン */}
                    <button type="button" onClick={() => loginSuccess(tempUser)} className="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold rounded-xl px-5 py-3 shadow-sm text-sm transition-colors flex items-center justify-center gap-2"><Icon name="forward"/> 【デモ用】設定をスキップしてログイン</button>
                    <button type="button" onClick={goBackToLogin} className="text-gray-500 hover:text-gray-700 text-sm font-bold flex justify-center items-center gap-1 mt-1"><Icon name="arrow-left" size={12}/> 戻る</button>
                  </div>
                </form>
              )}

              {loginStep === 'reset_request' && (
                <form onSubmit={handleResetRequestSubmit} className="space-y-4 animate-fade-in">
                  <div className="text-center mb-4">
                    <p className="font-bold text-gray-800 text-lg">本人確認</p>
                    <p className="text-sm text-gray-500 mt-1">登録されている情報を入力してください</p>
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-1">社員番号</label>
                    <input type="text" inputMode="numeric" pattern="[0-9]*" value={resetIdInput} onChange={(e) => setResetIdInput(e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3 text-base font-bold text-center" placeholder="例: 1001" required />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-1">メールアドレス</label>
                    <input type="email" value={resetEmailInput} onChange={(e) => setResetEmailInput(e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3 text-base font-bold text-center" placeholder="例: sato@example.com" required />
                  </div>
                  <div className="pt-4 flex flex-col gap-3">
                    <button type="submit" className="w-full text-white bg-blue-600 hover:bg-blue-700 font-bold rounded-xl px-5 py-3 shadow-md text-base transition-colors">確認して再設定へ進む</button>
                    <button type="button" onClick={goBackToLogin} className="text-gray-500 hover:text-gray-700 text-sm font-bold flex justify-center items-center gap-1"><Icon name="arrow-left" size={12}/> 戻る</button>
                  </div>
                </form>
              )}

            </div>
            {renderToastAlert()}
          </div>
        );
      }

      if (!currentUser) return null;
      const safeUserId = currentUser.id;

      return (
        <div className="min-h-screen bg-gray-50 pb-40 relative">
          {renderLoadingOverlay()}
          {renderHeaderAndTabs()}
          
          {/* ==================================================== */}
          {/* スタッフ用コンテンツ */}
          {/* ==================================================== */}
          {view === 'staff' && (() => {
            const myShifts = shifts[safeUserId] || {};
            const myPendingDays = pendingChanges[safeUserId] || {};
            const hasPending = Object.keys(myPendingDays).length > 0;
            const myStatus = submissionStatus[safeUserId] || '未提出';
            const isActive = currentMonthStr === activeTargetMonth;
            const isOverdue = new Date() > new Date(deadline);
            const isDisabled = isConfirmed || !isActive;

            return (
              <div className="max-w-4xl mx-auto p-3 sm:p-4 space-y-3 sm:space-y-4 animate-fade-in mt-2">
                {!isActive && (
                  <div className="bg-yellow-50 text-yellow-800 border border-yellow-200 p-4 rounded-xl flex items-start gap-3 shadow-sm text-base">
                    <Icon name="shield-alt" size={24} className="shrink-0 mt-0.5" />
                    <div><p className="font-bold">{currentMonth}月は現在提出期間ではありません。</p><p className="text-sm mt-1">過去のシフトの確認、または次回の募集開始をお待ち下さい。</p></div>
                  </div>
                )}

                {isActive && (
                  <div className={`rounded-xl p-4 flex items-center justify-between border shadow-sm ${isOverdue ? 'bg-red-50 border-red-200' : 'bg-white border-gray-200'}`}>
                    <div className="flex items-center gap-2">
                      <Icon name="calendar-alt" size={24} className={isOverdue ? "text-red-500" : "text-gray-500"} />
                      <span className={`text-base sm:text-lg font-bold ${isOverdue ? "text-red-700" : "text-gray-700"}`}>提出締切日</span>
                    </div>
                    <span className={`text-lg sm:text-xl font-black flex items-center ${isOverdue ? "text-red-600" : "text-gray-800"}`}>
                      {deadline ? new Date(deadline).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' }) : '未設定'}
                      {isOverdue && <span className="text-sm ml-3 bg-red-500 text-white px-2.5 py-0.5 rounded-full">期限切れ</span>}
                    </span>
                  </div>
                )}

                {personalNotes[safeUserId] && isActive && (
                  <div className="bg-indigo-50 border border-indigo-200 rounded-xl p-4 shadow-sm relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                    <div className="flex gap-3">
                      <Icon name="comment-alt" size={24} className="text-indigo-500 shrink-0 mt-0.5" />
                      <div>
                        <p className="text-sm font-bold text-indigo-800 mb-1">管理者からのメッセージ</p>
                        <p className="text-base text-gray-800 leading-relaxed whitespace-pre-wrap">{personalNotes[safeUserId]}</p>
                      </div>
                    </div>
                  </div>
                )}

                {isActive && (
                  <div className={`bg-white rounded-xl shadow-sm p-4 flex items-center justify-between border-l-4 ${hasPending ? 'border-orange-500' : 'border-blue-500'}`}>
                    <span className={`font-bold text-base flex items-center gap-2 text-gray-700`}>
                      <Icon name="info-circle" size={20} className={hasPending ? "text-orange-500" : "text-blue-500"}/> 現在の状況:
                    </span>
                    <span className={`px-3 py-1 rounded-full text-sm sm:text-base font-bold ${myStatus === '提出済' ? 'bg-green-100 text-green-700' : (isConfirmed && hasPending) ? 'bg-orange-100 text-orange-700 border border-orange-200' : myStatus === '途中保存' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-200 text-gray-700'}`}>{isConfirmed && hasPending ? '申請結果待ち' : myStatus}</span>
                  </div>
                )}

                <div className="flex bg-white p-1.5 rounded-xl border border-gray-200 w-full shadow-sm mb-2">
                  <button onClick={() => setStaffViewMode('list')} className={`flex-1 flex justify-center items-center gap-2 px-3 py-2.5 text-sm sm:text-base font-bold rounded-lg transition-colors ${staffViewMode === 'list' ? 'bg-blue-50 text-blue-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><Icon name="list" /> リスト</button>
                  <button onClick={() => setStaffViewMode('week')} className={`flex-1 flex justify-center items-center gap-2 px-3 py-2.5 text-sm sm:text-base font-bold rounded-lg transition-colors ${staffViewMode === 'week' ? 'bg-blue-50 text-blue-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><Icon name="calendar-week" /> 週間</button>

                              <div className="flex gap-1.5 sm:gap-2 w-full sm:w-auto">
                                <button onClick={() => updateLocalShift(day, 'status', '未')} disabled={isDisabled} className={`flex-1 sm:flex-none sm:px-5 py-3 sm:py-3 rounded-lg text-base font-bold transition-colors ${shiftData.status === '未' ? 'bg-gray-600 text-white shadow-sm' : 'bg-gray-100 text-gray-500'} disabled:opacity-40`}>未</button>
                                <button onClick={() => updateLocalShift(day, 'status', '休')} disabled={isDisabled} className={`flex-[1.5] sm:flex-1 sm:max-w-[4rem] px-2 py-3 sm:py-3 rounded-lg text-base font-bold transition-all ${shiftData.status === '休' ? 'bg-red-500 text-white shadow-md' : 'bg-white border border-gray-300 text-gray-700'} disabled:opacity-40`}>休</button>

                                  <select value={shiftData.end} onChange={(e) => updateLocalShift(day, 'end', e.target.value)} disabled={isDisabled} className={`bg-white border text-base sm:text-lg rounded-lg block px-3 py-2.5 w-[6.5rem] sm:w-[7.5rem] text-center appearance-none disabled:bg-gray-100 ${isRest ? 'border-orange-300 text-orange-800' : 'border-blue-200 text-blue-900'}`} style={{ textAlignLast: 'center' }}>
                                    {HOUR_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}

                                  <span className="text-sm font-bold text-gray-600">出勤調整可能</span>
                                </label>
                              </div>
                            )}

                  </div>

                {/* 週間ビュー */}
                {staffViewMode === 'week' && (
                  <div className="mb-6 animate-fade-in pt-4 pb-16">

                        const isWorking = shiftData.status === '勤務';
                        const isRest = shiftData.status === '休';

                              const isRest = shiftData.status === '休';
                              const isPendingDay = myPendingDays[day];

                              return (
                                <div key={day} className={`p-2 sm:p-3 border-r last:border-r-0 border-gray-200 min-h-[140px] flex flex-col relative transition-colors ${isPendingDay ? 'bg-orange-50' : 'hover:bg-blue-50/10'} hover:z-[100]`}>

                                    <select 
                                      value={shiftData.status}

                                      className={`w-full text-sm p-1.5 rounded-lg border outline-none appearance-none text-center shadow-sm cursor-pointer ${statusColorClass} disabled:opacity-50 relative z-10`}
                                      style={{ textAlignLast: 'center' }}
                                    >
                                      <option value="未" className="text-gray-600 bg-white">未入力</option>

                                      <option value="勤務" className="text-blue-600 bg-white">勤 務</option>

                                      <div className="flex flex-col gap-1 mt-1 relative z-10">
                                        <select value={shiftData.start} onChange={(e) => updateLocalShift(day, 'start', e.target.value)} disabled={rowDisabled} className="bg-white border border-gray-300 text-sm rounded-md p-1 text-center font-bold disabled:bg-transparent shadow-inner appearance-none" style={{ textAlignLast: 'center' }}>

                                      </div>

                                        <span className="text-xs text-gray-600 font-bold whitespace-nowrap">調整可</span>
                                      </div>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                  {!isConfirmed && (
                    <div className="flex gap-3 sm:gap-4 justify-center max-w-4xl mx-auto w-full">
                      {myStatus !== '提出済' ? (
                        <>
                          <button onClick={() => handleSubmitShift(false)} className="flex-1 py-3.5 px-2 bg-yellow-100 text-yellow-800 rounded-xl font-bold text-sm sm:text-base hover:bg-yellow-200 transition-colors">途中保存</button>
                          <button onClick={() => handleSubmitShift(true)} className="flex-[2] py-3.5 px-2 bg-blue-600 text-white rounded-xl font-bold shadow-md text-base sm:text-lg hover:bg-blue-700 transition-colors">提出する</button>
                        </>
                      ) : (
                        <button onClick={() => handleSubmitShift(true)} className="w-full py-3.5 px-4 bg-blue-50 text-blue-700 border border-blue-200 rounded-xl font-bold shadow-sm text-base sm:text-lg hover:bg-blue-100 transition-colors">修正して再提出する</button>
                      )}
                    </div>
                  )}

                  {isConfirmed && (
                    <div className="max-w-4xl mx-auto w-full animate-fade-in">
                      <button onClick={openChangeForm} className="w-full py-3.5 px-4 bg-red-50 text-red-700 border border-red-200 rounded-xl font-bold shadow-sm text-base sm:text-lg transition-colors hover:bg-red-100">
                        <Icon name="edit" className="mr-2" />確定済みのシフト変更を申請する
                      </button>
                    </div>
                  )}
                </div>
              </div>

          })()}

          {/* ==================================================== */}
          {/* 管理者用コンテンツ */}
          {/* ==================================================== */}
          {view === 'admin' && (() => {
            const staffUsers = getStaffUsers();
            const pendingReqs = changeRequests.filter(req => req.status === 'pending');
            const unreadCount = adminNotifications.filter(n => !n.read).length + pendingReqs.length;
            const isActiveMonth = currentMonthStr === activeTargetMonth;

            return (
              <div className="flex-1 p-3 sm:p-5 max-w-[1400px] mx-auto w-full space-y-4 sm:space-y-6 mt-2 sm:mt-4">

                {adminTab === 'shift' && (
                  <div className="animate-fade-in">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                      <div className="bg-white rounded-xl shadow-sm overflow-hidden border border-indigo-100 flex flex-col max-h-[350px]">
