                          <h2 className="text-indigo-800 font-bold flex items-center gap-2 text-base"><Icon name="bell" size={20} className={unreadCount > 0 ? "text-red-500 animate-bounce" : "text-indigo-500"} /> 通知・変更申請 {unreadCount > 0 && <span className="bg-red-500 text-white text-sm px-2.5 py-0.5 rounded-full ml-1">{unreadCount}</span>}</h2>
                        </div>
                        <div className="p-0 overflow-y-auto bg-gray-50 flex-1">
                          {unreadCount === 0 && <div className="p-8 text-base text-gray-400 text-center flex flex-col items-center gap-3"><Icon name="check-circle" size={32}/>新しい通知はありません</div>}
                          
                          <div className="divide-y divide-gray-200">
                            {pendingReqs.map(req => {
                              const checks = approvalChecks[req.id] || { shift: false, kot: false };
                              // 管理者用のラジオボタン選択状態（初期値はスタッフの申請内容）
                              const selectedType = adminChangeTypes[req.id] || req.newVal.changeType;
                              const canApprove = checks.shift && checks.kot && selectedType;

                              return (
                                <div key={req.id} className="p-4 sm:p-5 bg-orange-50/80 relative overflow-hidden border-b border-orange-100">
                                  <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-orange-500"></div>
                                  <div className="flex justify-between items-start mb-3">
                                    <p className="text-base font-black text-orange-900 flex items-center gap-2">
                                      <Icon name="exclamation-circle" size={18} className="text-orange-500"/> 
                                      {req.userName} さんから変更申請
                                    </p>
                                    <span className="text-xs text-gray-500 bg-white px-2 py-1 rounded shadow-sm">{req.createdAt.split(' ')[0]}</span>
                                  </div>
                                  <p className="text-sm font-bold text-gray-700 bg-white p-3 rounded-lg shadow-sm mb-3 border border-gray-200">理由: {req.reason}</p>
                                  
                                  <div className="space-y-2">
                                    {req.changes.map((c, idx) => (
                                      <div key={idx} className="text-sm bg-white p-3 border border-orange-200 rounded-lg flex items-center gap-3 shadow-sm">
                                        <span className="font-bold bg-orange-100 px-3 py-1.5 rounded-md text-orange-800 shrink-0">{c.day}日</span> 
                                        <div className="flex flex-col flex-1">
                                          <span className="text-gray-500 line-through truncate">{formatShiftStr(c.oldVal)}</span>
                                          <div className="flex items-center gap-2 mt-1">
                                            <Icon name="arrow-right" className="text-gray-400 shrink-0" />
                                            <span className="text-orange-700 font-bold truncate text-base">{formatShiftStr(c.newVal)}</span>
                                            {c.newVal.note && <span className="text-gray-500 text-xs ml-2 bg-gray-100 px-2 py-0.5 rounded border border-gray-200 truncate">備考: {c.newVal.note}</span>}
                                          </div>
                                        </div>
                                      </div>
                                    ))}
                                  </div>
                                  
                                  <div className="mt-4 bg-white p-3.5 rounded-xl border border-gray-300 shadow-sm">
                                    {/* 💡 管理者による変更種別の確認・修正 */}
                                    <div className="mb-4">
                                      <label className="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-1.5"><Icon name="tag" className="text-indigo-500"/> 変更種別を確認・修正 <span className="text-red-500 text-xs">*必須</span></label>
                                      <div className="flex flex-wrap gap-2">
                                        {['自己変更', '依頼変更'].map(type => (
                                          <label key={type} className={`cursor-pointer px-3 py-1.5 rounded-lg border text-xs sm:text-sm font-bold transition-all ${selectedType === type ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-gray-50 text-gray-600 border-gray-300 hover:bg-gray-100'}`}>
                                            <input type="radio" name={`changeType-${req.id}`} className="hidden" checked={selectedType === type} onChange={() => setAdminChangeTypes(prev => ({...prev, [req.id]: type}))} />
                                            {type}
                                          </label>
                                        ))}
                                      </div>
                                    </div>

                                    {/* 承認用チェックボックス */}
                                    <div className="flex gap-4 pt-3 border-t border-gray-100 justify-center">
                                      <label className="flex items-center cursor-pointer gap-2 font-bold text-sm text-gray-700 hover:text-green-700 transition-colors">
                                        <input type="checkbox" checked={checks.shift} onChange={() => toggleApprovalCheck(req.id, 'shift')} className="w-4 h-4 accent-green-600 cursor-pointer" />
                                        シフト表更新 <span className="text-red-500 text-xs">*</span>
                                      </label>
                                      <label className="flex items-center cursor-pointer gap-2 font-bold text-sm text-gray-700 hover:text-green-700 transition-colors">
                                        <input type="checkbox" checked={checks.kot} onChange={() => toggleApprovalCheck(req.id, 'kot')} className="w-4 h-4 accent-green-600 cursor-pointer" />
                                        KOT更新 <span className="text-red-500 text-xs">*</span>
                                      </label>
                                    </div>
                                  </div>

                                  <div className="flex gap-3 mt-3">
                                    <button onClick={() => handleApprove(req.id)} disabled={!canApprove} className={`flex-1 text-white text-sm font-bold py-3 rounded-xl shadow flex justify-center items-center gap-2 transition-colors ${canApprove ? 'bg-green-600 hover:bg-green-700 cursor-pointer' : 'bg-gray-300 cursor-not-allowed'}`}>
                                      <Icon name="check" size={18}/> 承認して反映
                                    </button>
                                    <button onClick={() => handleReject(req.id)} className="flex-[0.5] bg-white border border-gray-300 text-gray-700 text-sm font-bold py-3 rounded-xl hover:bg-gray-100 shadow-sm flex justify-center items-center gap-2 transition-colors"><Icon name="times" size={18}/> 却下</button>
                                  </div>
                                </div>
                              );
                            })}

                            {adminNotifications.map(note => (
                              <div key={note.id} className={`p-4 flex justify-between items-start gap-4 transition-colors bg-white`}>
                                <div className="flex-1">
                                  <p className={`text-base ${note.read ? 'text-gray-500' : 'text-gray-900 font-bold'} whitespace-pre-wrap leading-relaxed`}>{note.message}</p>
                                </div>
                                {!note.read && <button onClick={() => markNotificationAsRead(note.id)} className="shrink-0 text-sm bg-white border border-gray-300 hover:bg-gray-100 text-gray-600 px-4 py-2 rounded-lg font-medium shadow-sm mt-0.5">既読</button>}
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>

                      <div className="bg-white rounded-xl shadow-sm p-5 border border-indigo-100 flex flex-col justify-center gap-5">
                        <div className="flex items-center gap-3">
                          <Icon name="calendar-alt" size={24} className="text-indigo-600" />
                          <h2 className="text-lg font-bold text-gray-800">{currentMonth}月のシフト設定</h2>
                          {isActiveMonth ? <span className="ml-2 bg-green-100 text-green-700 text-sm px-3 py-1 rounded-full font-bold border border-green-200">募集中</span> : <span className="ml-2 bg-gray-100 text-gray-500 text-sm px-3 py-1 rounded-full font-bold">過去/未来</span>}
                        </div>
                        <div className="flex flex-wrap items-center gap-4">
                          {!isActiveMonth && <button onClick={setAsActiveMonth} className="flex items-center gap-2 bg-indigo-100 text-indigo-700 hover:bg-indigo-200 px-4 py-2.5 rounded-xl text-base font-bold transition-colors"><Icon name="play-circle" size={18}/> この月を募集にする</button>}
                          <div className="flex items-center gap-3 bg-gray-50 px-4 py-3 rounded-xl border border-gray-200">
                            <span className="text-base font-bold text-gray-700">締切日:</span>
                            <input type="date" value={deadline} onChange={(e) => setDeadline(e.target.value)} className="bg-white border border-gray-300 text-base rounded-lg px-3 py-1.5 text-gray-800 focus:ring-2 focus:ring-indigo-300 outline-none" />
                          </div>
                          <button onClick={toggleConfirmAll} disabled={!isActiveMonth} className={`px-5 py-3 rounded-xl font-bold text-base flex items-center gap-2 shadow-sm ml-auto transition-all ${isConfirmed ? 'bg-green-100 text-green-800 border border-green-200 hover:bg-red-50 hover:text-red-700 hover:border-red-200' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>
                            <Icon name={isConfirmed ? "unlock" : "check-circle"} size={18}/> {isConfirmed ? '確定解除' : '全体確定する'}
                          </button>
                        </div>
                      </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm p-2.5 sm:p-4 border border-gray-200 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mt-6">
                      <h2 className="text-base sm:text-lg font-bold text-gray-800 flex items-center gap-2">
                        <Icon name="calendar" size={20} className="text-indigo-600 hidden sm:block" />
                        {shiftViewMode === 'month' ? '月間シフト表' : '日別ガントチャート'}
                      </h2>
                      <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 w-full sm:w-auto">
                        <button onClick={handleExportCSV} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-lg text-sm shadow-sm flex items-center justify-center gap-2 transition-colors">
                          <Icon name="file-excel" /> Excel出力 (CSV)
                        </button>
                        <div className="flex bg-gray-100 p-1.5 rounded-xl border border-gray-200 w-full sm:w-auto">
                          <button onClick={() => setShiftViewMode('month')} className={`flex-1 sm:flex-none flex justify-center items-center gap-2 px-4 py-2 text-sm sm:text-base font-bold rounded-lg transition-colors ${shiftViewMode === 'month' ? 'bg-white text-indigo-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><Icon name="th" /> 月間</button>
                          <button onClick={() => setShiftViewMode('day')} className={`flex-1 sm:flex-none flex justify-center items-center gap-2 px-4 py-2 text-sm sm:text-base font-bold rounded-lg transition-colors ${shiftViewMode === 'day' ? 'bg-white text-indigo-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><Icon name="align-left" /> 日別</button>
                        </div>
                      </div>
                    </div>

                    {/* 管理者: 月間ビュー */}
                    {shiftViewMode === 'month' && (
                      <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-x-auto animate-fade-in no-scrollbar pt-12 pb-24 mt-2">
                        <table className="w-full text-left whitespace-nowrap bg-white border-collapse min-w-[1200px]">
                          <thead className="text-sm text-gray-700 bg-gray-100 border-b-2 border-gray-300 relative z-20">
                            <tr>
                              <th rowSpan="2" className="px-4 py-3 sticky left-0 bg-gray-100 z-30 border-r-2 border-gray-300 text-center shadow-[1px_0_0_rgba(0,0,0,0.1)] min-w-[140px] text-base">スタッフ</th>
                              {daysArray.map(day => (
                                <th key={day} colSpan="2" className={`px-2 py-2 text-center min-w-[100px] border-r-2 border-b border-gray-300 group relative ${getDayColor(day)} hover:bg-gray-200 cursor-pointer transition-colors`} onClick={() => setModal({isOpen: true, type: 'daily', targetId: day, text: dailyNotes[day]||''})}>
                                  <div className="flex flex-col items-center gap-1">
                                    <span className="text-lg leading-none">{day}</span>
                                    <span className="text-xs font-normal leading-none">({getDayOfWeek(day)})</span>
                                    <span className={`mt-1 bg-white border border-gray-300 text-gray-500 text-[10px] font-bold px-2 py-0.5 rounded shadow-sm opacity-60 group-hover:opacity-100 w-full flex items-center justify-center gap-1 ${dailyNotes[day] ? 'text-indigo-600 border-indigo-300 bg-indigo-50' : ''}`}><Icon name={dailyNotes[day] ? "pen" : "plus"}/>{dailyNotes[day] ? "メモ編集" : "メモ"}</span>
                                  </div>
                                </th>
                              ))}
                            </tr>
                            <tr>
                              {daysArray.map(day => (
                                <React.Fragment key={`sub-${day}`}>
                                  <th className="px-1.5 py-1.5 text-xs text-center bg-gray-50 border-r border-gray-200 font-bold text-gray-500 w-1/2">出</th>
                                  <th className="px-1.5 py-1.5 text-xs text-center bg-gray-50 border-r-2 border-gray-300 font-bold text-gray-500 w-1/2">退</th>
                                </React.Fragment>
                              ))}
                            </tr>
                          </thead>
                          <tbody className="divide-y border-gray-200">
                            <tr>
                              <td className="px-3 py-2 font-bold sticky left-0 bg-gray-50 border-r-2 border-gray-300 z-10 text-xs text-gray-500 text-center shadow-[1px_0_0_rgba(0,0,0,0.05)]">日別メモ</td>
                              {daysArray.map(day => (
                                <td key={`note-${day}`} colSpan="2" className="px-1 py-1 border-r-2 border-gray-300 bg-gray-50 align-top max-w-[100px] cursor-pointer hover:bg-gray-100 transition-colors" onClick={() => setModal({isOpen: true, type: 'daily', targetId: day, text: dailyNotes[day]||''})}>
                                  {dailyNotes[day] ? (
                                    <div className="bg-red-50 text-red-600 border border-red-200 text-[10px] font-bold px-1.5 py-1 rounded shadow-sm w-full text-left whitespace-normal break-words leading-tight" title={dailyNotes[day]}>
                                      {dailyNotes[day]}
                                    </div>
                                  ) : (
                                    <div className="text-[10px] text-gray-300 text-center mt-1">-</div>
                                  )}
                                </td>
                              ))}
                            </tr>

                            {(!staffUsers.filter(u => u.status === 'active') || staffUsers.filter(u => u.status === 'active').length === 0) ? (
                              <tr><td colSpan={daysArray.length * 2 + 1} className="px-4 py-10 text-center text-gray-500 text-base">スタッフが登録されていません</td></tr>
                            ) : (
                              staffUsers.filter(u => u.status === 'active').map(user => {
                                const hasPending = pendingChanges[user.id] && Object.keys(pendingChanges[user.id]).length > 0;
                                let statusText = submissionStatus[user.id] || '未提出';
                                let statusColor = 'bg-gray-100 text-gray-600';
                                
                                if (statusText === '提出済') statusColor = 'bg-green-100 text-green-700';
                                else if (statusText === '途中保存') statusColor = 'bg-yellow-100 text-yellow-700';
                                
                                if (isConfirmed && hasPending) {
                                  statusColor = 'bg-orange-100 text-orange-700 border border-orange-200';
                                  statusText = '承認待ち';
                                }

                                return (
                                  <tr key={user?.id || Math.random()} className="hover:bg-blue-50/30 transition-colors h-[56px] relative hover:z-30">
                                    <td className="px-3 py-3 font-medium sticky left-0 bg-white border-r-2 border-gray-300 z-10 text-sm text-gray-800 align-middle shadow-[1px_0_0_rgba(0,0,0,0.05)]">
                                      <div className="flex justify-between items-center mb-1.5 gap-2">
                                        <span className="font-bold text-base truncate" title={user?.name ? user.name.split(' ')[0] : ''}>{user?.name ? user.name.split(' ')[0] : ''}</span>
                                        <button onClick={() => setModal({isOpen: true, type: 'personal', targetId: user.id, text: personalNotes[user.id]||''})} className={`p-1 rounded hover:bg-gray-100 transition-colors ${personalNotes[user.id] ? 'text-indigo-500' : 'text-gray-300 opacity-0 group-hover:opacity-100'}`} title="個人宛コメント">
                                          <Icon name="comment-alt" size={14} />
                                        </button>
                                      </div>
                                      <span className={`text-xs font-bold px-2 py-0.5 rounded-md ${statusColor}`}>{statusText}</span>
                                    </td>
                                    {daysArray.map(day => {
                                      const s = shifts[user.id]?.[day] || { status: '未' };
                                      const isPendingCell = pendingChanges[user.id]?.[day];
                                      const cellBg = isPendingCell ? 'bg-orange-50 relative' : '';

                                      if (s.status === '休' && !s.canWorkIfNeeded) return <td key={day} colSpan="2" className={`px-2 py-2 text-center border-r-2 border-gray-300 align-middle ${isPendingCell ? 'bg-orange-100 relative' : 'bg-red-50/20'}`}>{isPendingCell && <div className="absolute inset-0 border-2 border-orange-400 pointer-events-none"></div>}<span className="text-red-500 font-bold text-lg relative z-10">休</span></td>;
                                      if (s.status === '有休') return <td key={day} colSpan="2" className={`px-2 py-2 text-center border-r-2 border-gray-300 align-middle ${isPendingCell ? 'bg-orange-100 relative' : 'bg-teal-50/20'}`}>{isPendingCell && <div className="absolute inset-0 border-2 border-orange-400 pointer-events-none"></div>}<span className="text-teal-600 font-bold text-sm bg-teal-50 px-2.5 py-1 rounded-lg border border-teal-200 relative z-10">有休</span></td>;
                                      if (s.status === '未') return <td key={day} colSpan="2" className={`px-2 py-2 text-center border-r-2 border-gray-300 align-middle ${cellBg}`}>{isPendingCell && <div className="absolute inset-0 border-2 border-orange-400 pointer-events-none"></div>}<span className="text-gray-300 relative z-10 text-lg">-</span></td>;
                                      
                                      return (
                                        <React.Fragment key={day}>
                                          <td className={`px-1.5 text-center border-r border-gray-200 align-middle whitespace-nowrap relative hover:z-40 ${s.status === '休' ? (isPendingCell ? 'bg-orange-100' : 'bg-orange-50/50') : cellBg}`}>
                                            {isPendingCell && <div className="absolute top-0 bottom-0 left-0 right-0 border-y-2 border-l-2 border-orange-400 pointer-events-none"></div>}
                                            {s.status === '休' && <div className="text-[9px] text-orange-500 font-bold leading-none mb-1 relative z-10">休(調整可)</div>}
                                            
                                            <div className="relative z-10 flex items-center justify-center gap-1">
                                              <span className={`text-sm font-bold tracking-tighter ${s.status === '休' ? 'text-orange-700' : 'text-blue-700'}`}>{s.start}</span>
                                              {s.note && (
                                                <div className="tooltip-container cursor-help" tabIndex="0">
                                                  <Icon name="comment-dots" className="text-blue-500 text-sm" />
                                                  <span className="tooltip-text">{s.note}</span>
                                                </div>
                                              )}
                                            </div>
                                          </td>
                                          <td className={`px-1.5 text-center border-r-2 border-gray-300 align-middle whitespace-nowrap relative hover:z-40 ${s.status === '休' ? (isPendingCell ? 'bg-orange-100' : 'bg-orange-50/50') : cellBg}`}>
                                            {isPendingCell && <div className="absolute top-0 bottom-0 left-0 right-0 border-y-2 border-r-2 border-orange-400 pointer-events-none"></div>}
                                            <span className={`text-sm font-bold tracking-tighter relative z-10 ${s.status === '休' ? 'text-orange-700' : 'text-blue-700'}`}>{s.end}</span>
                                          </td>
                                        </React.Fragment>
                                      );
                                    })}
                                  </tr>
                                );
                              })
                            )}
                            
                            {/* --- 集計行 --- */}
                            {staffUsers.filter(u => u.status === 'active').length > 0 && (
                              <>
                                <tr className="bg-indigo-50/80 border-t-2 border-indigo-200">
                                  <td className="px-3 py-3 font-bold sticky left-0 bg-indigo-50 border-r-2 border-indigo-200 z-20 text-sm text-indigo-900 text-center shadow-[1px_0_0_rgba(0,0,0,0.05)]">
                                    <div className="flex items-center justify-center gap-1"><Icon name="users" /> 出勤人数</div>
                                  </td>
                                  {daysArray.map(day => {
                                    const { confirmed, possible } = getDailySummary(day);
                                    const hasAnyone = confirmed > 0 || possible > 0;
                                    return (
                                      <td key={`count-${day}`} colSpan="2" className="px-2 py-2 text-center border-r-2 border-indigo-200 align-middle whitespace-nowrap">
                                        <span className={`font-black text-lg ${hasAnyone ? 'text-indigo-700' : 'text-gray-400 font-normal text-base'}`}>
                                          {hasAnyone ? (
                                            <>
                                              {confirmed}
                                              {possible > 0 && <span className="text-sm text-orange-600 ml-0.5" title="調整可">(+{possible})</span>}
                                              <span className="text-sm font-bold text-indigo-700 ml-0.5">名</span>
                                            </>
                                          ) : '-'}
                                        </span>
                                      </td>
                                    );
                                  })}
                                </tr>
                                <tr className="bg-indigo-100/50 border-t border-indigo-200">
                                  <td className="px-3 py-3 font-bold sticky left-0 bg-indigo-50 border-r-2 border-indigo-200 z-20 text-sm text-indigo-900 text-center shadow-[1px_0_0_rgba(0,0,0,0.05)]">
                                    <div className="flex items-center justify-center gap-1"><Icon name="clock" /> 総稼働時間</div>
                                  </td>
                                  {daysArray.map(day => {
                                    const { totalHours } = getDailySummary(day);
                                    return (
                                      <td key={`hours-${day}`} colSpan="2" className="px-2 py-2 text-center border-r-2 border-indigo-200 align-middle">
                                        <span className={`font-black text-base ${totalHours > 0 ? 'text-indigo-700' : 'text-gray-400 font-normal text-sm'}`}>{totalHours > 0 ? totalHours.toFixed(1) + 'h' : '-'}</span>
                                      </td>
                                    );
                                  })}
                                </tr>
                              </>
                            )}
                          </tbody>
                        </table>
                      </div>
                    )}

                    {/* 管理者: 日別ビュー */}
                    {shiftViewMode === 'day' && (
                      <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden animate-fade-in mt-2">
                        <div className="bg-indigo-50 px-4 sm:px-5 py-3 sm:py-4 border-b border-indigo-100 flex items-center justify-between">
                          <div className="flex items-center gap-3 sm:gap-4">
                            <button onClick={() => setSelectedDay(Math.max(1, selectedDay - 1))} disabled={selectedDay === 1} className="p-2 sm:p-2.5 bg-white border border-indigo-200 rounded-lg text-indigo-700 hover:bg-indigo-100 disabled:opacity-50"><Icon name="chevron-left" size={18} /></button>
                            <h3 className="text-lg sm:text-2xl font-black text-indigo-900 min-w-[140px] sm:min-w-[160px] text-center">{currentMonth}月{selectedDay}日 <span className="text-sm sm:text-base font-medium text-indigo-700">({getDayOfWeek(selectedDay)})</span></h3>
                            <button onClick={() => setSelectedDay(Math.min(daysInMonth, selectedDay + 1))} disabled={selectedDay === daysInMonth} className="p-2 sm:p-2.5 bg-white border border-indigo-200 rounded-lg text-indigo-700 hover:bg-indigo-100 disabled:opacity-50"><Icon name="chevron-right" size={18} /></button>
                          </div>
                        </div>

                        <div className="overflow-x-auto no-scrollbar pt-12 pb-24">
                          <div className="min-w-[1100px]">
                            <div className="flex border-b border-gray-200 bg-gray-100 text-sm font-bold text-gray-500">
                              <div className="w-64 shrink-0 px-5 py-3 border-r border-gray-300 text-base">スタッフ / 実働時間</div>
                              <div className="flex-1 flex relative h-10">
                                {timeAxis.map(h => <div key={h} className="flex-1 border-r border-gray-300 last:border-r-0 pl-1.5 pt-1.5 opacity-70">{h}:00</div>)}
                              </div>
                            </div>

                            <div className="divide-y divide-gray-100">
                              {(!staffUsers.filter(u => u.status === 'active') || staffUsers.filter(u => u.status === 'active').length === 0) ? (
                                <div className="p-10 text-center text-gray-500 text-base">スタッフが登録されていません</div>
                              ) : (
                                staffUsers.filter(u => u.status === 'active').map(user => {
                                  const s = shifts[user.id]?.[selectedDay] || { status: '未' };
                                  const isWorking = s.status === '勤務' || (s.status === '休' && s.canWorkIfNeeded);
                                  const details = isWorking ? calculateShiftDetails(s.start, s.end) : null;
                                  
                                  return (
                                    <div key={user?.id || Math.random()} className="flex hover:bg-blue-50/30 transition-colors items-center group min-h-[4rem] py-2 relative hover:z-30">
                                      <div className="w-64 shrink-0 px-5 border-r border-gray-200 flex flex-col justify-center bg-white z-10 group-hover:bg-blue-50/50 min-h-[3rem] relative hover:z-40">
                                        <div className="flex items-center gap-2.5">
                                          <span className="text-base font-bold text-gray-800">{user?.name ? user.name.split(' ')[0] : ''}</span>
                                          <button onClick={() => setModal({isOpen: true, type: 'personal', targetId: user.id, text: personalNotes[user.id]||''})} className={`p-1 rounded hover:bg-gray-100 transition-colors ${personalNotes[user.id] ? 'text-indigo-500' : 'text-gray-300 opacity-0 group-hover:opacity-100'}`} title="個人宛コメント">
                                            <Icon name="comment-alt" size={14} />
                                          </button>
                                          {pendingChanges[user.id]?.[selectedDay] && <span className="bg-orange-500 text-white text-[10px] font-bold px-2 py-0.5 rounded shadow-sm animate-pulse">申請あり</span>}
                                        </div>
                                        
                                        <div className="flex items-center gap-2 mt-0.5">
                                          {isWorking ? (
                                            <span className="text-sm font-black text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-md border border-indigo-100">
                                              実働: {details.hours.toFixed(1)}h
                                            </span>
                                          ) : (
                                            <span className="text-sm text-gray-400">シフトなし</span>
                                          )}
                                          
                                          {s.note && (
                                            <div className="tooltip-container cursor-help" tabIndex="0">
                                              <Icon name="comment-dots" className="text-blue-500 text-base" />
                                              <span className="tooltip-text">{s.note}</span>
                                            </div>
                                          )}
                                        </div>
                                      </div>
                                      
                                      <div className="flex-1 relative h-full min-h-[4rem] bg-white flex items-center">
                                        <div className="absolute inset-0 flex pointer-events-none">
                                          {timeAxis.map(h => <div key={h} className="flex-1 border-r border-dashed border-gray-200 last:border-r-0"></div>)}
                                        </div>
                                        
                                        {isWorking && details.hours > 0 && (() => {
                                          const startPct = Math.max(0, (details.startVal - START_HOUR)) / TOTAL_HOURS * 100;
                                          const endPct = Math.min(TOTAL_HOURS, (details.endVal - START_HOUR)) / TOTAL_HOURS * 100;
                                          const isPossible = s.status === '休';
                                          const colorClass = isPossible ? 'bg-gradient-to-r from-orange-400 to-red-400 border border-orange-500' : 'bg-gradient-to-r from-blue-500 to-indigo-500';

                                          if (details.hasBreak) {
                                            const breakStartPct = (details.breakStartVal - START_HOUR) / TOTAL_HOURS * 100;
                                            const breakEndPct = (details.breakEndVal - START_HOUR) / TOTAL_HOURS * 100;
                                            return (
                                              <>
                                                <div className={`absolute h-8 rounded-l-md shadow-sm flex items-center px-3 text-sm font-bold text-white overflow-hidden ${colorClass}`} style={{ top: '50%', transform: 'translateY(-50%)', left: `${startPct}%`, width: `${breakStartPct - startPct}%` }}><span className="truncate drop-shadow-md">{s.start}</span></div>
                                                <div className="absolute h-8 flex flex-col items-center justify-center bg-stripes-gray opacity-50 border-x border-dashed border-gray-300" style={{ top: '50%', transform: 'translateY(-50%)', left: `${breakStartPct}%`, width: `${breakEndPct - breakStartPct}%` }}><Icon name="coffee" size={14} className="text-gray-500" /><span className="text-[10px] font-bold text-gray-500 mt-1">{details.breakStartStr}-{details.breakEndStr}</span></div>
                                                <div className={`absolute h-8 rounded-r-md shadow-sm flex items-center justify-end px-3 text-sm font-bold text-white overflow-hidden ${colorClass}`} style={{ top: '50%', transform: 'translateY(-50%)', left: `${breakEndPct}%`, width: `${endPct - breakEndPct}%` }}><span className="truncate drop-shadow-md">{s.end} {isPossible && '(調整可)'}</span></div>
                                              </>
                                            );
                                          } else {
                                            return (
                                              <div className={`absolute h-8 rounded-md shadow-sm flex items-center px-3 text-sm font-bold text-white overflow-hidden ${colorClass}`} style={{ top: '50%', transform: 'translateY(-50%)', left: `${startPct}%`, width: `${endPct - startPct}%` }}><span className="truncate drop-shadow-md">{s.start} - {s.end} {isPossible && '(調整可)'}</span></div>
                                            );
                                          }
                                        })()}
                                      </div>
                                    </div>
                                  )
                                })
                              )}
                            </div>

                            <div className="flex border-t-2 border-indigo-200 bg-indigo-50 items-stretch h-16">
                              <div className="w-64 shrink-0 px-5 border-r border-indigo-200 flex flex-col justify-center">
                                <span className="text-sm font-bold text-indigo-900">時間帯 出勤人数</span>
                                <span className="text-[10px] text-indigo-600 leading-tight mt-1">※()内は「出勤調整可能」</span>
                              </div>
                              <div className="flex-1 flex relative">
                                {timeAxis.map(h => {
                                   const { confirmed, possible } = getHourlyCount(selectedDay, h);
                                   return (
                                     <div key={h} className="flex-1 border-r border-indigo-200 last:border-r-0 flex flex-col items-center justify-center">
                                       <span className={`text-base font-black ${confirmed > 0 ? 'text-indigo-700 text-xl' : 'text-indigo-300'}`}>{confirmed > 0 ? confirmed : '-'}</span>
                                       {possible > 0 && <span className="text-sm font-bold text-orange-600 leading-none mt-0.5">(+{possible})</span>}
                                     </div>
                                   )
                                })}
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* 2. 変更履歴 タブ */}
                {adminTab === 'history' && (
                  <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden animate-fade-in">
                    <div className="bg-indigo-50 p-5 border-b border-indigo-100 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                      <div>
                        <h2 className="font-bold text-indigo-900 flex items-center gap-2 text-lg"><Icon name="history"/> シフト変更履歴</h2>
                        <p className="text-sm text-indigo-700 mt-1">誰がいつシフトを変更申請し、どう処理されたかの全履歴です。</p>
                      </div>
                    </div>
                    
                    <div className="overflow-x-auto no-scrollbar">
                      <table className="w-full text-base text-left min-w-[1000px]">
                        <thead className="bg-gray-50 text-gray-600 border-b">
                          <tr>
                            <th className="px-5 py-4 whitespace-nowrap font-bold">申請日時</th>
                            <th className="px-5 py-4 whitespace-nowrap font-bold">スタッフ</th>
                            <th className="px-5 py-4 whitespace-nowrap font-bold text-center">対象日</th>
                            <th className="px-5 py-4 whitespace-nowrap font-bold text-center">変更種別</th>
                            <th className="px-5 py-4 min-w-[140px] font-bold text-center">変更前</th>
                            <th className="px-5 py-4 min-w-[160px] font-bold text-center">変更後</th>
                            <th className="px-5 py-4 min-w-[200px] font-bold">理由</th>
                            <th className="px-5 py-4 text-center whitespace-nowrap font-bold">結果</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-100">
                          {changeRequests.length === 0 ? (
                            <tr><td colSpan="8" className="p-10 text-center text-gray-500">変更履歴はありません</td></tr>
                          ) : (
                            changeRequests.map(req => (
                              <tr key={req.id} className="hover:bg-gray-50 transition-colors">
                                <td className="px-5 py-4 text-sm text-gray-500 whitespace-nowrap">{req.createdAt}</td>
                                <td className="px-5 py-4 font-bold text-gray-800 whitespace-nowrap"><Icon name="user" className="mr-2 text-gray-400"/>{req.userName}</td>
                                <td className="px-5 py-4 font-bold text-indigo-600 whitespace-nowrap text-lg text-center">{req.day}日</td>
                                
                                {/* 変更種別 */}
                                <td className="px-5 py-4 text-center">
                                  <span className="bg-gray-100 border border-gray-300 text-gray-700 px-3 py-1 rounded text-sm font-bold whitespace-nowrap">{req.newVal.changeType || '-'}</span>
                                </td>

                                {/* 変更前 */}
                                <td className="px-5 py-4 align-top">
                                  <span className="text-gray-400 line-through bg-gray-50 border border-gray-200 px-3 py-1.5 rounded text-sm block w-fit mx-auto whitespace-nowrap">{formatShiftStr(req.oldVal)}</span>
                                </td>

                                {/* 変更後 */}
                                <td className="px-5 py-4 align-top">
                                  <div className="flex flex-col items-center gap-1.5">
                                    <span className={`font-bold px-3 py-1.5 rounded text-sm w-fit whitespace-nowrap ${req.status === 'approved' ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-orange-50 text-orange-700 border border-orange-200'}`}>{formatShiftStr(req.newVal)}</span>
                                    {req.newVal.note && <span className="text-[11px] text-gray-500 bg-gray-100 p-1.5 rounded border border-gray-200 w-full text-center">備考: {req.newVal.note}</span>}
                                  </div>
                                </td>

                                <td className="px-5 py-4 text-sm text-gray-600" title={req.reason}>{req.reason}</td>
                                <td className="px-5 py-4 text-center align-middle">
                                  {req.status === 'pending' && <span className="bg-orange-100 text-orange-700 text-xs font-bold px-3 py-1.5 rounded-full border border-orange-200 shadow-sm">承認待ち</span>}
                                  {req.status === 'approved' && <span className="bg-green-100 text-green-700 text-xs font-bold px-3 py-1.5 rounded-full border border-green-200 shadow-sm">承認済</span>}
                                  {req.status === 'rejected' && <span className="bg-gray-100 text-gray-500 text-xs font-bold px-3 py-1.5 rounded-full border border-gray-300 shadow-sm">却下</span>}
                                </td>
                              </tr>
                            ))
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {/* 3. スタッフ管理タブ */}
                {adminTab === 'staff' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fade-in">
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 h-fit">
                      <div className="flex items-center gap-2 mb-5 border-b pb-3">
                        <Icon name="user-plus" size={24} className="text-indigo-600" />
                        <h2 className="text-xl font-bold text-gray-800">新規スタッフ追加</h2>
                      </div>
                      <form onSubmit={handleAddStaff} className="space-y-4">
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">社員番号 (ログインID)</label>
                          <input type="text" inputMode="numeric" pattern="[0-9]*" required value={newStaff.employeeId || ''} onChange={e => setNewStaff({...newStaff, employeeId: e.target.value})} className="w-full bg-gray-50 border border-gray-300 rounded-lg p-3 text-base focus:ring-indigo-500 focus:border-indigo-500" placeholder="例: 1004" />
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">氏名</label>
                          <input type="text" required value={newStaff.name || ''} onChange={e => setNewStaff({...newStaff, name: e.target.value})} className="w-full bg-gray-50 border border-gray-300 rounded-lg p-3 text-base focus:ring-indigo-500 focus:border-indigo-500" placeholder="例: 山田 太郎" />
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">メールアドレス</label>
                          <input type="email" required value={newStaff.email || ''} onChange={e => setNewStaff({...newStaff, email: e.target.value})} className="w-full bg-gray-50 border border-gray-300 rounded-lg p-3 text-base focus:ring-indigo-500 focus:border-indigo-500" placeholder="例: yamada@example.com" />
                        </div>
                        <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 text-lg rounded-xl transition-colors shadow-sm mt-2">追加する</button>
                      </form>
                    </div>
                    
                    <div className="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-200 p-6">
                      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-5 border-b pb-3">
                        <div className="flex items-center gap-3">
                          <Icon name="users" size={24} className="text-indigo-600" />
                          <h2 className="text-xl font-bold text-gray-800">スタッフ一覧</h2>
                          {/* 退職者表示トグル */}
                          <label className="flex items-center cursor-pointer gap-2 ml-4 bg-gray-50 p-2 rounded-lg border border-gray-200">
                            <input type="checkbox" className="sr-only peer" checked={showRetired} onChange={() => setShowRetired(!showRetired)} />
                            <div className="relative w-9 h-5 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-gray-600"></div>
                            <span className="text-xs font-bold text-gray-600">退職者も表示</span>
                          </label>
                        </div>
                        
                        <button onClick={handleSendRemind} className="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2.5 px-4 rounded-lg text-sm shadow-sm flex items-center justify-center gap-2 transition-colors">
                          <Icon name="paper-plane" /> 未提出者にリマインド送信
                        </button>
                      </div>
                      
                      <div className="overflow-x-auto no-scrollbar">
                        <table className="w-full text-base text-left min-w-[500px]">
                          <thead className="bg-gray-50 text-gray-600 border-y border-gray-200">
                            <tr>
                              <th className="px-5 py-4 font-bold">社員番号</th>
                              <th className="px-5 py-4 font-bold">氏名</th>
                              <th className="px-5 py-4 font-bold text-center">提出状況</th>
                              <th className="px-5 py-4 font-bold text-center">管理</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-100">
                            {(!staffUsers || staffUsers.length === 0) ? (
                              <tr><td colSpan={4} className="px-5 py-10 text-center text-gray-500">スタッフが登録されていません</td></tr>
                            ) : (
                              staffUsers.filter(u => showRetired || u.status === 'active').map(user => {
                                const isRetired = user.status === 'retired';
                                let statusText = submissionStatus[user.id] || '未提出';
                                let statusColor = 'bg-gray-100 text-gray-600';
                                
                                if (statusText === '提出済') statusColor = 'bg-green-100 text-green-700';
                                else if (statusText === '途中保存') statusColor = 'bg-yellow-100 text-yellow-700';
                                
                                const hasPending = pendingChanges[user.id] && Object.keys(pendingChanges[user.id]).length > 0;
                                if (isConfirmed && hasPending) {
                                  statusColor = 'bg-orange-100 text-orange-700 border border-orange-200';
                                  statusText = '承認待ち';
                                }

                                return (
                                  <tr key={user?.id || Math.random()} className={`hover:bg-gray-50 ${isRetired ? 'bg-gray-50 opacity-50' : ''}`}>
                                    <td className="px-5 py-4 font-mono text-gray-600 font-bold">{user?.employeeId || ''}</td>
                                    {/* メールアドレス表示を削除 */}
                                    <td className="px-5 py-4 font-bold text-gray-800">
                                      <div className="flex items-center">
                                        {String(user?.name || '').replace(' (オペレーター)', '')}
                                        {isRetired && <span className="ml-3 text-[10px] bg-gray-200 text-gray-600 border border-gray-300 px-2 py-0.5 rounded-full font-black tracking-widest">退職済</span>}
                                      </div>
                                    </td>
                                    <td className="px-5 py-4 text-center">
                                      {!isRetired ? <span className={`px-3 py-1.5 rounded-lg text-xs font-bold ${statusColor}`}>{statusText}</span> : <span className="text-xs text-gray-400">-</span>}
                                    </td>
                                    <td className="px-5 py-4 text-center flex justify-center items-center gap-2">
                                      <button onClick={() => toggleStaffStatus(user.id, user.name, user.status)} className={`p-2.5 rounded-lg shadow-sm transition-colors ${isRetired ? 'bg-indigo-50 text-indigo-600 hover:bg-indigo-100 border border-indigo-200' : 'bg-orange-50 text-orange-600 hover:bg-orange-100 border border-orange-200'}`} title={isRetired ? '復職させる' : '退職扱いにする(ログイン不可)'}>
                                        <Icon name={isRetired ? 'user-check' : 'door-open'} size={18} />
                                      </button>
                                      <button onClick={() => handleDeleteStaff(user?.id, user?.name)} className="text-red-500 hover:text-red-700 hover:bg-red-50 p-2.5 rounded-lg transition-colors border border-transparent hover:border-red-200" title="完全に削除する"><Icon name="trash" size={18} /></button>
                                    </td>
                                  </tr>
                                );
                              })
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          })()}
          
          {modal.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[100] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
                <div className="bg-indigo-600 px-5 py-4 text-white font-bold text-lg flex items-center gap-3">
                  <Icon name={modal.type === 'daily' ? 'calendar-alt' : 'comment-alt'} size={20} />
                  {modal.type === 'daily' ? `${currentMonth}月${modal.targetId}日のメモ設定` : '個人宛メッセージ'}
                </div>
                <div className="p-5">
                  <textarea value={modal.text} onChange={(e) => setModal({ ...modal, text: e.target.value })} placeholder="内容を入力" className="w-full border border-gray-300 rounded-xl p-4 text-base focus:ring-2 focus:ring-indigo-500 outline-none h-32 resize-none shadow-inner" />
                </div>
                <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t">
                  <button onClick={() => setModal({ isOpen: false })} className="px-5 py-2.5 text-base font-bold text-gray-600 hover:bg-gray-200 rounded-lg">キャンセル</button>
                  <button onClick={handleSaveModal} className="px-5 py-2.5 text-base font-bold bg-indigo-600 text-white hover:bg-indigo-700 rounded-lg shadow-sm">保存する</button>
                </div>
              </div>
            </div>
          )}

          {/* 変更申請フォームのモーダル */}
          {changeForm.isOpen && (() => {
            const isReasonEmpty = !changeForm.reason.trim();
            const isTypeEmpty = !changeForm.changeType;
            const isSubmitDisabled = isReasonEmpty || isTypeEmpty;
            
            return (
              <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[110] p-4 animate-fade-in pb-safe">
                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden max-h-[90vh] flex flex-col">
                  <div className="bg-red-600 px-5 py-4 text-white font-bold text-lg flex items-center gap-3 shrink-0">
                    <Icon name="edit" size={20} />
                    確定後シフト変更申請
                  </div>
                  <div className="p-4 sm:p-5 overflow-y-auto flex-1 space-y-5">
                    
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">対象となる日付</label>
                      <select value={changeForm.day} onChange={(e) => handleChangeFormDay(e.target.value)} className="w-full bg-gray-50 border border-gray-300 rounded-lg p-3 text-base font-bold outline-none focus:ring-2 focus:ring-red-300 cursor-pointer">
                        {daysArray.map(d => <option key={d} value={d}>{currentMonth}月{d}日 ({getDayOfWeek(d)})</option>)}
                      </select>
                    </div>
                    
                    <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                      <p className="text-xs text-gray-500 font-bold mb-1 flex items-center gap-1"><Icon name="info-circle"/> 現在の登録内容</p>
                      <p className="font-bold text-gray-800 text-lg">
                        {(() => {
                          const shiftForDay = (shifts[currentUser?.id] || {})[changeForm.day];
                          return shiftForDay ? formatShiftStr(shiftForDay) : '未入力';
                        })()}
                      </p>
                    </div>

                    <div className="border-t border-gray-200 pt-4">
                      {/* 💡 スタッフによる変更種別の選択 */}
                      <div className="mb-4">
                        <label className="block text-sm font-bold text-gray-700 mb-2">変更の種別 <span className="text-red-500 text-xs">*必須</span></label>
                        <div className="flex flex-wrap gap-2">
                          {['自己変更', '依頼変更'].map(type => (
                            <label key={type} className={`cursor-pointer px-3 py-2 rounded-lg border text-sm font-bold transition-all ${changeForm.changeType === type ? 'bg-red-600 text-white border-red-600 shadow-md' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}>
                              <input type="radio" className="hidden" checked={changeForm.changeType === type} onChange={() => setChangeForm({...changeForm, changeType: type})} />
                              {type}
                            </label>
                          ))}
                        </div>
                      </div>

                      <label className="block text-sm font-bold text-red-600 mb-3 flex items-center gap-2"><Icon name="arrow-down"/> 変更後の希望シフトを入力</label>
                      <div className="flex gap-2 mb-3">
                        <button onClick={() => setChangeForm({...changeForm, status: '休'})} className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition-all ${changeForm.status === '休' ? 'bg-red-500 text-white shadow-md' : 'bg-white border border-gray-300 text-gray-700'}`}>休</button>
                        <button onClick={() => setChangeForm({...changeForm, status: '有休'})} className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition-all ${changeForm.status === '有休' ? 'bg-teal-500 text-white shadow-md' : 'bg-white border border-gray-300 text-gray-700'}`}>有休</button>
                        <button onClick={() => setChangeForm({...changeForm, status: '勤務'})} className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition-all ${changeForm.status === '勤務' ? 'bg-blue-600 text-white shadow-md' : 'bg-white border border-gray-300 text-blue-700'}`}>勤務</button>
                      </div>

                      {(changeForm.status === '勤務' || (changeForm.status === '休' && changeForm.canWorkIfNeeded)) && (
                        <div className="flex items-center gap-2 mb-3 animate-fade-in-down">
                          <select value={changeForm.start} onChange={(e) => setChangeForm({...changeForm, start: e.target.value})} className="flex-1 bg-white border border-gray-300 text-base rounded-lg p-2.5 text-center font-bold">
                            {HOUR_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
                          </select>
                          <span className="text-gray-400 font-bold">~</span>
                          <select value={changeForm.end} onChange={(e) => setChangeForm({...changeForm, end: e.target.value})} className="flex-1 bg-white border border-gray-300 text-base rounded-lg p-2.5 text-center font-bold">
                            {HOUR_OPTIONS.map(t => <option key={t} value={t}>{t}</option>)}
                          </select>
                        </div>
                      )}

                      {changeForm.status === '休' && (
                        <label className="flex items-center cursor-pointer gap-2.5 bg-gray-50 px-3 py-2.5 rounded-lg border border-gray-200 mb-3 animate-fade-in-down">
                          <input type="checkbox" className="sr-only peer" checked={changeForm.canWorkIfNeeded} onChange={() => setChangeForm({...changeForm, canWorkIfNeeded: !changeForm.canWorkIfNeeded})} />
                          <div className="relative w-10 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-orange-500"></div>
                          <span className="text-sm font-bold text-gray-600">出勤調整可能</span>
                        </label>
                      )}

                      <input type="text" value={changeForm.note || ''} onChange={(e) => setChangeForm({...changeForm, note: e.target.value})} placeholder="備考 (任意)" className="w-full bg-white border border-gray-300 text-base rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-red-300 outline-none" />
                    </div>

                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">変更理由 <span className="text-red-500 text-xs">*必須</span></label>
                      <textarea value={changeForm.reason} onChange={(e) => setChangeForm({...changeForm, reason: e.target.value})} placeholder="例: 予定していた病院の予約日時が変更になったため" className="w-full border border-gray-300 rounded-xl p-3 text-sm sm:text-base focus:ring-2 focus:ring-red-300 outline-none h-24 resize-none shadow-inner" />
                    </div>

                  </div>
                  <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t shrink-0">
                    <button onClick={() => setChangeForm({ ...changeForm, isOpen: false })} className="px-5 py-2.5 text-sm sm:text-base font-bold text-gray-600 hover:bg-gray-200 rounded-lg transition-colors">キャンセル</button>
                    <button 
                      onClick={submitChangeRequest} 
                      disabled={isSubmitDisabled}
                      className={`px-5 py-2.5 text-sm sm:text-base font-bold text-white rounded-lg shadow-sm transition-colors flex items-center gap-2 ${isSubmitDisabled ? 'bg-gray-400 cursor-not-allowed' : 'bg-red-600 hover:bg-red-700'}`}
                    >
                      <Icon name="paper-plane" size={14}/> 申請する
                    </button>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* カスタム確認モーダル */}
          {confirmModal.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[120] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
                <div className={`${confirmModal.title.includes('エラー') || confirmModal.title === '警告' ? 'bg-red-600' : 'bg-yellow-500'} px-5 py-4 text-white font-bold text-lg flex items-center gap-2`}>
                  <Icon name="exclamation-triangle" /> {confirmModal.title}
                </div>
                <div className="p-6 text-gray-800 text-sm sm:text-base font-medium space-y-2 whitespace-pre-wrap leading-relaxed">
                  {confirmModal.message}
                </div>
                <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t">
                  {!confirmModal.isAlert && <button onClick={() => setConfirmModal({ isOpen: false, type: '', title: '', message: '', onConfirm: null, isAlert: false })} className="px-5 py-2.5 text-sm sm:text-base font-bold text-gray-600 hover:bg-gray-200 rounded-lg transition-colors">キャンセル</button>}
                  <button onClick={() => { if(confirmModal.onConfirm) confirmModal.onConfirm(); setConfirmModal({ isOpen: false, type: '', title: '', message: '', onConfirm: null, isAlert: false }); }} className={`px-6 py-2.5 text-sm sm:text-base font-bold text-white rounded-lg shadow-sm transition-colors ${confirmModal.title.includes('エラー') || confirmModal.title === '警告' ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'}`}>
                    {confirmModal.isAlert ? 'OK' : '実行する'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
