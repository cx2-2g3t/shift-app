              <div className="flex flex-col">
                <h1 className="text-lg sm:text-xl font-bold">{view === 'admin' ? "シフトの窓口（管理画面）" : "シフトの窓口"}</h1>
                <div className="flex items-center gap-2 mt-0.5 text-sm opacity-90">
                  <button type="button" onClick={() => changeMonth(-1)} className="p-1 hover:bg-white/20 rounded-md transition-colors cursor-pointer relative z-[100]"><Icon name="chevron-left" size={12}/></button>
                  <span className="min-w-[5rem] text-center font-medium">{currentYear}年 {currentMonth}月</span>
                  <button type="button" onClick={() => changeMonth(1)} className="p-1 hover:bg-white/20 rounded-md transition-colors cursor-pointer relative z-[100]"><Icon name="chevron-right" size={12}/></button>
                  <span className="ml-2 border-l border-white/40 pl-3 font-bold">{getDisplayName(currentUser?.name)}</span>
                </div>
              </div>
            </div>
            
            <div className="flex items-center gap-2">
              
              {view === 'admin' && (
                <button onClick={handleManualRefresh} className="p-2 rounded-md flex items-center gap-1.5 text-sm font-bold border bg-indigo-700 border-indigo-600 hover:bg-indigo-600 transition-colors cursor-pointer relative z-[100]">
                  <Icon name="sync" size={14}/> <span className="hidden sm:inline">更新</span>
                </button>
              )}

              {currentUser?.role === 'admin' && (
                <button onClick={() => setView(view === 'admin' ? 'staff' : 'admin')} className={`p-2 rounded-md flex items-center gap-1.5 text-sm font-bold border ${view === 'admin' ? 'bg-indigo-700 border-indigo-600 hover:bg-indigo-600' : 'bg-blue-500 border-blue-400 hover:bg-blue-400'} transition-colors cursor-pointer relative z-[100]`}>
                  <Icon name={view === 'admin' ? "user" : "user-tie"} size={14}/> <span className="hidden sm:inline">{view === 'admin' ? 'スタッフ画面へ' : '管理画面へ'}</span>
                </button>
              )}
              <button onClick={handleLogout} className={`p-2 rounded-md flex items-center gap-2 text-sm font-bold ${view === 'admin' ? 'bg-indigo-700 hover:bg-indigo-600' : 'bg-blue-500 hover:bg-blue-400'} cursor-pointer relative z-[100]`}>
                <Icon name="sign-out-alt" size={16}/> <span className="hidden sm:inline">ログアウト</span>
              </button>
            </div>
          </header>
          {view === 'admin' && (
            <div className="bg-indigo-900 border-b border-indigo-700 overflow-x-auto no-scrollbar">
              <div className="max-w-[1400px] mx-auto px-4 flex gap-4 min-w-[300px]">
                <button onClick={() => setAdminTab('shift')} className={`py-3 px-2 text-sm sm:text-base font-bold border-b-4 whitespace-nowrap transition-colors ${adminTab === 'shift' ? 'border-white text-white' : 'border-transparent text-indigo-300 hover:text-white'}`}><Icon name="calendar-alt" className="mr-1.5" />シフト集計・管理</button>
                <button onClick={() => setAdminTab('history')} className={`py-3 px-2 text-sm sm:text-base font-bold border-b-4 whitespace-nowrap transition-colors ${adminTab === 'history' ? 'border-white text-white' : 'border-transparent text-indigo-300 hover:text-white'}`}><Icon name="history" className="mr-1.5" />変更履歴</button>
                <button onClick={() => setAdminTab('staff')} className={`py-3 px-2 text-sm sm:text-base font-bold border-b-4 whitespace-nowrap transition-colors ${adminTab === 'staff' ? 'border-white text-white' : 'border-transparent text-indigo-300 hover:text-white'}`}><Icon name="user-cog" className="mr-1.5" />スタッフ管理</button>
                <button onClick={() => setAdminTab('settings')} className={`py-3 px-2 text-sm sm:text-base font-bold border-b-4 whitespace-nowrap transition-colors ${adminTab === 'settings' ? 'border-white text-white' : 'border-transparent text-indigo-300 hover:text-white'}`}><Icon name="cog" className="mr-1.5" />設定・テンプレ</button>
              </div>
            </div>
          )}
        </div>
      );

      if (view === 'login') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-blue-50 to-purple-100 flex flex-col items-center justify-center p-4 relative overflow-hidden">
            <div className="absolute top-[-10%] left-[-10%] w-72 sm:w-96 h-72 sm:h-96 bg-blue-400/20 rounded-full blur-3xl pointer-events-none"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-72 sm:w-96 h-72 sm:h-96 bg-purple-400/20 rounded-full blur-3xl pointer-events-none"></div>
            {isLoading && <div className="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-[120]"><Icon name="spinner" className="fa-spin text-white" size={48} /></div>}
            
            <div className="w-full max-w-md animate-fade-in bg-white/90 backdrop-blur-xl rounded-md shadow-2xl border border-white/60 p-6 sm:p-10 relative z-10">
              <div className="flex flex-col items-center w-full">
                <div className="text-center mb-8">
                  <div className="w-20 h-20 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-md flex items-center justify-center mx-auto mb-5 shadow-lg transform hover:scale-105 transition-transform duration-300">
                    <Icon name="calendar-alt" size={36} className="text-white" />
                  </div>
                  <h1 className="text-3xl sm:text-4xl font-black text-gray-800 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-700 to-indigo-700">シフトの窓口</h1>
                </div>

                {loginError && <div className="w-full bg-red-50 text-red-600 p-3.5 rounded-md text-sm sm:text-base flex items-start gap-2 font-bold mb-6 border border-red-100 shadow-sm"><Icon name="exclamation-triangle" className="mt-0.5 shrink-0" />{loginError}</div>}
                
                {loginStep === 'login' && (
                  <form onSubmit={handleLoginSubmit} className="w-full space-y-6 animate-fade-in">
                    <div className="space-y-1.5">
                      <label className="block text-sm font-bold text-gray-700 ml-1">社員番号</label>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Icon name="id-badge" className="text-gray-400" /></div>
                        <input type="tel" value={employeeIdInput} onChange={(e) => { const val = toHalfWidthNum(e.target.value); if (val === '' || /^[0-9]+$/.test(val)) setEmployeeIdInput(val); }} className="w-full bg-white border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block pl-11 p-3.5 text-lg tracking-widest font-bold outline-none shadow-sm placeholder-gray-300" placeholder="社員番号を入力" />
                      </div>
                    </div>
                    <div className="space-y-1.5">
                      <label className="block text-sm font-bold text-gray-700 ml-1">パスワード</label>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Icon name="lock" className="text-gray-400" /></div>
                        <input type={showPassword ? "text" : "password"} value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full bg-white border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block pl-11 pr-10 p-3.5 text-lg tracking-widest font-bold outline-none shadow-sm placeholder-gray-300" placeholder="パスワードを入力" />
                        <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600"><Icon name={showPassword ? "eye" : "eye-slash"} regular={true} /></button>
                      </div>
                    </div>
                    <div className="flex flex-col gap-4 pt-4">
                      <button type="submit" className="w-full text-white bg-gradient-to-r from-blue-600 to-indigo-600 font-bold rounded-md px-5 py-4 shadow-md hover:shadow-lg text-lg transition-all transform hover:-translate-y-0.5">ログイン</button>
                      <button type="button" onClick={() => { setLoginStep('reset_request'); setLoginError(''); }} className="text-blue-500 hover:text-indigo-600 text-sm font-bold underline underline-offset-2 text-center mt-2">パスワードを忘れた場合</button>
                    </div>
                  </form>
                )}

                {loginStep === 'change_password' && (
                  <form onSubmit={handleChangePasswordSubmit} className="w-full space-y-5 animate-fade-in">
                    <div className="text-center mb-6 border-b border-gray-100 pb-6">
                      <p className="font-bold text-gray-800 text-2xl">{getDisplayName(tempUser?.name)} さん</p>
                      <p className="text-xs sm:text-sm font-bold text-orange-600 bg-orange-50 border border-orange-100 px-3 py-2 rounded-md mt-3 inline-block shadow-sm">
                        {isResetMode ? '新しいパスワードを設定してください' : '初期パスワードから変更してください'}
                      </p>
                    </div>
                    <div>
                      <label className="block text-[11px] sm:text-xs font-bold text-gray-700 mb-2 ml-1">新しいパスワード<br/><ul className="font-normal text-gray-500 mt-1.5 ml-3 list-disc list-inside"><li>8文字以上で設定</li><li>英大文字・小文字・数字・記号から3種類以上</li></ul></label>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Icon name="key" className="text-gray-400" /></div>
                        <input type={showPassword ? "text" : "password"} value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full bg-white border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 pl-11 pr-10 p-3.5 text-lg font-bold outline-none shadow-sm" placeholder="新しいパスワードを入力" />
                        <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400"><Icon name={showPassword ? "eye" : "eye-slash"} regular={true} /></button>
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-2 ml-1">パスワード (確認用)</label>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Icon name="lock" className="text-gray-400" /></div>
                        <input type={showPasswordConfirm ? "text" : "password"} value={passwordConfirm} onChange={(e) => setPasswordConfirm(e.target.value)} className="w-full bg-white border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 pl-11 pr-10 p-3.5 text-lg font-bold outline-none shadow-sm" placeholder="もう一度入力" />
                        <button type="button" onClick={() => setShowPasswordConfirm(!showPasswordConfirm)} className="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400"><Icon name={showPasswordConfirm ? "eye" : "eye-slash"} regular={true} /></button>
                      </div>
                    </div>
                    <div className="pt-4 flex flex-col gap-4">
                      <button type="submit" className="w-full text-white bg-gradient-to-r from-emerald-500 to-green-600 font-bold rounded-md px-5 py-4 shadow-md text-lg transform hover:-translate-y-0.5">設定してログイン</button>
                      <button type="button" onClick={goBackToLogin} className="text-gray-400 text-sm font-bold flex justify-center gap-1 mt-2"><Icon name="arrow-left" size={12}/> 戻る</button>
                    </div>
                  </form>
                )}

                {loginStep === 'reset_request' && (
                  <form onSubmit={handleResetRequestSubmit} className="w-full space-y-5 animate-fade-in">
                    <div className="text-center mb-6 border-b border-gray-100 pb-6"><p className="font-bold text-gray-800 text-xl">本人確認</p><p className="text-xs text-gray-500 mt-2">登録情報を入力してください</p></div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-2 ml-1">社員番号</label>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Icon name="id-badge" className="text-gray-400" /></div>
                        <input type="tel" value={resetIdInput} onChange={(e) => { const val = toHalfWidthNum(e.target.value); if (val === '' || /^[0-9]+$/.test(val)) setResetIdInput(val); }} className="w-full bg-white border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 pl-11 p-3.5 text-lg font-bold outline-none shadow-sm" placeholder="社員番号" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-2 ml-1">メールアドレス</label>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><Icon name="envelope" className="text-gray-400" /></div>
                        <input type="email" value={resetEmailInput} onChange={(e) => setResetEmailInput(e.target.value)} className="w-full bg-white border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 pl-11 p-3.5 text-lg font-bold outline-none shadow-sm" placeholder="メールアドレス" />
                      </div>
                    </div>
                    <div className="pt-4 flex flex-col gap-4">
                      <button type="submit" className="w-full text-white bg-gradient-to-r from-blue-600 to-indigo-600 font-bold rounded-md px-5 py-4 shadow-md text-lg transform hover:-translate-y-0.5">確認して初期化する</button>
                      <button type="button" onClick={goBackToLogin} className="text-gray-400 text-sm font-bold flex justify-center gap-1 mt-2"><Icon name="arrow-left" size={12}/> 戻る</button>
                    </div>
                  </form>
                )}
              </div>
            </div>
            {toast && <div className="fixed top-4 right-4 z-[130] animate-fade-in-down"><div className={`flex items-center gap-3 px-6 py-4 rounded-md shadow-lg text-white font-bold ${toast.type === 'success' ? 'bg-gray-800' : 'bg-red-600'}`}>{toast.message}</div></div>}
          </div>
        );
      }

      if (!currentUser) return null;

      const pendingApprovalCount = changeRequests.filter(req => req.status === 'pending').length;
      const unreadNotificationCount = adminNotifications.filter(n => !n.read).length;

      // 並び順（staffOrder）の基準でソートする処理に変更
      const filteredDbUsers = [...dbUsers].filter(u => 
        (u.name || '').includes(staffSearchQuery) || 
        (u.employeeId || '').includes(staffSearchQuery) ||
        (u.employmentCategory || '').includes(staffSearchQuery)
      ).sort((a, b) => getOrder(a.id) - getOrder(b.id));

      const filteredShiftUsers = staffUsers.filter(u => {
        if (displayFilter === 'admin' && u.role !== 'admin') return false;
        if (displayFilter === 'staff' && u.role === 'admin') return false;
        return (u.name || '').includes(shiftSearchQuery) || 
               String(u.employeeId || '').includes(shiftSearchQuery) ||
               (u.employmentCategory || '').includes(shiftSearchQuery);
      });

      return (
        <div className="min-h-screen bg-gray-50 pb-40 relative">
          {isLoading && <div className="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-[120]"><Icon name="spinner" className="fa-spin text-white" size={48} /></div>}
          {renderHeaderAndTabs()}
          
          {/* ==================================================== */}
          {/* スタッフ用コンテンツ */}
          {/* ==================================================== */}
          {view === 'staff' && (() => {
            const myShifts = safeUserId ? (currentMonthShifts[safeUserId] || {}) : {};
            const isBaseDisabled = isConfirmed || !isActiveMonth; 
            const staffAlerts = adminNotifications.filter(n => n.type === 'staff_alert' && n.userId === safeUserId && !n.read);

            return (
              <div className="max-w-4xl mx-auto p-3 sm:p-4 space-y-3 sm:space-y-4 animate-fade-in mt-2">
                {/* ▼▼ 追加: 強調表示されるスタッフ向け通知ポップアップ ▼▼ */}
                {staffAlerts.length > 0 && (
                  <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[99999] p-4 animate-fade-in backdrop-blur-sm">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
                      <div className="bg-gradient-to-r from-orange-500 to-red-500 px-5 py-4 text-white font-black text-xl flex items-center justify-center gap-3">
                        <Icon name="bell" className="animate-bounce" size={24} /> 重要なお知らせ
                      </div>
                      <div className="p-6 space-y-4 max-h-[60vh] overflow-y-auto bg-orange-50/30">
                        {staffAlerts.map(note => (
                          <div key={note.id} className="bg-white border-l-4 border-orange-500 p-4 rounded-r-md shadow-md">
                            <p className="text-gray-800 font-bold text-base sm:text-lg leading-relaxed">{note.message}</p>
                            <p className="text-xs text-gray-400 mt-2 text-right">{note.createdAt}</p>
                            <button onClick={() => dismissStaffAlert(note.id)} className="mt-4 w-full bg-orange-100 hover:bg-orange-200 text-orange-800 font-bold py-2.5 rounded-md transition-colors border border-orange-200 flex justify-center items-center gap-2">
                              <Icon name="check-circle" /> 確認しました
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                <div className="flex items-center gap-3 bg-white p-4 rounded-md shadow-sm border border-gray-200">
                <div className="w-12 h-12 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xl font-bold">
                    {currentUser.name ? currentUser.name.charAt(0) : 'S'}
                  </div>
                  <div>
                    <h2 className="text-lg font-bold text-gray-800">{getDisplayName(currentUser.name)} さん</h2>
                    <p className="text-sm text-gray-500 font-medium mt-0.5">
                      {currentUser.employmentCategory || 'スタッフ'} / 社員番号: {currentUser.employeeId}
                    </p>
                  </div>
                </div>

                {!isActiveMonth && (
                  <div className="bg-yellow-50 text-yellow-800 border border-yellow-200 p-4 rounded-md flex items-start gap-3 shadow-sm text-base">
                    <Icon name="shield-alt" size={24} className="shrink-0 mt-0.5" />
                    <div><p className="font-bold">{currentMonth}月は現在提出期間ではありません。</p><p className="text-sm mt-1">次月の希望シフト提出開始をお待ち下さい。また、過去月のシフト確認ができます。</p></div>
                  </div>
                )}

                {isActiveMonth && (
                  <div className={`rounded-md p-4 flex items-center justify-between border shadow-sm ${isOverdue ? 'bg-red-50 border-red-200' : 'bg-white border-gray-200'}`}>
                    <div className="flex items-center gap-2">
                      <Icon name="calendar-alt" size={24} className={isOverdue ? "text-red-500" : "text-gray-500"} />
                      <span className={`text-base sm:text-lg font-bold ${isOverdue ? "text-red-700" : "text-gray-700"}`}>提出締切日</span>
                    </div>
                    <span className={`text-lg sm:text-xl font-black flex items-center ${isOverdue ? "text-red-600" : "text-gray-800"}`}>
                      {deadline ? new Date(deadline).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' }) : '未設定'}
                      {isOverdue && <span className="text-sm ml-3 bg-red-500 text-white px-2.5 py-0.5 rounded-md">期限切れ</span>}
                    </span>
                  </div>
                )}

                {staffMails[safeUserId]?.length > 0 && (() => {
                  const unreadMails = staffMails[safeUserId].filter(mail => {
                    const readList = mail.readBy ? (typeof mail.readBy === 'string' ? JSON.parse(mail.readBy) : mail.readBy) : [];
                    return !readList.includes(safeUserId);
                  });
                  if (unreadMails.length === 0) return null;
                  const latestMail = unreadMails[0];
                  
                  return (
                    <div className="bg-blue-50 border border-blue-200 rounded-md p-4 shadow-sm relative overflow-hidden mb-3 animate-fade-in-down">
                      <div className="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                      <div className="flex gap-3">
                        <Icon name="envelope" size={24} className="text-blue-500 shrink-0 mt-0.5" />
                        <div className="w-full">
                          <div className="flex justify-between items-start mb-2">
                            <div>
                              <p className="text-sm font-bold text-blue-800">{latestMail.type}</p>
                              <span className="text-xs text-gray-500">{latestMail.date}</span>
                            </div>
                            <button onClick={() => markMailAsRead(latestMail)} className="text-xs bg-white border border-blue-300 text-blue-600 px-3 py-1.5 rounded-md font-bold hover:bg-blue-100 shadow-sm flex items-center gap-1 shrink-0 transition-colors">
                              <Icon name="check" size={10} /> 確認しました
                            </button>
                          </div>
                          <p className="text-base text-gray-800 leading-relaxed whitespace-pre-wrap">{renderTextWithLink(latestMail.text)}</p>
                        </div>
                      </div>
                    </div>
                  );
                })()}

                {personalNotes[safeUserId] && isActiveMonth && (
                  <div className="sticky top-[64px] sm:top-[76px] z-[70] bg-indigo-50 border border-indigo-200 rounded-md p-4 shadow-md relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                    <div className="flex gap-3">
                      <Icon name="comment-dots" size={24} className="text-indigo-500 shrink-0 mt-0.5" />
                      <div>
                        <p className="text-sm font-bold text-indigo-800 mb-1">管理者からの個別メッセージ</p>
                        <p className="text-base text-gray-800 leading-relaxed whitespace-pre-wrap">{personalNotes[safeUserId]}</p>
                      </div>
                    </div>
                  </div>
                )}

                {isActiveMonth && (
                  <div className={`bg-white rounded-md shadow-sm p-4 flex items-center justify-between border-l-4 ${hasPending ? 'border-orange-500' : 'border-blue-500'}`}>
                    <span className={`font-bold text-base flex items-center gap-2 text-gray-700`}><Icon name="info-circle" size={20} className={hasPending ? "text-orange-500" : "text-blue-500"}/> 現在の状況:</span>
                    <span className={`px-3 py-1 rounded-md text-sm sm:text-base font-bold ${myStatus === '提出済' ? 'bg-green-100 text-green-700' : (isConfirmed && hasPending) ? 'bg-orange-100 text-orange-700 border border-orange-200' : myStatus === '途中保存' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-200 text-gray-700'}`}>{isConfirmed && hasPending ? '申請結果待ち' : myStatus}</span>
                  </div>
                )}

                <div className="flex bg-white p-1.5 rounded-md border border-gray-200 w-full shadow-sm mb-2">
                  <button onClick={() => setStaffViewMode('list')} className={`flex-1 flex justify-center items-center gap-2 px-3 py-2.5 text-sm sm:text-base font-bold rounded-md transition-colors ${staffViewMode === 'list' ? 'bg-blue-50 text-blue-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><Icon name="list" /> リスト</button>
                  <button onClick={() => setStaffViewMode('week')} className={`flex-1 flex justify-center items-center gap-2 px-3 py-2.5 text-sm sm:text-base font-bold rounded-md transition-colors ${staffViewMode === 'week' ? 'bg-blue-50 text-blue-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><Icon name="calendar-week" /> 週間</button>
                  <button onClick={() => setStaffViewMode('month')} className={`flex-1 flex justify-center items-center gap-2 px-3 py-2.5 text-sm sm:text-base font-bold rounded-md transition-colors ${staffViewMode === 'month' ? 'bg-blue-50 text-blue-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><Icon name="calendar-alt" /> 月間</button>
                </div>

                {isConfirmed && <div className="bg-blue-50 text-blue-700 text-sm font-bold p-3 rounded-md text-center border border-blue-200">※確定済みのシフトです。変更が必要な場合は画面下部のボタンから申請してください。</div>}

                {staffViewMode === 'list' && (
                  <div className="bg-white rounded-md shadow-sm mb-6 border border-gray-200 overflow-hidden animate-fade-in">
                    <div className="p-2 sm:p-3 bg-gray-50 border-b border-gray-200 text-xs sm:text-sm text-gray-500 font-bold text-center">{isConfirmed ? '確定済みのシフト（閲覧専用）' : '日ごとの希望を選択'}</div>
                    <div className="divide-y divide-gray-100 pb-10">
                      {daysArray.map(day => {
                        const shiftData = myShifts[day] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
                        const isWorking = shiftData.status === '勤務';
                        const isRest = shiftData.status === '休';
                        const isPendingDay = myPendingDays[day]; 
                        const isDisabled = isBaseDisabled;
                        
                        return (
                          <div key={day} className={`flex flex-col p-3 sm:p-4 gap-2 sm:gap-3 transition-colors relative ${isWorking ? 'bg-blue-50/20' : ''} ${isRest && shiftData.canWorkIfNeeded ? 'bg-orange-50/20' : ''} ${isPendingDay ? 'bg-orange-50 opacity-80' : 'hover:bg-gray-50'}`}>
                            {isPendingDay && <div className="absolute top-2 right-2 bg-orange-500 text-white text-xs font-bold px-2 py-1 rounded-md shadow-sm z-10 flex items-center gap-1"><Icon name="clock" size={12} /> 申請中</div>}
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 w-full">
                              <div className="flex sm:flex-col items-center sm:items-start gap-2 w-full sm:w-20 shrink-0">
                                <div className="flex items-baseline gap-1">
                                  <span className={`text-xl sm:text-2xl font-black w-7 sm:w-8 text-right sm:text-center ${getDayColor(day)}`}>{day}</span>
                                  <span className={`text-sm sm:text-base font-bold ${getDayColor(day)}`}>{getDayOfWeek(day)}</span>
                                </div>
                                {currentDailyNotes[day] && <span className={`text-xs font-bold px-2 py-0.5 rounded-md leading-tight whitespace-normal break-words max-w-full text-center ${currentDailyNotes[day].includes('休刊日') ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700'}`}>{currentDailyNotes[day]}</span>}
                              </div>
                              <div className="flex gap-1.5 sm:gap-2 w-full sm:w-auto">
                                <button onClick={() => updateLocalShift(day, 'status', '未')} disabled={isDisabled} className={`w-full sm:w-[4.5rem] py-1.5 sm:py-2 rounded-md text-xs sm:text-sm font-bold transition-colors border ${shiftData.status === '未' ? 'bg-gray-600 text-white border-gray-600 shadow-sm' : `bg-white text-gray-500 border-gray-300 ${isDisabled ? '' : 'hover:bg-gray-50'}`}`}>未</button>
                                <button onClick={() => updateLocalShift(day, 'status', '休')} disabled={isDisabled} className={`w-full sm:w-[4.5rem] py-1.5 sm:py-2 rounded-md text-xs sm:text-sm font-bold transition-all border ${shiftData.status === '休' ? 'bg-red-500 text-white border-red-500 shadow-md' : `bg-white border border-gray-300 text-gray-700 ${isDisabled ? '' : 'hover:bg-gray-50'}`}`}>休</button>
                                <button onClick={() => updateLocalShift(day, 'status', '有休')} disabled={isDisabled} className={`w-full sm:w-[4.5rem] py-1.5 sm:py-2 rounded-md text-xs sm:text-sm font-bold transition-all border ${shiftData.status === '有休' ? 'bg-teal-500 text-white border-teal-500 shadow-md' : `bg-white text-gray-700 border-gray-300 ${isDisabled ? '' : 'hover:bg-gray-50'}`}`}>有休</button>
                                <button onClick={() => updateLocalShift(day, 'status', '勤務')} disabled={isDisabled} className={`w-full sm:w-[4.5rem] py-1.5 sm:py-2 rounded-md text-xs sm:text-sm font-bold transition-all border ${isWorking ? 'bg-blue-600 text-white border-blue-600 shadow-md' : `bg-white border border-gray-300 text-blue-700 ${isDisabled ? '' : 'hover:bg-gray-50'}`}`}>勤務</button>
                              </div>
                            </div>

                            {(isWorking || (isRest && shiftData.canWorkIfNeeded)) && (
                              <div className="flex flex-col sm:flex-row sm:items-center justify-end gap-2 sm:gap-3 sm:pl-20 mt-1 w-full sm:w-auto">
                                {isRest && <span className="text-xs sm:text-sm font-bold text-orange-500 self-end sm:self-auto mr-1">出勤可能時間:</span>}
                                <div className="flex items-center justify-end gap-1.5 w-full sm:w-auto">
                                  <select value={shiftData.start} onChange={(e) => updateLocalShift(day, 'start', e.target.value)} disabled={isDisabled} className={`bg-white border text-xs sm:text-sm rounded-md block py-1.5 w-[3.5rem] sm:w-[4.5rem] text-center appearance-none ${isRest ? 'border-orange-300 text-orange-800' : 'border-blue-200 text-blue-900'}`} style={{ textAlignLast: 'center' }}>{HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}</select>
                                  <span className="text-gray-400 font-bold text-sm">~</span>
                                  <select value={shiftData.end} onChange={(e) => updateLocalShift(day, 'end', e.target.value)} disabled={isDisabled} className={`bg-white border text-xs sm:text-sm rounded-md block py-1.5 w-[3.5rem] sm:w-[4.5rem] text-center appearance-none ${isRest ? 'border-orange-300 text-orange-800' : 'border-blue-200 text-blue-900'}`} style={{ textAlignLast: 'center' }}>{HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}</select>
                                </div>
                              </div>
                            )}

                            {shiftData.status !== '未' && (
                              <div className="flex justify-end sm:pl-20 mt-1 w-full sm:w-auto">
                                <div className="relative w-full sm:w-auto">
                                  <Icon name="comment-dots" className="absolute left-2.5 top-[10px] text-gray-400 text-xs" />
                                  <input type="text" value={shiftData.note || ''} onChange={(e) => updateLocalShift(day, 'note', e.target.value)} disabled={isDisabled} placeholder="備考 (任意)" className="w-full sm:w-72 bg-white border border-gray-300 text-xs sm:text-sm rounded-md pl-8 pr-3 py-1.5 focus:ring-2 focus:ring-blue-300 outline-none" />
                                </div>
                              </div>
                            )}
                            {isRest && !isDisabled && (
                              <div className="flex justify-end sm:pl-20 mt-1 w-full sm:w-auto">
                                <label className="flex items-center cursor-pointer gap-2 bg-gray-50 px-3 py-1.5 rounded-md border border-gray-200 justify-end">
                                  <input type="checkbox" className="sr-only peer" checked={shiftData.canWorkIfNeeded} onChange={() => updateLocalShift(day, 'canWorkIfNeeded', !shiftData.canWorkIfNeeded)} />
                                  <div className="relative w-8 h-4 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:bg-orange-500 after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:after:translate-x-full"></div>
                                  <span className="text-xs sm:text-sm font-bold text-gray-600">出勤調整可能</span>
                                </label>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {staffViewMode === 'week' && (
                  <div className="mb-6 animate-fade-in pt-4 pb-16">
                    <div className="flex justify-between items-center bg-white rounded-md p-3 sm:p-4 shadow-sm mb-4 border border-gray-200">
                      <button onClick={() => setCurrentWeekIndex(Math.max(0, currentWeekIndex - 1))} disabled={currentWeekIndex === 0} className="p-2 sm:p-3 rounded-md hover:bg-gray-100 disabled:opacity-50"><Icon name="chevron-left" size={18}/></button>
                      <span className="text-base sm:text-lg font-bold text-gray-700">第 {currentWeekIndex + 1} 週</span>
                      <button onClick={() => setCurrentWeekIndex(Math.min(weeks.length - 1, currentWeekIndex + 1))} disabled={currentWeekIndex === weeks.length - 1} className="p-2 sm:p-3 rounded-md hover:bg-gray-100 disabled:opacity-50"><Icon name="chevron-right" size={18}/></button>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-7 gap-2 sm:gap-4">
                      {weeks[currentWeekIndex].map((day, idx) => {
                        if (!day) return <div key={`empty-${idx}`} className="hidden md:block opacity-50 bg-gray-100 rounded-md border min-h-[180px]"></div>;
                        const s = myShifts[day] || { status: '未' };
                        const isPendingDay = myPendingDays[day];
                        const rowDisabled = isBaseDisabled || isPendingDay;
                        return (
                          <div key={day} className={`bg-white border rounded-md p-2 sm:p-3 flex flex-col gap-2 shadow-sm relative ${isPendingDay ? 'bg-orange-50 border-orange-200' : 'border-gray-200'} hover:z-30`}>
                            {isPendingDay && <div className="absolute -top-2 -right-2 bg-orange-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-md"><Icon name="clock" size={10}/>申請中</div>}
                            <div className="text-center border-b border-gray-100 pb-2">
                              <div className={`text-xl sm:text-2xl font-black ${getDayColor(day)}`}>{day}</div>
                              <div className={`text-xs sm:text-sm font-bold ${getDayColor(day)}`}>{getDayOfWeek(day)}</div>
                              {currentDailyNotes[day] && <div className={`text-[10px] sm:text-xs font-bold rounded-md px-1.5 py-0.5 mt-1.5 truncate ${currentDailyNotes[day].includes('休刊日') ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700'}`}>{currentDailyNotes[day]}</div>}
                            </div>
                            <div className="grid grid-cols-2 gap-1 mt-1">
                              <button onClick={() => updateLocalShift(day, 'status', '未')} disabled={rowDisabled} className={`py-1.5 rounded-md text-xs sm:text-sm font-bold border ${s.status === '未' ? 'bg-gray-600 text-white border-gray-600' : 'bg-white border-gray-300 text-gray-500'}`}>未</button>
                              <button onClick={() => updateLocalShift(day, 'status', '休')} disabled={rowDisabled} className={`py-1.5 rounded-md text-xs sm:text-sm font-bold border ${s.status === '休' ? 'bg-red-500 text-white border-red-500' : 'bg-white border-gray-300 text-gray-700'}`}>休</button>
                              <button onClick={() => updateLocalShift(day, 'status', '有休')} disabled={rowDisabled} className={`py-1.5 rounded-md text-xs sm:text-sm font-bold border ${s.status === '有休' ? 'bg-teal-500 text-white border-teal-500' : 'bg-white border-gray-300 text-gray-700'}`}>有休</button>
                              <button onClick={() => updateLocalShift(day, 'status', '勤務')} disabled={rowDisabled} className={`py-1.5 rounded-md text-xs sm:text-sm font-bold border ${s.status === '勤務' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white border-gray-300 text-blue-700'}`}>勤務</button>
                            </div>
                            {(s.status === '勤務' || (s.status === '休' && s.canWorkIfNeeded)) && (
                              <div className="flex flex-col gap-1 mt-auto pt-2">
                                <select value={s.start} onChange={(e) => updateLocalShift(day, 'start', e.target.value)} disabled={rowDisabled} className="w-full bg-gray-50 border border-gray-300 rounded-md text-xs sm:text-sm py-1.5 px-0 text-center font-bold appearance-none" style={{textAlignLast:'center'}}>{HOUR_OPTIONS.map(t=><option key={t} value={t}>{t||'--:--'}</option>)}</select>
                                <div className="text-center text-gray-300 text-[10px]">▼</div>
                                <select value={s.end} onChange={(e) => updateLocalShift(day, 'end', e.target.value)} disabled={rowDisabled} className="w-full bg-gray-50 border border-gray-300 rounded-md text-xs sm:text-sm py-1.5 px-0 text-center font-bold appearance-none" style={{textAlignLast:'center'}}>{HOUR_OPTIONS.map(t=><option key={t} value={t}>{t||'--:--'}</option>)}</select>
                              </div>
                            )}
                            {s.status !== '未' && <input type="text" value={s.note || ''} onChange={(e) => updateLocalShift(day, 'note', e.target.value)} disabled={rowDisabled} placeholder="備考" className="mt-2 bg-white border border-gray-300 rounded-md text-xs p-1.5 text-center focus:ring-1 focus:ring-blue-300 outline-none" />}
                            {s.status === '休' && !rowDisabled && (
                              <label className="flex items-center cursor-pointer gap-1 justify-center mt-1.5 bg-gray-50 rounded-md p-1.5 border">
                                <input type="checkbox" className="sr-only peer" checked={s.canWorkIfNeeded} onChange={() => updateLocalShift(day, 'canWorkIfNeeded', !s.canWorkIfNeeded)} />
                                <div className="relative w-6 h-3 sm:w-7 sm:h-4 bg-gray-300 rounded-full peer peer-checked:bg-orange-500 after:absolute after:top-[1px] after:left-[1px] after:bg-white after:rounded-full after:h-2.5 after:w-2.5 sm:after:h-3 sm:after:w-3 after:transition-all peer-checked:after:translate-x-full"></div>
                                <span className="text-[10px] font-bold text-gray-600">調整可</span>
                              </label>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {staffViewMode === 'month' && (
                  <div className="bg-white rounded-md shadow-sm mb-6 border border-gray-200 animate-fade-in no-scrollbar pt-2 pb-20">
                    <div className="w-full">
                      <div className="grid grid-cols-7 bg-gray-100 border-b border-gray-200">
                        {['日', '月', '火', '水', '木', '金', '土'].map((dow, i) => (
                          <div key={dow} className={`text-center py-2 text-[10px] sm:text-base font-bold border-r last:border-r-0 ${i===0?'text-red-500':i===6?'text-blue-500':'text-gray-700'}`}>{dow}</div>
                        ))}
                      </div>
                      <div className="flex flex-col">
                        {weeks.map((week, wIdx) => (
                          <div key={wIdx} className="grid grid-cols-7 border-b border-gray-200">
                            {week.map((day, dIdx) => {
                              if (!day) return <div key={`empty-${wIdx}-${dIdx}`} className="bg-gray-50 border-r border-gray-200 min-h-[80px] opacity-50 last:border-r-0"></div>;
                              const s = myShifts[day] || { status: '未' };
                              const isPendingDay = myPendingDays[day]; 
                              const rowDisabled = isBaseDisabled || isPendingDay;
                              let statusColorClass = 'bg-gray-50 text-gray-500 border-gray-300';
                              if (s.status === '勤務') statusColorClass = 'bg-blue-100 text-blue-800 border-blue-300 font-bold';
                              if (s.status === '休') statusColorClass = 'bg-red-50 text-red-700 border-red-200 font-bold';
                              if (s.status === '有休') statusColorClass = 'bg-teal-50 text-teal-700 border-teal-200 font-bold';

                              return (
                                <div key={day} className={`p-0.5 sm:p-2 border-r last:border-r-0 min-h-[100px] flex flex-col relative transition-colors ${isPendingDay ? 'bg-orange-50' : 'hover:bg-blue-50/10'}`}>
                                  {isPendingDay && <div className="absolute top-0 right-0 bg-orange-500 text-white rounded-bl-md text-[8px] font-bold px-1 py-0.5 z-20">申請中</div>}
                                  <div className="flex justify-center items-center mb-1"><span className={`text-sm sm:text-base font-black ${getDayColor(day)}`}>{day}</span></div>
                                  
                                  {currentDailyNotes[day] && (
                                    <div className={`border rounded-sm text-[8px] sm:text-[11px] font-bold px-0.5 py-0.5 w-full text-center mb-1 leading-tight break-all ${currentDailyNotes[day].includes('休刊日') ? 'bg-blue-50 text-blue-600 border-blue-200' : 'bg-red-50 text-red-600 border-red-200'}`}>
                                      {currentDailyNotes[day]}
                                    </div>
                                  )}

                                  <div className="mt-auto flex flex-col gap-1">
                                    <select 
                                      value={s.status} 
                                      onChange={(e) => updateLocalShift(day, 'status', e.target.value)} 
                                      disabled={rowDisabled} 
                                      className={`w-full rounded-md text-[10px] sm:text-sm p-1 px-0 border text-center appearance-none ${statusColorClass}`} 
                                      style={{ textAlignLast: 'center' }}
                                    >
                                      <option value="未">未</option><option value="休">休</option><option value="有休">有休</option><option value="勤務">勤務</option>
                                    </select>
                                    
                                    {(s.status === '勤務' || (s.status === '休' && s.canWorkIfNeeded)) && (
                                      <div className="flex flex-col gap-0.5 mt-0.5 relative z-10">
                                        <select value={s.start} onChange={(e) => updateLocalShift(day, 'start', e.target.value)} disabled={rowDisabled} className="w-full bg-white rounded border text-[9px] sm:text-xs py-0.5 px-0 text-center font-bold appearance-none" style={{textAlignLast:'center'}}>{HOUR_OPTIONS.map(t=><option key={t} value={t}>{t||'-'}</option>)}</select>
                                        <select value={s.end} onChange={(e) => updateLocalShift(day, 'end', e.target.value)} disabled={rowDisabled} className="w-full bg-white rounded border text-[9px] sm:text-xs py-0.5 px-0 text-center font-bold appearance-none" style={{textAlignLast:'center'}}>{HOUR_OPTIONS.map(t=><option key={t} value={t}>{t||'-'}</option>)}</select>
                                      </div>
                                    )}
                                    
                                    {s.status === '休' && !rowDisabled && (
                                      <label className="flex items-center justify-center gap-0.5 mt-0.5">
                                        <input type="checkbox" checked={s.canWorkIfNeeded} onChange={() => updateLocalShift(day, 'canWorkIfNeeded', !s.canWorkIfNeeded)} className="w-3 h-3 accent-orange-500" />
                                        <span className="text-[8px] text-gray-500 font-bold leading-none">可</span>
                                      </label>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                {/* 追加：月間コメント入力エリア */}
                <div className="bg-white rounded-md shadow-sm mb-24 border border-gray-200 p-4 animate-fade-in">
                  <label className="flex items-center gap-2 text-sm font-bold text-gray-700 mb-2">
                    <Icon name="comment-dots" className="text-blue-500" /> 提出月のシフトに関する連絡・希望 (任意)
                  </label>
                  <textarea 
                    value={myShifts.monthlyNote || ''} 
                    onChange={(e) => updateLocalMonthlyNote(e.target.value)} 
                    disabled={isBaseDisabled}
                    className="w-full border border-gray-300 rounded-md p-3 text-sm focus:ring-2 focus:ring-blue-300 outline-none resize-none h-20"
                  />
                </div>

                <div className="fixed bottom-0 left-0 right-0 p-4 sm:p-5 bg-white border-t border-gray-200 z-50 pb-safe shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)]">
                  {!isConfirmed ? (
                    <div className="flex gap-3 sm:gap-4 justify-center max-w-4xl mx-auto w-full">
                      {myStatus !== '提出済' ? (
                        <><button onClick={() => handleSubmitShift(false)} className="flex-1 py-3.5 px-2 bg-yellow-100 text-yellow-800 rounded-md font-bold hover:bg-yellow-200">途中保存</button><button onClick={() => handleSubmitShift(true)} className="flex-[2] py-3.5 px-2 bg-blue-600 text-white rounded-md font-bold hover:bg-blue-700 shadow-md">提出する</button></>
                      ) : (
                        <button onClick={() => handleSubmitShift(true)} className="w-full py-3.5 px-4 bg-blue-50 text-blue-700 border border-blue-200 rounded-md font-bold hover:bg-blue-100">修正して再提出する</button>
                      )}
                    </div>
                  ) : (
                    <div className="max-w-4xl mx-auto w-full animate-fade-in">
                      <button onClick={openChangeForm} className="w-full py-3.5 px-4 bg-red-50 text-red-700 border border-red-200 rounded-md font-bold hover:bg-red-100 shadow-sm"><Icon name="edit" className="mr-2" />確定済みのシフト変更を申請する</button>
                    </div>
                  )}
                </div>
              </div>
            );
          })()}

          {/* ==================================================== */}
          {/* 管理者用コンテンツ */}
          {/* ==================================================== */}
          {view === 'admin' && (() => {
            
            const adminNotes = adminNotifications.filter(n => {
              // 1. スタッフ向けの通知（「【却下】」「【承認】」が含まれるもの等）は管理者画面には出さない
              const isStaffAlert = n.type === 'staff_alert' || (n.message && (n.message.includes('【却下】') || n.message.includes('【承認】')));
              if (isStaffAlert) return false;
              
              // 2. 処理済み（既読）のものは完全に隠す
              if (n.read === true || String(n.read) === 'true') return false;
              
              return true; // 上の条件に当てはまらない、本当の管理者宛の未読通知だけ残す
            });
            const unreadCount = adminNotes.length + pendingReqs.length;

            return (
              <div className="flex-1 p-3 sm:p-5 max-w-[1400px] mx-auto w-full space-y-4 sm:space-y-6 mt-2 sm:mt-4">
                
                {/* 1. シフト管理タブ */}
                {adminTab === 'shift' && (
                  <div className="animate-fade-in">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                      <div className="bg-white rounded-md shadow-sm overflow-hidden border border-indigo-100 flex flex-col max-h-[350px]">
                        <div className="bg-indigo-50 px-5 py-4 border-b border-indigo-100 flex justify-between items-center">
                          <h2 className="text-indigo-800 font-bold flex items-center gap-2"><Icon name="bell" size={20} className={unreadCount > 0 ? "text-red-500 animate-bounce" : "text-indigo-500"} /> 通知・変更申請 {unreadCount > 0 && <span className="bg-red-500 rounded-full text-white text-sm px-2.5 py-0.5 ml-1">{unreadCount}</span>}</h2>
                        </div>
                        <div className="p-0 overflow-y-auto bg-gray-50 flex-1">
                          {unreadCount === 0 && <div className="p-8 text-gray-400 text-center flex flex-col items-center gap-3"><Icon name="check-circle" size={32}/>新しい通知はありません</div>}
                          <div className="divide-y divide-gray-200">
                            {pendingReqs.map(req => {
                              const checks = approvalChecks[req.id] || { shift: false, kot: false };
                              const safeNewVal = req.newVal || {};
                              const category = adminChangeCategories[req.id] || safeNewVal.changeCategory || '';
                              const attStatus = adminAttendanceStatuses[req.id] || '';
                              const canApprove = checks.shift && checks.kot && category && attStatus;
                              const safeChanges = Array.isArray(req.changes) ? req.changes : [];
                              const safeDate = req.createdAt ? String(req.createdAt).split(' ')[0] : '';

                              return (
                                <div key={req.id} className="p-4 sm:p-5 bg-orange-50/80 relative overflow-hidden border-b border-orange-100">
                                  <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-orange-500"></div>
                                  <div className="flex justify-between items-start mb-3">
                                    <p className="font-black text-orange-900 flex items-center gap-2"><Icon name="exclamation-circle" className="text-orange-500"/> {req.userName} さんから変更申請</p>
                                    <span className="text-xs text-gray-500 bg-white px-2 py-1 rounded-md shadow-sm">{safeDate}</span>
                                  </div>
                                  <p className="text-sm font-bold text-gray-700 bg-white rounded-md p-3 shadow-sm mb-3 border border-gray-200">
                                    理由: {req.reason}
                                    <span className="text-indigo-600 text-xs mt-1.5 block flex items-center gap-1"><Icon name="user-check"/> 事前確認: {req.confirmedBy}</span>
                                  </p>
                                  
                                  <div className="space-y-2">
                                    {safeChanges.length > 0 ? (
                                      safeChanges.map((c, idx) => (
                                        <div key={idx} className="text-sm bg-white rounded-md p-3 border border-orange-200 flex items-center gap-3 shadow-sm">
                                          <span className="font-bold bg-orange-100 rounded-md px-3 py-1.5 text-orange-800">{c.day}日</span> 
                                          <div className="flex flex-col flex-1">
                                            <span className="text-gray-500 line-through">{formatShiftStr(c.oldVal)}</span>

<button onClick={handleExportCSV} className="hidden sm:flex bg-emerald-600 rounded-md hover:bg-emerald-700 text-white font-bold py-2 px-4 text-sm shadow-sm items-center justify-center gap-2"><Icon name="file-excel" /> Excel出力 (CSV)</button>

  <div className="tooltip-container tooltip-bottom tooltip-left cursor-help" tabIndex="0">

)}
