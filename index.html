<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>シフトの窓口</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    .animate-fade-in-down { animation: fadeInDown 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { height: 8px; width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .bg-stripes-gray { background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(0,0,0,0.05) 5px, rgba(0,0,0,0.05) 10px); }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }

    .tooltip-container { position: relative; display: inline-flex; align-items: center; outline: none; }
    .tooltip-container:hover { z-index: 99999; }
    .tooltip-text { 
      visibility: hidden; 
      position: absolute; 
      bottom: 130%; 
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 8px;
      background-color: #1e293b; 
      color: white; 
      text-align: center; 
      padding: 8px 12px; 
      border-radius: 6px; 
      white-space: normal; 
      min-width: max-content;
      max-width: 250px;
      font-size: 12px;
      font-weight: bold;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.2s, visibility 0.2s;
      pointer-events: none;
      z-index: 99999;
    }
    .tooltip-container:hover .tooltip-text,
    .tooltip-container:active .tooltip-text,
    .tooltip-container:focus-within .tooltip-text {
      visibility: visible;
      opacity: 1;
    }
    .tooltip-text::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%; 
      margin-left: -6px;
      border-width: 6px;
      border-style: solid;
      border-color: #1e293b transparent transparent transparent;
    }

    /* Flat Input for Login */
    .input-flat {
      border: none;
      border-bottom: 2px solid #cbd5e1;
      border-radius: 0;
      background: transparent;
      padding: 12px 8px;
      transition: border-color 0.2s ease;
    }
    .input-flat:focus {
      outline: none;
      border-bottom-color: #2563eb;
      box-shadow: none;
    }
    
    /* クリック領域の調整用 */
    .clickable-cell {
      position: relative;
      z-index: 20;
    }
  </style>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const INITIAL_USERS = [
      { employeeId: '1001', id: 'u1', name: '佐藤 太郎 (オペレーター)', email: 'sato@example.com', role: 'staff', status: 'active', password: '1001' },
      { employeeId: '1002', id: 'u2', name: '鈴木 花子 (オペレーター)', email: 'suzuki@example.com', role: 'staff', status: 'active', password: '1002' },
      { employeeId: '1003', id: 'u3', name: '高橋 健太 (オペレーター)', email: 'takahashi@example.com', role: 'staff', status: 'active', password: '1003' },
      { employeeId: '9999', id: 'admin', name: '管理者 (SV)', email: 'admin@example.com', role: 'admin', status: 'active', password: '9999' },
    ];

    const INITIAL_TEMPLATES = [
      { id: 't1', name: '【シフトの窓口】{month}月シフト提出依頼', body: 'お疲れ様です。\n\n{month}月のシフト提出期間が開始しました。\n提出期限は「{deadline}」となっておりますので、期限までのご提出をお願いいたします。\n\n▼ シフトの窓口（提出はこちらから）\nhttps://cx2-2g3t.github.io/shift-app/' },
      { id: 't2', name: '【シフトの窓口】未提出者へのリマインド', body: 'お疲れ様です。\n\n{month}月のシフト提出がまだ確認できておりません。\n提出期限は「{deadline}」となっておりますので、至急ご提出をお願いいたします。\n\n▼ シフトの窓口（提出はこちらから）\nhttps://cx2-2g3t.github.io/shift-app/' },
      { id: 't3', name: '【シフトの窓口】{month}月シフト確定のお知らせ', body: 'お疲れ様です。\n\n{month}月のシフトが確定しました。\nシフト表をご確認ください。\n\n▼ シフトの窓口（確認はこちらから）\nhttps://cx2-2g3t.github.io/shift-app/' },
      { id: 't4', name: '【シフトの窓口】シフト調整のお願い', body: 'お疲れ様です。\n\n出勤人数の調整をお願いしたい日がございます。\nご対応可能な方は管理者までご連絡ください。\n\n▼ シフトの窓口（確認はこちらから）\nhttps://cx2-2g3t.github.io/shift-app/' },
    ];

    // 💡 デフォルトを空欄にし、時間の選択肢から0:00を削除
    const DEFAULT_START_TIME = '';
    const DEFAULT_END_TIME = '';
    const START_HOUR = 7;
    const END_HOUR = 22;
    const TOTAL_HOURS = END_HOUR - START_HOUR;
    const timeAxis = Array.from({ length: TOTAL_HOURS }, (_, i) => i + START_HOUR);
    const HOUR_OPTIONS = ['', ...Array.from({ length: TOTAL_HOURS + 1 }, (_, i) => `${i + START_HOUR}:00`)];

    const DOW_NAMES = ['日', '月', '火', '水', '木', '金', '土'];
    const DOW_COLORS = ['text-red-500', 'text-gray-700', 'text-gray-700', 'text-gray-700', 'text-gray-700', 'text-gray-700', 'text-blue-500'];

    const Icon = ({ name, size = 16, className = "", title = "", regular = false }) => (
      <i className={`${regular ? 'far' : 'fas'} fa-${name} ${className}`} style={{ fontSize: size }} title={title}></i>
    );

    const getDisplayName = (name) => {
      if (!name) return '---';
      return String(name).replace(' (オペレーター)', '').replace(' (SV)', '');
    };

    function App() {
      const [isLoading, setIsLoading] = useState(false);
      const [toast, setToast] = useState(null);
      const [view, setView] = useState('login'); 
      const [currentUser, setCurrentUser] = useState(null);
      const [loginStep, setLoginStep] = useState('login'); 
      const [tempUser, setTempUser] = useState(null);
      const [isResetMode, setIsResetMode] = useState(false); 
      const [employeeIdInput, setEmployeeIdInput] = useState('');
      const [passwordInput, setPasswordInput] = useState('');
      const [passwordConfirm, setPasswordConfirm] = useState('');
      const [resetIdInput, setResetIdInput] = useState('');
      const [resetEmailInput, setResetEmailInput] = useState('');
      const [loginError, setLoginError] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [showPasswordConfirm, setShowPasswordConfirm] = useState(false);

      const [displayDate, setDisplayDate] = useState(new Date(2026, 3, 1)); 
      const [dbUsers, setDbUsers] = useState(INITIAL_USERS);
      const [activeTargetMonth, setActiveTargetMonth] = useState('2026-04');
      const [deadline, setDeadline] = useState('2026-03-15');
      const [isConfirmed, setIsConfirmed] = useState(true); 
      
      const [shifts, setShifts] = useState({
        u1: { 1: {status: '勤務', start: '9:00', end: '18:00', note: '病院のため早退。'}, 2: {status: '勤務', start: '9:00', end: '14:00'}, 15: {status: '勤務', start: '8:00', end: '17:00'} },
        u2: { 1: {status: '勤務', start: '12:00', end: '21:00'}, 2: {status: '休', canWorkIfNeeded: false}, 15: {status: '休', start: '10:00', end: '15:00', canWorkIfNeeded: true} },
        u3: { 1: {status: '勤務', start: '9:00', end: '14:00'}, 2: {status: '勤務', start: '15:00', end: '20:00'}, 15: {status: '勤務', start: '12:00', end: '21:00'} },
      });
      const [submissionStatus, setSubmissionStatus] = useState({ u1: '提出済', u2: '未提出', u3: '途中保存' });
      const [dailyNotes, setDailyNotes] = useState({ 15: '新キャンペーン開始日', 25: '入電予測:高' });
      const [personalNotes, setPersonalNotes] = useState({ u1: '今月も補佐をお願いします！' });
      const [adminNotifications, setAdminNotifications] = useState([]);

      const [modal, setModal] = useState({ isOpen: false, type: '', targetId: null, text: '' });
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null, isAlert: false });
      const [adminTab, setAdminTab] = useState('shift'); 
      
      const [shiftViewMode, setShiftViewMode] = useState('month');
      const [selectedDay, setSelectedDay] = useState(1);
      const [newStaff, setNewStaff] = useState({ employeeId: '', name: '', email: '' });
      const [showRetired, setShowRetired] = useState(false);
      const [staffViewMode, setStaffViewMode] = useState('list'); 
      const [currentWeekIndex, setCurrentWeekIndex] = useState(0);
      
      const [changeForm, setChangeForm] = useState({ isOpen: false, day: 1, status: '勤務', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '', reason: '', changeCategory: '' });
      const [changeRequests, setChangeRequests] = useState([]); 
      const [pendingChanges, setPendingChanges] = useState({}); 
      const [approvalChecks, setApprovalChecks] = useState({}); 
      const [adminChangeCategories, setAdminChangeCategories] = useState({}); 
      const [adminAttendanceStatuses, setAdminAttendanceStatuses] = useState({}); 
      
      const [mailForm, setMailForm] = useState({ isOpen: false, targetMode: 'all', selectedUsers: [], templateId: '', type: '', text: '' });
      const [staffMails, setStaffMails] = useState({}); 
      const [sentMails, setSentMails] = useState([]);
      const [isMailHistoryOpen, setIsMailHistoryOpen] = useState(false);

      const [emailTemplates, setEmailTemplates] = useState(INITIAL_TEMPLATES);
      const [templateForm, setTemplateForm] = useState({ isOpen: false, id: null, name: '', body: '' });
      
      const [fixedShifts, setFixedShifts] = useState({
        u1: { 1: {status: '勤務', start: '9:00', end: '18:00'}, 2: {status: '勤務', start: '9:00', end: '18:00'}, 3: {status: '勤務', start: '9:00', end: '18:00'}, 4: {status: '勤務', start: '9:00', end: '18:00'}, 5: {status: '勤務', start: '9:00', end: '18:00'} }
      });
      const [fixedShiftForm, setFixedShiftForm] = useState({ isOpen: false, userId: null, userName: '', data: {} });

      const currentYear = displayDate.getFullYear();
      const currentMonth = displayDate.getMonth() + 1;
      const currentMonthStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
      const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
      const daysArray = Array.from({ length: daysInMonth }, (_, i) => i + 1);

      const staffUsers = useMemo(() => dbUsers.filter(u => u.role === 'staff'), [dbUsers]);
      const pendingReqs = useMemo(() => changeRequests.filter(req => req.status === 'pending'), [changeRequests]);
      const isActiveMonth = currentMonthStr === activeTargetMonth;
      const isOverdue = new Date() > new Date(deadline);
      const safeUserId = currentUser ? currentUser.id : null;

      const myPendingDays = safeUserId ? (pendingChanges[safeUserId] || {}) : {};
      const hasPending = Object.keys(myPendingDays).length > 0;
      const myStatus = safeUserId ? (submissionStatus[safeUserId] || '未提出') : '未提出';

      const weeks = useMemo(() => {
        const startDayOfWeek = new Date(currentYear, currentMonth - 1, 1).getDay();
        const emptyCells = Array.from({ length: startDayOfWeek }, () => null);
        const calendarCells = [...emptyCells, ...daysArray];
        const totalCells = Math.ceil(calendarCells.length / 7) * 7;
        const trailingEmptyCells = Array.from({ length: totalCells - calendarCells.length }, () => null);
        const fullCells = [...calendarCells, ...trailingEmptyCells];
        const rows = [];
        for (let i = 0; i < fullCells.length; i += 7) rows.push(fullCells.slice(i, i + 7));
        return rows;
      }, [currentYear, currentMonth, daysArray]);

      const generateMailText = (text) => {
        if (!text) return '';
        let formattedDeadline = '未設定';
        if (deadline) {
          const d = new Date(deadline);
          formattedDeadline = `${d.getMonth() + 1}月${d.getDate()}日`;
        }
        return text
          .replace(/{month}/g, currentMonth)
          .replace(/{deadline}/g, formattedDeadline);
      };

      const getDayOfWeek = (day) => DOW_NAMES[new Date(currentYear, currentMonth - 1, day).getDay()];
      const getDayColor = (day) => DOW_COLORS[new Date(currentYear, currentMonth - 1, day).getDay()] + ' font-bold';
      
      const showToast = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      const formatShiftStr = (shiftObj) => {
        if (!shiftObj || shiftObj.status === '未') return '未入力';
        if (shiftObj.status === '休' && !shiftObj.canWorkIfNeeded) return '休';
        if (shiftObj.status === '有休') return '有休';
        if (shiftObj.status === '勤務') return `勤務 (${shiftObj.start || '--:--'}-${shiftObj.end || '--:--'})`;
        if (shiftObj.status === '休' && shiftObj.canWorkIfNeeded) return `休 (${shiftObj.start || '--:--'}-${shiftObj.end || '--:--'}可)`;
        return shiftObj.status;
      };

      const calculateShiftDetails = (startStr, endStr) => {
        if (!startStr || !endStr) return { hours: 0, hasBreak: false, startVal: 0, endVal: 0 };
        const [h1, m1] = startStr.split(':').map(Number);
        const [h2, m2] = endStr.split(':').map(Number);
        const startVal = h1 + m1 / 60;
        const endVal = h2 + m2 / 60;
        const diff = endVal - startVal;
        
        if (diff > 6) {
          const midVal = startVal + (diff / 2);
          let breakStartVal = Math.floor(midVal - 0.5);
          const breakEndVal = breakStartVal + 1;
          return { 
            hours: diff - 1, 
            hasBreak: true, 
            startVal, endVal, breakStartVal, breakEndVal, 
            breakStartStr: `${Math.floor(breakStartVal)}:00`, 
            breakEndStr: `${Math.floor(breakEndVal)}:00` 
          };
        }
        return { hours: diff, hasBreak: false, startVal, endVal };
      };

      const getHourlyCount = (day, hour) => {
        let confirmed = 0, possible = 0;
        staffUsers.forEach(u => {
          if (u.status === 'retired') return; 
          const s = shifts[u.id]?.[day];
          if (!s) return;
          if (s.status === '勤務' || (s.status === '休' && s.canWorkIfNeeded)) {
            const details = calculateShiftDetails(s.start, s.end);
            if (details.hours === 0) return;
            let isWorkingThisHour = (details.startVal <= hour && details.endVal > hour);
            if (isWorkingThisHour && details.hasBreak && details.breakStartVal <= hour && details.breakEndVal > hour) isWorkingThisHour = false;
            if (isWorkingThisHour) { if (s.status === '勤務') confirmed++; else possible++; }
          }
        });
        return { confirmed, possible };
      };

      const getDailySummary = (day) => {
        let confirmed = 0;
        let possible = 0;
        let totalHours = 0;
        staffUsers.filter(u => u.status === 'active').forEach(u => {
          const s = shifts[u.id]?.[day];
          if (s) {
            if (s.status === '勤務') {
              confirmed++;
              const details = calculateShiftDetails(s.start, s.end);
              totalHours += details.hours;
            } else if (s.status === '休' && s.canWorkIfNeeded) {
              possible++;
            }
          }
        });
        return { confirmed, possible, totalHours };
      };

      const simulateLoading = (callback) => { setIsLoading(true); setTimeout(() => { callback(); setIsLoading(false); }, 400); };

      const changeMonth = (offset) => {
        setDisplayDate(prev => {
          const newDate = new Date(prev.getFullYear(), prev.getMonth() + offset, 1);
          return newDate;
        });
        setSelectedDay(1); 
        setCurrentWeekIndex(0); 
      };

      const handleDemoLogin = (empId) => { setLoginError(''); simulateLoading(() => { const user = dbUsers.find(u => u.employeeId === empId); if (user) { loginSuccess(user); } }); };

      const handleLoginSubmit = (e) => {
        e.preventDefault();
        setLoginError('');
        
        if (!(employeeIdInput || '').trim()) { setLoginError('社員番号を入力してください。'); return; }
        if (!(passwordInput || '').trim()) { setLoginError('パスワードを入力してください。'); return; }

        simulateLoading(() => {
          const user = dbUsers.find(u => u.employeeId === employeeIdInput);
          if (!user) { setLoginError('該当する社員番号が見つかりません。'); return; }
          if (user.status === 'retired') { setLoginError('このアカウントは現在利用できません。'); return; }
          if (user.password === passwordInput) {
            if (passwordInput === user.employeeId) {
              setTempUser(user); 
              setIsResetMode(false); 
              setPasswordInput(''); 
              setPasswordConfirm(''); 
              setLoginStep('change_password');
            } else { loginSuccess(user); }
          } else { setLoginError('パスワードが間違っています。'); }
        });
      };

      const validatePassword = (pw) => {
        if (pw.length < 8) return { valid: false, msg: 'パスワードは8文字以上で設定してください。' };
        let matchCount = 0;
        if (/[A-Z]/.test(pw)) matchCount++; 
        if (/[a-z]/.test(pw)) matchCount++; 
        if (/[0-9]/.test(pw)) matchCount++; 
        if (/[^A-Za-z0-9]/.test(pw)) matchCount++; 
        if (matchCount < 3) return { valid: false, msg: '英大文字、小文字、数字、記号のうち3種類以上を組み合わせてください。' };
        return { valid: true };
      };

      const handleChangePasswordSubmit = (e) => {
        e.preventDefault();
        setLoginError('');

        if (!(passwordInput || '').trim()) { setLoginError('新しいパスワードを入力してください。'); return; }
        if (!(passwordConfirm || '').trim()) { setLoginError('確認用のパスワードを入力してください。'); return; }
        
        if (!tempUser) { setLoginStep('login'); return; }
        if (passwordInput !== passwordConfirm) { setLoginError('パスワードが一致しません。'); return; }
        if (passwordInput === tempUser.employeeId) { setLoginError('初期パスワード(社員番号)と同じパスワードは設定できません。'); return; }
        const validation = validatePassword(passwordInput);
        if (!validation.valid) { setLoginError(validation.msg); return; }
        simulateLoading(() => {
          setDbUsers(prev => prev.map(u => u.id === tempUser.id ? { ...u, password: passwordInput } : u));
          loginSuccess({ ...tempUser, password: passwordInput });
        });
      };

      const handleResetRequestSubmit = (e) => {
        e.preventDefault();
        setLoginError('');

        if (!(resetIdInput || '').trim()) { setLoginError('社員番号を入力してください。'); return; }
        if (!(resetEmailInput || '').trim()) { setLoginError('メールアドレスを入力してください。'); return; }

        simulateLoading(() => {
          const user = dbUsers.find(u => u.employeeId === resetIdInput);
          if (user && user.email === resetEmailInput) {
            setDbUsers(prev => prev.map(u => u.id === user.id ? { ...u, password: null } : u));
            setTempUser({...user, password: null});
            setIsResetMode(true);
            setLoginStep('change_password');
            setPasswordInput('');
            setPasswordConfirm('');
            setResetIdInput('');
            setResetEmailInput('');
            showToast('本人確認が完了しました。新しいパスワードを設定してください。');
          } else {
            setLoginError('入力された情報が登録内容と一致しません。');
          }
        });
      };

      const loginSuccess = (user) => {
        setCurrentUser(user); setView(user.role);
        setEmployeeIdInput(''); setPasswordInput(''); setPasswordConfirm('');
        setLoginStep('login'); setTempUser(null); setIsResetMode(false);
        setShowPassword(false); setShowPasswordConfirm(false);
        if (user.role === 'staff') {
          const [y, m] = activeTargetMonth.split('-');
          setDisplayDate(new Date(parseInt(y), parseInt(m) - 1, 1));
        }
      };

      const goBackToLogin = () => {
        setLoginStep('login');
        setPasswordInput(''); setPasswordConfirm('');
        setResetIdInput(''); setResetEmailInput(''); setTempUser(null);
        setIsResetMode(false); setLoginError('');
        setShowPassword(false); setShowPasswordConfirm(false);
      };

      const handleLogout = () => { setCurrentUser(null); setView('login'); setAdminTab('shift'); setLoginStep('login'); setShowPassword(false); setShowPasswordConfirm(false); };

      const updateLocalShift = (day, field, value) => {
        if (!currentUser) return;
        setShifts(prev => {
          const uShifts = prev[currentUser.id] || {};
          const cShift = uShifts[day] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
          return { ...prev, [currentUser.id]: { ...uShifts, [day]: { ...cShift, [field]: value } } };
        });
      };

      const handleSubmitShift = (isSubmit = false) => {
        if (isSubmit && currentUser) {
          const currentShifts = shifts[currentUser.id] || {};
          const hasUnentered = daysArray.some(day => !currentShifts[day] || currentShifts[day].status === '未');
          if (hasUnentered) {
            setConfirmModal({ isOpen: true, title: '未入力エラー', message: '未入力の日付があります。すべて選択してから提出してください。', isAlert: true, onConfirm: null });
            return;
          }
          const hasMissingTime = daysArray.some(day => {
            const s = currentShifts[day];
            if (s && s.status === '勤務') {
              return !s.start || !s.end;
            }
            return false;
          });
          if (hasMissingTime) {
            setConfirmModal({ isOpen: true, title: '時間未入力エラー', message: '「勤務」の日は、出勤時間と退勤時間の両方を選択してください。', isAlert: true, onConfirm: null });
            return;
          }
        }
        simulateLoading(() => {
          setSubmissionStatus(prev => ({ ...prev, [currentUser.id]: isSubmit ? '提出済' : '途中保存' }));
          setConfirmModal({ 
            isOpen: true, 
            title: '提出完了', 
            message: isSubmit ? 'シフトの提出が完了しました。' : 'シフトを一時保存しました。', 
            isAlert: true, 
            onConfirm: null 
          });
        });
      };

      const handleChangeFormDay = (dayStr) => {
        const day = parseInt(dayStr);
        if (!currentUser) return;
        const currentShift = (shifts[currentUser.id] || {})[day] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
        setChangeForm(prev => ({ ...prev, day, status: currentShift.status === '未' ? '勤務' : currentShift.status, start: currentShift.start || DEFAULT_START_TIME, end: currentShift.end || DEFAULT_END_TIME, canWorkIfNeeded: currentShift.canWorkIfNeeded || false, note: currentShift.note || '' }));
      };

      const openChangeForm = () => {
        if (!safeUserId) return;
        const initialDay = 1;
        const currentShift = (shifts[safeUserId] || {})[initialDay] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
        setChangeForm({ isOpen: true, day: initialDay, status: currentShift.status === '未' ? '勤務' : currentShift.status, start: currentShift.start || DEFAULT_START_TIME, end: currentShift.end || DEFAULT_END_TIME, canWorkIfNeeded: currentShift.canWorkIfNeeded || false, note: currentShift.note || '', reason: '', changeCategory: '' });
      };

      const submitChangeRequest = () => {
        if (!currentUser) return;
        if (!changeForm.changeCategory) { showToast('区分を選択してください', 'error'); return; }
        if (!(changeForm.reason || '').trim()) { showToast('変更理由を入力してください', 'error'); return; }

        const original = (shifts[currentUser.id] || {})[changeForm.day] || { status: '未' };
        const newVal = { status: changeForm.status, start: changeForm.start, end: changeForm.end, canWorkIfNeeded: changeForm.canWorkIfNeeded, note: changeForm.note, changeCategory: changeForm.changeCategory };
        
        simulateLoading(() => {
          const newReq = { id: Date.now(), userId: currentUser.id, userName: getDisplayName(currentUser.name), changes: [{ day: changeForm.day, oldVal: original, newVal }], day: changeForm.day, oldVal: original, newVal: newVal, reason: changeForm.reason, status: 'pending', createdAt: new Date().toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute:'2-digit' }) };
          setChangeRequests(prev => [newReq, ...prev]);
          setPendingChanges(prev => { const uPending = prev[currentUser.id] || {}; uPending[changeForm.day] = true; return { ...prev, [currentUser.id]: uPending }; });
          setChangeForm(prev => ({ ...prev, isOpen: false }));
          setConfirmModal({ 
            isOpen: true, 
            title: '申請完了', 
            message: '確定後シフトの変更申請を送信しました。\n管理者の承認をお待ちください。', 
            isAlert: true, 
            onConfirm: null 
          });
        });
      };

      const handleApprove = (reqId) => {
        simulateLoading(() => {
          const req = changeRequests.find(r => r.id === reqId);
          if (!req) return;
          const category = adminChangeCategories[reqId] || req.newVal.changeCategory;
          const attStatus = adminAttendanceStatuses[reqId];

          const updatedReq = { ...req, status: 'approved', newVal: { ...req.newVal, changeCategory: category, attendanceStatus: attStatus }, changes: req.changes.map(c => ({ ...c, newVal: { ...c.newVal, changeCategory: category, attendanceStatus: attStatus } })) };
          setShifts(prev => { const uShifts = { ...(prev[req.userId] || {}) }; updatedReq.changes.forEach(c => { uShifts[c.day] = c.newVal; }); return { ...prev, [req.userId]: uShifts }; });
          setPendingChanges(prev => { const uPending = { ...(prev[req.userId] || {}) }; updatedReq.changes.forEach(c => delete uPending[c.day]); return { ...prev, [req.userId]: uPending }; });
          setChangeRequests(prev => prev.map(r => r.id === reqId ? updatedReq : r));
          setApprovalChecks(prev => { const newChecks = { ...prev }; delete newChecks[reqId]; return newChecks; });
          setAdminChangeCategories(prev => { const newC = { ...prev }; delete newC[reqId]; return newC; });
          setAdminAttendanceStatuses(prev => { const newA = { ...prev }; delete newA[reqId]; return newA; });
          
          setConfirmModal({ 
            isOpen: true, 
            title: '処理完了', 
            message: 'シフトの変更申請を承認し、反映しました。', 
            isAlert: true, 
            onConfirm: null 
          });
        });
      };

      const handleReject = (reqId) => {
        simulateLoading(() => {
          const req = changeRequests.find(r => r.id === reqId);
          if (!req) return;
          setPendingChanges(prev => { const uPending = { ...(prev[req.userId] || {}) }; req.changes.forEach(c => delete uPending[c.day]); return { ...prev, [req.userId]: uPending }; });
          setChangeRequests(prev => prev.map(r => r.id === reqId ? { ...r, status: 'rejected' } : r));
          setApprovalChecks(prev => { const newChecks = { ...prev }; delete newChecks[reqId]; return newChecks; });
          setAdminChangeCategories(prev => { const newC = { ...prev }; delete newC[reqId]; return newC; });
          setAdminAttendanceStatuses(prev => { const newA = { ...prev }; delete newA[reqId]; return newA; });
          
          setConfirmModal({ 
            isOpen: true, 
            title: '処理完了', 
            message: 'シフトの変更申請を却下しました。', 
            isAlert: true, 
            onConfirm: null 
          });
        });
      };

      const toggleApprovalCheck = (reqId, type) => { setApprovalChecks(prev => { const current = prev[reqId] || { shift: false, kot: false }; return { ...prev, [reqId]: { ...current, [type]: !current[type] } }; }); };

      const setAsActiveMonth = () => {
        simulateLoading(() => { 
          setActiveTargetMonth(currentMonthStr); setIsConfirmed(false); 
          let dYear = currentYear, dMonth = currentMonth - 1;
          if (dMonth === 0) { dMonth = 12; dYear -= 1; }
          setDeadline(`${dYear}-${String(dMonth).padStart(2, '0')}-15`);
          showToast(`${currentYear}年${currentMonth}月 を募集開始しました`); 
        });
      };

      const toggleConfirmAll = () => { 
        simulateLoading(() => { 
          setIsConfirmed(!isConfirmed); 
        }); 
      };

      const handleSaveModal = () => {
        simulateLoading(() => {
          if (modal.type === 'daily') setDailyNotes(prev => ({ ...prev, [modal.targetId]: modal.text }));
          else setPersonalNotes(prev => ({ ...prev, [modal.targetId]: modal.text }));
          setModal({ isOpen: false, type: '', targetId: null, text: '' });
          showToast('保存しました');
        });
      };

      const markNotificationAsRead = (id) => { setAdminNotifications(prev => prev.map(n => n.id === id ? { ...n, read: true } : n)); };

      const handleAddStaff = (e) => {
        e.preventDefault();
        if (!(newStaff.employeeId || '').trim()) { showToast('社員番号を入力してください', 'error'); return; }
        if (!(newStaff.name || '').trim()) { showToast('氏名を入力してください', 'error'); return; }
        if (!(newStaff.email || '').trim()) { showToast('メールアドレスを入力してください', 'error'); return; }

        simulateLoading(() => {
          if (dbUsers.some(u => u.employeeId === newStaff.employeeId)) { showToast('社員番号が重複しています', 'error'); return; }
          const newId = `u${Date.now()}`;
          const safeName = newStaff.name || '名称未設定';
          const newUser = { employeeId: newStaff.employeeId, id: newId, name: safeName, email: newStaff.email, role: 'staff', status: 'active', password: newStaff.employeeId };
          setDbUsers([...dbUsers, newUser]);
          setSubmissionStatus(prev => ({ ...prev, [newId]: '未提出' }));
          showToast(`${safeName} さんを追加しました`);
          setNewStaff({ employeeId: '', name: '', email: '' });
        });
      };

      const toggleStaffStatus = (userId, name, currentStatus) => {
        const isRetiring = currentStatus === 'active';
        setConfirmModal({ isOpen: true, title: '確認', message: `${getDisplayName(name)} を${isRetiring ? '退職' : '復職'}状態にします。`, isAlert: false, onConfirm: () => {
          setDbUsers(prev => prev.map(u => u.id === userId ? { ...u, status: isRetiring ? 'retired' : 'active' } : u));
          showToast(`更新しました`);
        }});
      };

      const handleDeleteStaff = (userId, name) => {
        setConfirmModal({ isOpen: true, title: '警告', message: `${getDisplayName(name)} を完全に削除しますか？履歴も消えます。`, isAlert: false, onConfirm: () => {
          simulateLoading(() => {
            setDbUsers(dbUsers.filter(u => u.id !== userId));
            showToast(`${getDisplayName(name)} を削除しました`);
          });
        }});
      };

      const handleExportCSV = () => {
        simulateLoading(() => {
          let csv = "社員番号,名前,日付,ステータス,出勤,退勤,備考\n";
          staffUsers.filter(u => u.status === 'active').forEach(u => {
            daysArray.forEach(d => {
              const s = shifts[u.id]?.[d] || { status: '未' };
              csv += `${u.employeeId},${getDisplayName(u.name)},${currentMonth}/${d},${s.status},${s.start || ''},${s.end || ''},${s.note || ''}\n`;
            });
          });
          const link = document.createElement("a");
          link.href = URL.createObjectURL(new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv' }));
          link.download = `シフト_${currentYear}年${currentMonth}月.csv`;
          link.click();
          showToast('ダウンロードしました');
        });
      };

      const openMailForm = () => {
        const defaultTpl = emailTemplates.length > 0 ? emailTemplates[0] : { id: '', name: '', body: '' };
        let defaultSelected = staffUsers.filter(u => u.status === 'active').map(u => u.id);
        setMailForm({
          isOpen: true,
          targetMode: 'all',
          selectedUsers: defaultSelected,
          templateId: defaultTpl.id,
          type: generateMailText(defaultTpl.name),
          text: generateMailText(defaultTpl.body)
        });
      };

      const handleTargetModeChange = (e) => {
        const mode = e.target.value;
        let selected = [];
        if (mode === 'all') {
          selected = staffUsers.filter(u => u.status === 'active').map(u => u.id);
        } else if (mode === 'unsubmitted') {
          selected = staffUsers.filter(u => u.status === 'active' && submissionStatus[u.id] !== '提出済').map(u => u.id);
        } else if (mode === 'submitted') {
          selected = staffUsers.filter(u => u.status === 'active' && submissionStatus[u.id] === '提出済').map(u => u.id);
        } else {
          selected = [...mailForm.selectedUsers];
        }
        setMailForm({ ...mailForm, targetMode: mode, selectedUsers: selected });
      };

      const toggleMailUser = (uid) => {
        setMailForm(prev => {
          const isSelected = prev.selectedUsers.includes(uid);
          let newSelected = [];
          if (isSelected) newSelected = prev.selectedUsers.filter(id => id !== uid);
          else newSelected = [...prev.selectedUsers, uid];
          return { ...prev, selectedUsers: newSelected };
        });
      };

      const handleSendMail = (e) => {
        e.preventDefault(); 
        if (mailForm.selectedUsers.length === 0) { showToast('送信対象のスタッフが選択されていません', 'error'); return; }
        
        const targetStaff = staffUsers.filter(u => mailForm.selectedUsers.includes(u.id));
        const emails = targetStaff.map(u => u.email).filter(Boolean);
        
        if (emails.length === 0) {
          showToast('選択されたスタッフにメールアドレスが登録されていません', 'error');
          return;
        }

        const subject = encodeURIComponent(generateMailText(mailForm.type));
        const body = encodeURIComponent(mailForm.text);
        
        let mailtoLink = "";
        if (emails.length === 1) {
          mailtoLink = `mailto:${emails[0]}?subject=${subject}&body=${body}`;
        } else {
          const bccEmails = emails.join(',');
          mailtoLink = `mailto:?bcc=${bccEmails}&subject=${subject}&body=${body}`;
        }
        
        const link = document.createElement('a');
        link.href = mailtoLink;
        link.target = '_top'; 
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        simulateLoading(() => {
          const newMails = { ...staffMails };
          const mailObj = {
            id: Date.now(), type: generateMailText(mailForm.type), text: mailForm.text,
            date: new Date().toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute:'2-digit' })
          };
          targetStaff.forEach(u => {
            if (!newMails[u.id]) newMails[u.id] = [];
            newMails[u.id] = [mailObj, ...newMails[u.id]];
          });
          setStaffMails(newMails);
          const newSentMail = {
            id: Date.now(), type: generateMailText(mailForm.type), text: mailForm.text,
            date: new Date().toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute:'2-digit' }),
            targetNames: targetStaff.map(u => getDisplayName(u.name)).join(', ')
          };
          setSentMails(prev => [newSentMail, ...prev]);
          
          showToast('メールソフトを起動しました');
          setMailForm(prev => ({ ...prev, isOpen: false }));
        });
      };

      const openTemplateForm = (tpl) => {
        if (tpl) {
          setTemplateForm({ isOpen: true, id: tpl.id, name: tpl.name, body: tpl.body });
        } else {
          setTemplateForm({ isOpen: true, id: `t${Date.now()}`, name: '', body: '' });
        }
      };

      const saveTemplate = () => {
        if(!templateForm.name.trim()) return showToast('件名（種類）を入力してください', 'error');
        
        simulateLoading(() => {
          setEmailTemplates(prev => {
            const exists = prev.find(t => t.id === templateForm.id);
            if (exists) {
              return prev.map(t => t.id === templateForm.id ? { ...t, name: templateForm.name, body: templateForm.body } : t);
            } else {
              return [...prev, { id: templateForm.id, name: templateForm.name, body: templateForm.body }];
            }
          });
          setTemplateForm({ isOpen: false, id: null, name: '', body: '' });
          showToast('テンプレートを保存しました');
        });
      };

      const deleteTemplate = (id) => {
        setConfirmModal({ isOpen: true, title: '確認', message: 'このテンプレートを削除しますか？', isAlert: false, onConfirm: () => {
          setEmailTemplates(prev => prev.filter(t => t.id !== id));
          showToast('削除しました');
        }});
      };

      const openFixedShiftForm = (user) => {
        const data = fixedShifts[user.id] || {};
        const initData = {};
        for(let i=0; i<7; i++) {
          initData[i] = data[i] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false };
        }
        setFixedShiftForm({ isOpen: true, userId: user.id, userName: getDisplayName(user.name), data: initData });
      };

      const updateFixedShiftForm = (dow, field, value) => {
        setFixedShiftForm(prev => ({
          ...prev,
          data: {
            ...prev.data,
            [dow]: { ...prev.data[dow], [field]: value }
          }
        }));
      };

      const saveFixedShift = () => {
        simulateLoading(() => {
          setFixedShifts(prev => ({ ...prev, [fixedShiftForm.userId]: fixedShiftForm.data }));
          setFixedShiftForm({ isOpen: false, userId: null, userName: '', data: {} });
          showToast(`${fixedShiftForm.userName}さんの曜日固定シフトを保存しました`);
        });
      };

      const applyFixedShiftsToMonth = () => {
        setConfirmModal({ isOpen: true, title: '一括自動入力の確認', message: `事前に設定された「曜日固定シフト」を、今月（${currentMonth}月）の「未入力」の日に一括で自動反映します。\n（すでに入力・選択済みの日は上書きされません）\n\nよろしいですか？`, isAlert: false, onConfirm: () => {
          simulateLoading(() => {
            setShifts(prev => {
              const newShifts = { ...prev };
              staffUsers.forEach(u => {
                if (!newShifts[u.id]) newShifts[u.id] = {};
                const uFixed = fixedShifts[u.id];
                if (uFixed) {
                  daysArray.forEach(day => {
                    const date = new Date(currentYear, currentMonth - 1, day);
                    const dow = date.getDay();
                    
                    const isUnentered = !newShifts[u.id][day] || newShifts[u.id][day].status === '未';
                    const hasFixedSetting = uFixed[dow] && uFixed[dow].status !== '未';
                    
                    if (isUnentered && hasFixedSetting) {
                      newShifts[u.id][day] = { ...uFixed[dow] };
                    }
                  });
                }
              });
              return newShifts;
            });
            showToast(`${currentMonth}月の未入力の日に固定シフトを自動反映しました`);
          });
        }});
      };

      const renderHeaderAndTabs = () => (
        <div className="sticky top-0 z-[80] w-full shadow-md">
          <header className={`${view === 'admin' ? 'bg-indigo-800' : 'bg-blue-600'} text-white px-4 py-3 sm:px-6 sm:py-4 flex justify-between items-center`}>
            <div className="flex items-center gap-3">
              <Icon name={view === 'admin' ? "user-tie" : "calendar-alt"} size={24} className="hidden sm:block" />
              <div className="flex flex-col">
                <h1 className="text-lg sm:text-xl font-bold">{view === 'admin' ? "シフトの窓口（管理画面）" : "シフトの窓口"}</h1>
                <div className="flex items-center gap-2 mt-0.5 text-sm opacity-90">
                  <button type="button" onClick={() => changeMonth(-1)} className="p-1 hover:bg-white/20 rounded-md transition-colors cursor-pointer relative z-[100]"><Icon name="chevron-left" size={12}/></button>
                  <span className="min-w-[5rem] text-center font-medium">{currentYear}年 {currentMonth}月</span>
                  <button type="button" onClick={() => changeMonth(1)} className="p-1 hover:bg-white/20 rounded-md transition-colors cursor-pointer relative z-[100]"><Icon name="chevron-right" size={12}/></button>
                  <span className="ml-2 border-l border-white/40 pl-3 font-bold">{getDisplayName(currentUser?.name)}</span>
                </div>
              </div>
            </div>
            <button onClick={handleLogout} className={`p-2 rounded-md flex items-center gap-2 text-sm font-bold ${view === 'admin' ? 'bg-indigo-700 hover:bg-indigo-600' : 'bg-blue-500 hover:bg-blue-400'} cursor-pointer relative z-[100]`}>
              <Icon name="sign-out-alt" size={16}/> <span className="hidden sm:inline">ログアウト</span>
            </button>
          </header>
          {view === 'admin' && (
            <div className="bg-indigo-900 border-b border-indigo-700 overflow-x-auto no-scrollbar">
              <div className="max-w-[1400px] mx-auto px-4 flex gap-4 min-w-[300px]">
                <button onClick={() => setAdminTab('shift')} className={`py-3 px-2 text-sm sm:text-base font-bold border-b-4 whitespace-nowrap transition-colors ${adminTab === 'shift' ? 'border-white text-white' : 'border-transparent text-indigo-300 hover:text-white'}`}><Icon name="calendar-alt" className="mr-1.5" />シフト集計・管理</button>
                <button onClick={() => setAdminTab('history')} className={`py-3 px-2 text-sm sm:text-base font-bold border-b-4 whitespace-nowrap transition-colors ${adminTab === 'history' ? 'border-white text-white' : 'border-transparent text-indigo-300 hover:text-white'}`}><Icon name="history" className="mr-1.5" />変更履歴 <span className="bg-white/20 px-1.5 py-0.5 rounded ml-1 text-xs">{changeRequests.length}</span></button>
                <button onClick={() => setAdminTab('staff')} className={`py-3 px-2 text-sm sm:text-base font-bold border-b-4 whitespace-nowrap transition-colors ${adminTab === 'staff' ? 'border-white text-white' : 'border-transparent text-indigo-300 hover:text-white'}`}><Icon name="user-cog" className="mr-1.5" />スタッフ管理</button>
                <button onClick={() => setAdminTab('settings')} className={`py-3 px-2 text-sm sm:text-base font-bold border-b-4 whitespace-nowrap transition-colors ${adminTab === 'settings' ? 'border-white text-white' : 'border-transparent text-indigo-300 hover:text-white'}`}><Icon name="cog" className="mr-1.5" />設定・テンプレ</button>
              </div>
            </div>
          )}
        </div>
      );

      if (view === 'login') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-blue-50 to-purple-100 flex flex-col items-center justify-center p-4 relative overflow-hidden">
            {/* 背景の装飾オブジェクト */}
            <div className="absolute top-[-10%] left-[-10%] w-72 sm:w-96 h-72 sm:h-96 bg-blue-400/20 rounded-full blur-3xl pointer-events-none"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-72 sm:w-96 h-72 sm:h-96 bg-purple-400/20 rounded-full blur-3xl pointer-events-none"></div>

            {isLoading && <div className="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-[120]"><Icon name="spinner" className="fa-spin text-white" size={48} /></div>}
            
            <div className="w-full max-w-md animate-fade-in bg-white/90 backdrop-blur-xl rounded-md shadow-2xl border border-white/60 p-6 sm:p-10 relative z-10">
              <div className="flex flex-col items-center w-full">
                <div className="text-center mb-8">
                  <div className="w-20 h-20 bg-gradient-to-tr from-blue-600 to-indigo-600 rounded-md flex items-center justify-center mx-auto mb-5 shadow-lg transform hover:scale-105 transition-transform duration-300">
                    <Icon name="calendar-alt" size={36} className="text-white" />
                  </div>
                  <h1 className="text-3xl sm:text-4xl font-black text-gray-800 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-blue-700 to-indigo-700">シフトの窓口</h1>
                </div>

                {loginError && <div className="w-full bg-red-50 text-red-600 p-3.5 rounded-md text-sm sm:text-base flex items-start gap-2 font-bold mb-6 border border-red-100 shadow-sm"><Icon name="exclamation-triangle" className="mt-0.5 shrink-0" />{loginError}</div>}
                
                {loginStep === 'login' && (
                  <form onSubmit={handleLoginSubmit} className="w-full space-y-6 animate-fade-in">
                    <div className="space-y-1.5">
                      <label className="block text-sm font-bold text-gray-700 ml-1">社員番号</label>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                          <Icon name="id-badge" className="text-gray-400" />
                        </div>
                        <input type="text" inputMode="numeric" pattern="[0-9]*" value={employeeIdInput} onChange={(e) => setEmployeeIdInput(e.target.value)} className="w-full bg-white border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block pl-11 p-3.5 text-lg tracking-widest font-bold outline-none transition-shadow shadow-sm placeholder-gray-300" placeholder="社員番号を入力" />
                      </div>
                    </div>
                    <div className="space-y-1.5">
                      <label className="block text-sm font-bold text-gray-700 ml-1">パスワード</label>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                          <Icon name="lock" className="text-gray-400" />
                        </div>
                        <input type={showPassword ? "text" : "password"} value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full bg-white border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block pl-11 pr-10 p-3.5 text-lg tracking-widest font-bold outline-none transition-shadow shadow-sm placeholder-gray-300" placeholder="パスワードを入力" />
                        <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
                          <Icon name={showPassword ? "eye" : "eye-slash"} regular={true} />
                        </button>
                      </div>
                    </div>
                    <div className="flex flex-col gap-4 pt-4">
                      <button type="submit" className="w-full text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 font-bold rounded-md px-5 py-4 shadow-md hover:shadow-lg text-lg transition-all transform hover:-translate-y-0.5">ログイン</button>
                      <button type="button" onClick={() => { setLoginStep('reset_request'); setLoginError(''); setResetIdInput(''); setResetEmailInput(''); }} className="text-blue-500 hover:text-indigo-600 text-sm font-bold underline underline-offset-2 text-center mt-2 transition-colors">パスワードを忘れた場合</button>
                    </div>
                    
                    <div className="mt-8 w-full pt-6 border-t border-gray-200/60 flex flex-col gap-3">
                      <p className="font-bold text-xs text-gray-400 text-center tracking-widest"><Icon name="rocket"/> デモ用ログイン</p>
                      <div className="flex gap-2">
                        <button type="button" onClick={() => handleDemoLogin('1001')} className="flex-1 bg-white border border-gray-200 hover:bg-blue-50 hover:border-blue-300 text-gray-600 hover:text-blue-700 font-bold py-2.5 rounded-md flex items-center justify-center gap-2 text-sm transition-all shadow-sm"><Icon name="user"/> スタッフ</button>
                        <button type="button" onClick={() => handleDemoLogin('9999')} className="flex-1 bg-white border border-gray-200 hover:bg-indigo-50 hover:border-indigo-300 text-gray-600 hover:text-indigo-700 font-bold py-2.5 rounded-md flex items-center justify-center gap-2 text-sm transition-all shadow-sm"><Icon name="user-tie"/> 管理者</button>
                      </div>
                    </div>
                  </form>
                )}

                {loginStep === 'change_password' && (
                  <form onSubmit={handleChangePasswordSubmit} className="w-full space-y-5 animate-fade-in">
                    <div className="text-center mb-6 border-b border-gray-100 pb-6">
                      <p className="font-bold text-gray-800 text-2xl">{getDisplayName(tempUser?.name)} さん</p>
                      <p className="text-xs sm:text-sm font-bold text-orange-600 bg-orange-50 border border-orange-100 px-3 py-2 rounded-md mt-3 inline-block shadow-sm">
                        {isResetMode ? '新しいパスワードを設定してください' : '初期パスワードから変更してください'}
                      </p>
                    </div>
                    <div>
                      <label className="block text-[11px] sm:text-xs font-bold text-gray-700 mb-2 ml-1">
                        新しいパスワード<br/><ul className="font-normal text-gray-500 mt-1.5 ml-3 list-disc list-inside"><li>8文字以上で設定してください</li><li>英大文字・小文字・数字・記号から3種類以上</li></ul>
                      </label>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                          <Icon name="key" className="text-gray-400" />
                        </div>
                        <input type={showPassword ? "text" : "password"} value={passwordInput} onChange={(e) => setPasswordInput(e.target.value)} className="w-full bg-white border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block pl-11 pr-10 p-3.5 text-lg font-bold outline-none transition-shadow shadow-sm placeholder-gray-300" placeholder="新しいパスワードを入力" />
                        <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
                          <Icon name={showPassword ? "eye" : "eye-slash"} regular={true} />
                        </button>
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-2 ml-1">パスワード (確認用)</label>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                          <Icon name="lock" className="text-gray-400" />
                        </div>
                        <input type={showPasswordConfirm ? "text" : "password"} value={passwordConfirm} onChange={(e) => setPasswordConfirm(e.target.value)} className="w-full bg-white border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block pl-11 pr-10 p-3.5 text-lg font-bold outline-none transition-shadow shadow-sm placeholder-gray-300" placeholder="もう一度パスワードを入力" />
                        <button type="button" onClick={() => setShowPasswordConfirm(!showPasswordConfirm)} className="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-gray-600 transition-colors">
                          <Icon name={showPasswordConfirm ? "eye" : "eye-slash"} regular={true} />
                        </button>
                      </div>
                    </div>
                    <div className="pt-4 flex flex-col gap-4">
                      <button type="submit" className="w-full text-white bg-gradient-to-r from-emerald-500 to-green-600 hover:from-emerald-600 hover:to-green-700 font-bold rounded-md px-5 py-4 shadow-md hover:shadow-lg text-lg transition-all transform hover:-translate-y-0.5">設定してログイン</button>
                      <button type="button" onClick={() => loginSuccess(tempUser)} className="w-full bg-white border border-gray-200 hover:bg-gray-50 text-gray-600 font-bold rounded-md px-5 py-3.5 text-sm transition-all shadow-sm flex items-center justify-center gap-2"><Icon name="forward"/> 【デモ用】設定をスキップ</button>
                      <button type="button" onClick={goBackToLogin} className="text-gray-400 hover:text-gray-600 text-sm font-bold flex justify-center items-center gap-1 mt-2 transition-colors"><Icon name="arrow-left" size={12}/> 戻る</button>
                    </div>
                  </form>
                )}

                {loginStep === 'reset_request' && (
                  <form onSubmit={handleResetRequestSubmit} className="w-full space-y-5 animate-fade-in">
                    <div className="text-center mb-6 border-b border-gray-100 pb-6">
                      <p className="font-bold text-gray-800 text-xl">本人確認</p>
                      <p className="text-xs text-gray-500 mt-2">登録されている情報を入力してください</p>
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-2 ml-1">社員番号</label>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                          <Icon name="id-badge" className="text-gray-400" />
                        </div>
                        <input type="text" inputMode="numeric" pattern="[0-9]*" value={resetIdInput} onChange={(e) => setResetIdInput(e.target.value)} className="w-full bg-white border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block pl-11 p-3.5 text-lg font-bold outline-none transition-shadow shadow-sm placeholder-gray-300" placeholder="社員番号を入力" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-2 ml-1">メールアドレス</label>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                          <Icon name="envelope" className="text-gray-400" />
                        </div>
                        <input type="email" value={resetEmailInput} onChange={(e) => setResetEmailInput(e.target.value)} className="w-full bg-white border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block pl-11 p-3.5 text-lg font-bold outline-none transition-shadow shadow-sm placeholder-gray-300" placeholder="メールアドレスを入力" />
                      </div>
                    </div>
                    <div className="pt-4 flex flex-col gap-4">
                      <button type="submit" className="w-full text-white bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 font-bold rounded-md px-5 py-4 shadow-md hover:shadow-lg text-lg transition-all transform hover:-translate-y-0.5">確認して再設定へ進む</button>
                      <button type="button" onClick={goBackToLogin} className="text-gray-400 hover:text-gray-600 text-sm font-bold flex justify-center items-center gap-1 mt-2 transition-colors"><Icon name="arrow-left" size={12}/> 戻る</button>
                    </div>
                  </form>
                )}
              </div>
            </div>
            {toast && <div className="fixed top-4 right-4 z-[130] animate-fade-in-down"><div className={`flex items-center gap-3 px-6 py-4 rounded-md shadow-lg text-white font-bold ${toast.type === 'success' ? 'bg-gray-800' : 'bg-red-600'}`}>{toast.message}</div></div>}
          </div>
        );
      }

      if (!currentUser) return null;

      // --- Rendering: Main App View ---
      return (
        <div className="min-h-screen bg-gray-50 pb-40 relative">
          {isLoading && <div className="fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-[120]"><Icon name="spinner" className="fa-spin text-white" size={48} /></div>}
          {renderHeaderAndTabs()}
          
          {/* ==================================================== */}
          {/* スタッフ用コンテンツ */}
          {/* ==================================================== */}
          {view === 'staff' && (() => {
            const myShifts = safeUserId ? (shifts[safeUserId] || {}) : {};
            const isBaseDisabled = isConfirmed || !isActiveMonth; 

            return (
              <div className="max-w-4xl mx-auto p-3 sm:p-4 space-y-3 sm:space-y-4 animate-fade-in mt-2">
                {!isActiveMonth && (
                  <div className="bg-yellow-50 text-yellow-800 border border-yellow-200 p-4 rounded-md flex items-start gap-3 shadow-sm text-base">
                    <Icon name="shield-alt" size={24} className="shrink-0 mt-0.5" />
                    <div><p className="font-bold">{currentMonth}月は現在提出期間ではありません。</p><p className="text-sm mt-1">過去のシフトの確認、または次回の募集開始をお待ち下さい。</p></div>
                  </div>
                )}

                {isActiveMonth && (
                  <div className={`rounded-md p-4 flex items-center justify-between border shadow-sm ${isOverdue ? 'bg-red-50 border-red-200' : 'bg-white border-gray-200'}`}>
                    <div className="flex items-center gap-2">
                      <Icon name="calendar-alt" size={24} className={isOverdue ? "text-red-500" : "text-gray-500"} />
                      <span className={`text-base sm:text-lg font-bold ${isOverdue ? "text-red-700" : "text-gray-700"}`}>提出締切日</span>
                    </div>
                    <span className={`text-lg sm:text-xl font-black flex items-center ${isOverdue ? "text-red-600" : "text-gray-800"}`}>
                      {deadline ? new Date(deadline).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' }) : '未設定'}
                      {isOverdue && <span className="text-sm ml-3 bg-red-500 text-white px-2.5 py-0.5 rounded-md">期限切れ</span>}
                    </span>
                  </div>
                )}

                {/* 管理者からのメール通知 */}
                {staffMails[safeUserId]?.length > 0 && (
                  <div className="space-y-3">
                    {staffMails[safeUserId].map(mail => (
                      <div key={mail.id} className="bg-blue-50 border border-blue-200 rounded-md p-4 shadow-sm relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                        <div className="flex gap-3">
                          <Icon name="envelope" size={24} className="text-blue-500 shrink-0 mt-0.5" />
                          <div className="w-full">
                            <div className="flex justify-between items-center mb-1">
                              <p className="text-sm font-bold text-blue-800">【{mail.type}】</p>
                              <span className="text-xs text-gray-500">{mail.date}</span>
                            </div>
                            <p className="text-base text-gray-800 leading-relaxed whitespace-pre-wrap">{mail.text}</p>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {/* 管理者からの個別メモ */}
                {personalNotes[safeUserId] && isActiveMonth && (
                  <div className="sticky top-[64px] sm:top-[76px] z-[70] bg-indigo-50 border border-indigo-200 rounded-md p-4 shadow-md relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500"></div>
                    <div className="flex gap-3">
                      <Icon name="comment-dots" size={24} className="text-indigo-500 shrink-0 mt-0.5" />
                      <div>
                        <p className="text-sm font-bold text-indigo-800 mb-1">管理者からの個別メッセージ</p>
                        <p className="text-base text-gray-800 leading-relaxed whitespace-pre-wrap">{personalNotes[safeUserId]}</p>
                      </div>
                    </div>
                  </div>
                )}

                {isActiveMonth && (
                  <div className={`bg-white rounded-md shadow-sm p-4 flex items-center justify-between border-l-4 ${hasPending ? 'border-orange-500' : 'border-blue-500'}`}>
                    <span className={`font-bold text-base flex items-center gap-2 text-gray-700`}><Icon name="info-circle" size={20} className={hasPending ? "text-orange-500" : "text-blue-500"}/> 現在の状況:</span>
                    <span className={`px-3 py-1 rounded-md text-sm sm:text-base font-bold ${myStatus === '提出済' ? 'bg-green-100 text-green-700' : (isConfirmed && hasPending) ? 'bg-orange-100 text-orange-700 border border-orange-200' : myStatus === '途中保存' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-200 text-gray-700'}`}>{isConfirmed && hasPending ? '申請結果待ち' : myStatus}</span>
                  </div>
                )}

                <div className="flex bg-white p-1.5 rounded-md border border-gray-200 w-full shadow-sm mb-2">
                  <button onClick={() => setStaffViewMode('list')} className={`flex-1 flex justify-center items-center gap-2 px-3 py-2.5 text-sm sm:text-base font-bold rounded-md transition-colors ${staffViewMode === 'list' ? 'bg-blue-50 text-blue-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><Icon name="list" /> リスト</button>
                  <button onClick={() => setStaffViewMode('week')} className={`flex-1 flex justify-center items-center gap-2 px-3 py-2.5 text-sm sm:text-base font-bold rounded-md transition-colors ${staffViewMode === 'week' ? 'bg-blue-50 text-blue-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><Icon name="calendar-week" /> 週間</button>
                  <button onClick={() => setStaffViewMode('month')} className={`flex-1 flex justify-center items-center gap-2 px-3 py-2.5 text-sm sm:text-base font-bold rounded-md transition-colors ${staffViewMode === 'month' ? 'bg-blue-50 text-blue-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><Icon name="calendar-alt" /> 月間</button>
                </div>

                {isConfirmed && <div className="bg-blue-50 text-blue-700 text-sm font-bold p-3 rounded-md text-center border border-blue-200">※確定済みのシフトです。変更が必要な場合は画面下部のボタンから申請してください。</div>}

                {/* リストビュー */}
                {staffViewMode === 'list' && (
                  <div className="bg-white rounded-md shadow-sm mb-6 border border-gray-200 overflow-hidden animate-fade-in">
                    <div className="p-2 sm:p-3 bg-gray-50 border-b border-gray-200 text-xs sm:text-sm text-gray-500 font-bold text-center">{isConfirmed ? '確定済みのシフト（閲覧専用）' : '日ごとの希望を選択'}</div>
                    <div className="divide-y divide-gray-100 pb-10">
                      {daysArray.map(day => {
                        const shiftData = myShifts[day] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
                        const isWorking = shiftData.status === '勤務';
                        const isRest = shiftData.status === '休';
                        const isPendingDay = myPendingDays[day]; 
                        const isDisabled = isBaseDisabled;
                        
                        return (
                          <div key={day} className={`flex flex-col p-3 sm:p-4 gap-2 sm:gap-3 transition-colors relative ${isWorking ? 'bg-blue-50/20' : ''} ${isRest && shiftData.canWorkIfNeeded ? 'bg-orange-50/20' : ''} ${isPendingDay ? 'bg-orange-50 opacity-80' : 'hover:bg-gray-50'}`}>
                            {isPendingDay && <div className="absolute top-2 right-2 bg-orange-500 text-white text-xs font-bold px-2 py-1 rounded-md shadow-sm z-10 flex items-center gap-1"><Icon name="clock" size={12} /> 申請中</div>}
                            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 w-full">
                              <div className="flex sm:flex-col items-center sm:items-start gap-2 w-full sm:w-20 shrink-0">
                                <div className="flex items-baseline gap-1">
                                  <span className={`text-xl sm:text-2xl font-black w-7 sm:w-8 text-right sm:text-center ${getDayColor(day)}`}>{day}</span>
                                  <span className={`text-sm sm:text-base font-bold ${getDayColor(day)}`}>{getDayOfWeek(day)}</span>
                                </div>
                                {dailyNotes[day] && <span className="text-xs bg-red-100 text-red-700 font-bold px-2 py-0.5 rounded-md leading-tight whitespace-normal break-words max-w-full text-center">{dailyNotes[day]}</span>}
                              </div>
                              <div className="flex gap-1.5 sm:gap-2 w-full sm:w-auto">
                                <button onClick={() => updateLocalShift(day, 'status', '未')} disabled={isDisabled} className={`w-full sm:w-[4.5rem] py-1.5 sm:py-2 rounded-md text-xs sm:text-sm font-bold whitespace-nowrap transition-colors border ${shiftData.status === '未' ? 'bg-gray-600 text-white border-gray-600 shadow-sm' : 'bg-white text-gray-500 border-gray-300 hover:bg-gray-50'} disabled:opacity-40`}>未</button>
                                <button onClick={() => updateLocalShift(day, 'status', '休')} disabled={isDisabled} className={`w-full sm:w-[4.5rem] py-1.5 sm:py-2 rounded-md text-xs sm:text-sm font-bold whitespace-nowrap transition-all border ${shiftData.status === '休' ? 'bg-red-500 text-white border-red-500 shadow-md' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'} disabled:opacity-40`}>休</button>
                                <button onClick={() => updateLocalShift(day, 'status', '有休')} disabled={isDisabled} className={`w-full sm:w-[4.5rem] py-1.5 sm:py-2 rounded-md text-xs sm:text-sm font-bold whitespace-nowrap transition-all border ${shiftData.status === '有休' ? 'bg-teal-500 text-white border-teal-500 shadow-md' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'} disabled:opacity-40`}>有休</button>
                                <button onClick={() => updateLocalShift(day, 'status', '勤務')} disabled={isDisabled} className={`w-full sm:w-[4.5rem] py-1.5 sm:py-2 rounded-md text-xs sm:text-sm font-bold whitespace-nowrap transition-all border ${isWorking ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white border border-gray-300 text-blue-700 hover:bg-gray-50'} disabled:opacity-40`}>勤務</button>
                              </div>
                            </div>

                            {(isWorking || (isRest && shiftData.canWorkIfNeeded)) && (
                              <div className="flex flex-col sm:flex-row sm:items-center justify-end gap-2 sm:gap-3 sm:pl-20 mt-1 w-full sm:w-auto">
                                {isRest && <span className="text-xs sm:text-sm font-bold text-orange-500 self-end sm:self-auto mr-1">出勤可能時間:</span>}
                                <div className="flex items-center justify-end gap-1.5 w-full sm:w-auto">
                                  <select value={shiftData.start} onChange={(e) => updateLocalShift(day, 'start', e.target.value)} disabled={isDisabled} className={`bg-white border text-xs sm:text-sm rounded-md block px-1.5 py-1.5 w-[5rem] sm:w-[5.5rem] text-center appearance-none disabled:bg-gray-100 ${isRest ? 'border-orange-300 text-orange-800' : 'border-blue-200 text-blue-900'}`} style={{ textAlignLast: 'center' }}>{HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}</select>
                                  <span className="text-gray-400 font-bold text-sm">~</span>
                                  <select value={shiftData.end} onChange={(e) => updateLocalShift(day, 'end', e.target.value)} disabled={isDisabled} className={`bg-white border text-xs sm:text-sm rounded-md block px-1.5 py-1.5 w-[5rem] sm:w-[5.5rem] text-center appearance-none disabled:bg-gray-100 ${isRest ? 'border-orange-300 text-orange-800' : 'border-blue-200 text-blue-900'}`} style={{ textAlignLast: 'center' }}>{HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}</select>
                                </div>
                              </div>
                            )}

                            {shiftData.status !== '未' && (
                              <div className="flex justify-end sm:pl-20 mt-1 w-full sm:w-auto">
                                <div className="relative w-full sm:w-auto">
                                  <Icon name="comment-dots" className="absolute left-2.5 top-[8px] sm:top-[10px] text-gray-400 text-[10px] sm:text-xs" />
                                  <input type="text" value={shiftData.note || ''} onChange={(e) => updateLocalShift(day, 'note', e.target.value)} disabled={isDisabled} placeholder="備考 (任意)" className="w-full sm:w-72 bg-white border border-gray-300 text-xs sm:text-sm rounded-md pl-8 pr-3 py-1.5 focus:ring-2 focus:ring-blue-300 outline-none disabled:bg-gray-100" />
                                </div>
                              </div>
                            )}

                            {isRest && !isDisabled && (
                              <div className="flex justify-end sm:pl-20 mt-1 w-full sm:w-auto">
                                <label className="flex items-center cursor-pointer gap-2 bg-gray-50 px-2 sm:px-3 py-1 sm:py-1.5 rounded-md border border-gray-200 w-full sm:w-auto justify-end">
                                  <input type="checkbox" className="sr-only peer" checked={shiftData.canWorkIfNeeded} onChange={() => updateLocalShift(day, 'canWorkIfNeeded', !shiftData.canWorkIfNeeded)} />
                                  <div className="relative w-8 h-4 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-orange-500"></div>
                                  <span className="text-xs sm:text-sm font-bold text-gray-600">出勤調整可能</span>
                                </label>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* 週間ビュー */}
                {staffViewMode === 'week' && (
                  <div className="mb-6 animate-fade-in pt-4 pb-16">
                    <div className="flex justify-between items-center bg-white rounded-md p-3 sm:p-4 shadow-sm mb-4 border border-gray-200">
                      <button onClick={() => setCurrentWeekIndex(Math.max(0, currentWeekIndex - 1))} disabled={currentWeekIndex === 0} className="p-2 sm:p-3 rounded-md hover:bg-gray-100 disabled:opacity-50"><Icon name="chevron-left" size={18}/></button>
                      <span className="text-base sm:text-lg font-bold text-gray-700">第 {currentWeekIndex + 1} 週</span>
                      <button onClick={() => setCurrentWeekIndex(Math.min(weeks.length - 1, currentWeekIndex + 1))} disabled={currentWeekIndex === weeks.length - 1} className="p-2 sm:p-3 rounded-md hover:bg-gray-100 disabled:opacity-50"><Icon name="chevron-right" size={18}/></button>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-7 gap-2 sm:gap-4">
                      {weeks[currentWeekIndex].map((day, idx) => {
                        if (!day) return <div key={`empty-${idx}`} className="hidden md:block opacity-50 bg-gray-100 rounded-md border border-gray-200 min-h-[180px]"></div>;
                        const s = myShifts[day] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
                        const isPendingDay = myPendingDays[day];
                        const rowDisabled = isBaseDisabled || isPendingDay;
                        return (
                          <div key={day} className={`bg-white border rounded-md p-2 sm:p-3 flex flex-col gap-2 shadow-sm relative ${isPendingDay ? 'bg-orange-50 border-orange-200' : 'border-gray-200'} hover:z-30`}>
                            {isPendingDay && <div className="absolute -top-2 -right-2 bg-orange-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-md shadow-sm z-10"><Icon name="clock" size={10} className="mr-0.5"/>申請中</div>}
                            <div className="text-center border-b border-gray-100 pb-2">
                              <div className={`text-xl sm:text-2xl font-black leading-tight ${getDayColor(day)}`}>{day}</div>
                              <div className={`text-xs sm:text-sm font-bold mt-0.5 ${getDayColor(day)}`}>{getDayOfWeek(day)}</div>
                              {dailyNotes[day] && <div className="text-[10px] sm:text-xs bg-red-100 text-red-700 font-bold rounded-md px-1.5 py-0.5 mt-1.5 text-center truncate">{dailyNotes[day]}</div>}
                            </div>
                            <div className="grid grid-cols-2 gap-1 mt-1">
                              <button onClick={() => updateLocalShift(day, 'status', '未')} disabled={rowDisabled} className={`py-1.5 rounded-md text-xs sm:text-sm font-bold transition-colors border ${s.status === '未' ? 'bg-gray-600 text-white border-gray-600' : 'bg-white border-gray-300 text-gray-500'} disabled:opacity-40`}>未</button>
                              <button onClick={() => updateLocalShift(day, 'status', '休')} disabled={rowDisabled} className={`py-1.5 rounded-md text-xs sm:text-sm font-bold transition-colors border ${s.status === '休' ? 'bg-red-500 text-white border-red-500' : 'bg-white border-gray-300 text-gray-700'} disabled:opacity-40`}>休</button>
                              <button onClick={() => updateLocalShift(day, 'status', '有休')} disabled={rowDisabled} className={`py-1.5 rounded-md text-xs sm:text-sm font-bold transition-colors border ${s.status === '有休' ? 'bg-teal-500 text-white border-teal-500' : 'bg-white border-gray-300 text-gray-700'} disabled:opacity-40`}>有休</button>
                              <button onClick={() => updateLocalShift(day, 'status', '勤務')} disabled={rowDisabled} className={`py-1.5 rounded-md text-xs sm:text-sm font-bold transition-colors border ${s.status === '勤務' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white border-gray-300 text-blue-700'} disabled:opacity-40`}>勤</button>
                            </div>
                            {(s.status === '勤務' || (s.status === '休' && s.canWorkIfNeeded)) && (
                              <div className="flex flex-col gap-1 mt-auto pt-2">
                                <select value={s.start} onChange={(e) => updateLocalShift(day, 'start', e.target.value)} disabled={rowDisabled} className="bg-gray-50 border border-gray-300 rounded-md text-xs sm:text-sm p-1.5 text-center font-bold appearance-none">{HOUR_OPTIONS.map(t=><option key={t} value={t}>{t || '--:--'}</option>)}</select>
                                <div className="text-center text-gray-300 text-[10px] leading-none">▼</div>
                                <select value={s.end} onChange={(e) => updateLocalShift(day, 'end', e.target.value)} disabled={rowDisabled} className="bg-gray-50 border border-gray-300 rounded-md text-xs sm:text-sm p-1.5 text-center font-bold appearance-none">{HOUR_OPTIONS.map(t=><option key={t} value={t}>{t || '--:--'}</option>)}</select>
                              </div>
                            )}
                            {s.status !== '未' && <input type="text" value={s.note || ''} onChange={(e) => updateLocalShift(day, 'note', e.target.value)} disabled={rowDisabled} placeholder="備考" className="mt-2 bg-white border border-gray-300 rounded-md text-xs p-1.5 text-center focus:ring-1 focus:ring-blue-300 outline-none disabled:bg-gray-50 shadow-inner" />}
                            {s.status === '休' && !rowDisabled && (
                              <label className="flex items-center cursor-pointer gap-1 justify-center mt-1.5 bg-gray-50 rounded-md p-1.5 border border-gray-200">
                                <input type="checkbox" className="sr-only peer" checked={s.canWorkIfNeeded} onChange={() => updateLocalShift(day, 'canWorkIfNeeded', !s.canWorkIfNeeded)} />
                                <div className="relative w-6 h-3 sm:w-7 sm:h-4 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[1px] after:start-[1px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-2.5 after:w-2.5 sm:after:h-3 sm:after:w-3 after:transition-all peer-checked:bg-orange-500"></div>
                                <span className="text-[10px] font-bold text-gray-600">調整可</span>
                              </label>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* 月間ビュー */}
                {staffViewMode === 'month' && (
                  <div className="bg-white rounded-md shadow-sm mb-6 border border-gray-200 overflow-x-auto animate-fade-in no-scrollbar pt-16 pb-20">
                    <div className="min-w-[700px]">
                      <div className="grid grid-cols-7 bg-gray-100 border-b border-gray-200">
                        {['日', '月', '火', '水', '木', '金', '土'].map((dow, i) => (<div key={dow} className={`text-center py-3 text-base font-bold border-r last:border-r-0 border-gray-200 ${i===0?'text-red-500':i===6?'text-blue-500':'text-gray-700'}`}>{dow}</div>))}
                      </div>
                      <div className="flex flex-col">
                        {weeks.map((week, wIdx) => (
                          <div key={wIdx} className="grid grid-cols-7 border-b last:border-b-0 border-gray-200">
                            {week.map((day, dIdx) => {
                              if (!day) return <div key={`empty-${wIdx}-${dIdx}`} className="bg-gray-50 border-r last:border-r-0 border-gray-200 min-h-[140px] opacity-50"></div>;
                              const s = myShifts[day] || { status: '未' };
                              const isPendingDay = myPendingDays[day]; 
                              const rowDisabled = isBaseDisabled || isPendingDay;
                              let statusColorClass = 'bg-gray-50 text-gray-500 border-gray-300';
                              if (s.status === '勤務') statusColorClass = 'bg-blue-100 text-blue-800 border-blue-300 font-bold';
