                                        </div>
                                        <div className="flex items-center gap-2 mt-0.5">
                                          {isWorking ? (<span className="text-sm rounded-md font-black text-indigo-600 bg-indigo-50 px-2 py-0.5 border border-indigo-100">実働: {details.hours.toFixed(1)}h</span>) : (<span className="text-sm text-gray-400">シフトなし</span>)}
                                          {s.note && (<div className="tooltip-container cursor-help" tabIndex="0"><Icon name="comment-dots" className="text-blue-500" /><span className="tooltip-text">{s.note}</span></div>)}
                                        </div>
                                      </div>
                                      <div className="flex-1 relative h-full min-h-[4rem] bg-white flex items-center">
                                        <div className="absolute inset-0 flex pointer-events-none">{timeAxis.map(h => <div key={h} className="flex-1 border-r border-dashed last:border-r-0"></div>)}</div>
                                        {isWorking && details.hours > 0 && (() => {
                                          const startPct = Math.max(0, (details.startVal - START_HOUR)) / TOTAL_HOURS * 100;
                                          const endPct = Math.min(TOTAL_HOURS, (details.endVal - START_HOUR)) / TOTAL_HOURS * 100;
                                          const isPossible = s.status === '休';
                                          const colorClass = isPossible ? 'bg-gradient-to-r from-orange-400 to-red-400' : 'bg-gradient-to-r from-blue-500 to-indigo-500';
                                          if (details.hasBreak) {
                                            const breakStartPct = (details.breakStartVal - START_HOUR) / TOTAL_HOURS * 100;
                                            const breakEndPct = (details.breakEndVal - START_HOUR) / TOTAL_HOURS * 100;
                                            return (
                                              <>
                                                <div className={`absolute h-8 rounded-l-md shadow-sm flex items-center px-3 text-sm font-bold text-white overflow-hidden ${colorClass}`} style={{ top:'50%', transform:'translateY(-50%)', left:`${startPct}%`, width:`${breakStartPct - startPct}%` }}><span>{s.start}</span></div>
                                                <div className="absolute h-8 flex flex-col items-center justify-center bg-stripes-gray opacity-50 border-x border-dashed" style={{ top:'50%', transform:'translateY(-50%)', left:`${breakStartPct}%`, width:`${breakEndPct - breakStartPct}%` }}><Icon name="coffee" size={14}/><span className="text-[10px]">{details.breakStartStr}-{details.breakEndStr}</span></div>
                                                <div className={`absolute h-8 rounded-r-md shadow-sm flex items-center justify-end px-3 text-sm font-bold text-white overflow-hidden ${colorClass}`} style={{ top:'50%', transform:'translateY(-50%)', left:`${breakEndPct}%`, width:`${endPct - breakEndPct}%` }}><span>{s.end} {isPossible && '(調整可)'}</span></div>
                                              </>
                                            );
                                          } else {
                                            return (<div className={`absolute h-8 rounded-md shadow-sm flex items-center px-3 text-sm font-bold text-white overflow-hidden ${colorClass}`} style={{ top:'50%', transform:'translateY(-50%)', left:`${startPct}%`, width:`${endPct - startPct}%` }}><span>{s.start} - {s.end} {isPossible && '(調整可)'}</span></div>);
                                          }
                                        })()}
                                      </div>
                                    </div>
                                  )
                                })
                              )}
                            </div>
                            <div className="flex border-t-2 border-indigo-200 bg-indigo-50 items-stretch h-16">
                              <div className="w-64 shrink-0 px-5 border-r border-indigo-200 flex flex-col justify-center"><span className="text-sm font-bold text-indigo-900">時間帯 出勤人数</span></div>
                              <div className="flex-1 flex relative">
                                {timeAxis.map(h => {
                                   const { confirmed, possible } = getHourlyCount(selectedDay, h);
                                   return (
                                     <div key={h} className="flex-1 border-r border-indigo-200 flex flex-col items-center justify-center">
                                       <span className={`text-base font-black ${confirmed > 0 ? 'text-indigo-700 text-xl' : 'text-indigo-300'}`}>{confirmed > 0 ? confirmed : '-'}</span>
                                       {possible > 0 && <span className="text-sm font-bold text-orange-600">(+{possible})</span>}
                                     </div>
                                   )
                                })}
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* 2. 変更履歴タブ */}
                {adminTab === 'history' && (
                  <div className="bg-white rounded-md shadow-sm border overflow-hidden animate-fade-in">
                    <div className="bg-indigo-50 p-5 border-b flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                      <div><h2 className="font-bold text-indigo-900 flex items-center gap-2 text-lg"><Icon name="history"/> シフト変更履歴</h2></div>
                    </div>
                    <div className="overflow-x-auto no-scrollbar">
                      <table className="w-full text-base text-left min-w-[1100px]">
                        <thead className="bg-gray-50 text-gray-600 border-b">
                          <tr><th className="px-5 py-4 font-bold">申請日時</th><th className="px-5 py-4 font-bold">スタッフ</th><th className="px-5 py-4 font-bold text-center">対象日</th><th className="px-5 py-4 font-bold text-center">区分</th><th className="px-5 py-4 font-bold text-center">勤怠種別</th><th className="px-5 py-4 font-bold text-center">変更前</th><th className="px-5 py-4 font-bold text-center">変更後</th><th className="px-5 py-4 font-bold">理由</th><th className="px-5 py-4 font-bold text-center">結果</th><th className="px-5 py-4 font-bold">対応者</th></tr>
                        </thead>
                        <tbody className="divide-y">
                          {(() => {
                            const currentMonthHistory = changeRequests.filter(req => req.targetMonth === currentMonthStr);
                            
                            if (currentMonthHistory.length === 0) {
                              return <tr><td colSpan="10" className="p-10 text-center text-gray-500 font-bold">履歴はありません</td></tr>;
                            }
                            
                            return currentMonthHistory.map(req => {
                              const safeChanges = Array.isArray(req.changes) ? req.changes : [];
                              const safeDate = req.createdAt ? String(req.createdAt).split(' ')[0] : '';
                              return (
                                <tr key={req.id} className="hover:bg-gray-50">
                                  <td className="px-5 py-4 text-sm text-gray-500">{safeDate}</td>
                                  <td className="px-5 py-4 font-bold text-gray-800"><Icon name="user" className="mr-2 text-gray-400"/>{req.userName}</td>
                                  <td className="px-5 py-4 font-bold text-indigo-600 text-lg text-center">{req.targetMonth ? `${req.targetMonth.split('-')[1]}/` : ''}{req.day}日</td>
                                  <td className="px-5 py-4 text-center"><span className="bg-gray-100 border text-gray-700 px-3 py-1 text-sm font-bold">{req.newVal?.changeCategory || '-'}</span></td>
                                  <td className="px-5 py-4 text-center"><span className="bg-indigo-50 border text-indigo-700 px-3 py-1 text-sm font-bold">{req.newVal?.attendanceStatus || '-'}</span></td>
                                  <td className="px-5 py-4 align-top"><span className="text-gray-400 line-through bg-gray-50 border px-3 py-1.5 text-sm block w-fit mx-auto">{formatShiftStr(req.oldVal)}</span></td>
                                  <td className="px-5 py-4 align-top"><div className="flex flex-col items-center gap-1.5"><span className={`font-bold px-3 py-1.5 rounded-md text-sm ${req.status === 'approved' ? 'bg-green-50 text-green-700 border' : 'bg-orange-50 text-orange-700 border'}`}>{formatShiftStr(req.newVal)}</span>{req.newVal?.note && <span className="text-[11px] text-gray-500 bg-gray-100 p-1.5 border w-full text-center">備考: {req.newVal.note}</span>}</div></td>
                                  <td className="px-5 py-4 text-sm text-gray-600">{req.reason}</td>
                                  <td className="px-5 py-4 text-center">
                                    {req.status === 'pending' && <span className="bg-orange-100 text-orange-700 text-xs font-bold px-3 py-1.5 border rounded-full">承認待ち</span>}
                                    {req.status === 'approved' && <span className="bg-green-100 text-green-700 text-xs font-bold px-3 py-1.5 border rounded-full">承認済</span>}
                                    {req.status === 'rejected' && <span className="bg-gray-100 text-gray-500 text-xs font-bold px-3 py-1.5 border rounded-full">却下</span>}
                                  </td>
                                  <td className="px-5 py-4 text-sm font-bold text-gray-700">{req.processedBy || '-'}</td>
                                </tr>
                              )
                            })
                          })()}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {/* 3. スタッフ管理タブ */}
                {adminTab === 'staff' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fade-in">
                    <div className="bg-white rounded-md shadow-sm border p-6 h-fit">
                      <div className="flex items-center gap-2 mb-5 border-b pb-3"><Icon name="user-plus" className="text-indigo-600" /><h2 className="text-xl font-bold text-gray-800">新規スタッフ追加</h2></div>
                      <form onSubmit={handleAddStaff} className="space-y-4">
                        <div><label className="block text-sm font-bold text-gray-700 mb-1.5">社員番号</label><input type="tel" required value={newStaff.employeeId} onChange={e => { const val = toHalfWidthNum(e.target.value); if (val === '' || /^[0-9]+$/.test(val)) setNewStaff({...newStaff, employeeId: val}); }} className="w-full rounded-md border p-3" /></div>
                        <div><label className="block text-sm font-bold text-gray-700 mb-1.5">氏名</label><input type="text" required value={newStaff.name} onChange={e => setNewStaff({...newStaff, name: e.target.value})} className="w-full rounded-md border p-3" /></div>
                        <div><label className="block text-sm font-bold text-gray-700 mb-1.5">メールアドレス</label><input type="email" required value={newStaff.email} onChange={e => setNewStaff({...newStaff, email: e.target.value})} className="w-full rounded-md border p-3" /></div>
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">雇用区分</label>
                          <input type="text" placeholder="例：A契約、Type4..." value={newStaff.employmentCategory} onChange={(e) => setNewStaff({ ...newStaff, employmentCategory: e.target.value })} className="w-full rounded-md border p-3" />
                        </div>
                        <div>
                          <label className="flex items-center gap-2 mt-1"><input type="checkbox" checked={newStaff.isAdmin} onChange={e => setNewStaff({...newStaff, isAdmin: e.target.checked})} className="w-4 h-4 accent-indigo-600" /><span className="text-sm font-bold text-gray-700">管理者権限を付与</span></label>
                        </div>
                        <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-md mt-2">追加する</button>
                      </form>
                    </div>
                    
                    <div className="lg:col-span-2 bg-white rounded-md shadow-sm border p-6">
                      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-5 border-b pb-3">
                        <div className="flex items-center gap-3">
                          <Icon name="users" className="text-indigo-600" /><h2 className="text-xl font-bold text-gray-800">スタッフ一覧</h2>
                          <label className="flex items-center gap-2 ml-4 bg-gray-50 p-2 rounded-md border"><input type="checkbox" className="sr-only peer" checked={showRetired} onChange={() => setShowRetired(!showRetired)} /><div className="relative w-9 h-5 bg-gray-300 rounded-full peer peer-checked:bg-gray-600 after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 peer-checked:after:translate-x-full transition-all"></div><span className="text-xs font-bold text-gray-600">退職者も表示</span></label>
                        </div>
                        <div className="flex items-center gap-2">
                          <button onClick={() => setIsMailHistoryOpen(true)} className="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2.5 font-bold text-sm rounded-md flex gap-2"><Icon name="history"/> 送信履歴</button>
                          <button onClick={openMailForm} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 font-bold text-sm rounded-md flex gap-2"><Icon name="envelope"/> メール送信</button>
                        </div>
                      </div>
                      
                      <div className="mb-4 flex items-center">
                        <div className="relative w-full max-w-sm"><span className="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400"><Icon name="search" /></span><input type="text" placeholder="名前、社員番号、雇用区分で検索..." value={staffSearchQuery} onChange={(e) => setStaffSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-2 border rounded-md focus:ring-2 outline-none" /></div>
                      </div>

                      <div className="overflow-x-auto no-scrollbar">
                        <table className="w-full text-base text-left min-w-[500px]">
                          <thead className="bg-gray-50 text-gray-600 border-y"><tr><th className="px-5 py-4 font-bold">社員番号</th><th className="px-5 py-4 font-bold">氏名 / 雇用区分</th><th className="px-5 py-4 font-bold text-center">提出状況</th><th className="px-5 py-4 font-bold text-center">管理</th></tr></thead>
                          <tbody className="divide-y">
                            {filteredDbUsers.filter(u => u.employeeId !== '9999').filter(u => showRetired || u.status === 'active').map(user => {
                              const isRetired = user.status === 'retired';
                              let stText = activeMonthStatus[user.id] || '未提出'; let stColor = 'bg-gray-100 text-gray-600';
                              if (stText === '提出済') stColor = 'bg-green-100 text-green-700'; else if (stText === '途中保存') stColor = 'bg-yellow-100 text-yellow-700';
                              if (isConfirmed && pendingChanges[user.id] && Object.keys(pendingChanges[user.id]).length > 0) { stColor = 'bg-orange-100 text-orange-700 border'; stText = '承認待ち'; }

                              return (
                                <tr key={user.id} className={`hover:bg-gray-50 ${isRetired ? 'opacity-50' : ''}`}>
                                  <td className="px-5 py-4 font-mono text-gray-600 font-bold">{user.employeeId}</td>
                                  <td className="px-5 py-4">
                                    <div className="flex items-center flex-wrap gap-2 font-bold text-gray-800">
                                      <span>{getDisplayName(user.name)}</span>
                                      {user.role === 'admin' && <span className="text-[10px] bg-indigo-100 text-indigo-700 border px-2 py-0.5 rounded-full">管理者</span>}
                                      {isRetired && <span className="text-[10px] bg-gray-200 text-gray-600 border px-2 py-0.5 rounded-full">退職済</span>}
                                    </div>
                                    <div className="text-xs text-gray-500 mt-1">{user.employmentCategory || '未設定'}</div>
                                  </td>
                                  <td className="px-5 py-4 text-center">{!isRetired ? <span className={`px-3 py-1.5 rounded-md text-xs font-bold ${stColor}`}>{stText}</span> : '-'}</td>
                                  <td className="px-5 py-4">
                                    <div className="flex justify-center gap-2">
                                      {!isRetired && (<div className="tooltip-container"><button onClick={() => setModal({isOpen: true, type: 'personal', targetId: user.id, text: personalNotes[user.id]||''})} className={`w-10 h-10 flex justify-center items-center rounded-md border ${personalNotes[user.id] ? 'bg-indigo-50 text-indigo-700' : 'bg-gray-50 text-gray-500'}`}><Icon name="comment-dots" size={18} /></button><span className="tooltip-text">個人宛メッセージ</span></div>)}
                                      {!isRetired && (<div className="tooltip-container"><button onClick={() => openFixedShiftForm(user)} className="w-10 h-10 flex justify-center items-center bg-emerald-50 text-emerald-600 border rounded-md"><Icon name="calendar-day" size={18} /></button><span className="tooltip-text">曜日固定シフト</span></div>)}
                                      <div className="tooltip-container"><button type="button" onClick={(e) => { e.stopPropagation(); toggleStaffStatus(user.id, user.name, currentStatus); }} className={`w-10 h-10 flex justify-center items-center rounded-md border transition-colors ${isRetired ? 'bg-indigo-50 text-indigo-600 hover:bg-indigo-100' : 'bg-orange-50 text-orange-600 hover:bg-orange-100'}`}><Icon name={isRetired ? 'user-check' : 'door-open'} size={18} /></button><span className="tooltip-text">{isRetired ? '復職' : '退職'}</span></div>
                                      <div className="tooltip-container"><button type="button" onClick={(e) => { e.stopPropagation(); handleDeleteStaff(user.id, user.name); }} className="w-10 h-10 flex justify-center items-center text-red-500 hover:bg-red-50 border border-transparent hover:border-red-200 rounded-md transition-colors"><Icon name="trash" size={18} /></button><span className="tooltip-text">削除</span></div>
                                    </div>
                                  </td>
                                </tr>
                              );
                            })}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}

                {/* 4. 設定・テンプレタブ */}
                {adminTab === 'settings' && (
                  <div className="max-w-5xl mx-auto space-y-6 animate-fade-in">
                    <div className="bg-white rounded-lg shadow-sm border overflow-hidden">
                      <div className="bg-indigo-50 px-5 py-4 border-b flex justify-between items-center">
                        <div><h2 className="text-indigo-900 font-bold flex gap-2 text-lg"><Icon name="envelope" /> メールテンプレート設定</h2></div>
                        <button onClick={() => openTemplateForm(null)} className="bg-indigo-600 text-white px-4 py-2 font-bold rounded-md flex gap-2"><Icon name="plus" /> 新規追加</button>
                      </div>
                      <div className="p-5 bg-gray-50">
                        <div className="mb-4 bg-white rounded-md border p-3 text-sm text-gray-600 flex gap-2"><Icon name="info-circle" className="text-blue-500 mt-0.5" /><p>本文に <code className="bg-gray-100 text-red-600 font-bold">{`{month}`}</code> で月、<code className="bg-gray-100 text-red-600 font-bold">{`{deadline}`}</code> で締切日を自動挿入。</p></div>
                        <div className="grid gap-4 md:grid-cols-2">
                          {emailTemplates.map(tpl => (
                            <div key={tpl.id} className="bg-white rounded-md border p-4 flex flex-col h-full group relative">
                              <div className="flex justify-between items-start mb-3 border-b pb-2">
                                <h3 className="font-bold text-lg text-gray-800 pr-16">{generateMailText(tpl.name)}</h3>
                                <div className="absolute top-3 right-3 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                  <button onClick={() => openTemplateForm(tpl)} className="bg-gray-100 text-gray-600 p-2 rounded-md"><Icon name="pen" /></button>
                                  <button onClick={() => deleteTemplate(tpl.id)} className="bg-red-50 text-red-600 p-2 rounded-md"><Icon name="trash" /></button>
                                </div>
                              </div>
                              <div className="text-sm text-gray-600 whitespace-pre-wrap flex-1">{renderTextWithLink(generateMailText(tpl.body))}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          })()}

          {/* モーダル群 */}
          {templateForm.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-lg shadow-2xl w-full max-w-lg overflow-hidden flex flex-col">
                <div className="bg-indigo-600 px-5 py-4 text-white font-bold text-lg flex gap-3"><Icon name="pen" size={20} />{templateForm.id.startsWith('t') && emailTemplates.find(t=>t.id === templateForm.id) ? '編集' : '新規追加'}</div>
                <div className="p-5 space-y-4">
                  <div><label className="block text-sm font-bold text-gray-700 mb-1.5">件名</label><input type="text" value={templateForm.name} onChange={e => setTemplateForm({...templateForm, name: e.target.value})} className="w-full border p-3 rounded-md focus:ring-2 outline-none" /></div>
                  <div><label className="block text-sm font-bold text-gray-700 mb-1.5">本文</label><textarea value={templateForm.body} onChange={e => setTemplateForm({...templateForm, body: e.target.value})} className="w-full border p-3 rounded-md h-48 resize-none focus:ring-2 outline-none" /></div>
                </div>
                <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t">
                  <button onClick={() => setTemplateForm({ isOpen: false, id: null, name: '', body: '' })} className="px-5 py-2.5 rounded-md font-bold text-gray-600">キャンセル</button>
                  <button onClick={saveTemplate} className="px-6 py-2.5 rounded-md font-bold bg-indigo-600 text-white">保存する</button>
                </div>
              </div>
            </div>
          )}

          {fixedShiftForm.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-lg shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col max-h-[90vh]">
                <div className="bg-emerald-600 px-5 py-4 text-white font-bold text-lg flex justify-between"><div className="flex gap-3"><Icon name="calendar-day" size={20} />曜日固定 - {fixedShiftForm.userName}</div><button onClick={() => setFixedShiftForm({...fixedShiftForm, isOpen: false})}><Icon name="times" size={20}/></button></div>
                <div className="overflow-y-auto flex-1">
                  <div className="divide-y">
                    {[0, 1, 2, 3, 4, 5, 6].map(dow => {
                      const shiftData = fixedShiftForm.data[dow]; const isWorking = shiftData.status === '勤務'; const isRest = shiftData.status === '休';
                      return (
                        <div key={dow} className={`flex flex-col sm:flex-row items-center gap-1.5 sm:gap-3 p-1.5 sm:px-4 sm:py-2 ${isWorking ? 'bg-blue-50/20' : isRest && shiftData.canWorkIfNeeded ? 'bg-orange-50/20' : 'bg-white'}`}>
                          <div className="w-full sm:w-16 shrink-0"><span className={`text-lg font-black ${DOW_COLORS[dow]}`}>{DOW_NAMES[dow]}曜</span></div>
                          <div className="grid grid-cols-3 gap-1 sm:flex sm:gap-2 w-full sm:w-auto">
                            <button onClick={() => updateFixedShiftForm(dow, 'status', '未')} className={`w-full sm:w-16 py-1 sm:py-1.5 rounded-md font-bold border ${shiftData.status === '未' ? 'bg-gray-600 text-white' : 'bg-white text-gray-500'}`}>未</button>
                            <button onClick={() => updateFixedShiftForm(dow, 'status', '休')} className={`w-full sm:w-16 py-1 sm:py-1.5 rounded-md font-bold border ${shiftData.status === '休' ? 'bg-red-500 text-white' : 'bg-white text-gray-700'}`}>休</button>
                            <button onClick={() => updateFixedShiftForm(dow, 'status', '勤務')} className={`w-full sm:w-16 py-1 sm:py-1.5 rounded-md font-bold border ${isWorking ? 'bg-blue-600 text-white' : 'bg-white text-blue-700'}`}>勤務</button>
                          </div>
                          {(isWorking || (isRest && shiftData.canWorkIfNeeded)) && (
                            <div className="flex items-center gap-1.5 sm:ml-auto">
                              <select value={shiftData.start} onChange={(e) => updateFixedShiftForm(dow, 'start', e.target.value)} className="bg-white border rounded-md py-1 px-0 w-16 text-center">{HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}</select>
                              <span>~</span>
                              <select value={shiftData.end} onChange={(e) => updateFixedShiftForm(dow, 'end', e.target.value)} className="bg-white border rounded-md py-1 px-0 w-16 text-center">{HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}</select>
                            </div>
                          )}
                          {isRest && (
                            <label className="flex items-center gap-2 bg-gray-50 px-2 py-1 rounded-md border sm:ml-auto"><input type="checkbox" checked={shiftData.canWorkIfNeeded} onChange={() => updateFixedShiftForm(dow, 'canWorkIfNeeded', !shiftData.canWorkIfNeeded)} className="accent-orange-500" /><span className="text-xs font-bold text-gray-600">調整可</span></label>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div className="bg-white px-5 py-4 flex justify-end gap-3 border-t"><button onClick={() => setFixedShiftForm({...fixedShiftForm, isOpen: false})} className="px-5 py-2.5 font-bold text-gray-600">キャンセル</button><button onClick={saveFixedShift} className="px-6 py-2.5 font-bold bg-emerald-600 text-white rounded-md">保存する</button></div>
              </div>
            </div>
          )}

          {isMailHistoryOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-lg w-full max-w-2xl flex flex-col max-h-[90vh]">
                <div className="bg-gray-800 px-5 py-4 text-white font-bold flex justify-between"><div className="flex gap-2"><Icon name="history" /> 送信履歴</div><button onClick={() => setIsMailHistoryOpen(false)}><Icon name="times" size={20}/></button></div>
                <div className="p-5 overflow-y-auto space-y-4 bg-gray-50">
                  {sentMails.length === 0 ? (<div className="text-center py-10 font-bold text-gray-500">履歴はありません</div>) : (
                    sentMails.map(mail => (
                      <div key={mail.id} className="bg-white rounded-md border p-4"><div className="flex justify-between mb-3"><span className="font-bold text-blue-800">{mail.type}</span><span className="text-xs text-gray-500">{mail.date}</span></div><div className="mb-3 text-sm"><span className="font-bold text-gray-600">宛先:</span> {mail.targetNames}</div><div className="bg-gray-50 p-3 text-sm text-gray-700 whitespace-pre-wrap border rounded-md">{renderTextWithLink(mail.text)}</div></div>
                    ))
                  )}
                </div>
              </div>
            </div>
          )}

          {mailForm.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-lg w-full max-w-md flex flex-col max-h-[90vh]">
                <div className="bg-blue-600 px-5 py-4 text-white font-bold flex gap-3"><Icon name="envelope" size={20} /> メール送信</div>
                <div className="p-5 overflow-y-auto space-y-5">
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-2">宛先</label>
                    <select value={mailForm.targetMode} onChange={handleTargetModeChange} className="w-full border p-3 rounded-md font-bold"><option value="all">全スタッフ</option><option value="unsubmitted">未提出のみ</option><option value="submitted">提出済のみ</option><option value="individual">個別に選択</option></select>
                    {mailForm.targetMode === 'individual' && (
                      <div className="mt-3 border max-h-40 overflow-y-auto bg-gray-50 divide-y">
                        {staffUsers.filter(u => u.status === 'active').map(u => (
                          <label key={u.id} className="flex items-center gap-3 p-3">
                            <input type="checkbox" checked={mailForm.selectedUsers.includes(u.id)} onChange={() => toggleMailUser(u.id)} className="w-4 h-4 accent-blue-600" />
                            <span className="font-bold text-sm">{getDisplayName(u.name)}</span>
                          </label>
                        ))}
                      </div>
                    )}
                  </div>
                  <div><label className="block text-sm font-bold text-gray-700 mb-2">種類</label><select value={mailForm.templateId} onChange={e => { const tpl = emailTemplates.find(t => t.id === e.target.value); if(tpl) setMailForm({...mailForm, templateId: tpl.id, type: tpl.name, text: generateMailText(tpl.body)}); }} className="w-full border p-3 rounded-md font-bold">{emailTemplates.map(tpl => <option key={tpl.id} value={tpl.id}>{generateMailText(tpl.name)}</option>)}</select></div>
                  <div><label className="block text-sm font-bold text-gray-700 mb-2">本文</label><textarea value={mailForm.text} onChange={e => setMailForm({...mailForm, text: e.target.value})} className="w-full border p-3 rounded-md h-40 resize-none" /></div>
                </div>
                <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t"><button onClick={() => setMailForm({...mailForm, isOpen: false})} className="px-5 py-2.5 font-bold text-gray-600">キャンセル</button><button onClick={handleSendMail} disabled={!mailForm.text.trim() || mailForm.selectedUsers.length === 0} className={`px-6 py-2.5 rounded-md font-bold text-white flex gap-2 items-center ${!mailForm.text.trim() || mailForm.selectedUsers.length === 0 ? 'bg-gray-400' : 'bg-blue-600'}`}><Icon name="paper-plane" /> 送信する</button></div>
              </div>
            </div>
          )}

          {modal.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-lg w-full max-w-md flex flex-col">
                <div className="bg-indigo-600 px-5 py-4 text-white font-bold flex gap-3"><Icon name={modal.type === 'daily' ? 'calendar-alt' : 'comment-alt'} size={20} />{modal.type === 'daily' ? `${currentMonth}月${modal.targetId}日のメモ設定` : '個人宛メッセージ'}</div>
                <div className="p-5"><textarea value={modal.text} onChange={(e) => setModal({ ...modal, text: e.target.value })} className="w-full border p-4 rounded-md h-32 resize-none" /></div>
                <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t"><button onClick={() => setModal({ isOpen: false, type: '', targetId: null, text: '' })} className="px-5 py-2.5 font-bold text-gray-600">キャンセル</button><button onClick={handleSaveModal} className="px-5 py-2.5 rounded-md font-bold bg-indigo-600 text-white">保存する</button></div>
              </div>
            </div>
          )}

          {changeForm.isOpen && (() => {
            const isSubmitDisabled = !changeForm.confirmedBy || !changeForm.changeCategory || !changeForm.status || !changeForm.reason.trim();

            return (
              <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
                <div className="bg-white rounded-lg w-full max-w-md flex flex-col max-h-[90vh]">
                  <div className="bg-red-600 px-5 py-4 text-white font-bold flex gap-3"><Icon name="edit" size={20} />変更申請</div>
                  <div className="p-4 sm:p-5 overflow-y-auto flex-1 space-y-5">
                    <div><label className="block text-sm font-bold text-gray-700 mb-1.5">対象日</label><select value={changeForm.day} onChange={(e) => handleChangeFormDay(e.target.value)} className="w-full border p-3 rounded-md font-bold">{daysArray.map(d => <option key={d} value={d}>{currentMonth}月{d}日</option>)}</select></div>
                    <div className="bg-gray-50 rounded-md p-4 border"><p className="text-xs text-gray-500 font-bold mb-1">現在</p><p className="font-bold text-lg">{(() => { const shiftForDay = (currentMonthShifts[currentUser?.id] || {})[changeForm.day]; return shiftForDay ? formatShiftStr(shiftForDay) : '未入力'; })()}</p></div>
                    <div className="border-t pt-4">
                      <div className="mb-4">
                        <label className="block text-sm font-bold text-gray-700 mb-2">事前確認管理者 <span className="text-red-500 text-xs ml-1 font-bold">※必須</span></label>
                        <select value={changeForm.confirmedBy || ''} onChange={(e) => setChangeForm({...changeForm, confirmedBy: e.target.value})} className="w-full border p-3 rounded-md text-sm">
                          <option value="">-- 選択してください --</option>
                          {adminUsersList.map(a => <option key={a.id} value={a.name}>{getDisplayName(a.name)}</option>)}
                        </select>
                      </div>

                      <div className="mb-4">
                        <label className="block text-sm font-bold text-gray-700 mb-2">区分 <span className="text-red-500 text-xs ml-1 font-bold">※必須</span></label>
                        <div className="flex gap-2">
                          {['自己変更', '依頼変更'].map(c => (
                            <button key={c} onClick={() => setChangeForm({...changeForm, changeCategory: c})} className={`flex-1 rounded-md py-2.5 text-sm font-bold border transition-colors ${changeForm.changeCategory === c ? 'bg-red-600 text-white border-red-600' : 'bg-white text-gray-600 border-gray-300'}`}>{c}</button>
                          ))}
                        </div>
                      </div>

                      <label className="block text-sm font-bold text-red-600 mb-3">変更後 <span className="text-red-500 text-xs ml-1 font-bold">※必須</span></label>
                      <div className="flex gap-2 mb-3">
                        <button onClick={() => setChangeForm({...changeForm, status: '休'})} className={`flex-1 rounded-md py-2.5 text-sm font-bold border transition-colors ${changeForm.status === '休' ? 'bg-red-500 text-white border-red-500' : 'bg-white text-gray-700 border-gray-300'}`}>休</button>
                        <button onClick={() => setChangeForm({...changeForm, status: '有休'})} className={`flex-1 rounded-md py-2.5 text-sm font-bold border transition-colors ${changeForm.status === '有休' ? 'bg-teal-500 text-white border-teal-500' : 'bg-white text-gray-700 border-gray-300'}`}>有休</button>
                        <button onClick={() => setChangeForm({...changeForm, status: '勤務'})} className={`flex-1 rounded-md py-2.5 text-sm font-bold border transition-colors ${changeForm.status === '勤務' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-700 border-gray-300'}`}>勤務</button>
                      </div>

                      {(changeForm.status === '勤務' || (changeForm.status === '休' && changeForm.canWorkIfNeeded)) && (
                        <div className="flex items-center gap-2 mb-3">
                          <select value={changeForm.start} onChange={(e) => setChangeForm({...changeForm, start: e.target.value})} className="flex-1 border p-2.5 rounded-md text-center">{HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}</select>
                          <span className="text-gray-400">~</span>
                          <select value={changeForm.end} onChange={(e) => setChangeForm({...changeForm, end: e.target.value})} className="flex-1 border p-2.5 rounded-md text-center">{HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}</select>
                        </div>
                      )}

                      {changeForm.status === '休' && (
                        <label className="flex items-center gap-2.5 bg-gray-50 px-3 rounded-md py-2.5 border mb-3 cursor-pointer">
                          <input type="checkbox" checked={changeForm.canWorkIfNeeded} onChange={() => setChangeForm({...changeForm, canWorkIfNeeded: !changeForm.canWorkIfNeeded})} className="accent-orange-500" />
                          <span className="text-sm font-bold text-gray-600">出勤調整可能</span>
                        </label>
                      )}
                      
                      <input type="text" value={changeForm.note || ''} onChange={(e) => setChangeForm({...changeForm, note: e.target.value})} placeholder="備考（任意）" className="w-full border px-4 py-2.5 rounded-md focus:ring-2 focus:ring-red-100 outline-none" />
                    </div>

                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">変更理由 <span className="text-red-500 text-xs ml-1 font-bold">※必須</span></label>
                      <textarea value={changeForm.reason} onChange={(e) => setChangeForm({...changeForm, reason: e.target.value})} className="w-full border p-3 rounded-md h-24 resize-none focus:ring-2 focus:ring-red-100 outline-none" placeholder="申請の理由を詳しく入力してください" />
                    </div>
                  </div>

                  <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t">
                    <button onClick={() => setChangeForm({ ...changeForm, isOpen: false })} className="px-5 py-2.5 font-bold text-gray-600 hover:bg-gray-100 rounded-md transition-colors">キャンセル</button>
                    <button 
                      onClick={submitChangeRequest} 
                      disabled={isSubmitDisabled} 
                      className={`px-6 py-2.5 rounded-md font-bold text-white flex items-center gap-2 transition-all ${isSubmitDisabled ? 'bg-gray-400 cursor-not-allowed opacity-70' : 'bg-red-600 hover:bg-red-700 shadow-md active:scale-95'}`}
                    >
                      <Icon name="paper-plane" size={14}/> 申請
                    </button>
                  </div>
                </div>
              </div>
            );
          })()}

          {confirmModal.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-lg w-full max-w-md flex flex-col">
                <div className={`${confirmModal.title.includes('エラー') || confirmModal.title.includes('警告') ? 'bg-red-600' : confirmModal.title.includes('完了') ? 'bg-blue-600' : 'bg-yellow-500'} px-5 py-4 text-white font-bold flex gap-2`}><Icon name={confirmModal.title.includes('エラー') || confirmModal.title.includes('警告') ? 'exclamation-triangle' : confirmModal.title.includes('完了') ? 'check-circle' : 'info-circle'} /> {confirmModal.title}</div>
                <div className="p-6 font-medium space-y-2 whitespace-pre-wrap">{confirmModal.message}</div>
                <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t">
                  {!confirmModal.isAlert && <button onClick={() => setConfirmModal({ isOpen: false, type: '', title: '', message: '', onConfirm: null, isAlert: false })} className="px-5 py-2.5 font-bold text-gray-600">キャンセル</button>}
                  <button onClick={() => { if(confirmModal.onConfirm) confirmModal.onConfirm(); setConfirmModal({ isOpen: false, type: '', title: '', message: '', onConfirm: null, isAlert: false }); }} className={`px-6 py-2.5 rounded-md font-bold text-white ${confirmModal.title.includes('エラー') || confirmModal.title.includes('警告') ? 'bg-red-600' : 'bg-blue-600'}`}>{confirmModal.isAlert ? 'OK' : '実行する'}</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
