                </div>
                <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t shrink-0"><button onClick={() => setModal({ isOpen: false, type: '', targetId: null, text: '', selectedDays: [] })} className="px-5 py-2.5 font-bold text-gray-600 hover:bg-gray-100 rounded-md transition-colors">キャンセル</button><button onClick={handleSaveModal} className="px-6 py-2.5 rounded-md font-bold bg-indigo-600 hover:bg-indigo-700 text-white shadow-sm transition-colors">保存する</button></div>
              </div>
            </div>
          )}

          {editStaffForm.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-lg shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
                <div className="bg-indigo-600 px-5 py-4 text-white font-bold text-lg flex justify-between items-center shrink-0">
                  <div className="flex gap-3 items-center"><Icon name="user-edit" size={20} />スタッフ情報編集</div>
                  <button onClick={() => setEditStaffForm({ ...editStaffForm, isOpen: false })}><Icon name="times" size={20}/></button>
                </div>
                <div className="p-5 overflow-y-auto flex-1">
                  <form id="editStaffForm" onSubmit={handleUpdateStaff} className="space-y-4">
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">社員番号 <span className="text-gray-400 font-normal text-xs">(変更不可)</span></label>
                      <input type="text" value={editStaffForm.user?.employeeId || ''} disabled className="w-full rounded-md border p-3 bg-gray-100 text-gray-500 cursor-not-allowed font-mono" />
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">氏名 <span className="text-red-500 text-xs">※必須</span></label>
                      <input type="text" required value={editStaffForm.name} onChange={e => setEditStaffForm({...editStaffForm, name: e.target.value})} className="w-full rounded-md border p-3 focus:ring-2 focus:ring-indigo-300 outline-none" />
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">メールアドレス</label>
                      <input type="email" value={editStaffForm.email} onChange={e => setEditStaffForm({...editStaffForm, email: e.target.value})} className="w-full rounded-md border p-3 focus:ring-2 focus:ring-indigo-300 outline-none" />
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">雇用区分</label>
                      <input type="text" placeholder="例：A契約、Type4..." value={editStaffForm.employmentCategory} onChange={(e) => setEditStaffForm({ ...editStaffForm, employmentCategory: e.target.value })} className="w-full rounded-md border p-3 focus:ring-2 focus:ring-indigo-300 outline-none" />
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">役割</label>
                      <input type="text" placeholder="例：SV、LD、CMなど" value={editStaffForm.position || ''} onChange={(e) => setEditStaffForm({ ...editStaffForm, position: e.target.value })} className="w-full rounded-md border p-3 focus:ring-2 focus:ring-indigo-300 outline-none" />
                      </div>
                    <div className="pt-2 border-t mt-4">
                      <label className="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" checked={editStaffForm.isAdmin} onChange={e => setEditStaffForm({...editStaffForm, isAdmin: e.target.checked})} className="w-5 h-5 accent-indigo-600" />
                        <span className="text-sm font-bold text-gray-800">管理者権限を付与する</span>
                      </label>
                      <p className="text-[11px] text-gray-500 mt-1 ml-7">このユーザーも管理画面を見れるようになります。</p>
                    </div>
                  </form>
                </div>
                <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t shrink-0">
                  <button type="button" onClick={() => setEditStaffForm({ ...editStaffForm, isOpen: false })} className="px-5 py-2.5 font-bold text-gray-600 hover:bg-gray-100 rounded-md transition-colors">キャンセル</button>
                  <button type="submit" form="editStaffForm" className="px-6 py-2.5 font-bold bg-indigo-600 hover:bg-indigo-700 text-white rounded-md transition-colors shadow-sm">更新する</button>
                </div>
              </div>
            </div>
          )}

          {changeForm.isOpen && (() => {
            const isSubmitDisabled = !changeForm.confirmedBy || !changeForm.changeCategory || !changeForm.status || !changeForm.reason.trim();

            return (
              <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
                <div className="bg-white rounded-lg w-full max-w-md flex flex-col max-h-[90vh]">
                  <div className="bg-red-600 px-5 py-4 text-white font-bold flex gap-3"><Icon name="edit" size={20} />変更申請</div>
                  <div className="p-4 sm:p-5 overflow-y-auto flex-1 space-y-5">
                    <div><label className="block text-sm font-bold text-gray-700 mb-1.5">対象日</label><select value={changeForm.day} onChange={(e) => handleChangeFormDay(e.target.value)} className="w-full border p-3 rounded-md font-bold">{daysArray.map(d => <option key={d} value={d}>{currentMonth}月{d}日</option>)}</select></div>
                    <div className="bg-gray-50 rounded-md p-4 border"><p className="text-xs text-gray-500 font-bold mb-1">現在</p><p className="font-bold text-lg">{(() => { const shiftForDay = (currentMonthShifts[currentUser?.id] || {})[changeForm.day]; return shiftForDay ? formatShiftStr(shiftForDay) : '未入力'; })()}</p></div>
                    <div className="border-t pt-4">
                      <div className="mb-4">
                        <label className="block text-sm font-bold text-gray-700 mb-2">事前確認管理者 <span className="text-red-500 text-xs ml-1 font-bold">※必須</span></label>
                        <select value={changeForm.confirmedBy || ''} onChange={(e) => setChangeForm({...changeForm, confirmedBy: e.target.value})} className="w-full border p-3 rounded-md text-sm">
                          <option value="">-- 選択してください --</option>
                          {adminUsersList.map(a => <option key={a.id} value={a.name}>{getDisplayName(a.name)}</option>)}
                        </select>
                      </div>

                      <div className="mb-4">
                        <label className="block text-sm font-bold text-gray-700 mb-2">区分 <span className="text-red-500 text-xs ml-1 font-bold">※必須</span></label>
                        <div className="flex gap-2">
                          {['自己変更', '依頼変更'].map(c => (
                            <button key={c} onClick={() => setChangeForm({...changeForm, changeCategory: c})} className={`flex-1 rounded-md py-2.5 text-sm font-bold border transition-colors ${changeForm.changeCategory === c ? 'bg-red-600 text-white border-red-600' : 'bg-white text-gray-600 border-gray-300'}`}>{c}</button>
                          ))}
                        </div>
                      </div>

                      <label className="block text-sm font-bold text-red-600 mb-3">変更後 <span className="text-red-500 text-xs ml-1 font-bold">※必須</span></label>
                      <div className="flex gap-2 mb-3">
                        <button onClick={() => setChangeForm({...changeForm, status: '休'})} className={`flex-1 rounded-md py-2.5 text-sm font-bold border transition-colors ${changeForm.status === '休' ? 'bg-red-500 text-white border-red-500' : 'bg-white text-gray-700 border-gray-300'}`}>休</button>
                        <button onClick={() => setChangeForm({...changeForm, status: '有休'})} className={`flex-1 rounded-md py-2.5 text-sm font-bold border transition-colors ${changeForm.status === '有休' ? 'bg-teal-500 text-white border-teal-500' : 'bg-white text-gray-700 border-gray-300'}`}>有休</button>
                        <button onClick={() => setChangeForm({...changeForm, status: '勤務'})} className={`flex-1 rounded-md py-2.5 text-sm font-bold border transition-colors ${changeForm.status === '勤務' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-700 border-gray-300'}`}>勤務</button>
                      </div>

                      {(changeForm.status === '勤務' || (changeForm.status === '休' && changeForm.canWorkIfNeeded)) && (
                        <div className="flex items-center gap-2 mb-3">
                          <select value={changeForm.start} onChange={(e) => setChangeForm({...changeForm, start: e.target.value})} className="flex-1 border p-2.5 rounded-md text-center">{HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}</select>
                          <span className="text-gray-400">~</span>
                          <select value={changeForm.end} onChange={(e) => setChangeForm({...changeForm, end: e.target.value})} className="flex-1 border p-2.5 rounded-md text-center">{HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}</select>
                        </div>
                      )}

                      {changeForm.status === '休' && (
                        <label className="flex items-center gap-2.5 bg-gray-50 px-3 rounded-md py-2.5 border mb-3 cursor-pointer">
                          <input type="checkbox" checked={changeForm.canWorkIfNeeded} onChange={() => setChangeForm({...changeForm, canWorkIfNeeded: !changeForm.canWorkIfNeeded})} className="accent-orange-500" />
                          <span className="text-sm font-bold text-gray-600">出勤調整可能</span>
                        </label>
                      )}
                      
                      <input type="text" value={changeForm.note || ''} onChange={(e) => setChangeForm({...changeForm, note: e.target.value})} placeholder="備考（任意）" className="w-full border px-4 py-2.5 rounded-md focus:ring-2 focus:ring-red-100 outline-none" />
                    </div>

                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">変更理由 <span className="text-red-500 text-xs ml-1 font-bold">※必須</span></label>
                      <textarea value={changeForm.reason} onChange={(e) => setChangeForm({...changeForm, reason: e.target.value})} className="w-full border p-3 rounded-md h-24 resize-none focus:ring-2 focus:ring-red-100 outline-none" placeholder="申請の理由を詳しく入力してください" />
                    </div>
                  </div>

                  <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t">
                    <button onClick={() => setChangeForm({ ...changeForm, isOpen: false })} className="px-5 py-2.5 font-bold text-gray-600 hover:bg-gray-100 rounded-md transition-colors">キャンセル</button>
                    <button 
                      onClick={submitChangeRequest} 
                      disabled={isSubmitDisabled} 
                      className={`px-6 py-2.5 rounded-md font-bold text-white flex items-center gap-2 transition-all ${isSubmitDisabled ? 'bg-gray-400 cursor-not-allowed opacity-70' : 'bg-red-600 hover:bg-red-700 shadow-md active:scale-95'}`}
                    >
                      <Icon name="paper-plane" size={14}/> 申請
                    </button>
                  </div>
                </div>
              </div>
            );
          })()}

          {proxyShiftForm.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-lg shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col max-h-[90vh]">
                <div className="bg-purple-600 px-5 py-4 text-white font-bold text-lg flex justify-between shrink-0">
                  <div className="flex items-center gap-3"><Icon name="user-astronaut" size={20} />{proxyShiftForm.userName} さんの代理登録 ({currentMonth}月)</div>
                  <button onClick={() => setProxyShiftForm({...proxyShiftForm, isOpen: false})}><Icon name="times" size={20}/></button>
                </div>
                {/* 横スクロールをなくし、w-fullで画面幅に固定します */}
                <div className="overflow-y-auto flex-1 p-1 sm:p-4 bg-gray-50">
                  <div className="divide-y divide-gray-200 border rounded-md bg-white w-full">
                    {daysArray.map(day => {
                      const shiftData = proxyShiftForm.shifts[day] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
                      const isWorking = shiftData.status === '勤務'; 
                      const isRest = shiftData.status === '休';
                      
                      return (
                        <div key={day} className={`flex flex-row items-center gap-1 sm:gap-4 p-1.5 sm:px-4 sm:py-3 transition-colors w-full overflow-hidden ${isWorking ? 'bg-blue-50/30' : isRest && shiftData.canWorkIfNeeded ? 'bg-orange-50/30' : 'bg-white'}`}>
                          
                          {/* 1. 日付と日別メモ */}
                          <div className="flex flex-col items-center justify-center w-8 sm:w-24 shrink-0">
                            <span className={`text-sm sm:text-xl font-black leading-none ${getDayColor(day)}`}>{day}</span>
                            <span className={`text-[8px] sm:text-sm font-bold leading-tight ${getDayColor(day)}`}>({getDayOfWeek(day)})</span>
                            {currentDailyNotes[day] && (
                              <div className={`text-[8px] sm:text-[10px] font-bold px-0.5 py-0.5 mt-0.5 rounded-sm text-center leading-tight w-full truncate ${currentDailyNotes[day].includes('休刊日') ? 'bg-blue-100 text-blue-700' : 'bg-red-100 text-red-700'}`} title={currentDailyNotes[day]}>
                                {currentDailyNotes[day]}
                              </div>
                            )}
                          </div>
                          
                          {/* 2. ステータスボタン (スマホでは幅と文字を極小化) */}
                          <div className="flex gap-0.5 sm:gap-2 shrink-0">
                            <button onClick={() => updateProxyShift(day, 'status', '未')} className={`w-6 sm:w-14 py-1 sm:py-2 rounded text-[10px] sm:text-sm font-bold border px-0 ${shiftData.status === '未' ? 'bg-gray-600 text-white' : 'bg-white text-gray-500'}`}>未</button>
                            <button onClick={() => updateProxyShift(day, 'status', '休')} className={`w-6 sm:w-14 py-1 sm:py-2 rounded text-[10px] sm:text-sm font-bold border px-0 ${shiftData.status === '休' ? 'bg-red-500 text-white' : 'bg-white text-gray-700'}`}>休</button>
                            <button onClick={() => updateProxyShift(day, 'status', '有休')} className={`w-8 sm:w-14 py-1 sm:py-2 rounded text-[10px] sm:text-sm font-bold border px-0 ${shiftData.status === '有休' ? 'bg-teal-500 text-white' : 'bg-white text-gray-700'}`}>有休</button>
                            <button onClick={() => updateProxyShift(day, 'status', '勤務')} className={`w-8 sm:w-14 py-1 sm:py-2 rounded text-[10px] sm:text-sm font-bold border px-0 ${isWorking ? 'bg-blue-600 text-white' : 'bg-white text-blue-700'}`}>勤務</button>
                          </div>
                          
                          {/* 3. 右側エリア（時間・調整可・備考）をフレックスで残りの幅に柔軟に収める */}
                          <div className="flex flex-1 items-center gap-1 sm:gap-2 min-w-0 justify-end">
                            
                            {/* 時間入力 */}
                            {(isWorking || (isRest && shiftData.canWorkIfNeeded)) && (
                              <div className="flex items-center shrink-0">
                                <select value={shiftData.start} onChange={(e) => updateProxyShift(day, 'start', e.target.value)} className="bg-white border rounded py-1 px-0 w-11 sm:w-20 text-center text-[10px] sm:text-sm appearance-none" style={{textAlignLast:'center'}}>{HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}</select>
                                <span className="text-gray-400 font-bold mx-0.5 sm:mx-1 text-[10px] sm:text-sm">~</span>
                                <select value={shiftData.end} onChange={(e) => updateProxyShift(day, 'end', e.target.value)} className="bg-white border rounded py-1 px-0 w-11 sm:w-20 text-center text-[10px] sm:text-sm appearance-none" style={{textAlignLast:'center'}}>{HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}</select>
                              </div>
                            )}
                            
                            {/* 調整可チェック (スマホでは「可」の1文字に省略して幅を節約) */}
                            {isRest && (
                              <label className="flex items-center gap-0.5 bg-gray-50 px-1 sm:px-3 py-1 sm:py-1.5 rounded border shrink-0">
                                <input type="checkbox" checked={shiftData.canWorkIfNeeded} onChange={() => updateProxyShift(day, 'canWorkIfNeeded', !shiftData.canWorkIfNeeded)} className="w-3 h-3 sm:w-4 sm:h-4 accent-orange-500 shrink-0" />
                                <span className="text-[10px] sm:text-xs font-bold text-gray-600 whitespace-nowrap hidden sm:inline">調整可</span>
                                <span className="text-[10px] font-bold text-gray-600 whitespace-nowrap sm:hidden">可</span>
                              </label>
                            )}
                            
                            {/* 備考欄 (flex-1 min-w-[2rem] を指定し、潰れすぎない程度に余った幅を全て埋める) */}
                            {shiftData.status !== '未' && (
                              <input type="text" value={shiftData.note || ''} onChange={(e) => updateProxyShift(day, 'note', e.target.value)} placeholder="備考" className="flex-1 min-w-[2rem] sm:w-32 bg-white border border-gray-300 text-[10px] sm:text-sm rounded px-1 sm:px-2 py-1 sm:py-1.5 focus:ring-1 focus:ring-purple-300 outline-none truncate" />
                            )}
                          </div>
                          
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="bg-white px-5 py-4 flex justify-end gap-3 border-t shrink-0">
                  <button onClick={() => setProxyShiftForm({...proxyShiftForm, isOpen: false})} className="px-5 py-2.5 font-bold text-gray-600 border rounded-md hover:bg-gray-50">キャンセル</button>
                  <button onClick={saveProxyShift} className="px-6 py-2.5 font-bold bg-purple-600 hover:bg-purple-700 text-white rounded-md shadow-sm">代理で提出する</button>
                </div>
              </div>
            </div>
          )}

          {confirmModal.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe backdrop-blur-sm">
              <div className="bg-white rounded-lg w-full max-w-md flex flex-col shadow-2xl overflow-hidden max-h-[90vh]">
                <div className={`${confirmModal.title.includes('エラー') || confirmModal.title.includes('警告') ? 'bg-red-600' : confirmModal.title.includes('完了') ? 'bg-blue-600' : 'bg-yellow-500'} px-5 py-4 text-white font-bold flex gap-2 shrink-0 items-center`}><Icon name={confirmModal.title.includes('エラー') || confirmModal.title.includes('警告') ? 'exclamation-triangle' : confirmModal.title.includes('完了') ? 'check-circle' : 'info-circle'} /> {confirmModal.title}</div>
                
                <div className="p-6 font-medium space-y-2 whitespace-pre-wrap overflow-y-auto flex-1">
                  <p className="text-gray-700 leading-relaxed">{confirmModal.message}</p>
                  
                  {confirmModal.checkboxLabel && confirmModal.unenteredDays && (
                    <div className="mt-6 border-t pt-5">
                      <label className="flex items-center gap-3 p-4 bg-orange-50 border border-orange-200 rounded-lg cursor-pointer hover:bg-orange-100 transition-colors shadow-sm">
                        <input type="checkbox" checked={confirmModal.checkboxValue || false} onChange={(e) => setConfirmModal(prev => ({...prev, checkboxValue: e.target.checked}))} className="w-6 h-6 accent-orange-600 shrink-0" />
                        <span className="font-bold text-orange-950 text-base">{confirmModal.checkboxLabel}</span>
                      </label>
                      
                      {/* ▼▼ チェックが入ったらカレンダー表示 ▼▼ */}
                      {confirmModal.checkboxValue && (
                        <div className="mt-4 p-5 bg-white border border-gray-200 rounded-lg shadow-inner animate-fade-in">
                          <p className="text-sm font-bold text-gray-700 mb-4 flex items-center gap-2"><Icon name="calendar-alt" className="text-orange-500"/> 調整可能な日を選択（未入力日のみ表示）</p>
                          
                          {(() => {
                            // カレンダー生成ロジック
                            const [year, month] = activeTargetMonth.split('-').map(Number);
                            const firstDayOfWeek = new Date(year, month - 1, 1).getDay(); // 0(日)〜6(土)
                            const daysInMonth = new Date(year, month, 0).getDate();
                            const calendarDays = [];
                            
                            // 最初の週の空白
                            for (let i = 0; i < firstDayOfWeek; i++) { calendarDays.push(null); }
                            // 日付を入れる
                            for (let i = 1; i <= daysInMonth; i++) { calendarDays.push(i); }
                            
                            const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
                            
                            return (
                              <div className="border border-gray-200 rounded-md overflow-hidden">
                                {/* 曜日ヘッダー */}
                                <div className="grid grid-cols-7 bg-gray-100 border-b border-gray-200 text-center">
                                  {weekdays.map((wd, i) => (
                                    <div key={wd} className={`py-2 text-xs font-bold ${i === 0 ? 'text-red-600' : i === 6 ? 'text-blue-600' : 'text-gray-700'}`}>{wd}</div>
                                  ))}
                                </div>
                                {/* 日付グリッド */}
                                <div className="grid grid-cols-7 gap-1 p-1.5 bg-gray-50/50">
                                  {calendarDays.map((day, index) => {
                                    if (day === null) return <div key={`empty-${index}`} className="aspect-square"></div>;
                                    
                                    // その日が「未入力」かどうかチェック
                                    const isUnentered = confirmModal.unenteredDays.includes(day);
                                    const isSelected = (confirmModal.adjustableDays || []).includes(day);
                                    const dayOfWeek = index % 7;
                                    
                                    return (
                                      <button
                                        key={day}
                                        disabled={!isUnentered} // 未入力でない日は押せない
                                        onClick={() => {
                                          setConfirmModal(prev => {
                                            const current = prev.adjustableDays || [];
                                            const newSelected = isSelected ? current.filter(d => d !== day) : [...current, day].sort((a,b)=>a-b);
                                            return { ...prev, adjustableDays: newSelected };
                                          });
                                        }}
                                        className={`aspect-square rounded-md flex flex-col items-center justify-center border transition-all ${
                                          !isUnentered 
                                            ? 'bg-gray-100 text-gray-300 border-gray-100' // 入力済み（選択不可）
                                            : isSelected
                                              ? 'bg-orange-500 text-white border-orange-600 shadow-md font-bold scale-105' // 選択中
                                              : `bg-white border-gray-200 hover:border-orange-400 hover:bg-orange-50 ${dayOfWeek === 0 ? 'text-red-600' : dayOfWeek === 6 ? 'text-blue-600' : 'text-gray-800'}` // 未選択
                                        }`}
                                      >
                                        <span className="text-base font-bold">{day}</span>
                                        {isSelected && <Icon name="check" size={10} className="mt-0.5" />}
                                      </button>
                                    );
                                  })}
                                </div>
                              </div>
                            );
                          })()}
                          <p className="text-xs text-gray-500 mt-3 border-t pt-2">※ すでにシフトを入力済みの日は選択できません。</p>
                        </div>
                      )}
                    </div>
                  )}
                </div>
                
                <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t shrink-0">
                  {!confirmModal.isAlert && <button onClick={() => setConfirmModal({ isOpen: false, type: '', title: '', message: '', onConfirm: null, isAlert: false, unenteredDays: [], adjustableDays: [] })} className="px-5 py-2.5 font-bold text-gray-600 hover:bg-gray-100 rounded-md transition-colors">キャンセル</button>}
                  <button 
                    onClick={() => { 
                      if(confirmModal.onConfirm) confirmModal.onConfirm(confirmModal.checkboxValue, confirmModal.adjustableDays || []); 
                      setConfirmModal({ isOpen: false, type: '', title: '', message: '', onConfirm: null, isAlert: false, checkboxLabel: '', checkboxValue: false, unenteredDays: [], adjustableDays: [] }); 
                    }} 
                    className={`px-6 py-2.5 rounded-md font-bold text-white shadow-sm transition-colors ${confirmModal.title.includes('エラー') || confirmModal.title.includes('警告') ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'}`}
                  >
                    {confirmModal.confirmText || (confirmModal.isAlert ? 'OK' : '実行する')}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
