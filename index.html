<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>シフトの窓口</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/mobile-drag-drop/index.min.js"></script>
  <script src="https://unpkg.com/mobile-drag-drop/scroll-behaviour.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/mobile-drag-drop/default.css">
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      MobileDragDrop.polyfill({ dragImageTranslateOverride: MobileDragDrop.scrollBehaviourDragImageTranslateOverride });
    });
  </script>

  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; -webkit-tap-highlight-color: transparent; background-color: #f3f4f6; }
    .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
    .animate-fade-in-down { animation: fadeInDown 0.3s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { height: 8px; width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .bg-stripes-gray { background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(0,0,0,0.05) 5px, rgba(0,0,0,0.05) 10px); }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }

    .tooltip-container { position: relative; display: inline-flex; align-items: center; outline: none; }
    .tooltip-container:hover { z-index: 99999; }
    .tooltip-text { 
      visibility: hidden; position: absolute; bottom: 130%; left: 50%; transform: translateX(-50%);
      margin-bottom: 8px; background-color: #1e293b; color: white; text-align: left; 
      padding: 8px 12px; border-radius: 6px; white-space: pre-wrap; word-break: break-all; width: max-content;
      max-width: 150px; font-size: 11px; font-weight: bold; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
      opacity: 0; transition: opacity 0.2s, visibility 0.2s; pointer-events: none; z-index: 99999;
    }
    .tooltip-container:hover .tooltip-text, .tooltip-container:active .tooltip-text, .tooltip-container:focus-within .tooltip-text { visibility: visible; opacity: 1; }
    .tooltip-text::after { content: ""; position: absolute; top: 100%; left: 50%; margin-left: -6px; border-width: 6px; border-style: solid; border-color: #1e293b transparent transparent transparent; }
    .tooltip-left .tooltip-text { left: 0; transform: none; text-align: left; }
    .tooltip-left .tooltip-text::after { left: 15px; margin-left: 0; }

    .tooltip-bottom .tooltip-text { bottom: auto; top: 130%; }
    .tooltip-bottom .tooltip-text::after { bottom: 100%; top: auto; border-color: transparent transparent #1e293b transparent; }
    /* PCで見やすくするために吹き出しの最大幅を広げる */
    .tooltip-text { max-width: 300px !important; }

    .input-flat { border: none; border-bottom: 2px solid #cbd5e1; border-radius: 0; background: transparent; padding: 12px 8px; transition: border-color 0.2s ease; }
    .input-flat:focus { outline: none; border-bottom-color: #2563eb; box-shadow: none; }
    .clickable-cell { position: relative; z-index: 20; }

/* スマホ等でスクロール中の不要なホバー判定（カクつきの原因）を無効化する */
    @media (pointer: coarse) {
      .hover\:bg-blue-50\/30:hover { background-color: transparent !important; }
      .hover\:z-\[70\]:hover { z-index: inherit !important; }
    }
  </style>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800"><div id="root"></div><script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const DEFAULT_START_TIME = '';
    const DEFAULT_END_TIME = '';
    const START_HOUR = 7;
    const END_HOUR = 22;
    const TOTAL_HOURS = END_HOUR - START_HOUR;
    const timeAxis = Array.from({ length: TOTAL_HOURS }, (_, i) => i + START_HOUR);
    const HOUR_OPTIONS = ['', ...Array.from({ length: TOTAL_HOURS + 1 }, (_, i) => `${i + START_HOUR}:00`)];

    const DOW_NAMES = ['日', '月', '火', '水', '木', '金', '土'];
    const DOW_COLORS = ['text-red-500', 'text-gray-700', 'text-gray-700', 'text-gray-700', 'text-gray-700', 'text-gray-700', 'text-blue-500'];

    const Icon = ({ name, size = 16, className = "", title = "", regular = false }) => (
      <i className={`${regular ? 'far' : 'fas'} fa-${name} ${className}`} style={{ fontSize: size }} title={title}></i>
    );

    const getDisplayName = (name) => {
      if (!name) return '---';
      return String(name).replace(' (オペレーター)', '').replace(' (SV)', '');
    };

    function App() {
      const GAS_URL = "https://script.google.com/macros/s/AKfycbxbzJxiBjROBm8EUXIYVckjhNnN4QhGqrtr_MCC8ndjLrEzJTiX6qp8FJE1_5QjM1WJ/exec";

      const fetchGAS = (action, ...args) => {
        // オフライン環境（社員番号1111）の時は通信せずに成功したフリをする
        if (employeeIdInput === '1111' || (currentUser && currentUser.employeeId === '1111')) {
          return new Promise(resolve => setTimeout(() => {
            if (action === 'verifyLogin') resolve({ success: true, user: { id: 'd_1111', employeeId: '1111', name: 'オフラインテスト', role: 'admin', status: 'active', employmentCategory: 'SV' } });
            else if (action === 'getInitialData') resolve({ users: [{ id: 'd_1111', employeeId: '1111', name: 'オフラインテスト', role: 'admin', status: 'active', employmentCategory: 'SV' }], settings: [], shifts: [], dailyNotes: [], personalNotes: [], fixedShifts: [], changeRequests: [], templates: [], notifications: [], mailHistory: [] });
            else resolve({ success: true });
          }, 300));
        }

        return fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action, args })
        })
        .then(async response => {
          const text = await response.text();
          try {
            return JSON.parse(text);
          } catch (e) {
            console.error("【GASからの返答】\n", text);
            throw new Error("セキュリティブロック、または通信エラーです");
          }
        })
        .then(data => {
          if (data.error || data.success === false) throw new Error(data.message || '通信エラー');
          return data;
        });
      };

      const toHalfWidthNum = (str) => str.replace(/[０-９]/g, (s) => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
      
      const [isLoading, setIsLoading] = useState(false);
      const [toast, setToast] = useState(null);
      const [view, setView] = useState('login'); 
      const [currentUser, setCurrentUser] = useState(null);
      const [loginStep, setLoginStep] = useState('login'); 
      const [tempUser, setTempUser] = useState(null);
      const [isResetMode, setIsResetMode] = useState(false); 
      const [employeeIdInput, setEmployeeIdInput] = useState('');
      const [passwordInput, setPasswordInput] = useState('');
      const [passwordConfirm, setPasswordConfirm] = useState('');
      const [resetIdInput, setResetIdInput] = useState('');
      const [resetEmailInput, setResetEmailInput] = useState('');
      const [loginError, setLoginError] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [showPasswordConfirm, setShowPasswordConfirm] = useState(false);

      const today = new Date();
      const currentRealYear = today.getFullYear();
      const currentRealMonth = today.getMonth() + 1;
      let targetYear = currentRealYear;
      let targetMonth = currentRealMonth + 1;
      if (targetMonth > 12) { targetMonth = 1; targetYear += 1; }
      
      const [displayDate, setDisplayDate] = useState(new Date(targetYear, targetMonth - 1, 1)); 
      const [activeTargetMonth, setActiveTargetMonth] = useState(`${targetYear}-${String(targetMonth).padStart(2, '0')}`);
      const [deadline, setDeadline] = useState(`${currentRealYear}-${String(currentRealMonth).padStart(2, '0')}-15`);
      const [isConfirmed, setIsConfirmed] = useState(false);
      
      const [dbUsers, setDbUsers] = useState([]);
      const [shifts, setShifts] = useState({}); 
      const [submissionStatus, setSubmissionStatus] = useState({}); 
      const [dailyNotes, setDailyNotes] = useState({}); 
      const [personalNotes, setPersonalNotes] = useState({});
      const [adminNotifications, setAdminNotifications] = useState([]);

      const [modal, setModal] = useState({ isOpen: false, type: '', targetId: null, text: '', selectedDays: [] });
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null, isAlert: false });
      const [adminTab, setAdminTab] = useState('shift'); 
      const [staffOrder, setStaffOrder] = useState([]);
      
      const [shiftViewMode, setShiftViewMode] = useState('month');
      const [selectedDay, setSelectedDay] = useState(1);
      
      const isScrollingRef = useRef(false);
      
      const [newStaff, setNewStaff] = useState({ employeeId: '', name: '', email: '', isAdmin: false, employmentCategory: '', position: '' });
      const [editStaffForm, setEditStaffForm] = useState({ isOpen: false, user: null, name: '', email: '', employmentCategory: '', isAdmin: false, position: '' });
      const [displayFilter, setDisplayFilter] = useState('all'); // 'all', 'admin', 'staff'
      const [staffSearchQuery, setStaffSearchQuery] = useState('');
      const [shiftSearchQuery, setShiftSearchQuery] = useState('');

      const [showRetired, setShowRetired] = useState(false);
      const [staffViewMode, setStaffViewMode] = useState('list'); 
      const [currentWeekIndex, setCurrentWeekIndex] = useState(0);
      
      const [changeForm, setChangeForm] = useState({ isOpen: false, day: 1, status: '勤務', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '', reason: '', changeCategory: '', confirmedBy: '' });
      const [changeRequests, setChangeRequests] = useState([]); 
      const [pendingChanges, setPendingChanges] = useState({}); 
      const [approvalChecks, setApprovalChecks] = useState({}); 
      const [adminChangeCategories, setAdminChangeCategories] = useState({}); 
      const [adminAttendanceStatuses, setAdminAttendanceStatuses] = useState({}); 
      
      const [mailForm, setMailForm] = useState({ isOpen: false, targetMode: 'all', selectedUsers: [], templateId: '', type: '', text: '' });
      const [staffMails, setStaffMails] = useState({}); 
      const [sentMails, setSentMails] = useState([]);
      const [isMailHistoryOpen, setIsMailHistoryOpen] = useState(false);

      const [emailTemplates, setEmailTemplates] = useState([]);
      const [templateForm, setTemplateForm] = useState({ isOpen: false, id: null, name: '', body: '' });
      
      const [fixedShifts, setFixedShifts] = useState({});
      const [fixedShiftForm, setFixedShiftForm] = useState({ isOpen: false, userId: null, userName: '', data: {} });

      const currentYear = displayDate.getFullYear();
      const currentMonth = displayDate.getMonth() + 1;
      const currentMonthStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
      
      const currentMonthShifts = shifts[currentMonthStr] || {};
      const currentMonthStatus = submissionStatus[currentMonthStr] || {};
      const activeMonthShifts = shifts[activeTargetMonth] || {};
      const activeMonthStatus = submissionStatus[activeTargetMonth] || {};
      
      const currentDailyNotes = dailyNotes[currentMonthStr] || {};

      const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
      const daysArray = Array.from({ length: daysInMonth }, (_, i) => i + 1);

      // エラーを防ぐため、データが壊れていても必ず配列として扱う安全な getOrder 関数
      const getOrder = (id) => { 
        const arr = Array.isArray(staffOrder) ? staffOrder : [];
        const idx = arr.indexOf(id); 
        return idx >= 0 ? idx : 999; 
      };
      const staffUsers = useMemo(() => dbUsers.filter(u => u.employeeId !== '9999').sort((a,b) => getOrder(a.id) - getOrder(b.id)), [dbUsers, staffOrder]);
      const adminUsersList = useMemo(() => dbUsers.filter(u => u.role === 'admin' && u.status === 'active' && u.employeeId !== '9999').sort((a,b) => getOrder(a.id) - getOrder(b.id)), [dbUsers, staffOrder]);
      
      const pendingReqs = useMemo(() => changeRequests.filter(req => req.status === 'pending'), [changeRequests]);
      const isActiveMonth = currentMonthStr === activeTargetMonth;
      const isOverdue = new Date() > new Date(`${deadline}T23:59:59+09:00`);
      const safeUserId = currentUser ? currentUser.id : null;

      const myPendingDays = safeUserId ? (pendingChanges[safeUserId] || {}) : {};
      const hasPending = Object.keys(myPendingDays).length > 0;
      const myStatus = safeUserId ? (activeMonthStatus[safeUserId] || '未提出') : '未提出';

      const markMailAsRead = (mail) => {
        const newReadBy = [...(mail.readBy ? (typeof mail.readBy === 'string' ? JSON.parse(mail.readBy) : mail.readBy) : [])];
        if (!newReadBy.includes(safeUserId)) {
          newReadBy.push(safeUserId);
          const updatedMail = { ...mail, readBy: newReadBy };
          setSentMails(prev => prev.map(m => m.id === mail.id ? updatedMail : m));
          setStaffMails(prev => {
            const updatedUserMails = (prev[safeUserId] || []).map(m => m.id === mail.id ? updatedMail : m);
            return { ...prev, [safeUserId]: updatedUserMails };
          });
          fetchGAS('saveRecord', 'mailHistory', 'id', updatedMail).catch(e => console.error("既読保存エラー", e));
        }
      };

      const weeks = useMemo(() => {
        const startDayOfWeek = new Date(currentYear, currentMonth - 1, 1).getDay();
        const emptyCells = Array.from({ length: startDayOfWeek }, () => null);
        const calendarCells = [...emptyCells, ...daysArray];
        const totalCells = Math.ceil(calendarCells.length / 7) * 7;
        const trailingEmptyCells = Array.from({ length: totalCells - calendarCells.length }, () => null);
        const fullCells = [...calendarCells, ...trailingEmptyCells];
        const rows = [];
        for (let i = 0; i < fullCells.length; i += 7) rows.push(fullCells.slice(i, i + 7));
        return rows;
      }, [currentYear, currentMonth, daysArray]);

      useEffect(() => {
        fetchGAS('getInitialData')
          .then((data) => {
            setDbUsers(data.users || []);
            const settings = data.settings || [];
            let currentMon = activeTargetMonth;
            const targetMonthObj = settings.find(s => s.key === 'activeTargetMonth');
            if (targetMonthObj) { currentMon = targetMonthObj.value; setActiveTargetMonth(currentMon); }
            const deadlineObj = settings.find(s => s.key === 'deadline');
            if (deadlineObj) setDeadline(deadlineObj.value);
            const isConfirmedObj = settings.find(s => s.key === 'isConfirmed');
            if (isConfirmedObj) setIsConfirmed(isConfirmedObj.value === 'true');

            const staffOrderObj = settings.find(s => s.key === 'staffOrder');
            if (staffOrderObj) {
              try { 
                const parsed = JSON.parse(staffOrderObj.value);
                setStaffOrder(Array.isArray(parsed) ? parsed : []); 
              } catch(e){
                setStaffOrder([]);
              }
            }

            const shiftsState = {}; const statusState = {};
            (data.shifts || []).forEach(row => {
              if (row.month) {
                if (!shiftsState[row.month]) shiftsState[row.month] = {};
                if (!statusState[row.month]) statusState[row.month] = {};
                shiftsState[row.month][row.userId] = typeof row.shiftData === 'string' ? JSON.parse(row.shiftData) : row.shiftData;
                statusState[row.month][row.userId] = row.status;
              }
            });
            setShifts(shiftsState); setSubmissionStatus(statusState);

            const dailyNotesState = {};
            (data.dailyNotes || []).forEach(row => {
              const dKey = String(row.dateKey || '');
              if (dKey.includes('-')) {
                const parts = dKey.split('-');
                if(parts.length >= 3) {
                  const mStr = `${parts[0]}-${parts[1]}`;
                  const d = parseInt(parts[2], 10);
                  if (!dailyNotesState[mStr]) dailyNotesState[mStr] = {};
                  dailyNotesState[mStr][d] = row.note;
                }
              }
            });
            setDailyNotes(dailyNotesState);

            const personalNotesState = {};
            (data.personalNotes || []).forEach(row => { personalNotesState[row.userId] = row.note; });
            setPersonalNotes(personalNotesState);

            const fixedShiftsState = {};
            (data.fixedShifts || []).forEach(row => { fixedShiftsState[row.userId] = typeof row.data === 'string' ? JSON.parse(row.data) : row.data; });
            setFixedShifts(fixedShiftsState);

            setChangeRequests(data.changeRequests || []);
            
            const initialPending = {};
            (data.changeRequests || []).forEach(req => {
              if (req.status === 'pending' && req.userId) {
                if (!initialPending[req.userId]) initialPending[req.userId] = {};
                const safeChanges = Array.isArray(req.changes) ? req.changes : [];
                if (safeChanges.length > 0) {
                  safeChanges.forEach(c => { if(c.day) initialPending[req.userId][c.day] = true; });
                } else if (req.day) {
                  initialPending[req.userId][req.day] = true;
                }
              }
            });
            setPendingChanges(initialPending);

            setEmailTemplates(data.templates || []);
            setAdminNotifications(data.notifications || []);
            
            const historyReversed = [...(data.mailHistory || [])].reverse();
            setSentMails(historyReversed);
            
            const mailsState = {};
            (data.users || []).forEach(u => {
              const userMails = historyReversed.filter(m => m.targetNames && (m.targetNames.includes(u.name) || m.targetNames.includes(getDisplayName(u.name))));
              if (userMails.length > 0) mailsState[u.id] = userMails;
            });
            setStaffMails(mailsState);
            setIsLoading(false);
          })
          .catch(() => {
            console.log("データの読み込み中...");
            setIsLoading(false);
          });
      }, []); 

      useEffect(() => {
        const intervalId = setInterval(() => {
          if (!document.hidden) {
            fetchGAS('getInitialData')
              .then((data) => {
                setDbUsers(data.users || []);
                
                const settings = data.settings || [];
                const staffOrderObj = settings.find(s => s.key === 'staffOrder');
                if (staffOrderObj) {
                  try { 
                    const parsed = JSON.parse(staffOrderObj.value);
                    setStaffOrder(Array.isArray(parsed) ? parsed : []); 
                  } catch(e){}
                }

                setChangeRequests(data.changeRequests || []);
                setAdminNotifications(data.notifications || []);
                const dailyNotesState = {};
                (data.dailyNotes || []).forEach(row => {
                  const dKey = String(row.dateKey || '');
                  if (dKey.includes('-')) {
                    const parts = dKey.split('-');
                    if(parts.length >= 3) {
                      const mStr = `${parts[0]}-${parts[1]}`;
                      const d = parseInt(parts[2], 10);
                      if (!dailyNotesState[mStr]) dailyNotesState[mStr] = {};
                      dailyNotesState[mStr][d] = row.note;
                    }
                  }
                });
                setDailyNotes(dailyNotesState);
              })
              .catch(() => {});
          }
        }, 300000); // 間隔はお好みで
        return () => clearInterval(intervalId);
      }, []);

      const generateMailText = (text) => {
        if (!text) return '';
        let formattedDeadline = '未設定';
        if (deadline) { const d = new Date(deadline); formattedDeadline = `${d.getMonth() + 1}月${d.getDate()}日`; }
        return text.replace(/{month}/g, currentMonth).replace(/{deadline}/g, formattedDeadline);
      };

      const renderTextWithLink = (text) => {
        if (!text) return null;
        const targetUrl = 'https://cx2-2g3t.github.io/shift-app/';
        const parts = text.split(targetUrl);
        return parts.map((part, index) => (
          <React.Fragment key={index}>
            {part}
            {index < parts.length - 1 && (<a href={targetUrl} target="_blank" rel="noopener noreferrer" className="text-blue-600 font-bold underline hover:text-blue-800" onClick={(e) => e.stopPropagation()}>こちら</a>)}
          </React.Fragment>
        ));
      };

      const getDayOfWeek = (day) => DOW_NAMES[new Date(currentYear, currentMonth - 1, day).getDay()];
      const getDayColor = (day) => DOW_COLORS[new Date(currentYear, currentMonth - 1, day).getDay()] + ' font-bold';
      
      const showToast = (message, type = 'success') => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };

      const formatShiftStr = (shiftObj) => {
        if (!shiftObj || shiftObj.status === '未') return '未入力';
        if (shiftObj.status === '休' && !shiftObj.canWorkIfNeeded) return '休';
        if (shiftObj.status === '有休') return '有休';
        if (shiftObj.status === '勤務') return `勤務 (${shiftObj.start || '--:--'}-${shiftObj.end || '--:--'})`;
        if (shiftObj.status === '休' && shiftObj.canWorkIfNeeded) return `休 (${shiftObj.start || '--:--'}-${shiftObj.end || '--:--'}可)`;
        return shiftObj.status;
      };

      const calculateShiftDetails = (startStr, endStr) => {
        if (!startStr || !endStr) return { hours: 0, hasBreak: false, startVal: 0, endVal: 0 };
        const [h1, m1] = startStr.split(':').map(Number); const [h2, m2] = endStr.split(':').map(Number);
        const startVal = h1 + m1 / 60; const endVal = h2 + m2 / 60; const diff = endVal - startVal;
        if (diff > 6) {
          const midVal = startVal + (diff / 2); let breakStartVal = Math.floor(midVal - 0.5); const breakEndVal = breakStartVal + 1;
          return { hours: diff - 1, hasBreak: true, startVal, endVal, breakStartVal, breakEndVal, breakStartStr: `${Math.floor(breakStartVal)}:00`, breakEndStr: `${Math.floor(breakEndVal)}:00` };
        }
        return { hours: diff, hasBreak: false, startVal, endVal };
      };

      const getHourlyCount = (day, hour) => {
        let confirmed = 0, possible = 0;
        staffUsers.forEach(u => {
          if (u.status === 'retired') return; 
          if (displayFilter === 'admin' && u.role !== 'admin') return;
          if (displayFilter === 'staff' && u.role !== 'staff') return;
          const s = currentMonthShifts[u.id]?.[day]; if (!s) return;
          if (s.status === '勤務' || (s.status === '休' && s.canWorkIfNeeded)) {
            const details = calculateShiftDetails(s.start, s.end); if (details.hours === 0) return;
            let isWorkingThisHour = (details.startVal <= hour && details.endVal > hour);
            if (isWorkingThisHour && details.hasBreak && details.breakStartVal <= hour && details.breakEndVal > hour) isWorkingThisHour = false;
            if (isWorkingThisHour) { if (s.status === '勤務') confirmed++; else possible++; }
          }
        });
        return { confirmed, possible };
      };

      const getDailySummary = (day) => {
        let confirmed = 0; let possible = 0; let totalHours = 0;
        staffUsers.filter(u => u.status === 'active').forEach(u => {
          if (displayFilter === 'admin' && u.role !== 'admin') return;
          if (displayFilter === 'staff' && u.role !== 'staff') return;
          const s = currentMonthShifts[u.id]?.[day];
          if (s) {
            if (s.status === '勤務') { confirmed++; const details = calculateShiftDetails(s.start, s.end); totalHours += details.hours; }
            else if (s.status === '休' && s.canWorkIfNeeded) { possible++; }
          }
        });
        return { confirmed, possible, totalHours };
      };

      // ドラッグ＆ドロップ用の状態と処理
      const [draggedStaffId, setDraggedStaffId] = useState(null);
      const [dragOverStaffId, setDragOverStaffId] = useState(null);

      const onDragStart = (e, id) => {
        setDraggedStaffId(id);
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', id);
      };
      const onDragOver = (e, id) => {
        e.preventDefault(); e.dataTransfer.dropEffect = 'move';
        if (dragOverStaffId !== id) setDragOverStaffId(id);
      };
      const onDragLeave = (e, id) => {
        e.preventDefault();
        if (dragOverStaffId === id) setDragOverStaffId(null);
      };
      const onDrop = (e, targetId) => {
        e.preventDefault(); setDragOverStaffId(null);
        if (!draggedStaffId || draggedStaffId === targetId) return;

        setIsLoading(true);
        let list = [...dbUsers.filter(u => u.employeeId !== '9999')].sort((a,b) => (a.displayOrder || 999) - (b.displayOrder || 999));
        list = list.map((u, i) => ({ ...u, tempOrder: u.displayOrder != null ? u.displayOrder : i * 1000 }));
        
        const draggedIdx = list.findIndex(u => u.id === draggedStaffId);
        const targetIdx = list.findIndex(u => u.id === targetId);
        if(draggedIdx < 0 || targetIdx < 0) { setIsLoading(false); return; }
        
        const draggedItem = list[draggedIdx];
        list.splice(draggedIdx, 1);
        list.splice(targetIdx, 0, draggedItem); // 並び替え実行
        
        const prevItem = list[targetIdx - 1]; const nextItem = list[targetIdx + 1];
        let newOrder;
        if (!prevItem) newOrder = nextItem.tempOrder - 1000;
        else if (!nextItem) newOrder = prevItem.tempOrder + 1000;
        else newOrder = (prevItem.tempOrder + nextItem.tempOrder) / 2; // 間の数値を計算
        
        if (prevItem && newOrder === prevItem.tempOrder) newOrder += 0.1; // 重複回避
        
        const finalUpdatedUser = { ...dbUsers.find(u => u.id === draggedItem.id), displayOrder: newOrder };
        setDbUsers(prev => prev.map(u => u.id === finalUpdatedUser.id ? finalUpdatedUser : u));
        
        fetchGAS('saveRecord', 'users', 'id', finalUpdatedUser)
          .then(() => setIsLoading(false)).catch(() => { alert('通信エラー'); setIsLoading(false); });
        setDraggedStaffId(null);
      };
      const onDragEnd = () => { setDraggedStaffId(null); setDragOverStaffId(null); };

      const changeMonth = (offset) => { setDisplayDate(prev => new Date(prev.getFullYear(), prev.getMonth() + offset, 1)); setSelectedDay(1); setCurrentWeekIndex(0); };

      const handleLoginSubmit = (e) => {
        e.preventDefault(); setLoginError('');
        if (!(employeeIdInput || '').trim()) { setLoginError('社員番号を入力してください。'); return; }
        if (!(passwordInput || '').trim()) { setLoginError('パスワードを入力してください。'); return; }
        setIsLoading(true);
        fetchGAS('verifyLogin', employeeIdInput, passwordInput)
          .then((result) => {
            setIsLoading(false);
            if (result.success) {
              if (result.isInitial) { 
                setTempUser(result.user); 
                setPasswordInput(''); 
                setPasswordConfirm('');
                setLoginStep('change_password'); 
              }
              else { loginSuccess(result.user); }
            } else { setLoginError(result.message); }
          })
          .catch((error) => { 
            setIsLoading(false); 
            setLoginError(`エラー: ${error.message}`); 
          });
      };

      const validatePassword = (pw) => {
        if (pw.length < 8) return { valid: false, msg: 'パスワードは8文字以上で設定してください。' };
        let matchCount = 0;
        if (/[A-Z]/.test(pw)) matchCount++; if (/[a-z]/.test(pw)) matchCount++; 
        if (/[0-9]/.test(pw)) matchCount++; if (/[^A-Za-z0-9]/.test(pw)) matchCount++; 
        if (matchCount < 3) return { valid: false, msg: '英大文字、小文字、数字、記号のうち3種類以上を組み合わせてください。' };
        return { valid: true };
      };

      const handleChangePasswordSubmit = (e) => {
        e.preventDefault(); setLoginError('');
        if (!(passwordInput || '').trim()) { setLoginError('新しいパスワードを入力してください。'); return; }
        if (!(passwordConfirm || '').trim()) { setLoginError('確認用のパスワードを入力してください。'); return; }
        if (!tempUser) { setLoginStep('login'); return; }
        if (passwordInput !== passwordConfirm) { setLoginError('パスワードが一致しません。'); return; }
        if (passwordInput === tempUser.employeeId) { setLoginError('初期パスワードと同じパスワードは設定できません。'); return; }
        const validation = validatePassword(passwordInput);
        if (!validation.valid) { setLoginError(validation.msg); return; }
        
        setIsLoading(true);
        const updatedUser = { ...tempUser, password: passwordInput };
        fetchGAS('saveRecord', 'users', 'id', updatedUser)
          .then(() => { setIsLoading(false); loginSuccess(updatedUser); })
          .catch(() => { setIsLoading(false); setLoginError('システムとの接続に失敗しました。'); });
      };

      const handleResetRequestSubmit = (e) => {
        e.preventDefault(); setLoginError('');
        if (dbUsers.length === 0) { setLoginError('システム準備中です。3秒ほど待ってからもう一度お試しください。'); return; }
        if (!(resetIdInput || '').trim()) { setLoginError('社員番号を入力してください。'); return; }
        if (!(resetEmailInput || '').trim()) { setLoginError('メールアドレスを入力してください。'); return; }

        setIsLoading(true);
        const user = dbUsers.find(u => u.employeeId === resetIdInput);
        if (user && user.email === resetEmailInput) {
          const resetPasswordStr = "'" + user.employeeId;
          const updatedUser = { ...user, password: resetPasswordStr };

          fetchGAS('saveRecord', 'users', 'id', updatedUser)
            .then(() => {
              setIsLoading(false);
              showToast('パスワードを初期化しました。初期パスワードでログインしてください。');
              goBackToLogin();
            })
            .catch(() => {
              setIsLoading(false);
              setLoginError('システムエラーが発生しました。');
            });
        } else { 
          setIsLoading(false);
          setLoginError('入力された情報が登録内容と一致しません。'); 
        }
      };

      const loginSuccess = (user) => {
        setCurrentUser(user); setView(user.role);
        setEmployeeIdInput(''); setPasswordInput(''); setPasswordConfirm('');
        setLoginStep('login'); setTempUser(null); setIsResetMode(false); setShowPassword(false); setShowPasswordConfirm(false);
        if (user.role === 'staff') {
          const [y, m] = activeTargetMonth.split('-');
          setDisplayDate(new Date(parseInt(y), parseInt(m) - 1, 1));
        }
      };

      const goBackToLogin = () => { setLoginStep('login'); setPasswordInput(''); setPasswordConfirm(''); setResetIdInput(''); setResetEmailInput(''); setTempUser(null); setIsResetMode(false); setLoginError(''); setShowPassword(false); setShowPasswordConfirm(false); };
      const handleLogout = () => { setCurrentUser(null); setView('login'); setAdminTab('shift'); setLoginStep('login'); setShowPassword(false); setShowPasswordConfirm(false); };

      const updateLocalShift = (day, field, value) => {
        if (!currentUser) return;
        setShifts(prev => {
          const monthShifts = prev[currentMonthStr] || {};
          const uShifts = monthShifts[currentUser.id] || {};
          const cShift = uShifts[day] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
          return { ...prev, [currentMonthStr]: { ...monthShifts, [currentUser.id]: { ...uShifts, [day]: { ...cShift, [field]: value } } } };
        });
      };

      const updateLocalMonthlyNote = (text) => {
        if (!currentUser) return;
        setShifts(prev => {
          const monthShifts = prev[currentMonthStr] || {};
          const uShifts = monthShifts[currentUser.id] || {};
          return { ...prev, [currentMonthStr]: { ...monthShifts, [currentUser.id]: { ...uShifts, monthlyNote: text } } };
        });
      };

      // ▼▼ シフトの保存処理（内部関数） ▼▼
      const executeSubmitShift = (isSubmit, unenteredDays = [], adjustableDays = []) => {
        setIsLoading(true);
        const statusToSave = isSubmit ? '提出済' : '途中保存';
        
        const currentShifts = activeMonthShifts[currentUser.id] || {};
        let shiftsToSave = { ...currentShifts };
        
        if (unenteredDays.length > 0) {
          unenteredDays.forEach(day => {
            const canWork = adjustableDays.includes(day);
            if (!currentShifts[day] || currentShifts[day].status === '未') {
              shiftsToSave[day] = { status: '休', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: canWork, note: '' };
            }
          });
        }

        const record = { recordId: `${currentUser.id}_${activeTargetMonth}`, userId: currentUser.id, month: activeTargetMonth, status: statusToSave, shiftData: shiftsToSave };

        fetchGAS('saveRecord', 'shifts', 'recordId', record)
          .then(() => {
            // Teamsへ通知（エラー時は裏側でログを出す）
            if (isSubmit) {
              const monthNum = parseInt(activeTargetMonth.split('-')[1], 10);
              
              fetchGAS('sendTeamsNotification', `✅ **シフト提出**\n${getDisplayName(currentUser.name)}さんから${monthNum}月分のシフトが提出されました。`)
                .catch(e => console.error("Teams通知エラー:", e));
            }

            if (unenteredDays.length > 0) {
              setShifts(prev => ({ ...prev, [activeTargetMonth]: { ...(prev[activeTargetMonth] || {}), [currentUser.id]: shiftsToSave } }));
            }
            setSubmissionStatus(prev => ({ ...prev, [activeTargetMonth]: { ...(prev[activeTargetMonth] || {}), [currentUser.id]: statusToSave } }));
            setConfirmModal({ isOpen: true, title: '処理完了', message: isSubmit ? 'シフトの提出が完了しました。' : 'シフトを一時保存しました。', isAlert: true, onConfirm: null });
            setIsLoading(false);
          })
          .catch((err) => { 
            alert('保存エラーが発生しました。\n詳細: ' + err.message); 
            setIsLoading(false); 
          });
      };

      const handleSubmitShift = (isSubmit = false) => {
        if (!currentUser) return;
        const currentShiftsForSubmit = activeMonthShifts[currentUser.id] || {};

        if (isSubmit) {
          const hasMissingTime = daysArray.some(day => { const s = currentShiftsForSubmit[day]; return (s && s.status === '勤務') ? (!s.start || !s.end) : false; });
          if (hasMissingTime) { setConfirmModal({ isOpen: true, title: '時間未入力エラー', message: '「勤務」の日は、出勤時間と退勤時間の両方を選択してください。', isAlert: true, onConfirm: null }); return; }

          const unenteredDays = daysArray.filter(day => !currentShiftsForSubmit[day] || currentShiftsForSubmit[day].status === '未');
          
          // 未入力の日がある場合は確認モーダルを出す
          if (unenteredDays.length > 0) {
            setConfirmModal({ 
              isOpen: true, 
              title: '未入力の確認', 
              message: `未入力の日付が ${unenteredDays.length} 日分あります。\nこれらをすべて「休」として提出してよろしいですか？\n（キャンセルを押すと自分で入力できます）`, 
              isAlert: false, 
              confirmText: '「休」にして提出',
              checkboxLabel: '出勤調整可能日を選択する',
              checkboxValue: false, // 初期値はオフ
              unenteredDays: unenteredDays, // 対象の日付リストを渡す
              adjustableDays: [], // 選択された日付を入れる箱（初期は空）
              onConfirm: (isChecked, selectedDays) => executeSubmitShift(isSubmit, unenteredDays, isChecked ? selectedDays : [])
            });
            return;
          }
        }
        
        // 未入力がない（または途中保存）場合はそのまま保存処理へ
        executeSubmitShift(isSubmit, [], []);
      };

      const handleChangeFormDay = (dayStr) => {
        const day = parseInt(dayStr);
        if (!currentUser) return;
        const currentShift = (currentMonthShifts[currentUser.id] || {})[day] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
        setChangeForm(prev => ({ ...prev, day, status: currentShift.status === '未' ? '勤務' : currentShift.status, start: currentShift.start || DEFAULT_START_TIME, end: currentShift.end || DEFAULT_END_TIME, canWorkIfNeeded: currentShift.canWorkIfNeeded || false, note: currentShift.note || '' }));
      };

      const openChangeForm = () => {
        if (!safeUserId) return;
        const initialDay = 1; const currentShift = (currentMonthShifts[safeUserId] || {})[initialDay] || { status: '未', start: DEFAULT_START_TIME, end: DEFAULT_END_TIME, canWorkIfNeeded: false, note: '' };
        setChangeForm({ isOpen: true, day: initialDay, status: currentShift.status === '未' ? '勤務' : currentShift.status, start: currentShift.start || DEFAULT_START_TIME, end: currentShift.end || DEFAULT_END_TIME, canWorkIfNeeded: currentShift.canWorkIfNeeded || false, note: currentShift.note || '', reason: '', changeCategory: '', confirmedBy: '' });
      };

      const handleManualRefresh = () => {
        setIsLoading(true);
        fetchGAS('getInitialData')
          .then((data) => {
            // スタッフ情報の更新
            setDbUsers(data.users || []);
            
            const settings = data.settings || [];
            const staffOrderObj = settings.find(s => s.key === 'staffOrder');
            if (staffOrderObj) {
              try { 
                const parsed = JSON.parse(staffOrderObj.value);
                setStaffOrder(Array.isArray(parsed) ? parsed : []); 
              } catch(e){ setStaffOrder([]); }
            }
            const deadlineObj = settings.find(s => s.key === 'deadline');
            if (deadlineObj) setDeadline(deadlineObj.value);
            const isConfirmedObj = settings.find(s => s.key === 'isConfirmed');
            if (isConfirmedObj) setIsConfirmed(isConfirmedObj.value === 'true');

            setChangeRequests(data.changeRequests || []);
            setAdminNotifications(data.notifications || []);
            
            const dailyNotesState = {};
            (data.dailyNotes || []).forEach(row => {
              const dKey = String(row.dateKey || '');
              if (dKey.includes('-')) {
                const parts = dKey.split('-');
                if(parts.length >= 3) {
                  const mStr = `${parts[0]}-${parts[1]}`;
                  const d = parseInt(parts[2], 10);
                  if (!dailyNotesState[mStr]) dailyNotesState[mStr] = {};
                  dailyNotesState[mStr][d] = row.note;
                }
              }
            });
            setDailyNotes(dailyNotesState);
            setIsLoading(false);
            if (typeof showToast === 'function') showToast('最新のデータに更新しました', 'success');
          })
          .catch((err) => {
            console.error(err);
            setIsLoading(false);
            alert('データの更新に失敗しました。');
          });
      };

      const submitChangeRequest = () => {
        if (!currentUser) return;
        if (!changeForm.confirmedBy) { showToast('事前確認管理者を選択してください', 'error'); return; }
        if (!changeForm.changeCategory) { showToast('区分を選択してください', 'error'); return; }
        if (!(changeForm.reason || '').trim()) { showToast('変更理由を入力してください', 'error'); return; }

        setIsLoading(true);
        const original = (currentMonthShifts[currentUser.id] || {})[changeForm.day] || { status: '未' };
        const newVal = { status: changeForm.status, start: changeForm.start, end: changeForm.end, canWorkIfNeeded: changeForm.canWorkIfNeeded, note: changeForm.note, changeCategory: changeForm.changeCategory };
        
        const now = new Date();
        const pad = n => String(n).padStart(2, '0');
        const createdAtSafe = `${now.getFullYear()}/${pad(now.getMonth() + 1)}/${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;

        const newReq = { 
          id: `req_${Date.now()}`, userId: currentUser.id, userName: getDisplayName(currentUser.name), 
          targetMonth: currentMonthStr,
          changes: [{ day: changeForm.day, oldVal: original, newVal }], 
          day: changeForm.day, oldVal: original, newVal: newVal, reason: changeForm.reason, status: 'pending', 
          createdAt: createdAtSafe, confirmedBy: changeForm.confirmedBy, processedBy: null
        };

        fetchGAS('saveRecord', 'changeRequests', 'id', newReq)
          .then(() => {
            // ▼▼ 修正：時間の先頭の「0」を取り除く処理を追加 ▼▼
            const mon = parseInt(currentMonthStr.split('-')[1], 10);
            
            // 時間の先頭の「0」を消す関数（09:00 → 9:00、18:00はそのまま）
            const formatTime = (t) => t ? t.replace(/^0/, '') : '';
            
            // シフトの文字列表記を作成
            const getShiftStr = (s) => s.status === '勤務' ? `${s.status} ${formatTime(s.start)}-${formatTime(s.end)}` : (s.status || '未');
            const oldShift = getShiftStr(original);
            const newShift = getShiftStr(newVal);

            // アダプティブカードで確実に改行させるため「\n\n」を使用します
            const notifyText = `🔔 **変更申請**\n\n${getDisplayName(currentUser.name)}さんから ${mon}月${changeForm.day}日 の変更申請が届きました。\n\n${oldShift} → ${newShift}\n\n理由: ${changeForm.reason}`;

            fetchGAS('sendTeamsNotification', notifyText)
              .catch(e => console.error("Teams通知エラー:", e));

            setChangeRequests(prev => [newReq, ...prev]);
            setPendingChanges(prev => ({ ...prev, [currentUser.id]: { ...(prev[currentUser.id] || {}), [changeForm.day]: true } }));
            setChangeForm(prev => ({ ...prev, isOpen: false }));
            setConfirmModal({ isOpen: true, title: '申請完了', message: '申請を送信しました。', isAlert: true, onConfirm: null });
            setIsLoading(false);
          })
          .catch((err) => { 
            alert('申請エラーが発生しました。\n詳細: ' + err.message); 
            setIsLoading(false); 
          });
      };

      const handleApprove = (reqId) => {
        setIsLoading(true);
        const req = changeRequests.find(r => r.id === reqId);
        if (!req) { setIsLoading(false); return; }
        
        const safeNewVal = req.newVal || {};
        const category = adminChangeCategories[reqId] || safeNewVal.changeCategory || '未設定';
        const attStatus = adminAttendanceStatuses[reqId] || '未設定';
        const safeChanges = Array.isArray(req.changes) ? req.changes : [];

        const updatedReq = { 
          ...req, status: 'approved', processedBy: getDisplayName(currentUser.name),
          newVal: { ...safeNewVal, changeCategory: category, attendanceStatus: attStatus }, 
          changes: safeChanges.map(c => ({ ...c, newVal: { ...(c.newVal||{}), changeCategory: category, attendanceStatus: attStatus } })) 
        };

        const targetMon = req.targetMonth || activeTargetMonth; 
        const updatedShiftsForUser = { ...((shifts[targetMon] || {})[req.userId] || {}) };
        
        if (safeChanges.length > 0) {
          updatedReq.changes.forEach(c => { updatedShiftsForUser[c.day] = c.newVal; });
        } else if (req.day && updatedReq.newVal) {
          updatedShiftsForUser[req.day] = updatedReq.newVal;
        }

        const shiftRecord = { recordId: `${req.userId}_${targetMon}`, userId: req.userId, month: targetMon, status: (submissionStatus[targetMon] || {})[req.userId] || '提出済', shiftData: updatedShiftsForUser };

        const dayOnlyStr = safeChanges.length > 0 ? safeChanges.map(c => c.day).join(', ') : req.day;
        const daysStr = dayOnlyStr + '日';
        
        const notifyRecord = { id: `note_${Date.now()}_${req.userId}`, userId: req.userId, type: 'staff_alert', message: `【承認】${parseInt(targetMon.split('-')[1], 10)}月${daysStr}のシフト変更申請が承認され、シフトの窓口に反映されました。`, read: false, createdAt: new Date().toLocaleString('ja-JP') };

        fetchGAS('saveRecord', 'changeRequests', 'id', updatedReq)
          .then(() => fetchGAS('saveRecord', 'shifts', 'recordId', shiftRecord))
          .then(() => fetchGAS('saveRecord', 'notifications', 'id', notifyRecord))
          .then(() => {
            const staffUser = dbUsers.find(u => u.id === req.userId);
            const mon = parseInt(targetMon.split('-')[1], 10);
            if (staffUser && staffUser.email) {
              
              const staffLastName = getDisplayName(staffUser.name).split(/[ \u3000]+/)[0];
              const adminLastName = getDisplayName(currentUser.name).split(/[ \u3000]+/)[0];
              
              // ▼▼ 修正：正しい変数名(emailTemplates)とプロパティ名(name)を使用 ▼▼
              const template = emailTemplates.find(t => t.name && t.name.includes('承認'));
              
              let subjectStr = `【承認】シフト変更申請の結果`;
              let bodyStr = `${staffLastName}さん\n\nお疲れ様です。${adminLastName}です。\n申請いただいた ${mon}月${daysStr} のシフト変更を承認し、シフトの窓口に反映しました。\nよろしくお願いします。`;

              if (template) {
                subjectStr = (template.name || subjectStr)
                  .replace(/{userName}/g, staffLastName)
                  .replace(/{processedBy}/g, adminLastName)
                  .replace(/{month}/g, String(mon))
                  .replace(/{day}/g, String(dayOnlyStr))
                  .replace(/{reason}/g, req.reason || '');
                  
                bodyStr = (template.body || bodyStr)
                  .replace(/{userName}/g, staffLastName)
                  .replace(/{processedBy}/g, adminLastName)
                  .replace(/{month}/g, String(mon))
                  .replace(/{day}/g, String(dayOnlyStr))
                  .replace(/{reason}/g, req.reason || '');
              }

              const subject = encodeURIComponent(subjectStr);
              const body = encodeURIComponent(bodyStr);
              window.location.href = `mailto:${staffUser.email}?subject=${subject}&body=${body}`;
            }

            setAdminNotifications(prev => [notifyRecord, ...prev]);
            setShifts(prev => ({ ...prev, [targetMon]: { ...(prev[targetMon] || {}), [req.userId]: updatedShiftsForUser } }));

            setPendingChanges(prev => { 
              const uPending = { ...(prev[req.userId] || {}) }; 
              if (safeChanges.length > 0) { updatedReq.changes.forEach(c => delete uPending[c.day]); } else if (req.day) { delete uPending[req.day]; }
              return { ...prev, [req.userId]: uPending }; 
            });
            setChangeRequests(prev => prev.map(r => r.id === reqId ? updatedReq : r));
            setApprovalChecks(prev => { const newChecks = { ...prev }; delete newChecks[reqId]; return newChecks; });
            setAdminChangeCategories(prev => { const newC = { ...prev }; delete newC[reqId]; return newC; });
            setAdminAttendanceStatuses(prev => { const newA = { ...prev }; delete newA[reqId]; return newA; });
            setConfirmModal({ isOpen: true, title: '処理完了', message: '承認し、反映しました。', isAlert: true, onConfirm: null });
            setIsLoading(false);
          })
          .catch((err) => { 
            alert('承認エラーが発生しました。\n詳細: ' + err.message); 
            setIsLoading(false); 
          });
      };

      const handleReject = (reqId) => {
        setIsLoading(true);
        const req = changeRequests.find(r => r.id === reqId);
        if (!req) { setIsLoading(false); return; }
        const updatedReq = { ...req, status: 'rejected', processedBy: getDisplayName(currentUser.name) };

        const safeChanges = Array.isArray(req.changes) ? req.changes : [];
        const dayOnlyStr = safeChanges.length > 0 ? safeChanges.map(c => c.day).join(', ') : req.day;
        const daysStr = dayOnlyStr + '日';
        
        const targetMon = req.targetMonth || activeTargetMonth;
        const notifyRecord = { id: `note_${Date.now()}_${req.userId}`, userId: req.userId, type: 'staff_alert', message: `【却下】${parseInt(targetMon.split('-')[1], 10)}月${daysStr}のシフト変更申請は、管理者により却下されました。`, read: false, createdAt: new Date().toLocaleString('ja-JP') };

        fetchGAS('saveRecord', 'changeRequests', 'id', updatedReq)
          .then(() => fetchGAS('saveRecord', 'notifications', 'id', notifyRecord))
          .then(() => {
            const staffUser = dbUsers.find(u => u.id === req.userId);
            const mon = parseInt(targetMon.split('-')[1], 10);
            if (staffUser && staffUser.email) {
              
              const staffLastName = getDisplayName(staffUser.name).split(/[ \u3000]+/)[0];
              const adminLastName = getDisplayName(currentUser.name).split(/[ \u3000]+/)[0];

              // ▼▼ 修正：正しい変数名(emailTemplates)とプロパティ名(name)を使用 ▼▼

            <div className="flex items-center gap-3">
