                              if (s.status === '休') statusColorClass = 'bg-red-50 text-red-700 border-red-200 font-bold';
                              if (s.status === '有休') statusColorClass = 'bg-teal-50 text-teal-700 border-teal-200 font-bold';

                              return (
                                <div key={day} className={`p-2 sm:p-3 border-r last:border-r-0 border-gray-200 min-h-[140px] flex flex-col relative transition-colors ${isPendingDay ? 'bg-orange-50' : 'hover:bg-blue-50/10'} hover:z-[100]`}>
                                  {isPendingDay && <div className="absolute top-1 right-1 bg-orange-500 text-white rounded-md text-[10px] sm:text-xs font-bold px-2 py-0.5 shadow-sm z-10">申請中</div>}
                                  <div className="flex justify-between items-start mb-2"><span className={`text-base font-black ${getDayColor(day)}`}>{day}</span></div>
                                  {dailyNotes[day] && <div className="bg-red-50 text-red-600 border border-red-200 rounded-md text-[11px] sm:text-xs font-bold px-2 py-1.5 shadow-sm w-full text-center whitespace-normal break-words leading-tight mb-2">{dailyNotes[day]}</div>}
                                  <div className="mt-auto flex flex-col gap-1.5">
                                    <select value={s.status} onChange={(e) => updateLocalShift(day, 'status', e.target.value)} disabled={rowDisabled} className={`w-full rounded-md text-sm p-1.5 border outline-none appearance-none text-center shadow-sm cursor-pointer ${statusColorClass} disabled:opacity-50 relative z-10`}>
                                      <option value="未" className="text-gray-600 bg-white">未入力</option><option value="休" className="text-red-600 bg-white">休 み</option><option value="有休" className="text-teal-600 bg-white">有 休</option><option value="勤務" className="text-blue-600 bg-white">勤 務</option>
                                    </select>
                                    {(s.status === '勤務' || (s.status === '休' && s.canWorkIfNeeded)) && (
                                      <div className="flex flex-col gap-1 mt-1 relative z-10">
                                        <select value={s.start} onChange={(e) => updateLocalShift(day, 'start', e.target.value)} disabled={rowDisabled} className="bg-white rounded-md border border-gray-300 text-sm p-1 text-center font-bold shadow-inner appearance-none">{HOUR_OPTIONS.map(t=><option key={t} value={t}>{t || '-'}</option>)}</select>
                                        <select value={s.end} onChange={(e) => updateLocalShift(day, 'end', e.target.value)} disabled={rowDisabled} className="bg-white rounded-md border border-gray-300 text-sm p-1 text-center font-bold shadow-inner appearance-none">{HOUR_OPTIONS.map(t=><option key={t} value={t}>{t || '-'}</option>)}</select>
                                      </div>
                                    )}
                                    {s.status !== '未' && <div className="relative w-full z-10 mt-1"><input type="text" value={s.note || ''} onChange={(e) => updateLocalShift(day, 'note', e.target.value)} disabled={rowDisabled} placeholder="備考" className="bg-white rounded-md border border-gray-300 text-xs p-1.5 text-center shadow-inner w-full focus:ring-1 focus:ring-blue-300 outline-none disabled:bg-transparent" /></div>}
                                    {s.status === '休' && !rowDisabled && (
                                      <div className="flex items-center justify-center gap-1 mt-1 relative z-10">
                                        <input type="checkbox" checked={s.canWorkIfNeeded} onChange={(e) => updateLocalShift(day, 'canWorkIfNeeded', !s.canWorkIfNeeded)} className="w-3.5 h-3.5 accent-orange-500 cursor-pointer" />
                                        <span className="text-xs text-gray-600 font-bold whitespace-nowrap">調整可</span>
                                      </div>
                                    )}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}

                <div className="fixed bottom-0 left-0 right-0 p-4 sm:p-5 bg-white border-t border-gray-200 z-50 pb-safe shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.1)]">
                  {!isConfirmed ? (
                    <div className="flex gap-3 sm:gap-4 justify-center max-w-4xl mx-auto w-full">
                      {myStatus !== '提出済' ? (
                        <><button onClick={() => handleSubmitShift(false)} className="flex-1 py-3.5 px-2 bg-yellow-100 text-yellow-800 rounded-md font-bold text-sm sm:text-base hover:bg-yellow-200 transition-colors">途中保存</button><button onClick={() => handleSubmitShift(true)} className="flex-[2] py-3.5 px-2 bg-blue-600 text-white rounded-md font-bold shadow-md text-base sm:text-lg hover:bg-blue-700 transition-colors">提出する</button></>
                      ) : (
                        <button onClick={() => handleSubmitShift(true)} className="w-full py-3.5 px-4 bg-blue-50 text-blue-700 border border-blue-200 rounded-md font-bold shadow-sm text-base sm:text-lg hover:bg-blue-100 transition-colors">修正して再提出する</button>
                      )}
                    </div>
                  ) : (
                    <div className="max-w-4xl mx-auto w-full animate-fade-in">
                      <button onClick={openChangeForm} className="w-full py-3.5 px-4 bg-red-50 text-red-700 border border-red-200 rounded-md font-bold shadow-sm text-base sm:text-lg transition-colors hover:bg-red-100"><Icon name="edit" className="mr-2" />確定済みのシフト変更を申請する</button>
                    </div>
                  )}
                </div>
              </div>
            );
          })()}

          {/* ==================================================== */}
          {/* 管理者用コンテンツ */}
          {/* ==================================================== */}
          {view === 'admin' && (() => {
            const unreadCount = adminNotifications.filter(n => !n.read).length + pendingReqs.length;

            return (
              <div className="flex-1 p-3 sm:p-5 max-w-[1400px] mx-auto w-full space-y-4 sm:space-y-6 mt-2 sm:mt-4">
                
                {/* 1. シフト表 タブ */}
                {adminTab === 'shift' && (
                  <div className="animate-fade-in">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6">
                      <div className="bg-white rounded-md shadow-sm overflow-hidden border border-indigo-100 flex flex-col max-h-[350px]">
                        <div className="bg-indigo-50 px-5 py-4 border-b border-indigo-100 flex justify-between items-center">
                          <h2 className="text-indigo-800 font-bold flex items-center gap-2 text-base"><Icon name="bell" size={20} className={unreadCount > 0 ? "text-red-500 animate-bounce" : "text-indigo-500"} /> 通知・変更申請 {unreadCount > 0 && <span className="bg-red-500 rounded-full text-white text-sm px-2.5 py-0.5 ml-1">{unreadCount}</span>}</h2>
                        </div>
                        <div className="p-0 overflow-y-auto bg-gray-50 flex-1">
                          {unreadCount === 0 && <div className="p-8 text-base text-gray-400 text-center flex flex-col items-center gap-3"><Icon name="check-circle" size={32}/>新しい通知はありません</div>}
                          
                          <div className="divide-y divide-gray-200">
                            {pendingReqs.map(req => {
                              const checks = approvalChecks[req.id] || { shift: false, kot: false };
                              const category = adminChangeCategories[req.id] || req.newVal.changeCategory;
                              const attStatus = adminAttendanceStatuses[req.id];
                              const canApprove = checks.shift && checks.kot && category && attStatus;

                              return (
                                <div key={req.id} className="p-4 sm:p-5 bg-orange-50/80 relative overflow-hidden border-b border-orange-100">
                                  <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-orange-500"></div>
                                  <div className="flex justify-between items-start mb-3">
                                    <p className="text-base font-black text-orange-900 flex items-center gap-2">
                                      <Icon name="exclamation-circle" size={18} className="text-orange-500"/> 
                                      {req.userName} さんから変更申請
                                    </p>
                                    <span className="text-xs text-gray-500 rounded-md bg-white px-2 py-1 shadow-sm">{req.createdAt.split(' ')[0]}</span>
                                  </div>
                                  <p className="text-sm font-bold text-gray-700 bg-white rounded-md p-3 shadow-sm mb-3 border border-gray-200">理由: {req.reason}</p>
                                  
                                  <div className="space-y-2">
                                    {req.changes.map((c, idx) => (
                                      <div key={idx} className="text-sm bg-white rounded-md p-3 border border-orange-200 flex items-center gap-3 shadow-sm">
                                        <span className="font-bold bg-orange-100 rounded-md px-3 py-1.5 text-orange-800 shrink-0">{c.day}日</span> 
                                        <div className="flex flex-col flex-1">
                                          <span className="text-gray-500 line-through truncate">{formatShiftStr(c.oldVal)}</span>
                                          <div className="flex items-center gap-2 mt-1">
                                            <Icon name="arrow-right" className="text-gray-400 shrink-0" />
                                            <span className="text-orange-700 font-bold truncate text-base">{formatShiftStr(c.newVal)}</span>
                                            {c.newVal.note && <span className="text-gray-500 text-xs ml-2 rounded-md bg-gray-100 px-2 py-0.5 border border-gray-200 truncate">備考: {c.newVal.note}</span>}
                                          </div>
                                        </div>
                                      </div>
                                    ))}
                                  </div>
                                  
                                  <div className="mt-4 bg-white rounded-md p-3.5 border border-gray-300 shadow-sm">
                                    <div className="mb-4">
                                      <label className="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-1.5"><Icon name="tag" className="text-indigo-500"/> 区分を確認・修正 <span className="text-red-500 text-xs">*必須</span></label>
                                      <div className="flex flex-wrap gap-2">
                                        {['自己変更', '依頼変更'].map(type => (
                                          <label key={type} className={`cursor-pointer px-3 py-1.5 rounded-md border text-xs sm:text-sm font-bold transition-all ${category === type ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-gray-50 text-gray-600 border-gray-300 hover:bg-gray-100'}`}>
                                            <input type="radio" name={`changeCategory-${req.id}`} className="hidden" checked={category === type} onChange={() => setAdminChangeCategories(prev => ({...prev, [req.id]: type}))} />
                                            {type}
                                          </label>
                                        ))}
                                      </div>
                                    </div>
                                    <div className="mb-4">
                                      <label className="block text-sm font-bold text-gray-700 mb-2 flex items-center gap-1.5"><Icon name="tag" className="text-indigo-500"/> 勤怠種別を選択 <span className="text-red-500 text-xs">*必須</span></label>
                                      <div className="flex flex-wrap gap-2">
                                        {['遅刻', '早退', '欠勤', '有休', 'その他'].map(type => (
                                          <label key={type} className={`cursor-pointer px-3 py-1.5 rounded-md border text-xs sm:text-sm font-bold transition-all ${attStatus === type ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-gray-50 text-gray-600 border-gray-300 hover:bg-gray-100'}`}>
                                            <input type="radio" name={`attStatus-${req.id}`} className="hidden" checked={attStatus === type} onChange={() => setAdminAttendanceStatuses(prev => ({...prev, [req.id]: type}))} />
                                            {type}
                                          </label>
                                        ))}
                                      </div>
                                    </div>

                                    {/* 承認用チェックボックス */}
                                    <div className="flex gap-4 pt-3 border-t border-gray-100 justify-center">
                                      <label className="flex items-center cursor-pointer gap-2 font-bold text-sm text-gray-700 transition-colors">
                                        <input type="checkbox" checked={checks.shift} onChange={() => toggleApprovalCheck(req.id, 'shift')} className="w-4 h-4 accent-green-600 cursor-pointer" />
                                        シフト表更新 <span className="text-red-500 text-xs">*</span>
                                      </label>
                                      <label className="flex items-center cursor-pointer gap-2 font-bold text-sm text-gray-700 transition-colors">
                                        <input type="checkbox" checked={checks.kot} onChange={() => toggleApprovalCheck(req.id, 'kot')} className="w-4 h-4 accent-green-600 cursor-pointer" />
                                        KOT更新 <span className="text-red-500 text-xs">*</span>
                                      </label>
                                    </div>
                                  </div>

                                  <div className="flex gap-3 mt-3">
                                    <button onClick={() => handleApprove(req.id)} disabled={!canApprove} className={`flex-1 rounded-md text-white text-sm font-bold py-3 shadow flex justify-center items-center gap-2 transition-colors ${canApprove ? 'bg-green-600 hover:bg-green-700 cursor-pointer' : 'bg-gray-300 cursor-not-allowed'}`}>
                                      <Icon name="check" size={18}/> 承認して反映
                                    </button>
                                    <button onClick={() => handleReject(req.id)} className="flex-[0.5] rounded-md bg-white border border-gray-300 text-gray-700 text-sm font-bold py-3 hover:bg-gray-100 shadow-sm flex justify-center items-center gap-2 transition-colors"><Icon name="times" size={18}/> 却下</button>
                                  </div>
                                </div>
                              );
                            })}

                            {adminNotifications.map(note => (
                              <div key={note.id} className={`p-4 flex justify-between items-start gap-4 transition-colors bg-white`}>
                                <div className="flex-1">
                                  <p className={`text-base ${note.read ? 'text-gray-500' : 'text-gray-900 font-bold'} whitespace-pre-wrap leading-relaxed`}>{note.message}</p>
                                </div>
                                {!note.read && <button onClick={() => markNotificationAsRead(note.id)} className="shrink-0 rounded-md text-sm bg-white border border-gray-300 hover:bg-gray-100 text-gray-600 px-4 py-2 font-medium shadow-sm mt-0.5">既読</button>}
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>

                      <div className="bg-white rounded-md shadow-sm p-5 border border-indigo-100 flex flex-col justify-center gap-5">
                        <div className="flex items-center justify-between">
                          <div className="flex items-center gap-3">
                            <Icon name="calendar-alt" size={24} className="text-indigo-600" />
                            <h2 className="text-lg font-bold text-gray-800">{currentMonth}月のシフト設定</h2>
                            {isActiveMonth ? (
                              <span className="ml-2 bg-green-100 text-green-700 rounded-full text-sm px-3 py-1 font-bold border border-green-200">募集中</span>
                            ) : currentMonthStr < activeTargetMonth ? (
                              <span className="ml-2 bg-gray-100 text-gray-500 rounded-full text-sm px-3 py-1 font-bold border border-gray-200">過去</span>
                            ) : (
                              <span className="ml-2 bg-blue-50 text-blue-600 rounded-full text-sm px-3 py-1 font-bold border border-blue-200">未来</span>
                            )}
                          </div>
                          
                          <div className="flex items-center gap-2">
                            <button onClick={() => setIsMailHistoryOpen(true)} className="bg-gray-100 rounded-md hover:bg-gray-200 text-gray-700 font-bold py-2 px-4 text-sm shadow-sm transition-colors flex items-center gap-2">
                              <Icon name="history"/> 送信履歴
                            </button>
                            <button onClick={openMailForm} className="bg-blue-600 rounded-md hover:bg-blue-700 text-white font-bold py-2 px-4 text-sm shadow-sm flex items-center justify-center gap-2 transition-colors">
                              <Icon name="envelope" /> スタッフへメール送信
                            </button>
                          </div>
                        </div>
                        <div className="flex items-center justify-between gap-4 overflow-x-auto no-scrollbar pb-1">
                          <div className="flex items-center gap-3 shrink-0">
                            {!isActiveMonth && <button onClick={setAsActiveMonth} className="flex items-center gap-2 bg-indigo-100 rounded-md text-indigo-700 hover:bg-indigo-200 px-4 py-2.5 text-sm font-bold transition-colors whitespace-nowrap"><Icon name="play-circle" size={18}/> この月を募集にする</button>}
                            <div className="flex items-center gap-3 bg-gray-50 rounded-md px-4 py-2.5 border border-gray-200 whitespace-nowrap">
                              <span className="text-sm font-bold text-gray-700">締切日:</span>
                              <input type="date" value={deadline} onChange={(e) => setDeadline(e.target.value)} className="bg-white rounded-md border border-gray-300 text-sm px-3 py-1.5 text-gray-800 focus:ring-2 focus:ring-indigo-300 outline-none" />
                            </div>
                          </div>
                          
                          <div className="flex items-center gap-2 shrink-0">
                            <button onClick={applyFixedShiftsToMonth} className="bg-emerald-100 rounded-md text-emerald-800 border border-emerald-200 hover:bg-emerald-200 px-4 py-2.5 text-sm font-bold transition-colors flex items-center gap-2 shadow-sm whitespace-nowrap">
                              <Icon name="magic" size={16}/> 固定シフトを未入力日に反映
                            </button>
                            <button onClick={toggleConfirmAll} disabled={!isActiveMonth} className={`px-5 py-2.5 rounded-md font-bold text-sm flex items-center gap-2 shadow-sm transition-all whitespace-nowrap ${isConfirmed ? 'bg-green-100 text-green-800 border border-green-200 hover:bg-red-50 hover:text-red-700 hover:border-red-200' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>
                              <Icon name={isConfirmed ? "unlock" : "check-circle"} size={18}/> {isConfirmed ? '確定解除' : '全体確定する'}
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="bg-white rounded-md shadow-sm p-2.5 sm:p-4 border border-gray-200 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-3 mt-6">
                      <h2 className="text-base sm:text-lg font-bold text-gray-800 flex items-center gap-2">
                        <Icon name="calendar" size={20} className="text-indigo-600 hidden sm:block" />
                        {shiftViewMode === 'month' ? '月間シフト表' : '日別ガントチャート'}
                      </h2>
                      <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 w-full sm:w-auto">
                        <button onClick={handleExportCSV} className="bg-emerald-600 rounded-md hover:bg-emerald-700 text-white font-bold py-2 px-4 text-sm shadow-sm flex items-center justify-center gap-2 transition-colors">
                          <Icon name="file-excel" /> Excel出力 (CSV)
                        </button>
                        <div className="flex bg-gray-100 rounded-md p-1.5 border border-gray-200 w-full sm:w-auto">
                          <button onClick={() => setShiftViewMode('month')} className={`flex-1 sm:flex-none rounded-md flex justify-center items-center gap-2 px-4 py-2 text-sm sm:text-base font-bold transition-colors ${shiftViewMode === 'month' ? 'bg-white text-indigo-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}><Icon name="th" /> 月間</button>

                              <tr><td colSpan={daysArray.length * 2 + 1} className="px-4 py-10 text-center text-gray-500 text-base">スタッフが登録されていません</td></tr>

                              staffUsers.filter(u => u.status === 'active').map(user => {
                                const hasPending = pendingChanges[user.id] && Object.keys(pendingChanges[user.id]).length > 0;
                                let statusText = submissionStatus[user.id] || '未提出';
                                let statusColor = 'bg-gray-100 text-gray-600';
                                
                                if (statusText === '提出済') statusColor = 'bg-green-100 text-green-700';

                                if (isConfirmed && hasPending) {

                                return (
                                  <tr key={user.id} className="hover:bg-blue-50/30 transition-colors h-[56px] relative hover:z-30">
                                    <td className="px-3 py-3 font-medium sticky left-0 bg-white border-r-2 border-gray-300 z-20 shadow-[1px_0_0_rgba(0,0,0,0.1)]">

                                          <Icon name="comment-dots" size={14} />
                                        </button>
                                      </div>
                                      <span className={`text-[10px] rounded-md font-bold px-2 py-0.5 ${statusColor}`}>{statusText}</span>
                                    </td>
                                    {daysArray.map(day => {
                                      const s = shifts[user.id]?.[day] || { status: '未' };
                                      const isPendingCell = pendingChanges[user.id]?.[day];
                                      const cellBg = isPendingCell ? 'bg-orange-50 relative' : '';

                                      if (s.status === '休' && !s.canWorkIfNeeded) return <td key={day} colSpan={2} className={`px-2 py-2 text-center border-r-2 border-gray-300 align-middle ${isPendingCell ? 'bg-orange-100 relative' : 'bg-red-50/20'}`}>{isPendingCell && <div className="absolute inset-0 border-2 border-orange-400 pointer-events-none"></div>}<span className="text-red-500 font-bold text-lg relative z-10">休</span></td>;

                                      if (s.status === '未') return <td key={day} colSpan={2} className={`px-2 py-2 text-center border-r-2 border-gray-300 align-middle ${cellBg}`}>{isPendingCell && <div className="absolute inset-0 border-2 border-orange-400 pointer-events-none"></div>}<span className="text-gray-300 relative z-10 text-lg">-</span></td>;

                                              {confirmed}

                                            </>
                                          ) : '-'}
                                        </span>
                                      </td>
                                    );
                                  })}

                                <tr className="bg-indigo-100/50 border-t border-indigo-200">

                                    );
                                  })}
                                </tr>
                              </>
                            )}
                          </tbody>
                        </table>
                      </div>

                        {dailyNotes[selectedDay] && (
                          <div className="bg-red-50 text-red-600 border-b border-red-200 text-sm sm:text-base font-bold px-4 py-2.5 text-center whitespace-normal break-words leading-tight shadow-inner">

                                staffUsers.filter(u => u.status === 'active').map(user => {
                                  const s = shifts[user.id]?.[selectedDay] || { status: '未' };
                                  const isWorking = s.status === '勤務' || (s.status === '休' && s.canWorkIfNeeded);

                                    <div key={user.id} className="flex hover:bg-blue-50/30 transition-colors items-center group min-h-[4rem] py-2 relative hover:z-30">

                                              <Icon name="comment-dots" size={14} />
                                            </button>

                                        <div className="flex items-center gap-2 mt-0.5">

                                            <span className="text-sm text-gray-400">シフトなし</span>
                                          )}
                                          
                                          {s.note && (
                                            <div className="tooltip-container cursor-help" tabIndex="0">
                                              <Icon name="comment-dots" className="text-blue-500 text-base" />
                                              <span className="tooltip-text">{s.note}</span>
                                            </div>
                                          )}
                                        </div>
                                      </div>
                                      
                                      <div className="flex-1 relative h-full min-h-[4rem] bg-white flex items-center">

                                          const colorClass = isPossible ? 'bg-gradient-to-r from-orange-400 to-red-400 border border-orange-500' : 'bg-gradient-to-r from-blue-500 to-indigo-500';

                                            const breakStartPct = (details.breakStartVal - START_HOUR) / TOTAL_HOURS * 100;
                                            const breakEndPct = (details.breakEndVal - START_HOUR) / TOTAL_HOURS * 100;
                                            return (
                                              <>
                                                <div className={`absolute h-8 rounded-l-md shadow-sm flex items-center px-3 text-sm font-bold text-white overflow-hidden ${colorClass}`} style={{ top: '50%', transform: 'translateY(-50%)', left: `${startPct}%`, width: `${breakStartPct - startPct}%` }}><span className="truncate drop-shadow-md">{s.start}</span></div>
                                                <div className="absolute h-8 flex flex-col items-center justify-center bg-stripes-gray opacity-50 border-x border-dashed border-gray-300" style={{ top: '50%', transform: 'translateY(-50%)', left: `${breakStartPct}%`, width: `${breakEndPct - breakStartPct}%` }}><Icon name="coffee" size={14} className="text-gray-500" /><span className="text-[10px] font-bold text-gray-500 mt-1">{details.breakStartStr}-{details.breakEndStr}</span></div>
                                                <div className={`absolute h-8 rounded-r-md shadow-sm flex items-center justify-end px-3 text-sm font-bold text-white overflow-hidden ${colorClass}`} style={{ top: '50%', transform: 'translateY(-50%)', left: `${breakEndPct}%`, width: `${endPct - breakEndPct}%` }}><span className="truncate drop-shadow-md">{s.end} {isPossible && '(調整可)'}</span></div>
                                              </>
                                            );
                                          } else {
                                            return (
                                              <div className={`absolute h-8 rounded-md shadow-sm flex items-center px-3 text-sm font-bold text-white overflow-hidden ${colorClass}`} style={{ top: '50%', transform: 'translateY(-50%)', left: `${startPct}%`, width: `${endPct - startPct}%` }}><span className="truncate drop-shadow-md">{s.start} - {s.end} {isPossible && '(調整可)'}</span></div>
                                            );
                                          }
                                        })()}
                                      </div>
                                    </div>
                                  )
                                })
                              )}

                                     </div>
                                   )
                                })}
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* 2. 変更履歴 タブ */}
                {adminTab === 'history' && (
                  <div className="bg-white rounded-md shadow-sm border border-gray-200 overflow-hidden animate-fade-in">

                        <h2 className="font-bold text-indigo-900 flex items-center gap-2 text-lg"><Icon name="history"/> シフト変更履歴</h2>

                    </div>
                    
                    <div className="overflow-x-auto no-scrollbar">

                            <th className="px-5 py-4 whitespace-nowrap font-bold">申請日時</th>

                            <th className="px-5 py-4 whitespace-nowrap font-bold text-center">対象日</th>
                            <th className="px-5 py-4 whitespace-nowrap font-bold text-center">区分</th>
                            <th className="px-5 py-4 whitespace-nowrap font-bold text-center">勤怠種別</th>
                            <th className="px-5 py-4 min-w-[140px] font-bold text-center">変更前</th>
                            <th className="px-5 py-4 min-w-[160px] font-bold text-center">変更後</th>
                            <th className="px-5 py-4 min-w-[200px] font-bold">理由</th>
                            <th className="px-5 py-4 text-center whitespace-nowrap font-bold">結果</th>
                          </tr>

                        <tbody className="divide-y divide-gray-100">
                          {changeRequests.length === 0 ? (
                            <tr><td colSpan="9" className="p-10 text-center text-gray-500 font-bold">履歴はありません</td></tr>
                          ) : (
                            changeRequests.map(req => (
                              <tr key={req.id} className="hover:bg-gray-50 transition-colors">
                                <td className="px-5 py-4 text-sm text-gray-500 whitespace-nowrap">{req.createdAt}</td>
                                <td className="px-5 py-4 font-bold text-gray-800 whitespace-nowrap"><Icon name="user" className="mr-2 text-gray-400"/>{req.userName}</td>
                                <td className="px-5 py-4 font-bold text-indigo-600 whitespace-nowrap text-lg text-center">{req.day}日</td>
                                
                                <td className="px-5 py-4 text-center">
                                  <span className="bg-gray-100 rounded-md border border-gray-300 text-gray-700 px-3 py-1 text-sm font-bold whitespace-nowrap">{req.newVal?.changeCategory || '-'}</span>
                                </td>

                                <td className="px-5 py-4 text-center">
                                  <span className="bg-indigo-50 rounded-md border border-indigo-200 text-indigo-700 px-3 py-1 text-sm font-bold whitespace-nowrap">{req.newVal?.attendanceStatus || '-'}</span>
                                </td>

                                <td className="px-5 py-4 align-top">
                                  <span className="text-gray-400 line-through rounded-md bg-gray-50 border border-gray-200 px-3 py-1.5 text-sm block w-fit mx-auto whitespace-nowrap">{formatShiftStr(req.oldVal)}</span>
                                </td>

                                <td className="px-5 py-4 align-top">
                                  <div className="flex flex-col items-center gap-1.5">
                                    <span className={`font-bold px-3 py-1.5 rounded-md text-sm w-fit whitespace-nowrap ${req.status === 'approved' ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-orange-50 text-orange-700 border border-orange-200'}`}>{formatShiftStr(req.newVal)}</span>
                                    {req.newVal.note && <span className="text-[11px] rounded-md text-gray-500 bg-gray-100 p-1.5 border border-gray-200 w-full text-center">備考: {req.newVal.note}</span>}
                                  </div>
                                </td>

                                <td className="px-5 py-4 text-sm text-gray-600" title={req.reason}>{req.reason}</td>
                                <td className="px-5 py-4 text-center align-middle">
                                  {req.status === 'pending' && <span className="bg-orange-100 rounded-full text-orange-700 text-xs font-bold px-3 py-1.5 border border-orange-200 shadow-sm">承認待ち</span>}
                                  {req.status === 'approved' && <span className="bg-green-100 rounded-full text-green-700 text-xs font-bold px-3 py-1.5 border border-green-200 shadow-sm">承認済</span>}
                                  {req.status === 'rejected' && <span className="bg-gray-100 rounded-full text-gray-500 text-xs font-bold px-3 py-1.5 border border-gray-300 shadow-sm">却下</span>}
                                </td>
                              </tr>
                            ))
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {/* 3. スタッフ管理タブ */}
                {adminTab === 'staff' && (
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fade-in">
                    <div className="bg-white rounded-md shadow-sm border border-gray-200 p-6 h-fit">
                      <div className="flex items-center gap-2 mb-5 border-b pb-3">
                        <Icon name="user-plus" className="text-indigo-600" />
                        <h2 className="text-xl font-bold text-gray-800">新規スタッフ追加</h2>
                      </div>
                      <form onSubmit={handleAddStaff} className="space-y-4">
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">社員番号 (ログインID)</label>
                          <input type="text" inputMode="numeric" pattern="[0-9]*" required value={newStaff.employeeId || ''} onChange={e => setNewStaff({...newStaff, employeeId: e.target.value})} className="w-full rounded-md bg-gray-50 border border-gray-300 p-3 text-base focus:ring-indigo-500 focus:border-indigo-500" placeholder="社員番号を入力" onInvalid={(e) => e.target.setCustomValidity('社員番号を入力してください')} onInput={(e) => e.target.setCustomValidity('')} />
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">氏名</label>
                          <input type="text" required value={newStaff.name || ''} onChange={e => setNewStaff({...newStaff, name: e.target.value})} className="w-full rounded-md bg-gray-50 border border-gray-300 p-3 text-base focus:ring-indigo-500 focus:border-indigo-500" placeholder="氏名を入力" onInvalid={(e) => e.target.setCustomValidity('氏名を入力してください')} onInput={(e) => e.target.setCustomValidity('')} />
                        </div>
                        <div>
                          <label className="block text-sm font-bold text-gray-700 mb-1.5">メールアドレス</label>
                          <input type="email" required value={newStaff.email || ''} onChange={e => setNewStaff({...newStaff, email: e.target.value})} className="w-full rounded-md bg-gray-50 border border-gray-300 p-3 text-base focus:ring-indigo-500 focus:border-indigo-500" placeholder="メールアドレスを入力" onInvalid={(e) => e.target.setCustomValidity('正しい形式でメールアドレスを入力してください')} onInput={(e) => e.target.setCustomValidity('')} />
                        </div>
                        <button type="submit" className="w-full rounded-md bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 text-lg transition-colors shadow-sm mt-2">追加する</button>
                      </form>
                    </div>
                    
                    <div className="lg:col-span-2 bg-white rounded-md shadow-sm border border-gray-200 p-6">
                      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-5 border-b pb-3">
                        <div className="flex items-center gap-3">
                          <Icon name="users" className="text-indigo-600" />
                          <h2 className="text-xl font-bold text-gray-800">スタッフ一覧</h2>
                          {/* 退職者表示トグル */}
                          <label className="flex items-center cursor-pointer gap-2 ml-4 bg-gray-50 p-2 rounded-md border border-gray-200">
                            <input type="checkbox" className="sr-only peer" checked={showRetired} onChange={() => setShowRetired(!showRetired)} />
                            <div className="relative w-9 h-5 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-gray-600 after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all"></div>
                            <span className="text-xs font-bold text-gray-600">退職者も表示</span>
                          </label>
                        </div>
                        
                        <div className="flex items-center gap-2">
                          <button onClick={() => setIsMailHistoryOpen(true)} className="bg-gray-100 rounded-md hover:bg-gray-200 text-gray-700 px-4 py-2.5 font-bold text-sm shadow-sm transition-colors flex items-center gap-2"><Icon name="history"/> 送信履歴</button>
                          <button onClick={openMailForm} className="bg-blue-600 rounded-md hover:bg-blue-700 text-white px-4 py-2.5 font-bold text-sm shadow-sm transition-colors flex items-center gap-2"><Icon name="envelope"/> メール送信</button>
                        </div>
                      </div>
                      
                      <div className="overflow-x-auto no-scrollbar">
                        <table className="w-full text-base text-left min-w-[500px]">
                          <thead className="bg-gray-50 text-gray-600 border-y border-gray-200">
                            <tr>
                              <th className="px-5 py-4 font-bold">社員番号</th>
                              <th className="px-5 py-4 font-bold">氏名</th>
                              <th className="px-5 py-4 font-bold text-center">提出状況</th>
                              <th className="px-5 py-4 font-bold text-center">管理</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-100">
                            {staffUsers.length === 0 ? (
                              <tr><td colSpan="4" className="px-5 py-10 text-center text-gray-500">スタッフが登録されていません</td></tr>
                            ) : (
                              staffUsers.filter(u => showRetired || u.status === 'active').map(user => {
                                const isRetired = user.status === 'retired';
                                let stText = submissionStatus[user.id] || '未提出';
                                let stColor = 'bg-gray-100 text-gray-600';
                                
                                if (stText === '提出済') stColor = 'bg-green-100 text-green-700';
                                else if (stText === '途中保存') stColor = 'bg-yellow-100 text-yellow-700';
                                
                                if (isConfirmed && pendingChanges[user.id] && Object.keys(pendingChanges[user.id]).length > 0) {
                                  stColor = 'bg-orange-100 text-orange-700 border border-orange-200';
                                  stText = '承認待ち';
                                }

                                return (
                                  <tr key={user.id} className={`hover:bg-gray-50 ${isRetired ? 'opacity-50' : ''}`}>
                                    <td className="px-5 py-4 font-mono text-gray-600 font-bold">{user.employeeId}</td>
                                    <td className="px-5 py-4 font-bold text-gray-800">
                                      <div className="flex items-center">
                                        {getDisplayName(user.name)}
                                        {isRetired && <span className="ml-3 text-[10px] bg-gray-200 text-gray-600 border border-gray-300 px-2 py-0.5 rounded-full font-black tracking-widest">退職済</span>}
                                      </div>
                                    </td>
                                    <td className="px-5 py-4 text-center">
                                      {!isRetired ? <span className={`px-3 py-1.5 rounded-md text-xs font-bold ${stColor}`}>{stText}</span> : '-'}
                                    </td>
                                    <td className="px-5 py-4">
                                      <div className="flex justify-center items-center gap-2">
                                        {/* 💡 各ボタンにツールチップを追加 */}
                                        {!isRetired && (
                                          <div className="tooltip-container">
                                            <button 
                                              onClick={() => setModal({isOpen: true, type: 'personal', targetId: user.id, text: personalNotes[user.id]||''})} 
                                              className={`w-10 h-10 flex items-center justify-center rounded-md shadow-sm transition-colors border ${personalNotes[user.id] ? 'bg-indigo-50 text-indigo-700 hover:bg-indigo-100 border-indigo-200' : 'bg-gray-50 text-gray-500 hover:bg-gray-100 border-gray-200'}`} 
                                            >
                                              <Icon name="comment-dots" size={18} />
                                            </button>
                                            <span className="tooltip-text">個人宛メッセージを設定</span>
                                          </div>
                                        )}
                                        {!isRetired && (
                                          <div className="tooltip-container">
                                            <button onClick={() => openFixedShiftForm(user)} className="w-10 h-10 flex items-center justify-center bg-emerald-50 rounded-md text-emerald-600 hover:bg-emerald-100 border border-emerald-200 shadow-sm transition-colors">
                                              <Icon name="calendar-day" size={18} />
                                            </button>
                                            <span className="tooltip-text">曜日固定シフトを設定</span>
                                          </div>
                                        )}
                                        <div className="tooltip-container">
                                          <button onClick={() => toggleStaffStatus(user.id, user.name, user.status)} className={`w-10 h-10 flex items-center justify-center rounded-md shadow-sm transition-colors border ${isRetired ? 'bg-indigo-50 text-indigo-600 hover:bg-indigo-100 border-indigo-200' : 'bg-orange-50 text-orange-600 hover:bg-orange-100 border-orange-200'}`}>
                                            <Icon name={isRetired ? 'user-check' : 'door-open'} size={18} />
                                          </button>
                                          <span className="tooltip-text">{isRetired ? '復職させる' : '退職扱いにする(ログイン不可)'}</span>
                                        </div>
                                        <div className="tooltip-container">
                                          <button onClick={() => handleDeleteStaff(user.id, user.name)} className="w-10 h-10 flex items-center justify-center text-red-500 rounded-md hover:bg-red-50 transition-colors border border-transparent hover:border-red-200">
                                            <Icon name="trash" size={18} />
                                          </button>
                                          <span className="tooltip-text">完全に削除する</span>
                                        </div>
                                      </div>
                                    </td>
                                  </tr>
                                );
                              })
                            )}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                )}

                {/* 💡 4. 設定・テンプレ タブ */}
                {adminTab === 'settings' && (
                  <div className="max-w-5xl mx-auto space-y-6 animate-fade-in">
                    <div className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
                      <div className="bg-indigo-50 px-5 py-4 border-b border-indigo-100 flex justify-between items-center">
                        <div>
                          <h2 className="text-indigo-900 font-bold flex items-center gap-2 text-lg"><Icon name="envelope" /> メールテンプレート設定</h2>
                          <p className="text-sm text-indigo-700 mt-1">「スタッフへメール送信」で使用する件名や本文を自由に登録できます。</p>
                        </div>
                        <button onClick={() => openTemplateForm(null)} className="bg-indigo-600 rounded-md hover:bg-indigo-700 text-white px-4 py-2 font-bold shadow-sm transition-colors flex items-center gap-2">
                          <Icon name="plus" /> 新規追加
                        </button>
                      </div>
                      
                      <div className="p-5 bg-gray-50">
                        <div className="mb-4 bg-white rounded-md border border-gray-300 p-3 text-sm text-gray-600 flex items-start gap-2 shadow-sm">
                          <Icon name="info-circle" className="text-blue-500 mt-0.5" />
                          <p>件名や本文の中に <code className="bg-gray-100 px-1.5 py-0.5 rounded-md text-red-600 font-bold">{`{month}`}</code> と入力すると現在の月（例: {currentMonth}）に、<code className="bg-gray-100 px-1.5 py-0.5 rounded-md text-red-600 font-bold">{`{deadline}`}</code> と入力すると締切日（例: {generateMailText('{deadline}')}）に自動で置き換わります。</p>
                        </div>
                        
                        <div className="grid gap-4 md:grid-cols-2">
                          {emailTemplates.map(tpl => (
                            <div key={tpl.id} className="bg-white rounded-md border border-gray-200 p-4 shadow-sm flex flex-col h-full relative group">
                              <div className="flex justify-between items-start mb-3 border-b border-gray-100 pb-2">
                                <h3 className="font-bold text-lg text-gray-800 pr-16 leading-tight">{generateMailText(tpl.name)}</h3>
                                <div className="absolute top-3 right-3 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                  <button onClick={() => openTemplateForm(tpl)} className="bg-gray-100 rounded-md hover:bg-gray-200 text-gray-600 p-2 transition-colors" title="編集"><Icon name="pen" /></button>
                                  <button onClick={() => deleteTemplate(tpl.id)} className="bg-red-50 rounded-md hover:bg-red-100 text-red-600 p-2 transition-colors" title="削除"><Icon name="trash" /></button>
                                </div>
                              </div>
                              <pre className="text-sm text-gray-600 whitespace-pre-wrap font-sans leading-relaxed flex-1 overflow-hidden">{generateMailText(tpl.body)}</pre>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          })()}

          {/* 💡 テンプレート編集モーダル */}
          {templateForm.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-lg shadow-2xl w-full max-w-lg overflow-hidden flex flex-col">
                <div className="bg-indigo-600 px-5 py-4 text-white font-bold text-lg flex items-center gap-3">
                  <Icon name="pen" size={20} />
                  {templateForm.id.startsWith('t') && emailTemplates.find(t=>t.id === templateForm.id) ? 'テンプレートの編集' : 'テンプレートの新規追加'}
                </div>
                <div className="p-5 space-y-4">
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-1.5">件名（テンプレートの種類）</label>
                    <input type="text" value={templateForm.name} onChange={e => setTemplateForm({...templateForm, name: e.target.value})} className="w-full rounded-md border border-gray-300 p-3 text-base focus:ring-2 focus:ring-indigo-300 outline-none" placeholder="例: {month}月シフト提出のお願い" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-1.5 flex justify-between">本文 <span className="text-xs text-gray-500 font-normal">※ {`{month}`}, {`{deadline}`} で自動挿入</span></label>
                    <textarea value={templateForm.body} onChange={e => setTemplateForm({...templateForm, body: e.target.value})} className="w-full rounded-md border border-gray-300 p-3 text-sm sm:text-base focus:ring-2 focus:ring-indigo-300 outline-none h-48 resize-none shadow-inner" placeholder="お疲れ様です。&#13;&#10;{month}月のシフトを..." />
                  </div>
                </div>
                <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t">
                  <button onClick={() => setTemplateForm({ isOpen: false, id: null, name: '', body: '' })} className="px-5 py-2.5 rounded-md text-sm sm:text-base font-bold text-gray-600 hover:bg-gray-200 transition-colors">キャンセル</button>
                  <button onClick={saveTemplate} className="px-6 py-2.5 rounded-md text-sm sm:text-base font-bold bg-indigo-600 text-white hover:bg-indigo-700 shadow-sm transition-colors">保存する</button>
                </div>
              </div>
            </div>
          )}

          {/* 💡 曜日固定シフト設定モーダル */}
          {fixedShiftForm.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-lg shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col max-h-[90vh]">
                <div className="bg-emerald-600 px-5 py-4 text-white font-bold text-lg flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <Icon name="calendar-day" size={20} />
                    曜日固定シフトの設定 - {fixedShiftForm.userName}
                  </div>
                  <button onClick={() => setFixedShiftForm({...fixedShiftForm, isOpen: false})} className="text-emerald-100 hover:text-white"><Icon name="times" size={20}/></button>
                </div>
                <div className="p-0 overflow-y-auto bg-gray-50 flex-1">
                  <div className="p-2 sm:p-3 bg-emerald-50 border-b border-emerald-100 text-xs sm:text-sm text-emerald-800 font-medium">
                    毎週固定で入るシフトパターンを設定します。<br className="hidden sm:block"/>管理画面の「固定シフトを反映」ボタンを押すと、カレンダーの未入力の日に自動でこの設定が埋め込まれます。
                  </div>
                  <div className="divide-y divide-gray-200">
                    {[0, 1, 2, 3, 4, 5, 6].map(dow => {
                      const shiftData = fixedShiftForm.data[dow];
                      const isWorking = shiftData.status === '勤務';
                      const isRest = shiftData.status === '休';
                      
                      return (
                        <div key={dow} className={`flex flex-col sm:flex-row items-center gap-1.5 sm:gap-3 p-1.5 sm:px-4 sm:py-2 transition-colors ${isWorking ? 'bg-blue-50/20' : ''} ${isRest && shiftData.canWorkIfNeeded ? 'bg-orange-50/20' : 'bg-white hover:bg-gray-50'}`}>
                          <div className="flex items-center gap-2 w-full sm:w-16 shrink-0 justify-center sm:justify-start">
                            <span className={`text-base sm:text-lg font-black ${DOW_COLORS[dow]}`}>{DOW_NAMES[dow]}曜</span>
                          </div>
                          
                          <div className="grid grid-cols-3 gap-1.5 sm:flex sm:gap-2 justify-center w-full sm:w-auto">
                            <button onClick={() => updateFixedShiftForm(dow, 'status', '未')} className={`w-full sm:w-[4.5rem] py-1 sm:py-1.5 rounded-md text-xs sm:text-sm font-bold whitespace-nowrap transition-colors border ${shiftData.status === '未' ? 'bg-gray-600 text-white border-gray-600 shadow-sm' : 'bg-white text-gray-500 border-gray-300 hover:bg-gray-50'}`}>未</button>
                            <button onClick={() => updateFixedShiftForm(dow, 'status', '休')} className={`w-full sm:w-[4.5rem] py-1 sm:py-1.5 rounded-md text-xs sm:text-sm font-bold whitespace-nowrap transition-all border ${shiftData.status === '休' ? 'bg-red-500 text-white border-red-500 shadow-md' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'}`}>休</button>
                            <button onClick={() => updateFixedShiftForm(dow, 'status', '勤務')} className={`w-full sm:w-[4.5rem] py-1 sm:py-1.5 rounded-md text-xs sm:text-sm font-bold whitespace-nowrap transition-all border ${isWorking ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white border border-gray-300 text-blue-700 hover:bg-gray-50'}`}>勤務</button>
                          </div>

                          {(isWorking || (isRest && shiftData.canWorkIfNeeded)) && (
                            <div className="flex items-center justify-center sm:justify-end gap-1.5 w-full sm:w-auto ml-auto">
                              <select value={shiftData.start} onChange={(e) => updateFixedShiftForm(dow, 'start', e.target.value)} className={`bg-white rounded-md border text-xs sm:text-sm block px-1 py-1 w-[4.5rem] sm:w-[5.5rem] text-center appearance-none ${isRest ? 'border-orange-300 text-orange-800' : 'border-blue-200 text-blue-900'}`} style={{ textAlignLast: 'center' }}>{HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}</select>
                              <span className="text-gray-400 font-bold">~</span>
                              <select value={shiftData.end} onChange={(e) => updateFixedShiftForm(dow, 'end', e.target.value)} className={`bg-white rounded-md border text-xs sm:text-sm block px-1 py-1 w-[4.5rem] sm:w-[5.5rem] text-center appearance-none ${isRest ? 'border-orange-300 text-orange-800' : 'border-blue-200 text-blue-900'}`} style={{ textAlignLast: 'center' }}>{HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}</select>
                            </div>
                          )}

                          {isRest && (
                            <label className="flex items-center cursor-pointer gap-2 bg-gray-50 px-2 py-1 sm:py-1.5 rounded-md border border-gray-200 w-full sm:w-auto justify-end sm:ml-auto">
                              <input type="checkbox" className="sr-only peer" checked={shiftData.canWorkIfNeeded} onChange={() => updateFixedShiftForm(dow, 'canWorkIfNeeded', !shiftData.canWorkIfNeeded)} />
                              <div className="relative w-8 h-4 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-orange-500"></div>
                              <span className="text-[10px] sm:text-xs font-bold text-gray-600 whitespace-nowrap">出勤調整可能</span>
                            </label>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div className="bg-white px-5 py-4 flex justify-end gap-3 border-t shrink-0 shadow-[0_-5px_15px_-3px_rgba(0,0,0,0.05)]">
                  <button onClick={() => setFixedShiftForm({...fixedShiftForm, isOpen: false})} className="px-5 py-2.5 rounded-md text-sm sm:text-base font-bold text-gray-600 hover:bg-gray-100 transition-colors">キャンセル</button>
                  <button onClick={saveFixedShift} className="px-6 py-2.5 rounded-md text-sm sm:text-base font-bold bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm transition-colors">設定を保存する</button>
                </div>
              </div>
            </div>
          )}

          {/* メール送信履歴 モーダル */}
          {isMailHistoryOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-lg shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                <div className="bg-gray-800 px-5 py-4 text-white font-bold text-lg flex items-center justify-between">
                  <div className="flex items-center gap-2"><Icon name="history" /> 送信済みメール履歴</div>
                  <button onClick={() => setIsMailHistoryOpen(false)} className="text-gray-300 hover:text-white"><Icon name="times" size={20}/></button>
                </div>
                <div className="p-5 overflow-y-auto space-y-4 bg-gray-50 flex-1">
                  {sentMails.length === 0 ? (
                    <div className="text-center py-10 text-gray-500 font-bold">送信履歴はありません</div>
                  ) : (
                    sentMails.map(mail => (
                      <div key={mail.id} className="bg-white rounded-md border border-gray-200 p-4 shadow-sm">
                        <div className="flex justify-between items-start mb-3 border-b border-gray-100 pb-2">
                          <span className="font-bold text-blue-800 text-lg">{mail.type}</span>
                          <span className="text-xs text-gray-500">{mail.date}</span>
                        </div>
                        <div className="mb-3 text-sm">
                          <span className="font-bold text-gray-600 mr-2">宛先:</span>
                          <span className="text-gray-800 leading-relaxed">{mail.targetNames}</span>
                        </div>
                        <div className="bg-gray-50 rounded-md p-3 text-sm text-gray-700 whitespace-pre-wrap border border-gray-200">
                          {mail.text}
                        </div>
                      </div>
                    ))
                  )}
                </div>
              </div>
            </div>
          )}

          {/* メール送信フォーム モーダル */}
          {mailForm.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-lg shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
                <div className="bg-blue-600 px-5 py-4 text-white font-bold text-lg flex items-center gap-3 shrink-0">
                  <Icon name="envelope" size={20} />
                  スタッフへメール送信
                </div>
                <div className="p-5 overflow-y-auto space-y-5">
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-2">宛先の指定</label>
                    <select value={mailForm.targetMode} onChange={handleTargetModeChange} className="w-full rounded-md border border-gray-300 p-3 font-bold outline-none focus:ring-2 focus:ring-blue-300">
                      <option value="all">全スタッフ</option>
                      <option value="unsubmitted">未提出のスタッフのみ</option>
                      <option value="submitted">提出済のスタッフのみ</option>
                      <option value="individual">個別に選択する</option>
                    </select>

                    {mailForm.targetMode === 'individual' && (
                      <div className="mt-3 rounded-md border border-gray-200 max-h-40 overflow-y-auto bg-gray-50 divide-y divide-gray-100">
                        {staffUsers.filter(u => u.status === 'active').map(u => (
                          <label key={u.id} className="flex items-center gap-3 p-3 cursor-pointer hover:bg-gray-100 transition-colors">
                            <input type="checkbox" checked={mailForm.selectedUsers.includes(u.id)} onChange={() => toggleMailUser(u.id)} className="w-4 h-4 accent-blue-600" />
                            <span className="font-bold text-sm text-gray-800">{getDisplayName(u.name)}</span>
                          </label>
                        ))}
                      </div>
                    )}
                    {mailForm.targetMode !== 'individual' && (
                      <p className="text-xs text-gray-500 mt-2 font-bold pl-1">送信対象: {mailForm.selectedUsers.length}名</p>
                    )}
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-2">メールの種類（件名）</label>
                    <select value={mailForm.templateId} onChange={e => {
                      const val = e.target.value;
                      const tpl = emailTemplates.find(t => t.id === val);
                      if(tpl) {
                        setMailForm({...mailForm, templateId: tpl.id, type: tpl.name, text: generateMailText(tpl.body)});
                      }
                    }} className="w-full rounded-md border border-gray-300 p-3 font-bold outline-none focus:ring-2 focus:ring-blue-300">
                      {emailTemplates.map(tpl => <option key={tpl.id} value={tpl.id}>{generateMailText(tpl.name)}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-2">本文 <span className="text-gray-400 text-xs font-normal ml-1">※自由に編集可能です</span></label>
                    <textarea value={mailForm.text} onChange={e => setMailForm({...mailForm, text: e.target.value})} className="w-full rounded-md border border-gray-300 p-3 text-sm sm:text-base outline-none focus:ring-2 focus:ring-blue-300 h-40 resize-none shadow-inner" placeholder="メッセージを入力してください" />
                  </div>
                </div>
                <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t shrink-0">
                  <button onClick={() => setMailForm({...mailForm, isOpen: false})} className="px-5 py-2.5 rounded-md text-sm sm:text-base font-bold text-gray-600 hover:bg-gray-200 transition-colors">キャンセル</button>
                  <button onClick={handleSendMail} disabled={!mailForm.text.trim() || mailForm.selectedUsers.length === 0} className={`px-6 py-2.5 rounded-md text-sm sm:text-base font-bold text-white shadow-sm transition-colors flex items-center gap-2 ${(!mailForm.text.trim() || mailForm.selectedUsers.length === 0) ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}>
                    <Icon name="paper-plane" /> 送信する
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* メモ入力モーダル */}
          {modal.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-lg shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
                <div className="bg-indigo-600 px-5 py-4 text-white font-bold text-lg flex items-center gap-3">
                  <Icon name={modal.type === 'daily' ? 'calendar-alt' : 'comment-alt'} size={20} />
                  {modal.type === 'daily' ? `${currentMonth}月${modal.targetId}日のメモ設定` : '個人宛メッセージ'}
                </div>
                <div className="p-5">
                  <textarea value={modal.text} onChange={(e) => setModal({ ...modal, text: e.target.value })} placeholder="内容を入力" className="w-full rounded-md border border-gray-300 p-4 text-base focus:ring-2 focus:ring-indigo-500 outline-none h-32 resize-none shadow-inner" />
                </div>
                <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t">
                  <button onClick={() => setModal({ isOpen: false, type: '', targetId: null, text: '' })} className="px-5 py-2.5 rounded-md text-base font-bold text-gray-600 hover:bg-gray-200">キャンセル</button>
                  <button onClick={handleSaveModal} className="px-5 py-2.5 rounded-md text-base font-bold bg-indigo-600 text-white hover:bg-indigo-700 shadow-sm">保存する</button>
                </div>
              </div>
            </div>
          )}

          {/* 変更申請フォームのモーダル */}
          {changeForm.isOpen && (() => {
            const isReasonEmpty = !changeForm.reason.trim();
            const isCategoryEmpty = !changeForm.changeCategory;
            const isSubmitDisabled = isReasonEmpty || isCategoryEmpty;
            
            return (
              <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
                <div className="bg-white rounded-lg shadow-2xl w-full max-w-md overflow-hidden max-h-[90vh] flex flex-col">
                  <div className="bg-red-600 px-5 py-4 text-white font-bold text-lg flex items-center gap-3 shrink-0">
                    <Icon name="edit" size={20} />
                    確定後シフト変更申請
                  </div>
                  <div className="p-4 sm:p-5 overflow-y-auto flex-1 space-y-5">
                    
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">対象となる日付</label>
                      <select value={changeForm.day} onChange={(e) => handleChangeFormDay(e.target.value)} className="w-full rounded-md bg-gray-50 border border-gray-300 p-3 text-base font-bold outline-none focus:ring-2 focus:ring-red-300 cursor-pointer">
                        {daysArray.map(d => <option key={d} value={d}>{currentMonth}月{d}日 ({getDayOfWeek(d)})</option>)}
                      </select>
                    </div>
                    
                    <div className="bg-gray-50 rounded-md p-4 border border-gray-200">
                      <p className="text-xs text-gray-500 font-bold mb-1 flex items-center gap-1"><Icon name="info-circle"/> 現在の登録内容</p>
                      <p className="font-bold text-gray-800 text-lg">
                        {(() => {
                          const shiftForDay = (shifts[currentUser?.id] || {})[changeForm.day];
                          return shiftForDay ? formatShiftStr(shiftForDay) : '未入力';
                        })()}
                      </p>
                    </div>

                    <div className="border-t border-gray-200 pt-4">
                      <div className="mb-4">
                        <label className="block text-sm font-bold text-gray-700 mb-2">区分 <span className="text-red-500 text-xs">*必須</span></label>
                        <div className="flex gap-2">
                          {['自己変更', '依頼変更'].map(c => (
                            <button key={c} onClick={() => setChangeForm({...changeForm, changeCategory: c})} className={`flex-1 rounded-md py-2.5 text-sm font-bold transition-all border ${changeForm.changeCategory === c ? 'bg-red-600 text-white border-red-600 shadow-md' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-50'}`}>{c}</button>
                          ))}
                        </div>
                      </div>

                      <label className="block text-sm font-bold text-red-600 mb-3 flex items-center gap-2"><Icon name="arrow-down"/> 変更後の希望シフトを入力</label>
                      <div className="flex gap-2 mb-3">
                        <button onClick={() => setChangeForm({...changeForm, status: '休'})} className={`flex-1 rounded-md py-2.5 text-sm font-bold whitespace-nowrap transition-all border ${changeForm.status === '休' ? 'bg-red-500 text-white border-red-500 shadow-md' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'}`}>休</button>
                        <button onClick={() => setChangeForm({...changeForm, status: '有休'})} className={`flex-1 rounded-md py-2.5 text-sm font-bold whitespace-nowrap transition-all border ${changeForm.status === '有休' ? 'bg-teal-500 text-white border-teal-500 shadow-md' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'}`}>有休</button>
                        <button onClick={() => setChangeForm({...changeForm, status: '勤務'})} className={`flex-1 rounded-md py-2.5 text-sm font-bold whitespace-nowrap transition-all border ${changeForm.status === '勤務' ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50'}`}>勤務</button>
                      </div>

                      {(changeForm.status === '勤務' || (changeForm.status === '休' && changeForm.canWorkIfNeeded)) && (
                        <div className="flex items-center gap-2 mb-3">
                          <select value={changeForm.start} onChange={(e) => setChangeForm({...changeForm, start: e.target.value})} className="flex-1 rounded-md bg-white border border-gray-300 text-base p-2.5 text-center font-bold">
                            {HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}
                          </select>
                          <span className="text-gray-400 font-bold">~</span>
                          <select value={changeForm.end} onChange={(e) => setChangeForm({...changeForm, end: e.target.value})} className="flex-1 rounded-md bg-white border border-gray-300 text-base p-2.5 text-center font-bold">
                            {HOUR_OPTIONS.map(t => <option key={t} value={t}>{t || '--:--'}</option>)}
                          </select>
                        </div>
                      )}

                      {changeForm.status === '休' && (
                        <label className="flex items-center cursor-pointer gap-2.5 bg-gray-50 px-3 rounded-md py-2.5 border border-gray-200 mb-3">
                          <input type="checkbox" className="sr-only peer" checked={changeForm.canWorkIfNeeded} onChange={() => setChangeForm({...changeForm, canWorkIfNeeded: !changeForm.canWorkIfNeeded})} />
                          <div className="relative w-10 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-orange-500"></div>
                          <span className="text-sm font-bold text-gray-600">出勤調整可能</span>
                        </label>
                      )}

                      <input type="text" value={changeForm.note || ''} onChange={(e) => setChangeForm({...changeForm, note: e.target.value})} placeholder="備考 (任意)" className="w-full rounded-md bg-white border border-gray-300 text-base px-4 py-2.5 focus:ring-2 focus:ring-red-300 outline-none" />
                    </div>

                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-1.5">変更理由 <span className="text-red-500 text-xs">*必須</span></label>
                      <textarea value={changeForm.reason} onChange={(e) => setChangeForm({...changeForm, reason: e.target.value})} placeholder="例: 予定していた病院の予約日時が変更になったため" className="w-full rounded-md border border-gray-300 p-3 text-sm sm:text-base focus:ring-2 focus:ring-red-300 outline-none h-24 resize-none shadow-inner" />
                    </div>

                  </div>
                  <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t shrink-0">
                    <button onClick={() => setChangeForm({ ...changeForm, isOpen: false })} className="px-5 py-2.5 rounded-md text-sm sm:text-base font-bold text-gray-600 hover:bg-gray-200 transition-colors">キャンセル</button>
                    <button 
                      onClick={submitChangeRequest} 
                      disabled={isSubmitDisabled}
                      className={`px-6 py-2.5 rounded-md text-sm sm:text-base font-bold text-white shadow-sm transition-colors flex items-center gap-2 ${isSubmitDisabled ? 'bg-gray-400 cursor-not-allowed' : 'bg-red-600 hover:bg-red-700'}`}
                    >
                      <Icon name="paper-plane" size={14}/> 申請する
                    </button>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* カスタム確認モーダル */}
          {confirmModal.isOpen && (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] p-4 animate-fade-in pb-safe">
              <div className="bg-white rounded-lg shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
                <div className={`${confirmModal.title.includes('エラー') || confirmModal.title.includes('警告') ? 'bg-red-600' : confirmModal.title.includes('完了') ? 'bg-blue-600' : 'bg-yellow-500'} px-5 py-4 text-white font-bold text-lg flex items-center gap-2`}>
                  <Icon name={confirmModal.title.includes('エラー') || confirmModal.title.includes('警告') ? 'exclamation-triangle' : confirmModal.title.includes('完了') ? 'check-circle' : 'info-circle'} /> {confirmModal.title}
                </div>
                <div className="p-6 text-gray-800 text-sm sm:text-base font-medium space-y-2 whitespace-pre-wrap leading-relaxed">
                  {confirmModal.message}
                </div>
                <div className="bg-gray-50 px-5 py-4 flex justify-end gap-3 border-t">
                  {!confirmModal.isAlert && <button onClick={() => setConfirmModal({ isOpen: false, type: '', title: '', message: '', onConfirm: null, isAlert: false })} className="px-5 py-2.5 rounded-md text-sm sm:text-base font-bold text-gray-600 hover:bg-gray-200 transition-colors">キャンセル</button>}
                  <button onClick={() => { if(confirmModal.onConfirm) confirmModal.onConfirm(); setConfirmModal({ isOpen: false, type: '', title: '', message: '', onConfirm: null, isAlert: false }); }} className={`px-6 py-2.5 rounded-md text-sm sm:text-base font-bold text-white shadow-sm transition-colors ${confirmModal.title.includes('エラー') || confirmModal.title.includes('警告') ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'}`}>
                    {confirmModal.isAlert ? 'OK' : '実行する'}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
